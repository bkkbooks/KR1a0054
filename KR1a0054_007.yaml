body:
  text: 周易要義卷二上宋魏了翁輯泰至謙一泰不具四德物大通則多失節乾下坤上泰小往大來吉亨正義曰小往大來吉亨者隂去故小往陽長故大來以此吉而亨通此卦亨通之極而四德不具者物既泰通多失其節故不得以為元始而利貞也所以象云財成輔相故四德不具泰如字大通也鄭云通也馬云大也坤宫三世卦二天地之道謂四時之氣宜謂地所宜象曰天地交泰后以財成天地之道輔相天地之宜以左右民泰者物大通之時也上下大通則物失其節故財成而輔相以左右民也天地之道者謂四時也冬寒夏暑春生秋殺之道若氣相交通則物失其節物失其節則冬溫夏寒秋生春殺君當財節成就使寒暑得其常生殺依其節此天地自然之氣故云天地之道也天地之宜者謂天地所生之物各有其宜若大司徒云其動物植物及職方云揚州其貢宜稻麥雍州其貢宜黍稷若天氣大同則所宜相反故人君輔助天地所宜之物各安其性得其宜三三處天地之際將復其所處九三無平不陂無往不復艱貞無咎勿恤其孚于食有福乾本上也坤本下也而得泰者降與升也而三處天地之際將復其所處復其所處則上守其尊下守其卑是故無往而不復也無平而不陂也處天地之將閉平路之將陂時將大變世將大草而居不失其正動不失其應艱而能貞不失其義故無咎也信義誠著故不恤其孚而自明也故曰勿恤其孚于食有福也陂彼僞反徐甫寄反傾也注同又破河反偏也象曰無往不復天地際也天地將各分復之際四乾樂上復坤樂下復故曰翩翩六四翩翩不富以其鄰不戒以孚乾樂上復坤樂下復四處坤首不固所居見命則退故曰翩翩也坤爻皆樂下已退則從故不待富而用其鄰也莫不與已同其志願故不待戒而自孚也象曰翩翩不富皆失實也不戒以孚中心願也正義曰六四翩翩者四主坤首而欲下復見命則退故翩翩而下象曰皆失實者解翩翩不富之義由衆隂皆失其本實所居之處今既見命翩翩樂動不待財富並悉從之故云皆失實也不戒以孚中心願者解不戒以孚之義所以不待六四之戒告而六五上六皆已孚信者由中心皆願下復故不待戒而自孚也五女處尊位而應二故為帝乙歸妹六五帝乙歸妹以祉元吉婦人謂嫁曰歸泰者隂陽交通之時也女處尊位履中居順降身應二感以相與用中行願不失其禮帝乙歸妹誠合斯義履順居中行願以祉盡夫隂陽交配之宜故元吉也祉音恥一音勑子反又音止六居泰上極否道已成故告命不行上六城復于隍勿用師自邑告命貞吝居泰上極各反所應泰道將滅上下不交卑不上承尊不下施是故城復于隍卑道崩也勿用師不煩攻也自邑告命貞吝否道已成命不行也隍音皇城塹也子夏作隍姚作湟正義曰子夏傳云隍是城下池也城之為體由基土培扶乃得為城今下不培扶則損壞以此崩倒反復於隍猶君之為體由臣之輔翼今上下不交臣不扶君君道傾危七否大往小來故匪人不利君子貞坤下乾上否之匪人不利君子貞大往小來疏否之至小來正義曰否之匪人者言否閉之世非是人道交通之時故云匪人不利君子貞者由小人道長君子道消故不利君子為正也陽氣往而隂氣來故云大往小來陽主生息故稱大隂主消耗故稱小否備鄙反卦內同閉也塞也乾宫三世卦八三隂類進貞而不諂則吉亨初六拔茅茹以其彚貞吉亨居否之初處順之始為類之首者也順非健也何可以征居否之時動則入邪三隂同道皆不可進故茅茹以類貞而不諂則吉亨邪似嗟反諂勑檢反象曰拔茅貞吉志在君也志在于君故不苟進九包承小人吉大人否亨六二包承至亂羣也正義曰包承者居否之世而得其位用其至順包承于上小人吉者否閉之時小人路通故於小人為吉也大人否亨者若大人用此包承之德能否閉小人之吉其道乃亨象曰大人否亨不亂羣者此釋所以大人否亨之意良由否閉小人防之以得其道小人雖盛不敢亂羣十同人足以涉難然必利君子貞離下乾上同人于野亨利涉大川利君子貞正義曰同人謂和同于人于野亨者野是廣逺之處借其野名喻其廣逺言和同于人必須寬廣無所不同用心無私處非近狹逺至于野乃得亨通故云同人于野亨與人同心足以涉難故曰利涉大川也與人和同易涉邪僻故利君子貞也此利涉大川假物象以明人事同人和同也離宫歸魂卦十一同人非二所能故曰乾行曰同人曰同人曰同人于野亨利涉大川乾行也所以乃得同人于野亨利涉大川非二之所能也是乾之所行故特曰同人曰十二天火性同上故法之以類族辨物象曰天與至辨物正義曰天體在上火又炎上取其性同故云天與火同人君子以類族辨物者族聚者也言君子法此同人以類而聚也辨物謂分辨事物各同其黨使自相同不間雜也辨如字王肅卜免反十三初九無係吝出門逢人則同初九同人于門至誰咎也正義曰同人于門者居同人之首無應于上心無係吝含𢎞光大和同于人在于門外出門皆同故云無咎也象曰又誰咎者釋出門同人無咎之義言既心無係吝出門逢人皆同則誰與為過咎十四注同人不泰則用師總論一卦上九同人于郊無悔郊者外之極也處同人之時最在于外不獲同志而逺于內爭故雖無悔吝亦未得其志逺袁萬反爭爭鬪之爭象曰同人于郊志未得也凡處同人而不泰焉則必用師矣不能大通則各私其黨而求利焉楚人亡弓不能忘楚愛國愈甚益為他災是以同人不𢎞剛健之爻皆至用師也正義曰凡處同人而不泰焉則必用師矣者王氏注意非止上九一爻乃總論同人一卦之義去初上而言二有同宗之吝三有伏戎之禍四有不克之困五有大師之患是處同人之世無大通之志則必用師矣楚人亡弓不能忘楚愛國愈甚益為他災者案孔子家語弟子好生篇云楚昭王出逰亡烏號之弓左右請求之王曰楚人亡弓楚人得之又何求焉孔子聞之曰惜乎其志不大也不曰人亡弓人得之何必楚也昭王名軫哀六年吳伐陳楚救陳在城父卒此愛國而致他災也引此者證同人不𢎞皆至用師矣十五大有則必能大通故云元亨乾下離上大有元亨不大通何由得大有乎大有則必元亨矣正義曰大有元亨者柔得尊位羣陽並應能大所有故稱大有既能大有則其物大得亨通故云大有元亨大有包容豐富之象乾宫歸魂卦十六大有包容之象故為遏惡揚善順命象曰火在天上大有君子以遏惡揚善順天休命大有包容之象故遏惡揚善成物之性順天休命順物之命正義曰不云天在火下而云火在天上者天體髙明火性炎上是照耀之物而在于天上是光明之甚無所不照亦是包含之義又為揚善之理也十七公用亨于天子衆家並香兩反九三公用亨于天子小人弗克處大有之時居下體之極乘剛健之上而履得其位與五同功威權之盛莫此過焉公用斯位乃得通乎天子之道也小人不克害可待也亨許庚反通也下同衆家並香兩反京云獻也于云享宴也姚云享祀也十八匪其彭作旁謂九三九四匪其彭無咎既失其位而上近至尊之威下比分權之臣其為懼也可謂危矣惟夫有聖知者乃能免斯咎也三雖至盛五不可舍能辨斯數專心承五常匪其旁則無咎矣旁謂三也彭步郎反子夏傳作旁于云彭亨驕滿貌王肅云壯也虞作尫姚云彭旁俗音同十九易中言吉不言吉或大人吉或小人吉艮下坤上謙亨君子有終正義曰謙者屈躬下物先人後已以此待物則所在皆通故曰亨也小人行謙則不能長久唯君子有終也謙必獲吉其吉可知故不言之凡易經之體有吉理可知而不言吉者即此謙卦之繇及乾之九五利見大人是吉理分明故不云吉也若坤之六五及泰之六五並以隂居尊位若不行此事則無吉若行此事則得其吉故並稱元吉其餘皆言吉事亦倣此亦有大人為吉于小人為凶若否之九五云休否大人吉是也或有于小人為吉大人為凶若屯之九五小貞吉大貞凶及否之六二包承小人吉之類是也亦有其吉灼然而稱吉者若大有上九自天祐之吉無不利之類是也但易之為體不可以一為例今各隨文解之義具諸卦之下今謙卦之繇其吉可知也既不云吉何故初六六二及九三並云吉者謙卦是總諸六爻其善既大故不須云吉也六爻各明其義其義有優劣其德既小嫌其不吉故須吉以明之也謙卑退為義屈已下物也兊宫五世卦子夏作嗛云嗛謙也二十天下濟地上通及虧益變流等義彖曰謙亨至之終也正義曰謙亨天道下濟而光明地道卑而上行者此釋亨義也欲明天地上下交通坤體在上故言地道卑而上行也其地道既上行天地相對則天道下濟也且艮為陽卦又為山天之髙明今在下體亦是天道下濟之義也下濟者謂降下濟生萬物也而光明者謂三光垂耀而顯明也地道卑而上行者地體卑柔而氣上行交通於天以生萬物也天道虧盈而益謙者從此以下廣說謙德之美以結君子能終之義也虧謂减損减損盈滿而增益謙退若日中則昃月盈則食是虧减其盈盈者虧减則謙者受益也地道變盈而流謙者丘陵川谷之屬髙者漸下下者益髙是改變盈者流布謙者也鬼神害盈而福謙者驕盈者被害謙退者受福是害盈而福謙也人道惡盈而好謙者盈溢驕慢者皆以惡之謙退恭巽悉皆好之謙尊而光卑而不可踰者尊者有謙而更光明盛大卑謙而不可踰越是君子之所終也言君子能終其謙之善事又獲謙之終福故云君子之終也二十一裒多是尊光益寡是卑不可踰象曰地中有山謙君子以裒多益寡稱物平施多者用謙以為裒少者用謙以為益隨物而與施不失平也正義曰裒多者君子若能用此謙道則裒益其多言多者得謙物更裒聚彌益多也故云裒多即謙尊而光也是尊者得謙而光大也益寡者謂寡者得謙而更進益即卑而不可踰也是卑者得謙而更增益不可踰越也稱物平施者稱此物之多少均平而施二十二謙爻雖有失位無應乘剛皆無凶咎上六鳴謙利用行師征邑國最處於外不與內政故有鳴而已志功未得也處外而履謙順可以征邑國而已征邑國本或作征國邑者非象曰鳴謙志未得也可用行師征邑國也夫吉凶悔吝生乎動者也動之所起興於利者也故飲食必有訟訟必有衆起未有居衆人之所惡而為動者所害處不競之地而為爭者所奪是以六爻雖有失位無應乘剛而皆無凶咎悔吝者以謙為主也謙尊而光卑而不可踰信矣哉周易要義卷二上

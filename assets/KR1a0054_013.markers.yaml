  - {type: variant, offset: 0, length: 269, content: 欽定四庫全書周易要義卷五上宋魏了翁輯夬至井一夬以剛决柔可告邑不利即戎利有攸往乾下兑上夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬與剥反者也剥以柔變剛至于剛幾盡夬以剛决柔如剥之消剛剛隕則君子道消柔消則小人道隕正義曰夬决也此隂消陽息之卦也陽長至五五陽共决一隂故名爲夬也揚于王庭者明行决斷之法號號令也行决之法先須號令夬以剛决柔則是用明信之法而宣其號令如此即柔邪者危故曰孚號有厲也以剛制斷行令于邑可也若用剛即戎尚力取勝爲物所疾以此用師必有不利故曰告自邑不利即戎雖不利即戎然剛徳不長則柔邪不消故陽爻宜有所往夬道乃成故曰利有攸往也夬古怪反决也坤宫五世卦, SBCK: ''}

  - {type: variant, offset: 0, length: 3882, content: 欽定四庫全書周易要義卷三下宋魏了翁輯大畜至離一大畜艮能止乾小畜巽不能止乾乾下艮上大畜利貞不家食吉利涉大川正義曰謂之大畜者乾剛上進艮止在上止而畜之能畜止剛健故曰大畜彖云能止健大正也是能止健故為大畜也小畜則巽在乾上以其巽順不能畜止乾之剛故云小畜也此則艮能止之故為大畜也利貞者人能止健非正不可故利貞也不家食吉者已有大畜之資當須養贍賢人不使賢人在家自食如此乃吉也利涉大川者豐財養賢應于天道不憂險難故利渉大川畜本又作蓄勅六反義與小畜同艮宫二世卦二物弱而薄則退隕剛健篤實故日新彖曰大畜剛健篤實煇光日新其徳凡物既厭而退者弱也既榮而隕者薄也夫能煇光日新其徳唯剛健篤實也三王以篤實煇光絶句鄭日新絶句大畜剛健絶句篤實煇光絶句煇音輝日新其徳鄭以日新絶句其徳連下句正義曰言大畜剛健篤實者此釋大畜之義剛健謂乾也乾體剛性健故言剛健也篤實謂艮也艮體静止故稱篤實也煇光日新其徳者以其剛健篤實之故故能輝耀光榮日日增新其徳四天在山中取徳積於身中象曰天在山中大畜君子以多識前言往行以畜其徳物之可畜於懐令徳不散盡於此也正義曰天在山中者欲取徳積於身中故云天在山中五鄭本良馬逐逐曰閑輿衛九三良馬逐利艱貞曰閑輿衛利有攸往凡物極則反故畜極則通初二之進值於畜盛故不可以升至於九三升於上九而上九處天衢之亨塗徑大通進无違距可以馳騁故曰良馬逐也履當其位進得其時在乎通路不憂險阨故利艱貞也閑閡也衛護也進得其時雖涉艱難而无患也輿雖遇閑而故衛也與上合志故利有攸往也逐如字鄭本作逐逐云兩馬走也姚云逐逐疾並驅之貌一音胄曰音越劉云曰猶言也鄭人寔反云日習車徒六何天之衢音河梁武音賀上九何天之衢亨處畜之極畜極則通大畜以至于大亨之時何辭也猶云何畜乃天之衢亨也何音河梁武帝音賀七觀頤觀所飬物自求口實觀自飬震下艮上頤貞吉觀頤自求口實正義曰頤貞吉者于頤飬之世養此貞正則得吉也觀頤者頤養也觀此聖人所養物也自求口實者觀其自飬求其口中之實也頤以之反飬也此篆文字也巽宫遊魂卦八禍從口出患從口入故謹節象曰山下至飲食正義曰山止于上雷動于下頤之為用下動上止故曰山下有雷頥人之開𤼵言語咀嚼飲食皆動頥之事故君子觀此頥象以謹慎言語裁節飲食先儒云禍從口出患從口入故于頥養而慎節也九居養賢之世舎靈龜而羨朶頥初九舎爾靈龜觀我朶頥凶朶頥者嚼也以陽處下而為動始不能令物由已養動而求養者也夫安身莫若不競修已莫若自保守道則福至求禄則辱來居養賢之世不能貞其所履以全其徳而舎其靈龜之明兆羨我朶頥而躁求離其致養之至道闚我寵禄而競進凶莫甚焉象曰觀我朶頥亦不足貴也正義曰朶頥者嚼也者朶是動義如手之捉物謂之朶也今動其頤故知嚼也不能令物由已養者若道徳𢎞大則已能養物是物由已養今身處无位之地又居震動之始是動而自求養也十顛頤謂上養下拂經于丘不奉上六二顛頤拂經于丘頤征凶養下曰顛拂違也經猶義也丘所履之常也處下體之中无應于上反而養初居下不奉上而反養下故曰顛頤拂經于丘也以此而養未見其福也以此而行未見有與故曰頥征凶十一虎視威而不猛欲逐逐尚敦實六四顛頥吉虎視耽耽其欲逐逐无咎頥屬上體居得其位而應於初以上養下得頥之義故曰顛頥吉也下交不可以瀆故虎視耽耽威而不猛不惡而嚴養徳施賢何可有利故其欲逐逐尚敦實也修此二者然後乃得全其吉而无咎觀其自養則履正察其所養則養陽頥爻之貴斯為盛矣視徐市志反又常止反眈丁南反威而不猛也馬云虎下視貌十二衆隂宗一陽以養故曰由頥上九由頥至有慶也正義曰由頥者以陽處上而履四隂隂不能獨為其主必宗事于陽也衆隂莫不由之以得其養故曰由頥也厲吉者為衆隂之主不可褻瀆嚴厲乃吉十三大過言超過王肅音戈巽下兌上大過音相過之過徐並古卧反罪過也超過也王肅音戈震宫遊魂卦十四聖人越常理拯患難故曰大過正義曰過謂過越之過非經過之過此衰難之世唯陽爻乃大能過越常理以拯患難也故曰大過以人事言之猶若聖人過越常理以拯患難也棟橈者謂屋棟也本之與末俱橈弱以言衰亂之世始終皆弱也利有攸往亨者既遭衰難聖人利有所往以拯患難乃得亨通十五澤越常而滅木君子處衰難而獨立象曰澤滅至无悶正義曰澤滅木者澤體處下木體處上澤无滅木之理今云澤滅木者乃是澤之甚極而至滅木是極大過越之義其大過之卦有二義也一者物之自然大相過越常分即此澤滅木是也二者大人大過越常分以拯患難則九二枯楊生稊老夫得其女妻是也君子以獨立不懼遯世无悶者明君子於衰難之時卓爾獨立不有畏懼𨼆遯於世而无憂悶欲有遯難之心其操不改凡人遇此則不能然唯君子獨能如此是其過越之義遯本又作遁十六枯楊生稊老夫得女妻言過以相與九二枯楊生稊老夫得其女妻无不利稊者楊之秀也以陽處隂能過其本而救其弱者也上无其應心无特吝處過以此无衰不濟也故能令枯楊更生稊老夫更得少妻拯弱興衰莫盛斯爻故无不利也老過則枯少過則稚以老分少則稚者長以稚分老則枯者榮過以相與之謂也大過至衰而已至壯以至壯輔至衰應斯義也十七棟隆則其下榱柱亦不被橈九四棟隆至乎下也正義曰棟隆吉者體居上體以陽處隂能拯救其弱不為下所橈故得棟隆起而𫉬吉也有它吝者以有應在初心不𢎞濶故有它吝也象曰棟隆之吉不橈乎下也者釋棟隆之吉以其能拯于難不被橈乎在下故得棟隆吉九四應初行又謙順能拯于難然唯只拯初初謂下也下得其拯猶若所居屋棟隆起下必不橈弱何得云不被橈乎在下但經文云棟橈彖釋棟橈者本末弱也以屋棟橈弱而偏則屋下榱柱亦先弱柱為本榱為末觀此彖辭是已見其義故子産云棟折榱崩僑將壓焉以屋棟橈折則榱柱亦同崩則此義也十七過之甚而意則善則不可咎上六過涉滅頂凶无咎處大過之極過之甚也涉難過甚故至於滅頂凶志在救時故不可咎也頂徐都冷反象曰過渉之凶不可咎也雖凶无咎不害義也正義曰猶龍逢比干憂時危亂不懼誅殺直言深諫以忤無道之主遂至滅亡其意則善而功不成復有何咎責十八坎險陷之名習有二義坎下坎上習坎坎險陷之名也習謂便習之習便習也重也劉云水流行不休故曰習坎徐苦感反本亦作掐京劉作欿險也陷也八純卦象水陷陷沒之陷便婢面反通見後十九内亨外闇内剛外順故行有尚有孚維心亨剛正在内有孚者也陽不外𤼵而在乎内心亨者也行有尚内亨外闇内剛外順以此行險行有尚也正義曰心亨言心得通也行有尚者内亨外闇内剛外柔以此行險事事可上故云行有尚也案諸卦之名皆于卦上不加其字此坎卦之名特加習者以坎為險難故特加習名習有二義一者習重也謂上下俱坎是重疊有險險之重疊乃成險之用也二者人之行險先須便習其事乃可得通二十來之坎居亦坎故曰險且枕六三來之坎坎險且枕入于坎窞勿用既履非其位而又處兩坎之間出則之坎居則亦坎故曰來之坎坎也枕者枕枝而不安之謂也出則无之處則无安故曰險且枕也來之皆坎无所用之徒勞而已險且如字古文及鄭向本作檢鄭云木在手曰檢枕徐針鴆反王肅針甚反鄭𤣥云木在首曰枕二十一四五剛柔相際故尊酒簋貳儉約成禮六四樽酒簋貳用缶納約自牖終无咎處重險而履正以柔居柔履得其位以承于五五亦得位剛柔各得其所不相犯位皆无餘應以相承比明信顯著不存外飾處坎以斯雖復一樽之酒二簋之食瓦缶之器納此至約自進于牖乃可羞之于王公薦之于宗廟故終无咎也樽酒音尊絶句簋貳音軌絶句用缶方有反絶句舊讀樽酒簋絶句貳用缶一句象曰樽酒簋貳剛柔際也剛柔相比而相親焉際之謂也正義曰所以一樽之酒貳簋之食得進獻者以六四之柔與九五之剛兩相交際而相親故得以此儉約而為禮也二十二坎盡平乃无咎明九五未免于咎九五坎不盈祗既平无咎為坎之主而无應輔可以自佐未能盈坎者也坎之不盈則險不盡矣祗辭也為坎之主盡平乃无咎故曰祗既平无咎也說既平乃无咎明九五未免於咎也祗音支又祁支反鄭云當為坻小丘也二十三離以柔為正不可畜剛故畜牝牛吉離下離上離利貞亨離之為卦以柔為正故必貞而後乃亨故曰利貞亨也畜牝牛吉柔處于内而履正中牝之善也外强而内順牛之善也離之為體以柔順為主者也故不可以畜剛猛之物而吉於畜牝牛也二十四柔不處内不履正中皆非牝之善正義曰柔處於内而履正中牝之善也者若柔不處於内似婦人而預外事若柔而不履正中則邪僻之行皆非牝之善也二十五柔麗乎中正故亨謂六五六二正義柔麗乎中正故亨是以畜牝牛吉者釋經亨義也又總釋畜牝牛吉也柔麗于中正謂六五六二之柔皆麗于中中則不偏故云中正以中正為徳故萬事亨以中正得通故畜養牝牛而得吉也以牝牛有中正故也案諸卦之彖釋卦名之下乃釋卦下之義于後乃歎而美之此彖既釋卦名即廣歎為卦之美乃釋卦下之義與諸卦不例者此乃夫子隨義則言因文之便此既釋離名麗因廣說日月草木所麗之事然後却明卦下之義更無義例二十六八純卦象各異此言兩明乃作離象曰明兩至于四方正義曰明兩作離者離為日日為明今有上下二離故云明兩作離也案八純之卦論象不同各因卦體事義隨文而𤼵乾坤不論上下之體直總云天行健地𫝑坤以天地之大故總稱上下二體也雷是連續之至水為流注不已義皆取連續相因故震云洊雷坎云洊至也風是摇動相隨之物故云隨風巽也山澤各自為體非相入之物故云兼山艮麗澤兊是兩物各行也今明之為體前後各照故云明兩作離是積聚兩明乃作于離若一明暫絶其離未乆必聚兩明前後相續乃得作離卦之美故云大人以繼明照於四方是繼續其明乃得照於四方若明不繼續則不得乆為照臨所以特云明兩作離取不絶之義也作鄭云作起也荀云用也二十七黄離元吉以居中得位而處于文明六二黄離元吉居中得位以柔處柔履文明之盛而得其中故曰黄離元吉也正義曰黄者中色也離者文明居中得位而處於文明故元吉也故象云得中道以其得中央黄色之道也二十八六五柔乘剛四來害已至於沱嗟六五出涕沱若戚嗟若吉履非其位不勝所履以柔乘剛不能制下下剛而進將來害己憂傷之深至于沱嗟也然所麗在尊四為逆首憂傷至深衆之所助故乃沱嗟而𫉬吉也出如字徐尺遂反王嗣宗勑𩔖反二十九五為王位而言王公便文以㑹韻正義象曰六五之吉離王公者此釋六五吉義也所以終得吉者以其所居在五離附于王公之位被衆所助故得吉也五為王位而言公者此連王而言公取其便文以會韻也離王公音麗鄭作麗王肅云麗王者之後為公梁武力智反周易要義卷三下, SBCK: 豫}

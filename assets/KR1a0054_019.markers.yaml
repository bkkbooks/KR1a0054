  - {type: variant, offset: 5259, length: 0, content: '', SBCK: 周易要義卷第九􅀃卦一幽贊神明而生􅆱􅆱蒿屬昔者聖人之作易也幽贊於神明而生􅆱幽深也贊明也􅆱受命如響不知所以然而然也贊本或作讃子旦反􅆱音尸􅀃文云蒿屬生千歳三百莖易以爲數天子九尺諸侯七尺大夫五尺士三尺毛詩草木䟽云似藾蕭青色科生鴻範五行傳云􅆱百年一本生百莖論衡云七十歳生一莖七百歳生十莖神靈之物故生遲也史記云生滿百莖者其下必有神􅀛守之其上常有雲氣覆之淮南子云上有叢􅆱下有伏􅀛二􅆱極數以定象卦備象以盡數參天兩地而􅀝數參竒也兩耦也七九陽數六八隂數􅀚變於隂陽而立卦卦象也􅆱數也卦則雷風相薄山澤通氣擬象隂陽變化之體􅆱則錯綜天地參兩之數􅆱極數以定象卦備象以盡數故􅆱曰參天兩地而􅀝數卦曰觀變於隂陽也􅀚變一本作􅀚變化發揮於剛柔而生爻剛柔發散變動相生三孔子備陳伏羲重卦之由爲􅀃卦正義曰􅀃卦者陳􅀃八卦之德業變化及法象所爲也孔子以伏羲畫八卦後重爲六十四卦八卦爲六十四卦之本前繫辭中略明八卦小成引而伸之觸􅀋而長之天下之能事畢矣又曰八卦成列象在其中矣因而重之爻在其中矣又云古者包犧氏之王天下也仰則􅀚象於天俯則􅀚法於地􅀚鳥獸之文與地之冝近取諸身逺取諸物於是始作八卦以通神明之德以􅀋萬物之情然引而伸之重三成六之意猶自未明仰􅀚俯察近身逺物之象亦爲未見故孔子於此更備􅀃重卦之由及八卦所爲之象故謂之􅀃卦焉先儒以孔子十翼之次乾坤文言在二繫之後􅀃卦之前以􅂏象附上下二經爲六卷則上繫第七下繫第八文言第九􅀃卦第十輔嗣以文言分附乾坤二卦故􅀃卦爲第九}

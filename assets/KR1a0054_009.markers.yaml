  - {type: variant, offset: 15, length: 5727, content: 无妄一噬嗑亨利用獄言用刑除間乃通震下離上噬嗑亨利用獄噬齧也嗑合也凡物之不親由有間也物之不齊由有過也間與過齧而合之所以通也刑克以通獄之利也噬嗑亨利用獄正義曰噬嗑亨者噬齧也嗑合也物在於口則隔其上下若齧去其物上下乃合而得亨也此卦之名假借口象以為義以喻刑法也凡上下之間有物間隔當須用刑法去之乃得亨通故云噬嗑亨也利用獄者以刑除間之物故利用獄也噬市制反嗑胡臘反巽宫五世卦二諸彖先標卦名唯噬嗑不同正義曰頥中有物曰噬嗑者此釋噬嗑名也案諸卦之彖先標卦名乃復言曰某卦曰同人曰大有曰小畜之類是也此發首不疊卦名者若義幽𨼆者先出卦名後更以卦名結之若其義顯露則不先出卦名則此頥中有物曰噬嗑之類其事可知故不先出卦名此乃夫子因義理文𫝑隨義而發不為例也三易取象非一故噬嗑取分取合剛柔分動而明雷電合而章者釋利用獄之義剛柔既分不相溷雜故動而顯明也雷電既合而不錯亂故事得彰著明而且著可以斷獄剛柔分謂震剛在下離柔在上剛柔云分雷電云合者欲見明之與動各是一事故剛柔云分也明動雖各一事相須而用故雷電云合但易之為體取象既多若取分義則云震下離上若取合義則云離震合體共成一卦也此釋二象利用獄之義四明罰敕法只取雷電不取口象象曰雷電噬嗑先王以明罰勅法正義曰雷電噬嗑者但噬嗑之象其象在口雷電非噬嗑之體但噬嗑象外物既有雷電之體則雷電欲取明罰勅法可畏之義故連云雷電也五勅俗字字林作敕勅耻力反此俗字也字林作敇鄭云勅猶理也一云整六屨校滅趾謂過輕戮薄初九屨校滅趾无咎居无位之地以處刑初受刑而非治刑者也凡過之所始必始于㣲而後至于著罰之所始必始于薄而後至于誅過輕戮薄故屨校滅趾桎其行也足懲而已故不重也過而不改乃謂之過小懲大誡乃得其福故无咎也校者以木絞校者也即械也校者取其通名也七何校滅耳謂刑及其首非誡非懲上九何校滅耳凶處罰之極惡積不改者也罪非所懲故刑及其首至于滅耳及首非誡滅耳非懲凶莫甚焉象曰何校滅耳聰不明也聰不明故不慮惡積至于不可解也正義曰馬云耳无所聞鄭云目不明耳不聰王肅云言其聰之不眀八賁以剛上文柔不得中位故小利離下艮上賁亨小利有攸往正義曰賁飾也以剛柔二象交相文飾也賁亨者以柔来文剛而得亨通故曰賁亨也小利有攸往者以剛上文柔不得中位故不能大有所往故云小利有攸往也賁彼偽反徐甫寄反李軌府麄反傅氏云賁古斑字文章貌鄭云變也文飾之貌王肅符文反云有文飾黄白色艮宫一世卦九賁柔來文剛謂坤上六来居二彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往剛柔不分文何由生故坤之上六來居二位柔來文剛之義也柔來文剛居位得中是以亨乾之九二分居上位分剛上而文柔之義也剛上文柔不得中位不若柔來文剛故小利有攸往上時掌反十天文剛柔交錯人文詩書禮樂正義曰天文也者天之為體二象剛柔剛柔交錯成文是天文也文明以止人文者文明離也以止艮也用此文明之道裁止于人是人之文徳之教此賁卦之象既有天文人文欲廣美天文人文之義聖人用之以治于物也觀乎天文以察時變者言聖人當觀視天文剛柔交錯相飾成文以察四時變化若四月純陽用事隂在其中靡草死也十月純隂用事陽在其中薺麥生也是觀剛柔而察時變也觀乎人文以化成天下者言聖人觀察人文則詩書禮樂之謂當法此教而化成天下也十一坤柔居二乾剛居上此本泰卦正義曰坤之上六何以來居二位不居于初三乾之九二何以分居上位不居于五者乾性剛亢故以已九二上居坤極坤性柔順不為物首故以已上六下居乾之二位也且若柔不分居乾二剛不分居坤極則不得文明以止故也又陽本在上隂本在下應分剛而下分柔而上何因分剛向上柔向下者今謂此本泰卦故也若天地交泰則剛柔得交若乾上坤下則是否閉剛柔不得交故分剛而上分柔而下也十二車字漢以來始有居音初九賁其趾舎車而徒車音居鄭張本作輿從漢時始有居音十三四應初而三㓂故鮮潔其馬以待六四賁如皤如白馬翰如匪㓂婚媾有應在初而閡于三為已㓂雖二志相感不獲通亨欲靜則疑初之應欲進則懼三之難故或飾或素内懐疑懼也鮮絜其馬翰如以待雖履正位未敢果其志也三為剛猛未可輕犯匪㓂乃婚終无尤也皤白波反說文老人貌董音槃云馬作足横行曰皤鄭陸作燔音煩荀作波翰户旦反董黄云馬舉頭髙仰也馬荀云髙也鄭云白也亦作寒案反十四注以儉約釋賁于丘園無聘賢意六五賁于丘園束帛戔戔吝終吉處得尊位為飾之主飾之盛者也施飾於物其道害也施飾丘園盛莫大焉故賁于束帛丘園乃落賁于丘園帛乃戔戔用莫過儉泰而能約故必吝焉乃得終吉也賁于黄本賁作世束帛子夏傳云五匹為束三𤣥二纁象隂陽戔在千反馬云委積貌薛虞云禮之多也又音牋黄云猥積貌一云顯貌子夏傳作殘殘象曰六五之吉有喜也正義曰為飾之主飾之盛者若宫室輿服之屬五為飾主若施設華飾在于輿服宫館之物則大道損害也施飾丘園盛莫大焉者丘謂丘墟園謂園圃唯草木所生是質素之處非華美之所若能施飾每事質素與丘園相似盛莫大焉故賁于束帛丘園乃落者束帛財物也舉束帛言之則金銀珠玉之等皆是也若賁飾于此束帛珍寳則質素之道乃損落故云丘園乃落也賁于丘園帛乃戔戔者設飾在于丘園質素之所則不靡費財物束帛乃戔戔衆多也諸儒以為若賁飾束帛不用聘士則丘園之士乃落也若賁飾丘園之士與之故束帛乃戔戔也諸家注易多為此解但今案輔嗣之注全無聘賢之意且爻之與象亦無待士之文輔嗣云用莫過儉泰而能約故必吝焉乃得終吉此則普論為國之道不尚華侈而貴儉約也十五漢聘士用羔鴈𤣥纁蒲輪駟馬若從先師唯用束帛招聘丘園以儉約待賢豈其義也所以漢聘𨼆士或乃用羔鴈𤣥纁蒲輪駟馬豈止束帛之間而云儉約之事今觀注意故為此解耳十六隂長陽剛剥落故不利往坤下艮上剥不利有攸往正義曰剥者剥落也今隂長變剛剛陽剥落故稱剥也小人既長故不利有攸往剥邦角反彖云剥剥也馬云落也說文云裂也乾宫五世卦十七順止觀象不欲强亢以隕身彖曰順而止之觀象也君子尚消息盈虚天行也坤順而艮止也所以順而止之不敢以剛止者以觀其形象也强亢激拂觸忤以隕身身既傾焉功又不就非君子之所尚也十八剥從下起故取厚下安宅象曰山附至安宅正義曰山附于地剥者山本髙峻今附于地即是剥落之象故云山附于地剥也上以厚下安宅者剥之為義從下而起故在上之人當須豐厚于下安物之居以防於剥也十九剥牀以辨牀身下牀足上初六剥牀以足蔑貞凶牀者人之所以安也剥牀以足猶云剥牀之足也蔑猶削也剥牀之足滅下之道也下道始滅剛隕柔長則正削而凶來也蔑莫結反猶削也楚俗有削滅之言馬云无也鄭云輕慢荀作滅六二剥牀以辨蔑貞凶蔑猶甚極之辭也辨者足之上也剥道浸長故剥其辨也稍近于牀轉欲滅物之所處長柔而削正以斯為徳物所棄也辨徐音辦具之辦足上也馬鄭同黄云牀簀也薛虞膝下也鄭符勉反王肅否勉反正義曰剥牀以辨者辨謂牀身之下牀足之上足與牀身分辨之處也今剥落侵上乃至于辨是漸近人身初既稱蔑二又稱蔑蔑上復蔑此為蔑甚極故云蔑猶甚極之辭也蔑謂㣲蔑物之見削則㣲蔑也故以蔑為削二十羣隂剥陽而三獨應故失上下六三剥之无咎與上為應羣隂剥陽我獨恊焉雖處於剥可以无咎象曰剥之无咎失上下也三上下各有二隂而三獨應於陽則失上下也二十一處剥之時若施寵於宫人而已六五貫魚以宫人寵无不利處剥之時居得尊位為剥之主者也剥之為害小人得寵以消君子者也若能施寵小人似宫人而已不害於正則所寵雖衆終无尤也貫魚謂此衆隂也駢頭相次似魚貫也二十二在君子為碩果得輿小人為剥廬上九碩果不食君子得輿小人剥廬處卦之終獨全不落故果至於碩而不見食也君子居之則民覆䕃小人用之則剥下所庇正義象曰君子得輿民所載者釋得輿之義若君子居處此位養育其民民所仰載也小人剥廬終不可用者言小人處此位為君剥徹民之廬舍此小人終不可用為君也二十三出剛長入陽反故无疾陽來故无咎震下坤上復亨出入无疾朋來无咎反復其道七日來復利有攸往正義曰復亨者陽氣反復而得亨通故曰復亨也出入无疾者出則剛長入則陽反理㑹其時故无疾病也朋來无咎者朋謂陽也反復衆陽朋聚而來則无咎也若非陽衆來則有咎以其衆陽之來故无咎也反復其道七日來復者欲速反之與復而得其道不可過逺唯七日則來復乃合於道也利有攸往者以陽氣方長徃則小人道消也復音服反也還也坤宫一世卦二十四復者反本之謂天地以本為心彖曰復亨剛反動而以順行是以出入无疾入則陽反出則剛長故无疾疾猶病也剛反絶句朋來无咎朋謂陽也反復其道七日來復陽氣始剥盡至來復時凡七日天行也以天之行反覆不過七日復之不可逺也利有攸往剛長也往則小人道消也復其見天地之心乎復者反本之謂也天地以本為心者也凡動息則静静非對動者也語息則黙黙非對語者也然則天地雖大富有萬物雷動風行運化萬變寂然至无是其本矣故動息地中乃天地之心見也若其以有為心則異類未𫉬具存矣二十五七日來復或謂七月或謂六日七分釋注陽氣至凡七日正義曰陽氣始剥盡謂陽氣始於剥盡之後至陽氣來復時凡經七日觀注之意陽氣從剥盡之後至於反復凡經七日其注分明如褚氏莊氏並云五月一隂生至十一月一陽生凡七月而云七日不云月者欲見陽長須速故變月言日今輔嗣云剥盡至來復是從盡至來復經七日也若從五月言之何得云始盡也又臨卦亦是陽長而言八月今復卦亦是陽長何以獨變月而稱七日觀注之意必謂不然亦用易緯六日七分之義同鄭康成之說但於文省畧不復具言案易緯稽覽圖云卦氣起中孚故離坎震兊各主其一方其餘六十卦卦有六爻爻别主一日凡主三百六十日餘有五日四分日之一者每日分為八十分五日分為四百分四分日之一又為二十分是四百二十分六十卦分之六七四十二卦别各得七分是每卦得六日七分也剥卦陽氣之盡在於九月之末十月當純坤用事坤卦有六日七分坤卦之盡則復卦陽來是從剥盡至陽氣來復隔坤之一卦六日七分舉成數言之故輔嗣言凡七日也二十六反入而倒反復謂復而向上反復者則出入之義反謂入而倒反復謂既反之後復而向上也二十七注謂冬至隂之復夏至陽之復象曰雷在地中復先王以至日閉闗商旅不行后不省方方事也冬至隂之復也夏至陽之復也故為復則至于寂然大静先王則天地而行者也動復則静行復則止事復則无事也正義曰雷在地中復者雷是動復卦以動息為主故曰雷在地中不但不可出行亦不可省視事也冬至隂之復夏至陽之復復為反本静為動本冬至一陽生是陽動用而隂復於静也夏至一隂生是隂動用而陽復於静也動復則静二十八不逺復无祗悔幾悔而反初九不逺復无祗悔元吉最處復初始復者也復之不速遂至迷凶不逺而復幾悔而反以此修身患難逺矣錯之於事其殆庶幾乎故元吉也二十九祗悔有數音九家本作多韓訓大祗音支辭也馬同音之是反韓伯祁支反云大也鄭云病也王肅作禔時支反陸云禔安也九家本作多字音㩼幾音機正義曰不逺復者最處復初是始復者也既在陽復即能從而復之是迷而不逺即能復也无祗悔元吉者韓氏云祗大也既能速復是无大悔所以大吉象曰不逺之復以修身者釋不逺之復也三十二得位處中而比陽故曰下仁六二休復吉得位處中最比于初上无陽爻以疑其親陽為仁行在初之上而附順之下仁之謂也既處中位親仁善鄰復之休也象曰休復之吉以下仁也正義曰下如字王肅云下附于仁徐戸嫁反三十一頻復道貴速頻蹙而復故厲六三頻復厲无咎頻頻蹙之貌也處下體之終雖愈于上六之迷已失復逺矣是以蹙也蹙而求復未至于迷故雖危无咎也復道宜速蹙而乃復義雖无咎它來難保頻如字本又作嚬嚬眉也鄭作卑音同馬云憂頻也三十二云中行以居衆隂中應初故云獨復六四中行獨復四上下各有二隂而處厥中履得其位而應于初獨得所復順道而反物莫之犯故曰中行獨復也象曰中行獨復以從道也正義曰中行獨復者處于上卦之下上下各有二隂已獨應初居在衆隂之中故云中行獨自應初故云獨復從道而歸故象云以從道也三十三上六處復後故云迷終敗且凶上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征最處復後是迷者也以迷求復故曰迷復也用之行師難用有克也終必大敗用之于國則反乎君道也大敗乃復量斯勢也雖復十年修之猶未能征也三十四烖灾災文異義同眚祥分内外灾本又作災鄭作烖案說文烖正字也灾或字也災籀文也眚生領反下卦同子夏傳云傷害曰災妖祥曰眚鄭云異自内生曰眚自外曰祥害物曰災三十五无妄實理大亨而利于貞王肅作望震下乾上无妄元亨利貞其匪正有眚不利有攸往正義曰无妄者以剛為内主動而能健以此臨下物皆无敢詐偽虚妄俱行實理所以大得亨通利于貞正故曰元亨利貞也其匪正有眚不利有攸往者既无妄當以正道行之若其匪依正道則有眚災不利有所往也妄亡亮反无妄无虚妄也說文云妄亂也馬鄭王肅皆云妄猶望謂无所希望也巽宫四世卦三十六加物與二字欲見萬物皆无妄象曰天下雷行物與无妄與辭也猶皆也天下雷行物皆不可以妄也先王以茂對時育萬物茂盛也物皆不敢妄然後萬物乃得各全其性對時育物莫盛于斯也正義曰天下雷行者雷是威恐之聲今天下雷行震動萬物物皆驚肅无敢虚妄案諸卦之象直言兩象即以卦名結之若雷在地中復今无妄應云天下雷行无妄今云物與无妄者欲見萬物皆无妄故加物與二字也其餘諸卦未必萬物皆與卦名同義三十七不耕不菑猶臣道代終而不造始六二不耕穫不菑畬則利有攸往不耕而穫不菑而畬代終已成而不造也不擅其美乃盡臣道故利有攸往穫黄郭反或依注作不耕而穫非下句亦然菑側其反馬云田一嵗也董云反草也畬音余馬云田三嵗也董云悉耨曰畬說文云二嵗治田也字林弋恕反擅市戰反象曰不耕穫未富也正義曰不耕穫不菑畬者六二處中得位盡于臣道不敢創首唯守其終猶若田農不敢𤼵首而耕唯在後穫刈而已不敢菑𤼵新田唯治其畬熟之地皆是不為其初而成其末猶若為臣之道不為事始而代君有終也則利有攸徃者為臣如此則利有攸往若不如此則往而无利也象曰不耕穫未富也者釋不耕而穫之義不敢前耕但守後穫者未敢以耕耕之與穫俱為已事唯為後穫不敢先耕事既闕初不擅其美故云未富也三十八牛者稼穡之資六三僣耕有司繫牛六三无妄之災或繫之牛行人之得邑人之災以隂居陽行違謙順是无妄之所以為災也牛者稼穡之資也二以不耕而穫利有攸往而三為不順之行故或繫之牛是有司之所以為𫉬彼人之所以為災也正義曰无妄之災或繫之牛行人之得邑人之災者无妄之世邪道不行六三隂居陽位失其正道行違謙順而乖臣範故无妄之所以為災矣牛者稼穡之資六三僣為耕事行唱始之道而為不順王事之行故有司或繫其牛制之使不妄造故曰或繫之牛也行人者有司之義也有司繫得其牛是行人制之得功故曰行人之得彼居三者是處邑之人僣為耕事受其災罰故曰行人之得邑人之災也象曰行人得牛邑人災也者釋行人之得三十九无妄之疾猶堯湯水旱非已招九五无妄之疾勿藥有喜居得尊位為无妄之主者也下皆无妄害非所致而取藥焉疾之甚也非妄之災勿治自復非妄而藥之則凶故曰勿藥有喜象曰无妄之藥不可試也藥攻有妄者也而反攻无妄故不可試也正義曰无妄之疾者凡禍疾所起由有妄而來此假病象以喻人事猶若人主而剛正自修身无虚妄下亦无虚妄而遇逢凶禍若堯湯之厄災非已招但順時修徳勿須治理至於凡人之事亦皆然也若已之无罪忽逢禍患此乃自然之理不須憂勞救䕶亦恐反傷其性周易要義卷三上, SBCK: ''}

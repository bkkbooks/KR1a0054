  - {type: variant, offset: 0, length: 328, content: 欽定四庫全書周易要義卷九宋魏了翁輯說卦一幽贊神明而生蓍蓍蒿属昔者聖人之作易也幽賛於神明而生蓍幽深也賛明也蓍受命如響不知所以然而然也賛本或作讃子旦反蓍音尸說文云蒿属生千嵗三百莖易以為數天子九尺諸侯七尺大夫五尺士三尺毛詩草木疏云似藾蕭青色科生洪範五行傳云蓍百年一本生百莖論衡云七十嵗生一莖七百嵗生十莖神靈之物故生遲也史記云生滿百莖者其下必有神龜守之其上常有雲氣覆之淮南子云上有叢蓍下有伏龜二蓍極數以定象卦備象以盡數參天兩地而倚數參竒也兩耦也七九陽數六八隂數觀變於隂陽而立卦卦象也蓍數也卦則雷風相薄山澤通氣擬象隂陽變化之體蓍則錯綜天地參兩之數蓍極數以定象卦備象以盡數故蓍曰參天兩地而倚數卦曰觀變于隂陽也觀變一本作觀變化發揮于剛柔而生文不全標目缺三四此處盖脫去一頁, SBCK: ''}

  - {type: variant, offset: 1417, length: 204, content: 已故曰不及其君遇其臣无咎象曰臣不可過者臣不可自過其位也十二隂布而陽不交故小畜小過皆不雨六五宻雲不雨自我西郊公弋取彼在穴小過者小者過於大也六得五位隂之盛也故宻雲不雨至于西郊也夫雨者隂布於上而陽薄之而不得通則蒸而爲雨今艮止於下而不交焉故不雨也是故小畜尚往而亨則不雨也小過陽不上交亦不雨也雖隂盛于上未能行其施也公者臣之極也五極隂盛故稱公也弋射也在穴者隠伏之物也小過者過小而難未大作猶在隠伏者也以隂質治小過能獲小過者, SBCK: 利正}

  - {type: variant, offset: 2591, length: 1243, content: 焉其所務者祭祀而已祭祀之盛莫盛修德九五履正居中動不為妄修徳者也苟能修徳雖薄可饗故曰實受其福也象曰不如西鄰之時也者詩云威儀孔時言周王廟中羣臣助祭皆威儀肅敬甚得其時二十一既濟道窮而進不已故有濡首之厲上六濡其首厲處既濟之極既濟道窮則之於未濟之於未濟則首先犯焉過進不已則遇於難故濡其首也將沒不乆危莫先焉正義曰象曰何可乆者首既被濡身將䧟沒何可乆長者也二十二小才不能濟難如小狐水汔濟而濡尾坎下離上未濟亨至无攸利正義曰未濟亨者未濟者未能濟渡之名也未濟之時小才居位不能建功立徳㧞難濟險若能執柔用中委任賢哲則未濟有可濟之理所以得通故曰未濟亨小狐汔濟濡其尾无攸利者汔者將盡之名小才不能濟難事同小狐雖能渡水而無餘力必須水汔方可涉川未及登岸而濡其尾濟不免濡豈有所利故曰小狐汔濟濡其尾无攸利也未濟離宫三世卦狐音胡汔音訖反説文云水涸也鄭云幾也二十三未濟柔得中而不違剛故亨彖曰未濟亨柔得中也以柔處中不違剛也能納剛健故得亨也小狐汔濟未出中也小狐不能涉大川須汔然後乃能濟處未濟之時必剛健拔難然後乃能濟汔乃能濟未能出險之中濡其尾無攸利不續終也小狐雖能渡而無餘力將濟而濡其尾力竭於斯不能續終險難猶未足以濟也濟未濟者必有餘力也雖不當位剛柔應也位不當故未濟剛柔應故可濟正義曰雖不當位剛柔應者重釋未濟之義凡言未者今日雖未濟後有可濟之理以其不當其位故即時未濟剛柔皆應足得相拯是有可濟之理故稱未濟不言不濟也二十五火水未濟故慎辨物居方使得所正義曰火在水上未濟者火在水上不成烹飪未能濟物故曰火在水上未濟君子以慎辨物居方者君子見未濟之時剛柔失正故用慎爲德辨别衆物各居其方使皆得安其所所以濟也二十六既濟上六濡首始入難未濟初六濡尾已没身初六濡其至知極也正義曰濡其尾吝者初六處未濟之初最居險下而欲上之其應進則溺身如小狐之渡川濡其尾也未濟之始始於既濟之上六也既濟上六濡其首言始入於難未没其身此言濡其尾者進不知極已没其身也然以隂處下非爲進亢遂其志者也困則能反故不曰凶不能豫照事之幾萌困而後反頑亦甚矣故曰吝也象曰亦不知極者未濟之初始於既濟之上六濡首而不知遂濡其尾二十七九二失位而貞吉以居中而能行正九二曵其輪貞吉體剛履中而應於五五體隂柔應與而不自任者也居未濟之時處險難之中體剛中之質而見任與拯救危難經綸屯蹇者也用健拯難靖難在正而不違中故曵其輪貞吉象曰九二貞吉中以行正也位雖不正中以行正也正義曰曵其輪者言其勞也靖難在正然後得吉故曰曵其輪貞吉也象曰中以行正者釋九二失位而稱貞吉者位雖不正以其居中故能行正也二十八九四失位而貞吉悔亡有賞以正志得行九四貞吉悔亡震用伐鬼方三年有賞於大國處未濟之時而出險難之上居文明之初體乎剛質以近至尊雖履非其位志在乎正則吉而悔亡矣其志得行靡禁其威故曰震用伐鬼方也伐鬼方者興衰之征也故每至興衰而取義焉處文明之初始出於難其德未盛故曰三年也五居尊以柔體乎文明之盛不奪物功者也故以大國賞之正義曰象曰志行者釋九四失位而得貞吉悔亡者也以其正志得行而終吉故也二十九六五以柔居尊而付與九二故光暉而吉六五貞吉无悔君子之光有孚吉以柔居尊處文明之盛爲未濟, SBCK: 觀}

  - {type: variant, offset: 209, length: 488, content: 孚乃化邦也信立而後邦乃化也柔在内而剛得中各得其所也剛得中則直而正柔在内則静而順説而以巽則乖爭不作如此則物无巧競敦實之行著而篤信發乎其中矣豚魚吉信及豚魚也魚者蟲之幽隠者也豚者獸之微賤者也爭競之道不興中信之德淳著則雖微隠之物信皆及之三用中孚以涉難若乘木舟虚无溺利涉大川乗木舟虚也乘木於用舟之虚則終已无溺也用中孚以涉難若乘木舟虚也中孚以利貞乃應乎天也盛之至也四九二居重隂下與同類應爲鶴鳴子和九二鳴鶴在隂其子和之我有好爵吾與爾靡之靡同縻處内而居重隂之下而履不失中不狥於外任其真者也立誠篤志雖在闇昧物亦應焉故曰鳴鶴在隂其子和之也不私權利唯德是與誠之至也故曰我有好爵與物散之正義曰象曰中心願者誠信之人願與同類相應得誠信而應之五三四兩隂相敵故鼓罷泣歌无恒六三得敵或鼓或罷或泣或歌三居少隂之上四居長隂之下對而不相比敵之謂也以隂居陽欲進者也欲進而閡敵故或鼓也四履正而承五非已所克故或罷也不勝而退懼見侵陵故或泣也四履乎順不與物校退而不見害故或歌也不量其力進退无恒憊可知也罷如字王肅音皮徐扶彼反正義象曰位不當者所以或鼔或罷進退无恒者止爲不當其位妄進故也六六四月幾望馬匹亡謂處隂而絶類六四月幾望馬匹亡, SBCK: ''}

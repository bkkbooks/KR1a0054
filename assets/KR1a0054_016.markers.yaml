  - {type: variant, offset: 1275, length: 0, content: '', SBCK: 蠱者有事待能之時者物旣蠱壊湏有事營爲所作之事非賢能不可故經云幹父之蠱幹則能也甲者創制之令者甲爲十日之首創造之令爲在後諸令之首故以創造之令謂之爲甲故漢時謂令之重者謂之甲令則此義也創制不可責之以舊者以人有犯令而致罪者不可責之舊法有犯則刑故湏先後三日殷勤語之使曉知新令而後乃誅誅謂兼通責讓之罪非專謂誅殺也􅀃音恱創􅀄亮反此俗字也依字作刱十四振民象山下有風育德象山在上}
  - {type: page-break, offset: 1275, content: '', id: KR1a0054_SBCK_002-22a}
  - {type: variant, offset: 1277, length: 0, content: '', SBCK: 山下至育德正義曰必云山下有風者風能揺動散布􅃳澤今山下有風取君子能以恩澤下振於民育養已德振民象山下有風育德象山在上也振舊之慎反濟也師讀音眞振振仁厚也育王肅作毓古育字十五有子考无咎散文父在亦稱考􅀄六幹父之蠱有子考无咎厲終吉處事之首始見任者也以柔巽之質幹父之事能承先􅁤堪其任者也故曰有子也任爲事首能堪其事考乃无咎也故曰有子考无咎也當事之首是以危也能堪其事故終吉也有子考无咎絕句周依馬王肅以考絕句象曰幹父之蠱意承考者釋幹父之蠱義凡堪幹父事}
  - {type: page-break, offset: 1277, content: '', id: KR1a0054_SBCK_002-22b}
  - {type: page-break, offset: 1277, content: '', id: KR1a0054_SBCK_002-23a}
  - {type: variant, offset: 1279, length: 0, content: '', SBCK: 小大損益一依父命當量事制冝}
  - {type: variant, offset: 1280, length: 2, content: 如何, SBCK: 意承考而已對文父没稱考􅀂散而言之生亦稱考􅀂康誥云大傷厥考心是父在稱考此避幹父之文故變云考}

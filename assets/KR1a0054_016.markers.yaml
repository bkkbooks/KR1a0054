  - {type: variant, offset: 2233, length: 5, content: 九三處既濟, SBCK: 八月者何氏云從建子陽生至建未爲八月禇氏云自建寅至建酉爲八月今案此注云小人道長君子道消冝據否卦}
  - {type: variant, offset: 2240, length: 3, content: 居文明, SBCK: 故以臨卦建丑而至否卦建申爲八月也二十宗廟可觀莫盛於盥注引禘灌􅦉坤下巽上觀盥而不薦有孚顒􅀂王道}

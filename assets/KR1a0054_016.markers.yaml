  - {type: variant, offset: 1860, length: 349, content: 成性命以之而濟故曰水在火上既濟也但既濟之道初吉終亂故君子思其後患而豫防之十五初剛在棄難雖曳輪濡尾不有咎正義曰曳其輪濡其尾无咎者初九處既濟之初體剛居下是始欲濟渡也始濟未涉於燥故輪曳而尾濡故云曳其輪濡其尾也但志在棄難雖復曳輪濡尾其義不有咎故云无咎十六處既濟之時婦喪茀不逐而自得六二婦喪其茀勿逐七日得居中履正處文明之盛而應乎五隂之光盛者也然居初三之間而近不相得上不承三下不比初夫以光盛之隂處於二陽之間近而不相得能无見侵乎故曰喪其茀也稱婦者以明自有夫而它人侵之也茀首飾也夫以中道執乎貞正而見侵者衆之所助也處既濟之時不容邪道者也時既明峻衆又助之竊之者逃竄而莫之歸矣量斯勢也不過七日不須己逐而自得也喪息浪反注皆同茀方拂反馬同于云馬髴也鄭云車蔽也子夏作髴荀作紱董作髢十七高宗德文明而勢憊故三年乃克鬼方九三髙宗至憊, SBCK: 乆}

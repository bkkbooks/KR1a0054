  - {type: variant, offset: 1109, length: 12, content: 而周氏等不悟此理兼以罪過, SBCK: ''}
  - {type: variant, offset: 1122, length: 149, content: 卦名失之逺矣過爲小事道乃可通小過古卧反義與大過同王肅云音戈兊宫遊魂卦九上逆下順有飛鳥之象有飛鳥之象焉不宜上宜下即飛鳥之象飛鳥遺之音不宜上宜下大吉上逆而下順也上則乘剛逆也下則承陽順也施過於不順凶莫大焉施過於順過更變而爲吉也十飛鳥以凶謂進而之逆初六飛鳥以凶小過上逆下順而應在上卦進而之逆无所錯足飛鳥之凶, SBCK: 注蠱者至四時}

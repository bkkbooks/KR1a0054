  - {type: variant, offset: 825, length: 5, content: 翰音登于天, SBCK: 小子謂􅀄九也丈夫謂九五也􅀄九處卑故稱小子五居尊位故稱丈夫六二旣是隂柔不能獨立所處必近係屬􅀄九故云係小子旣屬􅀄九則不得徃應於五故云失丈夫也象曰係小子弗兼與者釋係小子之意旣隨此􅀄九則失彼九五丈夫是不能兩處兼有九六三舎􅀄係四非正應故利居}

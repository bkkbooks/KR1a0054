  - {type: variant, offset: 74, length: 1, content: 獸, SBCK: 㝷卦}
  - {type: variant, offset: 76, length: 2, content: 微賤, SBCK: 名則其意具盡中間更無餘義三雷出地而奮動法此作樂薦配象曰雷岀地奮豫先王以作樂崇德殷薦之上帝以配祖考正義曰案諸卦之象或云雲上于天或云風行天上以􅀋言之今此應云雷出地上乃云雷出地奮豫者雷是陽氣之聲奮是震動之狀雷旣岀地震動萬物􅀍陽氣而生各皆逸豫故云雷岀地奮豫也先王以作樂崇德者雷是鼓動故先王法此鼓動而作樂崇盛德業樂以發揚盛德故也殷薦之上帝者用此殷盛之樂薦祭上帝也象雷岀地而向天也以配祖考者謂以祖考配上帝用祖用考􅀂周夏正郊天配靈威仰以祖后稷配也配祀明堂五方之帝以考文王也故云以配祖考也奮方問反殷於勤反馬云盛也􅀃文云作樂之盛稱殷四六二介于石順不苟從豫不違中六二介于石不終日貞吉處豫之時得位履中安夫貞正不求苟豫者也順不苟從豫不違中是以上交不謟下交不瀆明禍福之所生故不苟􅀃辯必然之理故不改其操介如石焉不終日明矣介音界纎介古文作砎鄭故八反云謂磨砎也馬作扴云觸小石聲苟􅀃音恱象曰不終日貞吉以中正者釋貞吉之義所以見其惡事即能離去不待終日守正􅁻者以此六二居中守正順不苟從豫不違中故不湏待其一日終守貞吉也五盱豫謂睢盱而豫姚引詩盱日始旦六三盱豫悔遲有悔居下體之極處兩卦之際履非其位承動豫之主􅀂其睢盱而豫悔亦生焉遲而不從豫之所疾位非所據而以從豫進退離悔冝其然矣盱香于反睢盱也向云睢盱小}

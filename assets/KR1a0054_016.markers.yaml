  - {type: line-break, offset: 50, content: '', id: KR1a0054_WYG_016-1a06}
  - {type: variant, offset: 64, length: 0, content: '', SBCK: 豫者取逸豫之義以和順而動動不違衆衆皆􅀃豫故謂之豫也動而衆􅀃故可利建侯也以順而動不加无罪故可以行師也无四德者以逸豫之事不可以常行豫餘慮反恱豫也備豫也馬云豫樂震宫一丗卦二􅂏所嘆者十二卦或時或時用時義豫之時義大矣哉者歎美爲豫之善言於逸豫之時其義大矣此歎卦也凡言不盡意者不可煩文具􅀃故歎之以示情使後生思其餘藴得意而忘言也然歎卦有三體一直歎時如大過之時大矣哉之例是也二歎時并用如險之時用大矣哉之例是也三歎時并義豫之時義大矣哉之例是也夫立卦之體各象其時時有屯夷事非一揆故爻來適時有凶有􅁻人之生丗亦復如斯或逢治丗或遇亂時出處存身此道豈小故曰大矣哉也然時運雖多大體不出四種者一者治時頥養之丗是也二者亂時大過之丗是也三者離散之時解緩之丗是也四者改易之時革變之丗是也故舉此四卦之時爲歎餘皆可知言用者謂適時之用也雖知居時之難此事不小而未知以何而用之耳故坎暌蹇之時冝用君子小人勿用用險取濟不可爲常斟酌得冝是用時之大略舉險難等三卦餘從可知矣文言義者姤卦注云凡言義者不盡於所見}
  - {type: page-break, offset: 64, content: '', id: KR1a0054_SBCK_002-13b}
  - {type: page-break, offset: 64, content: '', id: KR1a0054_SBCK_002-14a}
  - {type: page-break, offset: 64, content: '', id: KR1a0054_SBCK_002-14b}
  - {type: variant, offset: 65, length: 2, content: 孚魚, SBCK: 有意謂}
  - {type: variant, offset: 68, length: 1, content: 蟲, SBCK: 也是其時皆有義也略明佚樂}
  - {type: variant, offset: 70, length: 0, content: '', SBCK: 丗相隨相遇之日隱遯覉旅之時凡五卦其義不小則餘卦亦可知也今所歎者十二卦足以發明大義恢弘妙理者也凡于􅂏之末歎云大哉者凡一十二卦􅀂豫旅遯姤凡四卦皆云時義案姤卦注云凡言義者不盡於所見中有意謂以此言之則四卦卦各未盡其理其中更有餘意不可盡申故揔云義也隨之一卦亦言義但與四卦其文稍別四卦皆云時義隨卦則隨時之義者非但其中別有義意又取隨逐其時故變云隨時之義大矣哉睽蹇坎此三卦皆云時用案睽卦注云睽離之時非小人之所能用蹇卦亦云非小人之所能用此二卦言大矣哉者則是大人能用故云大矣哉其中更无餘義唯大人能用故云用不云義也坎卦時用則與睽蹇稍別注云非用之常用有時也謂坎險之事時之湏用利益乃大與睽蹇時用文同而義異也解之時革之時頤之時大過之時此四卦直云時不云義與用也案解卦注難解之時非治難時故不言用體盡於解之名無有}

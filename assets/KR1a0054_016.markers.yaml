  - {type: variant, offset: 831, length: 1, content: 凶, SBCK: 六三係丈夫失小子隨有求得利居貞隂之爲物以處隨丗不能獨立必有係也雖體下卦二巳據􅀄將何所附故舎􅀄係四志在丈夫四俱无應亦欲於巳隨之則得其所求矣故曰隨有求得也應非其正以係於人何可以妄故利居貞也􅀄處已下四處已上故曰係丈夫失小子也象曰係丈夫志舎下也下謂􅀄也十輔嗣甲創制庚申命諸儒用辛丁􅫿巽下艮上蠱元亨利渉大川先甲三日後甲三日正義曰蠱}
  - {type: page-break, offset: 831, content: '', id: KR1a0054_SBCK_002-20a}
  - {type: variant, offset: 833, length: 3, content: 翰髙飛, SBCK: 事}
  - {type: 'kr:newline', offset: 835, content: '

      ', id: KR1a0054_krp_016-bkkkrnewl52}
  - {type: line-break, offset: 835, content: '', id: KR1a0054_WYG_016-3b08}
  - {type: variant, offset: 837, length: 2, content: 飛音, SBCK: 有事營爲則大得亨通有爲之時利在濟難故利渉大川也先甲三日後甲三日}
  - {type: variant, offset: 840, length: 2, content: 音飛, SBCK: 甲者創制之令旣在有爲之時不可因仍舊令今用創制之令以治於人人􅀂犯者未可即加刑罰以民未習故先此宣令之前三日殷勤}
  - {type: variant, offset: 843, length: 1, content: 實, SBCK: 語之又於此宣令之後三日更丁寧而語之其人}
  - {type: variant, offset: 846, length: 0, content: '', SBCK: 乃加刑罰也其禇氏何氏周氏等並同鄭義以爲甲者造作新令之日甲前三日取改過自新故用辛也甲後三日取丁寧之義故用丁也今案輔嗣注甲曰創制之令不云創制之日又巽卦九五先庚三日後庚三日輔嗣注申命令謂之庚輔嗣又云甲庚皆申命}
  - {type: page-break, offset: 846, content: '', id: KR1a0054_SBCK_002-20b}
  - {type: variant, offset: 848, length: 0, content: '', SBCK: 則輔嗣不以甲爲創制之日而諸儒不顧輔嗣注旨妄作異端非}
  - {type: variant, offset: 849, length: 4, content: 上九處信, SBCK: 蠱音古事也惑也亂也左傳云於文皿蟲爲蠱又云女惑男風落山謂}
  - {type: variant, offset: 854, length: 24, content: 終信終則衰也信衰則詐起而忠篤内喪華美外揚若鳥之翰, SBCK: 蠱徐又姬祖反一}

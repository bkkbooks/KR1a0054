  - {type: variant, offset: 1011, length: 2, content: 例是, SBCK: 義}
  - {type: variant, offset: 1014, length: 1, content: 褚, SBCK: 以上剛能制㫁下柔能施令巽順止靜故可以有爲也禇}
  - {type: variant, offset: 1017, length: 0, content: '', SBCK: 蠱者惑也物旣惑亂終致損壞當湏有事也有爲治理也故序卦云蠱者事也}
  - {type: variant, offset: 1018, length: 2, content: 小人, SBCK: 物蠱必有事非謂訓蠱爲事義當然也蠱元亨而天下治者釋元亨之義以有爲而得元亨是天下治理也利渉大川徃有事也者釋利渉大川也蠱者有爲之時拔拯危難位當有事故利渉大川此則假外象以喻危難也先甲三日後甲三日終則有始天行者釋先甲三日後甲三日之義也民之犯令告之巳終更復從始告之殷勤不巳􅀂天}

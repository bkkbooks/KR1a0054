  - {type: variant, offset: 103, length: 3, content: 豚魚吉, SBCK: 由豫大有得也夫不信於物物亦疑焉故勿疑則朋合疾也盍合也簮疾也由豫由從也鄭云用也馬作猶云猶豫疑也盍胡獵反合也簮徐側林反子夏傳同疾也鄭云速也埤蒼同王肅又祖感反古文作貸京作橬馬作臧荀作宗虞作戠戠叢合也蜀才本依京義從鄭􅀂能不疑於物以信待之則衆隂羣朋合聚而疾來也象}
  - {type: page-break, offset: 103, content: '', id: KR1a0054_SBCK_002-18a}
  - {type: variant, offset: 107, length: 0, content: '', SBCK: 由豫大有得志大行者釋由豫大得之意衆隂旣由之而豫大有所得是志意大行也七凡隨有元亨}
  - {type: variant, offset: 108, length: 1, content: 涉, SBCK: 貞乃无咎􅪹震下兊上隨元亨利貞无咎正義曰元亨者於相隨之丗必}
  - {type: variant, offset: 110, length: 1, content: 川, SBCK: 得亨通􅀂其不大亨通則无以相隨逆於時也}

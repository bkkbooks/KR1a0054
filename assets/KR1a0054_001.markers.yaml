  - {type: variant, offset: 0, length: 393, content: 御題魏了翁周易要義華父師敬子李燔宇其學傳紫陽紫陽注周易獨稱卜筮方舉占意有謂恐人涉荒唐朱子作本義首列筮儀每卦明著象占使人知觀象玩辭而不涉於䜟緯魏乃宗正義刪繁取其臧釋文考陸氏兼引馬融鄭康成王肅簡以得其要約而頗致詳彝尊尚弗知朱彝尊經義考未載此書希寶誠吉光開宗闢虚元孔門教用彰其原序云傳易者更桐祖述惟魏世王輔嗣之注獨冠古今江左諸儒並傳其學其江南義疏十有餘家皆辭尚虚元乃義涉於釋氏非為教于孔門也三易明周稱蓋謂取岐京叶乾健具四徳坤順惟隨倡弗牛而曰馬牝馬行无疆此書解利牝馬之貞謂坤是隂道假借柔順之象以明柔順之徳且謂不云牛而云馬者牛雖柔順不能行地无疆然予更思之仍即一乾剛坤之牝馬正承乾為馬而言蓋馬乃純陽而在坤則為牝馬故軋直曰利貞而坤云利牝馬之貞則坤之四徳一乾之四徳仍是以順為吉乾坤分去聲既定餘卦推𩔖明叶大端弗失正十翼臣之良出處益卓然正色立朝綱豈徒托空言用易誠有常四庫廣搜羅懋柱出珍藏鈔刻俾歸之牖世文教昌, SBCK: ''}

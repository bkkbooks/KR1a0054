body:
  text: 周易要義易類提要臣等謹案周易要義十卷宋魏了翁撰了翁字華夫號鶴山臨卭人慶元五年進士官至資政殿大學士參知政事僉書樞密院事事迹具宋史本傳了翁以說經者但知誦習成言不能求之詳博因取諸經注疏之文據事别類而録之謂之九經要義此其中之第一部也方回桐江集有周易集義跋載了翁嘗言辭變象占易之綱領而繇彖象爻之辭畫爻位虛之别互反飛伏之說乘承比應之例有不知則義理闕焉蓋其大㫖主於以象數求義理折衷於漢學宋學之間故是編所録雖主於注疏釋文而採掇謹嚴别裁精審可謂剪除枝蔓獨擷英華王禕雜說云孔頴逹作九經正義往往援引緯書之說歐陽公常欲刪而去之其言不果行逮鶴山魏氏作要義始加㸃削而其言絶焉則亦甚與以廓清之功矣明萬厯中張萱重編內閣書目載九經要義尚存儀禮七冊禮記三冊周易二冊尚書一冊春秋二冊論語二冊孟子二冊又類目六卷本共為一編今諸經或存或佚不能復合故以以世有傳本者各著於録朱彝尊經義考羣經類中載九經要義二百六十三卷注曰分見各經然各經皆載要義而易類則但據宋志載了翁周易集義六十四卷不載此書似乎即以集義為要義考方回周易集義跋曰鶴山先生謫靖州取諸經注疏摘為要義又取濓洛以來諸大儒易說為周易集義則為二書審矣乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c65c1551928827ee7df2bf6b98667efac9b7cd3da384049b5e478d46095f04a5

body:
  text: 周易要義易類提要臣等謹案周易要義十卷宋魏了翁撰了翁字華夫號鶴山臨卭人慶元五年進士官至資政殿大學士參知政事僉書樞密院事事迹具宋史本傳了翁以説經者但知誦習成言不能求之詳博因取諸經注疏之文據事别類而録之謂之九經要義此其中之第一部也方回桐江集有周易集義跋載了翁嘗言辭變象占易之綱領而繇彖象爻之辭畫爻位虛之别互反飛伏之説乘承比應之例有不知則義理闕焉蓋其大旨主於以象數求義理折衷於漢學宋學之間故是編所録雖主於注疏釋文而採掇謹嚴别裁精審可謂剪除枝蔓獨擷英華王禕雜説云孔頴逹作九經正義往往援引緯書之説歐陽公常欲刪而去之其言不果行逮鶴山魏氏作要義始加點削而其言絶焉則亦甚與以廓清之功矣明萬厯中張萱重編內閣書目載九經要義尚存儀禮七册禮記三册周易二册尚書一册春秋二册論語二册孟子二册又類目六卷本共為一編今諸經或存或佚不能復合故以以世有傳本者各著於録朱彝尊經義考羣經類中載九經要義二百六十三卷注曰分見各經然各經皆載要義而易類則但據宋志載了翁周易集義六十四卷不載此書似乎即以集義為要義考方回周易集義跋曰鶴山先生謫靖州取諸經注疏摘為要義又取濓洛以來諸大儒易説為周易集義則為二書審矣乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:099178fad2b84f1a057e4db911141f904292ff17cd2207f07d10cd5123c1ec22

body:
  text: 周易要義卷一下宋魏了翁輯訟至履一訟必有孚不可長利見大人坎下乾上訟有孚窒惕中吉窒謂窒塞也能惕然後可以獲中吉訟才用反爭也言之於公也鄭云辨財曰訟離宫遊魂卦窒張栗反徐得悉反又得失反馬作嘻云讀為躓猶止也鄭云嘻覺悔貌終凶利見大人不利涉大川正義曰訟有孚窒惕中吉者窒塞也惕懼也凡訟者物有不合情相乖爭而致其訟凡訟之體不可妄興必有信實被物止塞而能惕懼中道而止乃得吉也終凶者訟不可長若終竟訟事雖復窒惕亦有凶也利見大人者物既有訟須大人決之故利見大人也不利涉大川者以訟不可長若以訟而往涉危難必有禍患故不利涉大川二險而健所以訟惟中止乃吉彖曰訟上剛下險險而健訟正義曰此釋繇辭之義訟上剛下險險而健訟者上剛即乾也下險即坎也猶人意懷險惡性又剛健所以訟也中乃吉者謂此訟事以中途而止乃得吉也前注云可以獲中吉謂獲中止之吉不閉其源使訟不至者若能謙虛退讓與物不競即此是閉塞訟之根源使訟不至也今不能如此是不閉塞訟源使訟得至也三訟雖不枉而至於終竟亦凶雖每不枉而訟至終竟者謂雖每訴訟陳其道理不有枉曲而訟至終竟此亦凶矣四不云水與天違行訟自健者始象曰天與水違行訟君子以作事謀始聼訟吾猶人也必也使無訟乎無訟在於謀始謀始在於作制契之不明訟之所以生也物有其分職不相濫爭何由興正義曰天道西轉水流東注是天與水相違而行象人彼此兩相乖戾故致訟也不云水與天違行者凡訟之所起必剛健在先以為訟始故云天與水違行也五竄不可據強故云人三百户無眚九二不克訟歸而逋其邑人三百户無眚以剛處訟不能下物自下訟上宜其不克若能以懼歸竄其邑乃可以免災邑過三百非為竄也竄而據強災未免也象曰不克訟歸逋竄也自下訟上患至掇也正義曰不克訟者克勝也以剛處訟不能下物自下訟上與五相敵不勝其訟言訟不得勝也歸而逋其邑者訟既不勝怖懼還歸逋竄其邑若其邑強大則大都偶國非逋竄之道人三百户無眚者若其邑狹小唯三百户乃可也六十里為成定受田三百户三百户者鄭注禮記云小國下大夫之制又鄭注周禮小司徒云方十里為成九百夫之地溝渠城郭道路三分去其一餘六百夫又以田有不易有一易有再易定受田三百家即此三百户者一成之地也鄭注云不易之地嵗種之一易之地休一嵗乃種再易之地休二嵗乃種言至薄也茍自藏隱不敢與五相敵則無災眚象曰歸逋竄者釋歸而逋邑以訟之不勝故退歸逋竄也患至掇者掇猶拾掇也自下訟上悖逆之道故禍患來至若手自拾掇甚言患必來也故王肅云若手拾掇物然釋注以剛至災未免也正義曰若能以懼歸竄其邑乃可免災者如此意則經稱其邑二字連上為句人三百户合下為句七六三食舊德謂順從上九以保所有六三食舊德貞厲終吉或從王事無成體夫柔弱以順於上不為九二自下訟上不見侵奪保全其有故得食其舊德而不失也居爭訟之時處兩剛之間而皆近不相得故曰貞厲柔體不爭繫應在上衆莫能傾故曰終吉上壯爭勝難可忤也故或從王事不敢成也正義曰食舊德者六三以隂柔順從上九不為上九侵奪故保全已之所有故食其舊日之德祿位貞厲者貞正也厲危也象曰從上吉者釋所以食舊德以順從上九故得其吉食舊德也八九五以中正為訟主故元吉九五訟元吉處得尊位為訟之主用其中正以斷枉直中則不過正則不邪剛無所溺公無所偏故訟元吉九二五皆為主一卦兩主者非一此卦之內斷獄訟之人凡有二主案上注云善聽之主其在二乎是二為主也此注又云為訟之主用其中正以斷枉直是五又為主也一卦兩主者凡諸卦之內如此者多矣五是其卦尊位之主餘爻是其卦為義之主猶若復卦初九是復卦之主復義在於初九也六五亦居復之尊位為復卦尊位之主如此之例非一卦也所以然者五居尊位猶若天子總統萬幾與萬物為主故諸卦皆五居尊位諸爻則偏主一事猶若六卿春官主禮秋官主刑之類偏主一事則其餘諸爻各主一事也即六卿總歸於天子諸卦之爻皆以九五為尊位也若卦由五位五又居尊止為一主也若比之九五之類是也今此訟卦二既為主五又為主皆有斷獄之德其五與二爻其義同然也故俱以為主也十在下象者稱來亦有下往上而稱來案上彖辭剛來而得中今九五象辭云訟元吉以中正可知彖辭剛來得中非據九五輔嗣必以為九二者凡上下二象在於下象者則稱來故賁卦云柔來而文剛是離下艮上而稱柔來今此云剛來而得中故知九二也且凡云來者皆據異類而來九二在二隂之中故稱來九五在外卦又三爻俱陽不得稱來若於爻辭之中亦有從下卦向上卦稱來也故需上六有不速之客三人來謂下卦三陽然需上六隂爻陽來詣之亦是往非類而稱來也十一以訟受服不足敬故終朝三褫上九或錫之鞶帶終朝三褫之處訟之極以剛居上訟而得勝者也以訟受錫榮何可保故終朝之間褫帶者三也錫星歷反又星自反賜也鞶步干反馬云大也徐云王肅作槃正義曰或錫之鞶帶者上九以剛居上是訟而得勝者也以其因訟得勝受此錫服非德而受亦不足可敬故終朝之間三被褫脫也十二丈人嚴莊之稱馬云貞丈人絶句坎下坤上師貞丈人吉無咎丈人嚴莊之稱也為師之正丈人乃吉也興役動衆無功罪也故吉乃無咎也正義曰師貞丈人吉無咎者師衆也貞正也丈人謂嚴莊尊重之人言為師之正唯得嚴莊丈人監臨主領乃得吉無咎馬云二千五百人為師坎宫歸魂卦貞丈人絶句丈人莊嚴之稱鄭云能以法度長於人十三師貞謂衆正剛中九二險順上下體貞之為正其義已見於此復云貞正者欲見齊衆必須以正故訓貞為正也與下文為首引之勢故云能以衆正可以王矣剛中而應者剛中謂九二而應謂六五行險而順者行險謂下體坎也而順謂上體坤也若剛中而無應或有應而不剛中或行險而不柔順皆不可行師得吉也以此毒天下而民從之吉又何咎矣者毒猶役也若用此諸德使役天下之衆人必從之以得其吉又何無功而咎責乎自剛中以下釋丈人吉無咎也言丈人能備此諸德也十四地能包水是容畜之象象曰地中至畜衆正義曰君子以容民畜衆者言君子法此師卦容納其民畜養其衆地中有水欲見地能包水水又衆大是容民畜衆之象若其不然或當云地在水上或云上地下水或云水上有地今云地中有水蓋取容畜之義也畜敕六反聚也王肅許六反養也十五師出不以律否臧皆凶初六師出以律否臧凶為師之始齊師者也齊衆以律失律則散故師出以律律不可失失律而臧何異於否失令有功法所不赦故師出不以律否臧皆凶否音鄙惡也注同馬鄭王肅方友反正義曰初六師出以律者律法也否謂破敗即是凶也何須更云否臧凶者本意所明雖臧亦凶象曰失律凶者釋師出以律之義言所以必須以律者以其失律則凶反經之文以明經義十六閫外得專而言失令有功不赦失令有功法所不赦者解何異於否之義令則法律也若失此法令雖有功勞軍法所不容赦故云何異於否然閫外之事將軍所裁臨事制宜不必皆依君命何得有功法所不赦者凡為師之體理非一端量事制宜隨時進退此則將軍所制隨時施行茍順私情故違君命犯律觸法則事不可赦耳十七在師中吉注吉屬下象吉屬上九二在師中吉無咎王三錫命以剛居中而應於上在師而得其中者也承上之寵為師之主任大役重無功則凶故吉乃無咎也行師得吉莫善懷邦邦懷衆服錫莫重焉故乃得成命正義曰在師中吉者以剛居中而應於五是在師中吉也象曰承天寵者釋在師中吉之義也正謂承受五之恩寵故中吉也懷萬邦也者以其有功能招懷萬邦故被王三錫命也觀注之意以在師中為句其吉字屬下觀象之文在師中吉承天寵者則以吉字屬上此吉之一字上下兼該故注文屬下象文屬上但象略其無咎之字故吉屬師中也故乃得成命者案曲禮云三賜不及車馬一命受爵再命受服三命受車馬三賜三命而尊之得成故乃得成命也寵如字鄭云光耀也王肅作龍云寵也十八兵法右背髙故左次未失常六四師左次無咎得位而無應無應不可以行得位則可以處故左次之而無咎也行師之法欲右背髙故左次之象曰左次無咎未失常也雖不能有獲足以不失其常也正義曰行師之法欲右背髙者此兵法也故漢書韓信云兵法欲右背山陵前左水澤十九長子九二居中弟子六三失位莊氏云長子謂九二德長於人弟子謂六三德劣於物今案象辭云長子帥師以中行也是九二居中也弟子輿尸使不當也謂六三失位也二十大君正此上六之功戒用小人上六大君至亂邦也正義曰大君有命者上六處師之極是師之終竟也大君謂天子也言天子爵命此上六若其功大使之開國為諸侯若其功小使之承家為卿大夫小人勿用者言開國承家須用君子勿用小人也象曰大君有命以正功也者正此上六之功也二十一地與水相得故曰比坤下坎上比毗志反卦內並同彖云輔也序卦云比比也子夏傳云地得水而柔水得地而流故曰比徐又補履反坤宫歸魂卦二十二原筮以求比之無咎惟元永貞彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也處比之時將原筮以求無咎其惟元永貞乎夫羣黨相比而不以元永貞則凶邪之道也若不遇其主則雖永貞而猶未足免於咎也使永貞而無咎者其唯九五乎正義曰比吉也者釋親比為善言相親比而得吉也輔也者釋比所以得吉比者人來相輔助也下順從者在下之人順從於上是相輔助也謂衆隂順從九五也自此以上釋比名為吉之義原筮元永貞無咎以剛中者釋原筮元永貞無咎之義所以得如此者以九五剛而處中故使比者皆得原筮元永貞無咎也元大也永長也為已有大長貞正乃能原筮相親比之情得久長而無咎二十三上體故云外比四比五故云從上六四外比之貞吉外比於五履得其位比不失賢處不失位故貞吉也象曰外比於賢以從上也六四外比之至從上也正義曰六四上比於五欲外比也居得其位比不失賢所以貞吉凡下體為內上體為外六四比五故云外比也象曰外比於賢以從上也者九五居中得位故稱賢也五在四上四往比之是以從上也二十四注顯比則所親狹故常失前禽九五顯比王用三驅失前禽邑人不誡吉為比之主而有應在二顯比者也比而顯之則所親者狹矣夫無私於物唯賢是與則去之與來皆無失也夫三驅之禮禽逆來趣已則舍之背已而走則射之愛於來而惡於去也故其所施常失前禽也以顯比而居王位用三驅之道者也故曰王用三驅失前禽也用其中正征討有常伐不加邑動必討叛邑人無虞故不誡也雖不得乎大人之吉是顯比之吉也此可以為上之使非為上道也二十五注以上使中謂九五堪為王者之使象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也正義曰所以顯比得吉者以所居之位正而且中故云顯比之吉舍逆取順失前禽也者禽逆來向已者則舍之而不害禽順去背已而走者則射而取之是失前禽也邑人不誡上使中者釋邑人不誡之義所以已邑之人不須防誡正由在上九五之使得其中正之人伐不加邑動必討叛不橫加無罪正由在上使中也中謂九五也此九五雖不得為王者之身堪為王者之使以居中位故云上使中也二十六比之無首謂卦終後夫上六比之無首凶無首後也處卦之終是後夫也親道已成無所與終為時所棄宜其凶也二十七巽惟畜止九三為密雲不為雨乾下巽上小畜亨不能畜大止健剛志故行是以亨畜本又作蓄同敕六反積也聚也卦內皆同鄭許六反養也巽宫一世卦正義曰小畜亨者但小有所畜唯畜九三而已初九九二猶剛健得行是以剛志上得亨通故云小畜亨也若大畜乾在於下艮在於上艮是陽卦又能止物能止此乾之剛健所畜者大故稱大畜此卦則巽在於上乾在於下巽是隂柔性又和順不能止畜在下之乾唯能畜止九三所畜狹小故名小畜密雲不雨者若陽之上升隂能畜止兩氣相薄則為雨也今唯能畜止九三其氣被畜但為密雲初九九二猶自上通所以不能為雨也自我西郊者所聚密雲由在我之西郊去我既逺潤澤不能行也但聚在西郊而已二十八密雲乃自我西郊未足為雨謂四五健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也小畜之𫝑足作密雲乃自我西郊未足以為雨也何由知未能為雨夫能為雨者陽上薄隂隂能固之然後蒸而為雨今不能制初九之復自道固九二之牽復九三更以不能復為劣也下方尚往施豈得行故密雲而不能為雨尚往故也何以明之夫隂能固之然後乃雨今上九獨能固九三之路故九三不可以進而輿説輻也能固其路而安於上故得既雨既處若四五皆能若上九之善畜則能雨明矣故舉一卦而論之能為小畜密雲而已隂苟不足以固陽則雖復至盛密雲自我西郊故不能雨也雨之未下即施之未行二十九彖總二象象明一爻故雨不雨異彖全論一卦之體故曰密雲不雨象各言一爻之德故曰既雨既處也正義曰九三更以不能復為劣者初九既得復道九二可牽以獲復皆得剛健上通則是隂不能固陽而九三劣弱又不能自復則是陽不薄隂是以皆不雨也且小畜之義貴於上往而九三不能自復更為劣弱故言九三更不能復為劣也能固其路而安於上者謂上九能閉固九三之道路不被九三所陵得安於上所以既雨既處也故舉一卦而論之能為小畜密雲而已者此明卦之與爻其義别也但卦總二象明上體不能閉固下體所以密雲不能為雨爻則止明一爻之事上九能固九三所以上九而有雨也所以卦與爻其義異也諸卦多然若比卦云比吉上六則云比之無首凶也復卦云復亨上六云迷復凶也此皆卦之與爻義相違反他皆倣此三十風在天上未及物但修德待時象曰風行至文德正義曰君子以懿文德者懿美也以於其時施未得行喻君子之人但修美文德待時而發風為號令若風行天下則施附於物不得云施未行也今風在天上去物既逺無所施及故曰風行天上三十一凡大象或取卦象或取卦名凡大象君子所取之義或取二卦之象而法之者若地中有水師君子以容民畜衆取卦象包容之義若履卦象云上天下澤履君子以辨上下取上下尊卑之義如此之類皆取二象君子法以為行也或直取卦名因其卦義所有君子法之須合卦義行事者若訟卦云君子以作事謀始防其所訟之源不取天與水違行之象若小畜君子以懿文德不取風行天上之象餘皆倣此三十二隂畜陽故有貞厲幾望征凶之戒上九既雨既處尚德載婦貞厲月幾望君子征凶處小畜之極能畜者也陽不獲亨故既雨也剛不能侵故既處也體巽處上剛不敢犯尚德者也為隂之長能畜剛健德積載者也婦制其夫臣制其君雖貞近危故曰婦貞厲也隂之盈盛莫盛於此故曰月幾望也滿而又進必失其道隂疑於陽必見戰伐雖復君子以征必凶故曰君子征凶象曰既雨既處德積載也君子征凶有所疑也夫處下可以征而無咎者唯泰也則然坤本體下又順而弱不能敵剛故可以全其類征而吉也自此以往則其進各有難矣三十三大畜畜極而通小畜積極而後能畜夫巽雖不能若艮之善畜猶不肯為坤之順從也故可得少進不可盡陵也是以初九九二其復則可至於九三則輿説輻也夫大畜者畜之極也畜而不已畜極則通是以其畜之盛在於四五至於上九道乃大行小畜積極而後乃能畜是以四五可以進而上九説征之輻三十四六三為履主故云履虎尾謂履危兊下乾上履虎尾不嘻人亨正義曰履虎尾不嘻人亨者履卦之義以六三為主六三以隂柔履踐九二之剛履危者也猶如履虎尾為危之甚不嘻人亨者以六三在兊體兊為和説而應乾剛雖履其危而不見害故得亨通猶若履虎尾不見嘻齧於人此假物之象以喻人事彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨凡彖者言乎一卦之所以為主也成卦之體在六三也履虎尾者言其危也三為履主以柔履剛履危者也履虎尾而不見嘻者説而應乎乾也乾剛正之德者也不以説行夫佞邪而以説應乎乾宜其履虎尾不見嘻而亨艮宫五世卦三十五以爻言三履二以象言上天下澤象曰上天下澤履君子以辨上下定民志正義曰君子以辨上下定民志者天尊在上澤卑處下君子法此履卦之象以分辨上下尊卑以定正民之志意使尊卑有序也但此履卦名含二義若以爻言之則在上履踐於下六三履九二也若以二卦上下之象言之則履禮也在下以禮承事於上此象之所言取上下二卦卑承尊之義故云上天下澤履但易含萬象反覆取義不可定為一體故也三十六六三隂居陽柔乘剛故為眇為跛六三眇能視跛能履履虎尾嘻人凶武人為于大君居履之時以陽處陽猶曰不謙而况以隂居陽以柔乘剛者乎故以此為明眇目者也以此為行跛足者也以此履危見嘻者也志在剛健不修所履欲以陵武加人為于大君行未能免於凶而志存于五頑之甚也三十七九四多懼故履虎尾訴訴九四履虎尾訴訴終吉逼近至尊以陽承陽處多懼之地故曰履虎尾訴訴也然以陽居隂以謙為本雖處危懼終獲其志故終吉也訴山草反子夏傳云恐懼貌何休注公羊傳云驚愕也馬本作虩音許逆反云恐懼也説文同廣雅云懼也三十八居極應説履道成故可考祥上九視履考祥其旋元吉禍福之祥生乎所履處履之極履道成矣故可視履而考祥也居極應説髙而不危是其旋也履道大成故元吉周易要義卷一下

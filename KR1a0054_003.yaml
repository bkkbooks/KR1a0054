front:
  text: 周易要義綱領
  hash: sha256:eba255305eebcd4101a5601beb9c1004ec0d12c48b9fe263de6eed104432afc3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0054_WYG_003-1a, image: WYG0018/WYG0018-0125c.png}
body:
  text: 上六經正義表臣無忌等言故祭酒上䕶軍曲阜縣開國子孔頴達宏才碩學名振當時貞觀年中奉詔修撰雖加討覈尚有未周爰降絲綸更令刊定𠡠太尉揚州都督監修國史上柱國趙國公臣無忌司馬上柱國英國公臣勣尚書左僕射兼太子少師監修國史上柱國燕國公臣志寧尚書左僕射兼太子少傅監修國史上䕶軍北平縣開國公臣行成光禄大夫侍中兼太子少保監修國史上䕶軍蓚縣開國公臣季輔光禄大夫吏部尚書監修國史上柱國河南郡開國公臣褚遂良銀青光禄大夫守中書令監修國史上騎都尉臣栁奭前諫議大夫𢎞文館學士臣谷那律國子博士𢎞文館學士臣伯莊朝議大夫國子博士臣王徳韶朝散大夫行太學博士臣賈公彦朝散大夫行太學博士𢎞文館直學士臣范義頵朝散大夫行太常博士臣柳宣通直郎守太學博士臣齊威宣徳郎守國子助教臣史士𢎞宣徳郎守太常博士臣孔志約右内率府長史𢎞文館直學士臣薛伯珍兼太學助教臣鄭祖𤣥徵事郎守太學助教臣隨徳素徵事郎守四門博士臣趙君賛承務郎守太學助教臣周𤣥達承務郎守四門助教臣李𤣥植儒林郎守四門助教臣王真儒等上禀宸㫖傍摭羣書謹以上聞伏増戰越謹言永徽四年二月二十四日二漢祖述江南虛𤣥惟王輔嗣獨冠傳易者西都則有丁孟京田東都則有荀劉馬鄭大體更相祖述非有絶倫唯魏世王輔嗣之注獨冠古今所以江左諸儒並傳其學河北學者罕能及之其江南義疏十有餘家皆辭尚虚𤣥義多浮誕原夫易理難窮雖復𤣥之又𤣥至於垂範作則便是有而教有若論住内住外之空就能就所之說斯乃義渉於釋氏非為教於孔門也王氏七日來復即易緯六日七分之成數至若復卦云七日來復並解云七日當為七月謂陽氣從五月建午而消至十一月建子始復所歴七辰故云七月今案輔嗣注云陽氣始剥盡至來復時凡七日則是陽氣剥盡之後凡經七日始復但陽氣雖建午始消至建戌之月陽氣猶在何得稱七月來復故鄭康成引易緯之說建戌之月以陽氣既盡建亥之月純隂用事至建子之月陽氣始生隔此純隂一卦卦主六日七分舉其成數言之而云七日來復仲尼之緯分明輔嗣之注若此康成之說遺跡可尋輔嗣注之於前諸儒背之於後考其義理其可通乎先甲先庚王鄭異義蠱卦云先甲三日後甲三日輔嗣注云甲者創制之令又若漢世之時甲令乙令也輔嗣又云令洽乃誅故後之三日又巽卦云先庚三日後庚三日輔嗣注云申命令謂之庚輔嗣又云甲庚皆申命之謂也諸儒同於鄭氏之說以為甲者宣令之日先之三日而用辛也欲取改新之義後之三日而用丁也取其丁寧之義王氏注意本不如此而又不顧其注妄作異端進疏解姓名謹與朝散大夫行太學博士臣馬嘉運守太學助教臣趙乾叶等對共參議詳其可否至十六年又奉𠡠與前修疏人及給事郎守四門博士上騎都尉蘇徳融等對𠡠使趙𢎞智覆更詳審為之注疏解經凡十卷易一名而含三義夫易者變化之搃名改換之殊稱聖人初畫八卦設剛柔兩畫象二氣也布以三位象三才也謂之為易取變化之義既義總變化而獨以易為名者易緯乾鑿度云易一名而含三義所謂易也變易也不易也又云易者其徳也鄭𤣥依此義作賛及易論云易一名而含三義易簡一也變易二也不易三也崔覲劉貞簡等並用此義云易者謂生生之徳有易簡之義不易者言天地定位不可相易變易者謂生生之道變而相續皆以緯稱不煩不擾澹泊不失此明是易簡之義无為之道故易者易也作難易之音而周簡子云易者易音亦也不易也變易也易者易代之名凡有无相代彼此相易皆是易義不易者常體之名有常有體无常无體是不易之義變易者相變改之名兩有相變此為變易張氏何氏並用此義云易者換代之名待奪之義重卦有四說當從王氏以伏犧為正孔安國馬融王肅姚信等並云伏犧得河圖而作易是則伏犧雖得河圖復須仰觀俯察以相參正然後畫卦伏犧初畫八卦萬物之象皆在其中故繫辭曰八卦成列象在其中矣是也雖有萬物之象其萬物變通之理猶自未備故因其八卦而更重之卦有六爻遂重為六十四卦也繫辭曰因而重之爻在其中矣是也然重卦之人諸儒不同凡有四說王輔嗣等以為伏犧重卦鄭𤣥之徒以為神農重卦孫盛以為夏禹重卦史遷等以為文王重卦其言夏禹及文王重卦者案繫辭神農之時已有蓋取諸益與噬嗑以此論之不攻自破其言神農重卦亦未為得今以諸文騐之案說卦云昔者聖人之作易也幽賛於神明而生蓍凡言作者創造之謂也神農以後便是述修不可謂之作也則幽賛用蓍謂伏犧矣故乾鑿度云垂皇策者犧上繫論用蓍云四營而成易十有八變而成卦既言聖人作易十八變成卦明用蓍在六爻之後非三畫之時伏犧用蓍即伏犧已重卦矣說卦又云昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦既言聖人作易兼三才而兩之又非神農始重卦矣又上繫云易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占此四者之事皆在六爻之後何者三畫之時未有彖繇不得有尚其辭因而重之始有變動三畫不動不得有尚其變揲蓍布爻方用之卜筮蓍起六爻之後三畫不得有尚其占自然中間以制器者尚其象亦非三畫之時今伏犧結繩而為罔罟則是制器明伏犧已重卦矣又周禮小史掌三皇五帝之書明三皇已有書也下繫云上古結繩而治後世聖人易之以書契葢取諸夬既象夬卦而造書契伏犧有書契則有夬卦矣故孔安國書序云古者伏犧氏之王天下也始畫八卦造書契以代結繩之政又曰伏犧神農黄帝之書謂之三墳是也又八卦小成爻象未備重三成六能事畢矣若言重卦起自神農其為功也豈比繫辭而已哉何因易緯等數所歴三聖但云伏犧文王孔子竟不及神農明神農但有葢取諸益不重卦矣故今依王輔嗣以伏犧既畫八卦即自重為六十四卦為得其實其重卦之意備在說卦連山歸藏代號周易亦取岐陽名案周禮太卜三易云一曰連山二曰歸藏三曰周易杜子春云連山伏犧歸藏黄帝鄭𤣥易賛及易論云夏曰連山殷曰歸藏周曰周易鄭𤣥又釋云連山者象山之出雲連連不絶歸藏者萬物莫不歸藏於其中周易者言易道周普无所不備鄭𤣥雖有此釋更无所據之文先儒因此遂為文質之義皆煩而无用今所不取案世譜等羣書神農一曰連山氏亦曰烈山氏黄帝一曰歸藏氏既連山歸藏並是代號則周易稱周取𡵨陽地名毛詩云周原膴膴是也又文王作易之時正在羑里周徳未興猶是殷世也故題周别於殷以此文王所演故謂之周易其猶周書周禮題周以别餘代故易緯云因代以題周是也先儒又兼取鄭說云既指周代之名亦是普徧之義雖欲无所遐棄亦恐未可盡通其易題周因代以稱周是先儒更不别解唯皇甫謐云文王在羑里演六十四卦著七八九六之爻謂之周易以此文王安周字一說卦爻辭皆文王一說爻辭周公其周易繫辭凡有二說一說所以卦辭爻辭並是文王所作知者案繫辭云易之興也其於中古乎作易者其有憂患乎又曰易之興也其當殷之末世周之盛徳邪當文王與紂之事邪又乾鑿度云垂皇策者犧卦道演徳者文成命者孔通卦騐又云蒼牙通靈昌之成孔演命明道經凖此諸文伏犧制卦文王繫辭孔子作十翼易歴三聖只謂此也故史遷云文王囚而演易即是作易者其有憂患乎鄭學之徒並依此說也二以為騐爻辭多是文王後事案升卦六四王用享於岐山武王剋殷之始追號文王為王若爻辭是文王所制不應云王用亨於岐山又明夷六五箕子之明夷武王觀兵之後箕子始被囚奴文王不宜豫言箕子之明夷又既濟九五東鄰殺牛不如西鄰之禴祭說者皆云西鄰謂文王東鄰謂紂文王之時紂尚南靣豈容自言已徳受福勝殷又欲抗君之國遂言東西相鄰而已又左傳韓宣子適魯見易象云吾乃知周公之徳周公被流言之謗亦得為憂患也騐此諸說以為卦辭文王爻辭周公馬融陸績等並同此說今依而用之所以只言三聖不數周公者以父統子業故也上下二篇文王所定案乾鑿度云孔子曰陽三隂四位之正也故易卦六十四分為上下而象隂陽也夫陽道純而奇故上篇三十所以象陽也隂道不純而偶故下篇三十四所以法隂也乾坤者隂陽之本始萬物之祖宗故為上篇之始而尊之也離為日坎為月日月之道隂陽之經所以始終萬物故以坎離為上篇之終也咸恒者男女之始夫婦之道也人道之興必由夫婦所以奉承祖宗為天地之主故為下篇之始而貴之也既濟未濟為最終者所以明戒慎而全王道也以此言之則上下二篇文王所定夫子作緯以釋其義也鄭學隨經分彖象通為十翼其彖象等十翼之辭以為孔子所作先儒更无異論但數十翼亦有多家既文王易經本分為上下二篇則區域各别彖象釋卦亦當隨經而分故一家數十翼云上彖一下彖二上象三下象四上繫五下繫六文言七說卦八序卦九雜卦十鄭學之徒並同此說故今亦依之自商瞿至漢晉傳易不絶孔子既作十翼易道大明自商瞿已後傳授不絶案儒林傳云商瞿子木本受易於孔子以授魯橋庇子庸子庸授江東馯臂子弓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子莊及秦燔書易為卜筮之書獨得不禁故傳授者不絶漢興田何授東武王同子中及雒陽周王孫梁人丁寛齊服生皆著易傳數篇同授菑川楊何字叔元叔元傳京房京房傳梁丘賀賀授子臨臨授御史大夫王駿其後丁寛又别授田王孫孫授施犨犨授張禹禹授彭宣此前漢大畧傳授之人也其後漢則有馬融荀爽鄭𤣥劉表虞翻陸績等及王輔嗣也孟喜前已題上下經字緯文鄙偽但子夏傳云雖分為上下二篇未有經字經字是後人所加不知起自誰始案前漢孟喜易本云分上下二經是孟喜之前已題經字孝經緯稱易建八卦序六十四卦轉成三百八十四爻運機布度其氣轉易故稱經也但緯文鄙偽不可全信

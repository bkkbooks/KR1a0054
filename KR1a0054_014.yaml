body:
  text: 周易要義卷五下宋魏了翁輯革至歸妹一巳日乃孚故元亨利貞悔亡謂革而當離下兑上革已日乃孚元亨利貞悔亡夫民可與習常難與適變可與樂成難與慮始故革之爲道即日不孚已日乃孚也孚然後乃得元亨利貞悔亡也已日而不孚革不當也悔吝之所生生乎變動者也革而當其悔乃亡也坎宫四世卦二變生於不合故水火相戰乃生變彖曰革水火相息二女同居其志不相得曰革凡不合而後乃生變變之所生生於不合者也故取不合之象以爲革也息者生變之謂也火欲上而澤欲下水火相戰而後生變者也二女同居而有水火之性近而不相得也息如字馬云滅也李斐注漢書同説文作熄正義曰革水火相息二女同居其志不相得曰革者此就二體釋卦名也水火相息先就二象明革息生也火本乾燥澤本潤濕燥濕殊性不可共處若其共處必相侵尅既相侵尅其變乃生變生則本性改矣水熱而成湯火滅而氣冷是謂革也二女同居者此就人事明革也中少二女而成一卦此雖形同而志革也一男一女乃相感應二女雖復同居其志終不相得志不相得則變必生矣所以爲革三獨舉湯武革命以明損益之極天地革者天地之道隂陽升降温暑凉寒迭相變革然後四時之序皆有成也湯武革命順乎天而應乎人者王者相承改正易服皆有變革而獨舉湯武者蓋舜禹禪譲猶或因循湯武干戈極其損益故取相變甚者以明人革也四厯數時㑹存乎變象曰澤中有火革君子以治厯明時厯數時㑹存乎變也五六二隂不能先唱故革已乃能從之六二已日乃革之征吉无咎隂之爲物不能先唱順從者也不能自革革已乃能從之故曰已日乃革之也二與五雖有水火殊體之異同處厥中隂陽相應往必合志不憂咎也正義曰水火殊體嫌有相尅之過故曰无咎象曰行有嘉者往應見納故行有嘉慶也行如字又下孟反六以大人之德爲革之主猶虎變文炳九五大人虎變未占有孚未占而孚合時心也象曰大人虎變其文炳也正義曰大人虎變未占有孚者九五居中處尊以大人之德爲革之主損益前王創制立法有文章之美煥然可觀有似虎變其文彪炳則是湯武革命順天應人不勞占决信德自著七豹變雖不同虎變小人處之但革面上六君子至從君也正義曰君子豹變小人革面者上六居革之終變道巳成君子處之雖不能同九五革命創制如虎文之彪炳然已潤色鴻業如豹文之蔚縟故曰君子豹變也小人革面者小人處之但能變其顔面容色順上而已故曰小人革面也征凶居貞吉者革道已成宜安静守正更有所征則凶居而守正則吉八鼎有亨飪之用有物象之法巽下離上鼎元吉亨正義曰鼎者器之名也自火化之後鑄金而爲此器以供亨飪之用謂之爲鼎亨飪成新能成新法然則鼎之爲器且有二義一有亨飪之用二有物象之法故彖曰鼎象也明其有法象也雜卦曰革去故而鼎取新明其亨飪有成新之用此卦明聖人革命示物法象惟新其制有鼎之義以木巽火有鼎之象故名爲鼎焉變故成新必順當理故先元吉而後乃亨故曰鼎元吉亨鼎丁冷反法象也即鼎器也離宫二世卦九享帝直言亨尚質養聖賢言大亨飪所須不出二種一供祭祀二當賔客若祭祀則天神爲大賔客則聖賢爲重故舉其重大則輕小可知享帝直言亨養人則言大亨者享帝尚質特牲而已故直言亨十鼎取新成變故以正位序凝教命象曰木上有火鼎君子以正位凝命凝者嚴整之貌也鼎者取新成變者也革去故而鼎成新正位者明尊卑之序也凝命者以成教命之嚴也十一陽實隂虚初六隂在下爲鼎顛初六鼎顛趾利出否得妾以其子无咎凡陽爲實而隂爲虚鼎之爲物下實而上虚而今隂在下則是爲覆鼎也鼎覆則趾倒矣否謂不善之物也取妾以爲室主亦顛趾之義也處鼎之初將在納新施顛以出穢得妾以爲子故无咎也顛丁田反倒也趾音止出徐尺遂反或如字注及下同否悲己反惡也注及下同象曰鼎顛趾未悖也倒以寫否故未悖也悖必内反逆也利出否以從貴也棄穢以納新也十二得妾以其子䟽謂以有賢子故爲室主正義曰正室雖亡妾猶不得為室主妾為室主亦猶鼎之顛趾而有咎過妾若有賢子則母以子貴以之繼室則得无咎故曰得妾以其子无咎也象曰未悖也者倒趾以出否未爲悖逆也以從貴者舊穢也新貴也棄穢納新所以從貴也然則去妾之賤名而爲室主以從子貴也十三鼎有實五不我能即吉喻才任已極九二鼎有實我仇有疾不我能即吉以陽之質處鼎之中有實者也有實之物不可復加益之則溢反傷其實我仇謂五也困於乘剛之疾不能就我則我不溢得全其吉也仇音求匹也鄭云怨耦曰仇復扶又反下同𧰼曰鼎有實慎所之也有實之鼎不可復有所取才任巳極不可復有所加我仇有疾終无尤也正義曰終无尤也者五既有乗剛之疾不能加我則我終无尢也十四鼎不能空耳以待鉉雖雉膏不能食九三鼎耳革其行塞雉膏不食方雨虧悔終吉鼎之爲義虚中以待物者也而三處下體之上以陽居陽守實无應无所納受耳宜空以待鉉而反全其實塞故曰鼎耳革其行塞雖有雉膏而終不能食也雨者隂陽交和不偏亢者也雖體陽爻而統屬隂卦若不全任剛亢務在和通方雨則悔虧終則吉也行下孟反注同塞悉則反膏如字鄭云雉膏食之美者正義象曰失其義也者失其虛中納受之義也十五鼎覆餗其形渥不量力以致災九四鼎折足覆公餗其形渥凶處上體之下而又應初既承且施非己所堪故曰鼎折足也初已出否至四所盛則已潔矣故曰覆公餗也渥沾濡之貌也既覆公餗體爲渥沾知小謀大不堪其任受其至辱災及其身故曰其形渥凶也折之舌反注同餗送鹿反虞云八珍之具也馬云䭈也䭈之然反鄭云菜也渥於角反沾也鄭作剭音屋施始豉反盛音成知音智象曰覆公餗信如何也不量其力果致凶災信如之何正義曰鼎折足覆公餗者餗糝也八珍之膳鼎之實也信如何也者言不能治之於未亂既敗之後乃責之云不量其力果致凶災災既及矣信如之何也言信有此不可如何之事也十六其形渥鄭作受屋誅之刑闕十七鼎黄耳金鉉能以通理納剛正六五鼎黄耳金鉉利貞居中以柔能以通理納乎剛正故曰黄耳金鉉利貞也耳黄則能納剛正以自舉也十八鉉扛鼎而舉之有扄音鉉𤣥典反徐又古𤣥反又古冥反一音古螢反馬云鉉扛鼎而舉之也𧰼曰鼎黄耳中以爲實也以中爲實所受不妄也十九上九鼎玉鉉謂體剛處柔鼎道成上九鼎玉至剛柔節也正義曰鼎玉鉉者玉者堅剛而有潤者也上九居鼎之終鼎道之成體剛處柔則是用玉鉉以自舉者也故曰鼎玉鉉也大吉无不利者應不在一即靡所不舉故得大吉而无不利𧰼曰剛柔節者以剛履柔雖復在上不爲乾之亢龍故曰剛柔節也二十虩虩恐懼貌啞啞笑樂貌震下震上震亨懼以成則是以亨震止慎反動也八純卦象雷震來虩虩笑言啞啞震之爲義威至而後乃懼也故曰震來虩虩恐懼之貌也震者驚駭怠惰以肅懈慢者也故震來虩虩恐致福也笑言啞啞後有則也虩許逆反馬云恐懼貌鄭同荀作愬愬笑言言亦作語下同啞烏客反馬云笑聲鄭云樂也二十一雷不止百里文王以殷制象侯國正義曰先儒皆云雷之發聲聞乎百里故古帝王制國公侯地方百里故以象焉竊謂天之震雷不應止聞百里蓋以古之啓土百里爲極文王作繇在殷時明長子威震於國故以百里言之二十二匕以棘爲之載鼎實鬯有二義陸績云匕者棘匕撓鼎之器先儒皆云匕形似畢但不兩岐耳以棘木爲之長三尺刋柄與末詩云有捄棘匕是也用棘者取其赤心之義祭祀之禮先烹牢於鑊既納諸鼎而加幂焉將薦乃舉幂而以匕出之升於爼上故曰匕所以載鼎實也鬯者鄭𤣥之義則爲秬黍之酒其氣調暢故謂之鬯詩傳則爲鬯是香草案王度記云天子鬯諸侯薫大夫蘭以例而言之則鬯是草明矣今特言匕鬯者鄭𤣥云人君於祭祀之禮尚牲薦鬯而已其餘不足觀也二十三君出則長子守廟社爲祭主出可以守宗廟社稷以爲祭主也明所以堪長子之義也不䘮匕鬯則已出可以守宗廟正義曰出可以守宗廟社稷以爲祭主者釋不喪匕鬯之義也出謂君出廵狩等事也君出則長子㽞守宗廟社稷攝祭主之禮事也釋注已出正義曰已出謂君也長丁丈反已音紀二十四洊雷震君子以恐懼修省象曰洊雷震君子以恐懼修省正義曰洊重也因仍也雷相因仍乃爲威震也此是重震之卦故曰洊雷震也君子以恐懼修省者君子恒自戰戰兢兢不敢懈惰今見天之怒畏雷之威彌自修身省察已過二十五震來虩虩爻卦象同猶屯兩建侯震來虩虩後笑言啞啞吉此爻辭兩句既與卦同象辭釋之又與彖不異者蓋卦舉威震之功令物恐懼致福爻論遇震而懼修省致福之人卦則自震言人爻則據人威震所説雖殊其事一也所以爻卦二辭本末俱等其猶屯卦初九與卦俱稱利建侯然卦則汎舉屯時宜其有所封建爻則以貴下賤則是堪建之人二十六初九以恐致福六二乗剛喪貝六二震來厲億喪貝躋于九陵勿逐七日得震之爲義威駭怠懈肅整惰慢者也初幹其任而二乗之震來則危喪其資貨亡其所處矣故曰震來厲億喪貝億辭也貝資貨糧用之屬也犯逆受戮无應而行行无所舍威震大行物莫之納无糧而走雖復超越陵險必困于窮匱不過七日故曰勿逐七日得也象曰震來厲乗剛也正義曰初九以剛處下聞震而懼恐而致福即是有徳之人六二以隂賤之體不能敬於剛陽尊其有徳而反乗之是傲尊陵貴爲天所誅震來則有危亡喪其資貨故曰震來厲億䘮貝也躋於九陵勿逐七日得象曰乘剛也者只爲乘於剛陽所以犯逆受戮也億本又作噫同於其反六五同鄭於力反云十萬曰億二十七震蘇蘇以不當位故懼行而无眚六三震蘇蘇震行无眚不當其位位非所處故懼蘇蘇也而无乗剛之逆故可以懼行而无眚也蘇疑懼貌王肅云躁動貌鄭云不安也馬云尸禄素飱貌眚生領反象曰震蘇蘇位不當也正義曰驗注以訓震爲懼蓋懼不自爲懼由震故懼也自下爻辭皆以震言懼二十八索索心不安矍矍視不專懼鄰而戒上六震索索視矍矍征凶震不于其躬于其鄰无咎婚媾有言處震之極極震者也居震之極求中未得故懼而索索視而矍矍无所安親也已處動極而復征焉凶其宜也若恐非己造彼動故懼懼鄰而戒合於備豫故无咎也極懼相疑故雖㛰媾而有言也索桑落反注及下同懼也馬云内不安貌鄭云猶縮縮足不正也視如字徐市至反矍俱縛反徐許縛反馬云中未得之貌鄭云目不正正義曰震索索視矍矍者索索心不安之貌矍矍視不專之容象曰中未得也者猶言未得中也畏鄰戒也者畏鄰之動懼而自戒乃得无咎二十九施止於背无見則静止艮下艮上艮其背目無患也不獲其身所止在後故不得其身也行其庭不見其人相背故也无咎凡物對面而不相通否之道也艮者止而不相交通之卦也各止而不相與何得无咎唯不相見乃可也施止於背不隔物欲得其所止也背者无見之物也无見則自然静止静止而无見則不獲其身矣相背者雖近而不相見故行其庭不見其人也夫施止不於无見令物自然而止而强止之則姦邪並興近而不相得則凶其得无咎艮其背不獲其身行其庭不見其人故也正義曰目者能見之物施止於面則抑割所見強隔其欲是目見之所患今施止於背則目無患也三十物之動息有時應時行止乃光明彖曰艮止至无咎也正義曰艮止也者訓其名也時止則止時行則行動静不失其時其道光明者將釋施止有所光明施止有時凡物之動息自各有時運用止之法不可爲常必須應時行止然後其道乃得光明也艮既訓止今言艮其止是止其所止也故曰艮其止止其所也三十一八純卦皆无應獨於艮言明止義上下敵應不相與也者此就六爻皆不相應釋艮卦之名又釋不獲其身以下之義凡應者一隂一陽二體不敵今上下之位雖復相當而爻皆峙敵不相交與故曰上下敵應不相與也然八純之卦皆六爻不應何獨於此言之者謂此卦既止而不交爻又峙而不應與止義相恊故兼取以明之也是以不獲其身行其庭不見其人无咎也者此舉經文以結之明相與而止之則有咎也三十二兼山止義彌大君子以各止其所象曰兼山艮君子以思不出其位各止其所不侵害也正義曰兼山艮者兩山兼重謂之兼山也直置一山已能鎮止今兩止重叠止義彌大故曰兼山艮也君子以思不出其位者止之爲義各止其所故居子於此之時思慮所及不出其已位也三十三處止之初行則有咎故艮其趾初六艮其趾无咎利永貞處止之初行无所之故止其趾乃得无咎至静而定故利永貞正義象曰未失正也者行則有咎止則不失其正釋所以利永貞三十四艮其腓謂躁動之物而强止之故不快六二艮其腓不拯其隨其心不快隨謂趾也止其腓故其趾不拯腓體躁而處止而不得拯其隨又不能退聼安静故其心不快也腓符非反本又作肥義與咸卦同拯音拯救之拯馬云舉也正義曰艮其腓膊腸也在足之上腓體或屈或伸躁動之物腓動則足隨之故謂足爲隨拯舉也今既施止於腓腓不得動則足无由舉故曰艮其腓不拯其隨也其心不快者腓是躁動之物而強止之貪進而不得動則情與質乖也故曰其心不快此爻明施止不得其所也三十五艮各止其所故三有列夤危厲之象九三艮其限列其夤厲熏心限身之中也三當兩象之中故曰艮其限夤當中脊之肉止加其身中體而分故列其夤而憂危熏心也艮之爲義各止於其所上下不相與至中則列矣列加其夤危莫甚焉危亡之憂乃熏灼其心也施止體中其體分焉體分兩主大器䘮矣限馬云限要鄭荀虞同夤引真反馬云夾脊肉也鄭本作􅘡徐又音𦙍荀作腎云互體有坎坎爲腎熏許云反荀作動云反體有震震爲動喪息浪反象曰艮其限危熏心也三十六人列夤則身危君臣不接則國喪正義曰然則君臣共治大體若身大體不通則君臣不接君臣不接則上下離心列夤則身亡離心則國喪故曰列其夤厲薰心三十七六四艮其身總兩體異乎三之列夤六四艮其身无咎中上稱身履得其位止求諸身得其所處故不陷於咎也象曰艮其身止諸躬也自止其躬不分全體正義曰艮卦總其兩體以爲一身兩體不分乃謂之全全乃謂之身以九三居兩體之際在於身中未入上體則是止於下體不與上交所以體分夤列六四已入上體則非上下不接故能總止其身不分全體三十八婦人備禮乃動故漸爲女歸吉利貞艮下巽上漸女歸吉利貞漸者漸進之卦也止而巽以斯適進漸進者也止巽爲進故女歸吉也進而用正故利貞也正義曰漸者不速之名也凡物有變移徐而不速謂之漸也女歸吉者歸嫁也女人生有外成之義以夫爲家故謂嫁曰歸也婦人之嫁備禮乃動故漸之所施吉在女嫁故曰女歸吉也利貞者女歸有漸得禮之正故曰利貞也漸㨗檢反以之前爲義即階漸之道艮宫歸魂卦三十九進以正可以正邦言九五得位剛中進以正可以正邦也者此就九五得位剛中釋利貞也言進而得於貴位是往而有功也以六二適九五是進而以正身既得正可以正邦也其位剛得中者此卦爻皆得位上言進得位嫌是兼二三四等故特言剛得中以明得位之言惟是九五也四十鴻漸于干未得位故困厲然无咎初六鴻漸于干小子厲有言无咎鴻水鳥也適進之義始於下而升者也故以鴻爲喻六爻皆以進而履之爲義焉始進而位乎窮下又无其應若履于干危不可以安也始進而未得其位則困於小子窮於謗言故曰小子厲有言也困於小子讒諛之言未傷君子之義故曰无咎也干如字鄭云干水傍故停水處陸云水畔稱干毛詩傳曰涯也又云澗也荀王肅云山間澗水也翟云涯也四十一鴻漸于磐既安故飲食衎衎吉正義曰鴻漸于磐既得可安之地所以飲食衎衎然樂而獲吉福也故曰鴻漸于磐飲食衎衎吉也四十二不素飽謂故无禄養而今得之象曰不素飽者素故也故无禄養今日得之故願莫先焉釋注磐山石之安也正義曰馬季長云山中石磐紆故稱磐也鴻是水鳥非是集於山石陵陸之禽而爻辭以此言鴻漸者蓋漸之爲義漸之於髙故取山石陵陸以應漸髙之義不復係水鳥也四十三鴻漸得桷六四得三而安六四鴻漸于木至以巽也正義曰鴻漸于木者鳥而之木得其宜也六四進而得位故曰鴻漸于木也或得其桷无咎者桷榱也之木而遇堪爲桷之枝取其易直可安也六四與三相得順而相保故曰或得其桷既與相得无乗剛之咎故曰无咎象曰順以巽也者言四雖乘三體巽而下附三雖被乗上順而相保所以六四得其安棲由順以巽也四十四鴻陸可儀謂進處髙潔不累於位上九鴻漸于陸其羽可用爲儀吉進處髙潔不累於位无物可以屈其心而亂其志峨峨清逺儀可貴也故曰其羽可用爲儀吉四十五上九與三皆處卦上故並稱漸于陸正義曰鴻漸于陸者上九與三皆處卦上故並稱陸必言羽者既以鴻明漸故用羽表儀也象曰不可亂也者進處髙潔不累於位无物以亂其志也四十六咸二少相感恒二長相承歸妹少承長兑下震上歸妺征凶无攸利妹者少女之稱也兊爲少隂震爲長陽少隂而承長陽説以動嫁妹之象也正義曰歸妺者卦名也婦人謂嫁曰歸歸妹猶言嫁妹也然易論歸妹得名不同㤗卦六五云帝乙歸妹彼據兄嫁妹謂之歸妹此卦名歸妹以妹從姊而嫁謂之歸妹故初九爻辭云歸妹以娣是也上咸卦明二少相感恒卦明二長相承今此卦以少承長非是匹敵明是妹從姊嫁故謂之歸妹焉古者諸侯一取九女嫡夫人及左右媵皆以姪娣從故以此卦當之矣不言歸姪者女娣是兄弟之行亦舉尊以包之也征凶无攸利者歸妹之戒也征謂進有所往也妹從姊嫁本非正匹惟須自守卑退以事元妃若妄進求寵則有並后凶咎之敗故曰征凶无攸利歸妹婦人謂嫁曰歸兊宫歸魂卦四十七柔乘剛妾陵貴由失正而進征凶位不當也履於不正説動以進妖邪之道也邪似嗟反无攸利柔乘剛也以征則有不正之凶以處則有乘剛之逆征凶位不當也者此因二三四五皆不當位釋征凶之義位既不當明非正嫡因説動而更求進妖邪之道也所以戒其征凶也无攸利柔乗剛也者此因六三六五乗剛釋无攸利之義夫陽貴而隂賤以妾媵之賤進求殊寵即是以賤陵貴故无施而利也彖以失位釋征凶乘剛釋无攸利而注連引言之者略例云去初上而論位分則三五各在一卦之上何得不謂之陽二四各在一卦之下何得不謂之隂則二四隂位也三五陽位也陽應在上隂應在下今二三四五並皆失位其勢自然柔皆乘剛其猶妾媵求寵其勢自然以賤陵貴以明柔之乘剛縁於失正而進也四十八歸妹以永終知敝象曰澤上有雷歸妹君子以永終知敝歸妹相終始之道也故以永終知敝四十九妹爲娣雖非正配猶跛而能履初九以兊適震非夫婦匹敵是從姊之義也故曰歸妹以娣也跛能履者妹而繼姊爲娣雖非正配不失常道譬猶跛人之足然雖不正不廢能履故曰跛能履也征吉者少長非偶爲妻而行則凶焉爲娣而行則吉故曰征吉也象曰以恒也者妹而爲娣恒久之道也吉相承也者行得其宜是相承之吉也五十歸妹以須言待時或以須爲妾六三歸妹以須反歸以娣室主猶在而求進焉進未值時故有須也不可以進故反歸待時以娣乃行也須如字待也鄭云有才智之稱荀陸作嬬陸云妾也正義曰歸妹以須者六三在歸妹之時處下體之上有欲求爲室主之象而居不當位象曰未當也者未當其時故宜有待也五十一六五以震長從兑少故云不如娣良六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉歸妹之中獨處貴位故謂之帝乙歸妹也袂衣袖所以爲禮容者也其君之袂謂帝乙所寵也即五也爲帝乙所崇飾故謂之其君之袂也配在九二兊少震長以長從少不若以少從長之爲美也故曰不若其娣之袂良也位在乎中以貴而行極隂之盛以斯適配雖不若少往亦必合故曰月幾望吉袂彌世反幾音機又音祈荀作既象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也正義曰帝乙歸妹不如其娣之袂良者釋其六五雖所居貴位然長不如少也言不如少女而從於長男也其位在中以貴行也者釋月幾望吉也既以長適少非歸妹之美而得吉者其位在五之中以貴盛而行所往必得合而獲吉也五十二處卦之窮進退莫與爲筐无實羊无血上六女承至虚筐也正義曰女承筐无實士刲羊无血无攸利者女之爲行以上有承順爲美士之爲功以下有應命爲貴上六處卦之窮仰則无所承受故爲女承筐則虛而無實又下无其應下命則无應之者故爲士刲羊則乾而无血故曰女承筐无實士刲羊无血則進退莫與故无所利象曰承虛筐者筐本盛幣爲實今之无實正是承捧虛筐空无所有也周易要義卷五下

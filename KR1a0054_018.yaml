body:
  text: 周易要義卷七下宋魏了翁輯上繫一作易者知盗結上不宻失身正義曰作易者其知盗乎者此結上不宻失身之事事若不宻人則乘此機危而害之有若財之不宻盗則乘此機危而竊之易者愛惡相攻逺近相取盛衰相變若此爻有釁隙衰弱則彼爻乘變而奪之二誨盗誨淫小人居位致㓂負也者小人之事也負者擔負於物合是小人所為也乘也者君子之器言乘車者君子之器物言君子合乘車今應負之人而乘車是小人乘君子之器也則盗竊之人思欲奪之矣上慢下暴盗思伐之矣小人居上位必驕慢而在下必暴虐為政如此大盗思欲伐之矣慢藏誨盗冶容誨淫以比小人而居貴位驕矜而不謹慎而致㓂至也乘也者如字一讀乗時正反藏才浪反誨如字教也三其用四十有九不用而用以之通大衍之數五十其用四十有九王弼曰演天地之數所賴者五十也其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之太極也四十有九數之極也夫无不可以无明必因於有故常於有物之極而必明其所由之宗也衍延善反又注演同鄭云衍演也四分二掛一揲四歸竒扐分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閠五嵗再閠故再扐而後掛竒凡四揲之餘不足復揲者也分而為二既揲之餘合掛於一故曰再扐而後掛凡閠者十九年七閠為一章五嵗再閠者二故畧舉其凡也掛一卦買反别也王肅音卦揲時設反案揲猶數也說文云閱持也一音思頬反徐音息列反鄭云取也五乾坤之策萬有一千五百二十乾之策二百一十有六陽爻六一爻三十六策六爻二百一十六策策初革反字亦作筴坤之策百四十有四隂爻六一爻二十四策六爻百四十四策凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也二篇三百八十四爻隂陽各半合萬一千五百二十策當如字下同期本又作朞音基同是故四營而成易分而為二以象兩一營也掛一以象三二營也揲之以四三營也歸竒於扐四營也六大衍之數之用諸說不同正義曰此第八章明占筮之法揲蓍之體顯天地之數定乾坤之策以為六十四卦而生三百八十四爻大衍之數五十其用四十有九者京房云五十者謂十日十二辰二十八宿也凡五十其一不用者天之生氣將欲以虚來實故用四十九焉馬季長云易有太極謂北辰也太極生兩儀兩儀生日月日月生四時四時生五行五行生十二月十二月生二十四氣北辰居位不動其餘四十九轉運而用也荀爽云卦各有六爻六八四十八加乾坤二用凡有五十乾初九潜龍勿用故用四十九也鄭康成云天地之數五十有五以五行氣通凡五行减五大衍又减一故四十九也姚信董遇云天地之數五十有五者其六以象六畫之數故减之而用四十九但五十之數義有多家各有其說未知孰是今案王弼云演天地之數所賴者五十據王弼此說其意皆與諸儒不同萬物之策凡有萬一千五百二十其用此策推演天地之數唯用五十策也一謂自然所須策者唯用五十就五十策中其所用揲蓍者唯用四十有九其一不用以其虚无非所用也故不數之顧懽同王弼此說故顧懽云立此五十數以數神神雖非數因數而顯故虚其一數以明不可言之義只如此意則别无所以自然而有此五十也今依用之七象一兩三四閠及五位得合之數分而為二以象兩者五十之内去其一餘有四十九合同未分是象太一也今以四十九分而為二以象兩儀也掛一以象三者就兩儀之間於天數之中分掛其一而配兩儀以象三才也揲之以四以象四時者分揲其蓍皆以四四為數以象四時歸竒於扐以象閠者竒謂四揲之餘歸此殘竒於所扐之策而成數以法象天道歸殘聚餘分而成閠也五嵗再閠者凡前閠後閠相去大畧三十二月在五嵗之中故五嵗再閠再扐而後掛者既分天地天於左手地於右手乃四四揲天之數最末之餘歸之合於扐掛之一處是一揲也又以四四揲地之數最末之餘又合於前所歸之扐而總掛之是再扐而後掛也天數五者謂一三五七九也地數五者謂二四六八十也五位相得而各有合者若天一與地六相得合為水地二與天七相得合為火天三與地八相得合為木地四與天九相得合為金天五與地十相得合為土天數二十有五者總合五竒之數地數三十者總合五偶之數也凡天地之數五十有五者是天地二數相合為五十有五此乃天地隂陽竒偶之數非是上文演天地之策也八成變化而行鬼神此所以成變化而行鬼神者言此陽竒隂偶之數成就其變化言變化以此隂陽而成故云成變化也而宣行鬼神之用言鬼神以此隂陽而得宣行故云而行鬼神九當期之日當萬物之數據老隂老陽乾之策二百一十有六者乾之老陽一爻有三十六策六爻凡有二百十六策也乾之少陽一爻有二十八策六爻則有一百六十八策此經據老陽之策也坤之策百四十有四者坤之老隂一爻有二十四策六爻故一百四十有四策也若坤之少隂一爻有三十二六爻則有一百九十二此經據坤之老隂故百四十有四也凡三百有六十當期之日者舉合乾坤兩策有三百有六十當期之數三百六十日舉其大畧不數五日四分日之一也二篇之策萬有一千五百二十當萬物之數者二篇之爻總有三百八十四爻隂陽各半陽爻一百九十二爻爻别有三十六總有六千九百一十二也隂爻亦一百九十二爻爻别二十四總有四千六百八也隂陽總合萬有一千五百二十當萬物之數也十四營成易十八變成卦引伸觸長四營而成易者營謂經營而後成也謂四度蓍策乃成易之一變也十有八變而成卦者每一爻有三變謂第一揲不五則九是一變也第二揲不四則八是二變也第三揲亦不四則八是三變也若三者俱多為老隂謂初得九第二第三俱得八也若三者俱少為老陽謂初得五第二第三俱得四也若兩少一多為少隂謂初與二三之間或有四或有五或有八也或有二箇四而有一箇九此為兩少一多也其兩多一少為少陽者謂三揲之間或有一箇九有一箇八而有一箇四或有二箇八而有一箇五此謂兩多一少也如此三變既畢乃定一爻六爻則十有八變乃始成卦也八卦而小成者象天地雷風日月山澤於大象畧盡是易道小成引而伸之者謂引長八卦而伸盡之謂引之為六十四卦也觸類而長之者謂逢觸事類而增長之若觸剛之事類以次増長於剛若觸柔之事類以次増長於柔天下之能事畢矣者天下萬事皆如是例各以類増長則天下所能之事法象皆盡十一韓親受業於王故引所賴者五十正義曰王弼云演天地之數所賴者五十者韓氏親受業於王弼承王弼之㫖故引王弼云以証成其義之數所賴者五十謂萬物籌策雖萬有一千五百二十若用之推演天地之數所須賴者唯賴五十十二首論辭變象占中陳深幾神末以四結夫易聖人之所以極深而研幾也者易道𢎞大故聖人用之所以窮極幽深而研覈幾㣲也極深者前經初一節云君子將有為將有行問焉而以言其受命如響无有逺近幽深是極深也研幾者上經次節云參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象是研幾也唯深也故能通天下之志者言聖人用易道以極深故聖人徳深也故能通天下之志意即是前經上節問焉而以言其受命如響遂知來物是通天下之志也唯幾也故能成天下之務者聖人用易道以研幾故聖人知事之幾㣲是前經次節參伍以變錯綜其數通其變遂成天地之文是也幾者離无入有是有初之㣲以能知有初之㣲則能興行其事故能成天下之事務也唯神也故不疾而速不行而至者此覆說上經下節易之神功也以无思无為寂然不動感而遂通故不須急疾而事速成不須行動而理自至也案下節云唯深也言通天下之志唯幾也言成天下之務今唯神也直云不疾而速不行而至不言通天下者神則至理㣲妙不可測知无象无功於天下之事理絶名言不可論也故不云成天下之功也子曰易有聖人之道四焉者此之謂也者章首論聖人之道四焉章中厯陳其三事章末結而成之故曰聖人之道四焉是此之謂也章首聖人之道有四者韓氏注云此四者存乎器象可得而用者則辭也變也象也占也是有形之物形器可知也若章中所陳則有三事一是至精精則唯深也二是至變變則唯幾也三是至神神則㣲妙无形是其无也神既无形則章中三事不得配章首四事韓氏云四者存乎器象故知章中三事不得配章首四事者也但行此四者即能致章中三事故章中歴陳三事下總以聖人之道四焉結之也十三蓍圎神卦方知爻易貢是故蓍之徳圎而神卦之徳方以知圎者運而不窮方者止而有分言蓍以圓象神卦以方象知也唯變所適无數不周故曰圎卦列爻分各有其體故曰方也知音智注同六爻之義易以貢貢告也六爻變易以告吉凶易以䜴反韓音亦謂變易十四蓍定數於卦為來卦成象於蓍為往神以知來知以藏往明蓍卦之用同神知也蓍定數於始於卦為來卦成象於終於蓍為往往來之用相成猶神知也正義曰以蓍望卦則是知卦象將來之事故言神以知來以卦望蓍則是聚於蓍象往去之事故言知以藏往也十五古聖人能以威服天下而不殺其孰能與此哉者言誰能同此也盖是古之聰明睿知神武而不殺者夫易道深逺以吉凶禍福威服萬物故古人聰明睿知神武之君謂伏羲等用此易道能威服天下而不用刑殺而威服之也十六物先闔後闢闔闢往來謂之變通凡物先藏而後出故先言坤而後言乾闔户謂閉藏萬物若室之閉闔其戸故云闔戸謂之坤闢戸謂之乾者闢戸謂吐生萬物也若室之開闢其戸故云闢户謂之乾也一闔一闢謂之變者開閉相循隂陽遞至或陽變為隂或開而更闔或隂變為陽或閉而還開是謂之變也往來不窮謂之通者須往則變來為往須來則變往為來隨須改變不有窮已常得通流是謂之通也十七見為象形為器制為法用為神見乃謂之象者前往來不窮據其氣也氣漸積聚露見萌兆乃謂之象言物體尚㣲也形乃謂之器者體質成形是謂器物故曰形乃謂之器言其著也制而用之謂之法者言聖人裁制其物而施用之垂為模範故云謂之法利用出入民咸用之謂之神者言聖人以利為用或出或入使民咸用之是聖徳㣲妙故云謂之神十八䟽以一生二釋極生兩五行釋四象八卦太極天地未分之前元氣混而為一即是太初太一也故老子云道生一即此太極是也又謂混元既分即有天地故曰太極生兩儀即老子云一生二也不言天地而言兩儀者指其物體下與四象相對故曰兩儀謂兩體容儀也兩儀生四象者謂金木水火禀天地而有故云兩儀生四象土則分王四季又地中之别故唯云四象也四象生八卦者若謂震木離火兊金坎水各主一時又巽同震木乾同兊金加以坤艮之土為八卦也八卦定吉凶者八卦既立爻象變而相推有吉有凶故八卦定吉凶也吉凶生大業者萬事各有吉凶廣大悉備故能生天下大事業也十九河圖洛書鄭以緯言孔以卦疇釋河出圖洛出書聖人則之者如鄭康成之義則春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖𤼵洛龜書感河圖有九篇洛書有六篇孔安國以為河圖則八卦是也洛書則九疇是也輔嗣之義未知何從二十易有四象非一說䟽謂七八九六莊氏云四象謂六十四卦之中有實象有假象有義象有用象為四象也今於釋卦之處已破之矣何氏以為四象謂天生神物聖人則之一也天地變化聖人效之二也天垂象見吉凶聖人象之三也河出圖洛出書聖人則之四也今謂此等四事乃是聖人易外别有其功非專易内之物何得稱易有四象且又云易有四象所以示也繫辭焉所以告也然則象之與辭相對之物辭既爻卦之下辭則象謂爻卦之象也則上兩儀生四象七八九六之謂也故諸儒有為七八九六今則從以為義繫辭焉所以告者繫辭於象卦下所以告其得失也定之以吉凶所以斷者謂於繫辭之中定其行事吉凶所以斷其行事得失二十一立象設卦繫辭變通以鼔舞總之聖人立象以盡意者雖言不盡意立象可以盡之也設卦以盡情偽者非惟立象以盡聖人之意又設卦以盡百姓之情偽也繫辭焉以盡其言者雖書不盡言繫辭可以盡其言也變而通之以盡利者變謂化而裁之通謂推而行之故能盡物之利也鼔之舞之以盡神者此一句總結立象盡意繫辭盡言之美聖人立象以盡其意繫辭則盡其言可以說化百姓之心百姓之心自然樂順若鼔舞然而天下從之非盡神其孰能與於此二十二謂之事業者凡繫辭說易必闗人事舉而錯之天下之民謂之事業者謂舉此理以為變化而錯置於天下之民凡民得以營為事業故云謂之事業也此乃自然以變化錯置於民也聖人亦當法此錯置變化於萬民使成其事業也凡繫辭之說皆說易道以為聖人徳化欲使聖人法易道以化成天下是故易與聖人恒相將也以作易者本為立教故也非是空說易道不闗人事也是故夫象聖人有以見天下之賾至是故謂之爻者於第六章已具其文今於此更復言者何也為下云極天下之賾存乎卦鼔天下之動存乎辭為此故更引其文也已下又云存乎變存乎通存乎其人廣陳所存之事所以須重論也周易要義卷七下

body:
  text: 周易要義卷一上宋魏了翁輯乾一釋卦名義象體及卦德乾下乾上乾元亨利貞正義曰乾者此卦之名謂之卦者易緯云卦者掛也言懸掛物象以示于人故謂之卦但二畫之體雖象陰陽之氣未成萬物之象未得成卦必三畫以象三才寫天地雷風水火山澤之象乃謂之卦也故繫辭云八卦成列象在其中矣是也但初有三畫雖有萬物之象于萬物變通之理猶有未盡故更重之而有六畫備萬物之形象窮天下之能事故六畫成卦也此乾卦本以象天天乃積諸陽氣而成天故此卦六爻皆陽畫成卦也此既象天何不謂之天而謂之乾者天者定體之名乾者體用之稱故說卦云乾健也言天之體以健為用元亨利貞者是乾之四德也子夏傳云元始也亨通也利和也貞正也二天氣起子陽潜在下故勿用初九潜龍勿用正義曰居第一之位故稱初以其陽爻故稱九潜者𨼆伏之名龍者變化之物言天之自然之氣起于建子之月隂氣始盛陽氣潜在地下故言初九潜龍也此自然之象聖人作法言于此潜龍之時小人道盛聖人雖有龍德於此時唯宜潜藏勿可施用三卦位上有末義初有下義第一位言初第六位當言終第六位言上第一位當言下所以文不同者莊氏云下言初則上有末義故大過彖曰棟橈本末弱是上有末義六言上則初當言下故小象云潜龍勿用陽在下也則是初有下義互文相通義或然也且第一言初者欲明萬物積漸從無入有所以言初不言一與下也六言上者欲見位居卦上故不言六與末也此初九之等是乾之六爻之辭但乾卦是陽生之世故六爻所述皆以聖人出處託之其餘卦六爻各因象明義隨義而發不必皆論聖人他皆放此四蓍為數爻卦辭之本繫辭云爻也者效此者也聖人畫爻以倣效萬物之象先儒云後代聖人以易占事之時先用蓍以求數得數以定爻纍爻而成卦因卦以生辭則蓍為爻卦之本爻卦為蓍之末今案說卦云聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於陰陽而立卦發揮於剛柔而生爻繫辭云成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之又易乾鑿度云垂皇策者犧據此諸文皆是用蓍以求卦先儒之說理當然矣五陽爻稱九陰爻稱六其說二然陽爻稱九陰爻稱六其說有二一者乾體有三畫坤體有六畫陽得兼陰故其數九隂不得兼陽故其數六二者老陽數九老隂數六老隂老陽皆變周易以變者為占故杜元凱注襄九年傳遇艮之八及鄭康成注易皆稱周易以變者為占故稱九稱六所以老陽數九老隂數六者以揲蓍之數九遇揲則得老陽六遇揲則得老陰其少陽稱七少陰稱八義亦凖此張氏以為陽數有七有九陰數有八有六但七為少陽八為少陰質而不變為爻之本體九為老陽六為老隂文而從變故為爻之别名且七既為陽爻其畫已長今有九之老陽不可復畫為陽所以重體避少陽七數故稱九也八為陰數而畫隂爻今六為老陰不可復畫隂爻故交其體避八而稱六但易含萬象所託多塗義或然也六王氏二五為大人鄭謂二見五之大人九二見龍在田利見大人出潜離𨼆故曰見龍處於地上故曰在田德施周普居中不偏雖非君位君之德也初則不彰三則乾乾四則或躍上則過亢利見大人唯二五焉正義曰天下衆庶利見九二之大人故先儒云若夫子教於洙泗利益天下有人君之德故稱大人案文言云九二德博而化又云君德也王輔嗣注云雖非君位君之德也是九二有人君之德所以稱大人也輔嗣又云利見大人唯二五焉是二之與五俱是大人為天下所利見也而褚氏張氏同鄭康成之說皆以為九二利見九五之大人其義非也且大人之云不專在九五與九二故訟卦云利見大人又蹇卦利見大人此大人之文施處廣矣故輔嗣注謂九二也是大人非專九五在田者先儒以為重卦之時重於上下兩體故初與四相應二與五相應三與上相應是上下兩體論天地人各别但易含萬象為例非一及其六位則一二為地道三四為人道五上為天道二在一上是九二處於地上所田食之處七乾六爻子至巳謂正三五七九者非諸儒以為九二當太蔟之月陽氣發見則九三為建辰之月九四為建午之月九五為建申之月為隂氣始殺不宜稱飛龍在天上九為建戌之月羣隂既盛上九不得言與時偕極於此時陽氣僅存何極之有諸儒此說於理稍乖此乾之陽氣漸生似聖人漸出宜據十一月之後至建巳之月已來此九二當據建丑建寅之間於時地之萌芽初有出者即是陽氣發見之義乾卦之象其應然也但隂陽二氣共成嵗功故陰興之時仍有陽在陽生之月尚有隂存所以六律六吕隂陽相間取象論義與此不殊乾之初九則與復卦不殊乾之九二又與臨卦無别八九三位不中履重剛故惕厲九三君子終日乾乾夕惕若厲無咎處下體之極居上體之下在不中之位履重剛之險上不在天未可以安其尊也下不在田未可以寧其居也正義曰處下體之極者終也三是上卦之下下體之極故云極也又云居上體之下者四五與上是上體三居四下未入上體但居上體之下四則已入上體但居其上體之下故九四注云居上體之下與此别也云履重剛之險者上下皆有陽爻剛强好為險難九諸儒以若厲為如危於上下文不合夕惕猶若厲也者言雖至於夕恆懷惕懼猶如未夕之前常若厲也案此卦九三所居之處實有危厲又文言云雖危無咎是實有危也據其上下文勢若字宜為語辭但諸儒並以若為如如似有厲是實無厲也理恐未盡今且依如解之十九三以位卑免咎上九以位尊貽悔竭知力而後免於咎者正以九三與上九相並九三處下卦之極其位猶卑故竭知力而得免咎也上九在上卦之上其位極尊雖竭知力不免亢極言下勝於上卑勝於尊十一有悔謂當有此悔設法戒之上九亢龍有悔正義曰上九亢陽之至大而極盛故曰亢龍此自然之象以人事言之似聖人有龍德上居天位久而亢極物極則反故有悔也純陽雖極未至大凶但有悔吝而已繫辭云悔吝者言乎其小疵也故鄭引堯之末年四凶在朝是以有悔未大凶也凡悔之為文既是小疵不單稱悔也必以餘字配之其悔若在則言有悔謂當有此悔則此經是也其悔若無則言悔亡言其悔已亡也若恆卦九二悔亡是也其悔雖亡或是更取他文結之若復卦初九不逺復無祗悔元吉是也但聖人至極終始無虧故文言云知進退存亡而不失其正者其唯聖人乎是知大聖之人本無此悔但九五天位有大聖而居者亦有非大聖而居者不能不有驕亢故聖人設法以戒之也十二夫子所作彖辭統論一卦之體彖曰大哉至咸寧正義曰夫子所作彖辭統論一卦之義或說其卦之德或說其卦之義或說其卦之名故略例云彖者何也統論一卦之體明其所由之主案褚氏莊氏並云彖斷也斷定一卦之義所以名為彖也此彖釋乾與元亨利貞之德諸儒所說此彖分解四德意各不同今案莊氏之說於理稍密依而用之十三大哉至利貞釋四德首出聖人大哉乾元萬物資始乃統天者此三句總釋乾與元也乾是卦名元是乾德之首故以元德配乾釋之大哉乾元者陽氣昊大乾體廣逺又以元大始生萬物故曰大哉乾元萬物資始者釋其乾元稱大之義以萬象之物皆資取乾元而各得始生不失其宜所以稱大也乃統天者以其至健而為物始以此乃能統領於天天是有形之物以其至健能總統有形是乾元之德也雲行雨施品物流形者此二句釋亨之德也言乾能用天之德使雲氣流行雨澤施布故品類之物流布成形各得亨通無所壅蔽是其亨也大明終始六位時成者此二句總結乾卦之德也以乾之為德大明曉乎萬物終始之道始則潜伏終則飛躍可潜則潜可飛則飛是明達乎始終之道故六爻之位依時而成時乘六龍以御天者此二句申明乾元乃統天之義言乾之為德以依時乘駕六爻之陽氣以控御於天體六龍即六位之龍也以所居上下言之謂之六位也陽氣升降謂之六龍也變謂後來改前以漸移改謂之變也化謂一有一無忽然而改謂之為化言乾之為道使物漸變者使物卒化者各能正定物之性命性者天生之質若剛柔遲速之别命者人所禀受若貴賤夭壽之屬是也保合太和乃利貞者此二句釋利貞也純陽剛暴若無和順則物不得利又失其正以能保安合㑹太和之道乃能利貞於萬物言萬物得利而貞正也首出庶物萬國咸寧者自上已來皆論乾德自然飬萬物之道此二句論聖人上法乾德生飬萬物言聖人為君在衆物之上最尊髙於物似頭首出於衆物之上各置君長以領萬國故萬國皆得寧也十四聖人象乾立化亦有此四德聖人亦當令萬物資始統領於天位而雲行雨施布散恩澤使兆庶衆物各流布其形又大明乎盛衰終始之道使天地四時貴賤髙下各以時而成又任用羣賢以奉行聖化使物各正性命此聖人所以象乾而立化十五凡物壯者皆有衰惟天運日過一度象曰天行至不息正義曰此大象也十翼之中第三翼總象一卦天行健行者運動之稱健者强壯之名乾是衆健之訓今大象不取餘健為釋偏說天者萬物壯健皆有衰怠唯天運動日過一度蓋運轉混沒未曾休息故云天行健健是乾之訓也順者坤之訓也坤則云地勢坤此不言天行乾而言健者劉表云詳其名也然則天是體名乾是用名健是其訓三者並見最為詳悉所以尊乾異於他卦十六六十四象不同乾坤不顯上下體凡六十四卦說象不同或總舉象之所由不論象之實體又總包六爻不顯上體下體則乾坤二卦是也或直舉上下二體者若雲雷屯也天地交泰也天地不交否也雷電噬嗑也雷風恆也雷雨作解也風雷益也雷電皆至豐也洊雷震也隨風巽也習坎坎也明兩作離也兼山艮也麗澤兊也凡此一十四卦皆總舉兩體而結義也取兩體俱成或有直舉兩體上下相對者天與水違行訟也上天下澤履也天與火同人也上火下澤睽也凡此四卦或取兩體相違或取兩體相合或取兩體上下相承而為卦也故兩體相對而俱言也雖上下二體共成一卦或直指上體而為文者若雲上於天需也風行天上小畜也火在天上大有也雷出地奮豫也風行地上觀也山附于地剝也澤滅木大過也雷在天上大壯也明出地上晉也風自火出家人也澤上于天夬也澤上于地萃也風行水上渙也水在火上既濟也火在水上未濟也凡此十五卦皆先舉上象而連於下亦意取上象以立卦名也亦有雖意在上象而先舉下象以出上象者地上有水比也澤上有地臨也山上有澤咸也山上有火旅也木上有水井也木上有火鼎也山上有木漸也澤上有雷歸妹也山上有水蹇也澤上有水節也澤上有風中孚也山上有雷小過也凡此十二卦皆先舉下象以出上象亦意取上象共下象而成卦也或先舉上象而出下象義取下象以成卦義者山下出泉蒙也地中有水師也山下有風蠱也山下有火賁也天下雷行無妄也山下有雷頤也天下有山遁也山下有澤損也天下有風姤也地中有山謙也澤中有雷隨也地中生木升也澤中有火革也凡此十三卦皆先舉上體後舉下體也其上體是天天與山則稱下也若上體是地地與澤則稱中也或有雖先舉下象稱在上象之下者若雷在地中復也天在山中大畜也明入地中明夷也澤無水困也是舉下象而稱上象之下亦義取下象以立卦也所論之例者皆大判而言之其間委曲各於卦下别更詳之十七有假象實象先儒所云此等象辭或有實象或有假象實象者若地上有水比也地中生木升也皆非虛故言實也假象者若天在山中風自火出如此之類實無此象假而為義故謂之假也雖有實象假象皆以義示人總謂之象十八諸象不包在下者稱先王與后若卦體之義唯施於天子不兼包在下者則言先王也若比卦稱先王以建萬國豫卦稱先王以作樂崇德觀卦稱先王以省方觀民設教噬嗑稱先王以明罰𠡠法復卦稱先王以至日閉關無妄稱先王以茂對時育萬物渙卦稱先王以享于帝立廟泰卦稱后以財成天地之道姤卦稱后以施命誥四方稱后兼諸侯也自外卦並稱君子十九乾坤易之門特作文言此文凡六節文言曰至利貞正義曰文言者是夫子第七翼也以乾坤其易之門户邪其餘諸卦及爻皆從乾坤而出義理深奧故特作文言以開釋之莊氏云文謂文飾以乾坤德大故特文飾以為文言今謂夫子但贊明易道申說義理非是文飾華彩當謂釋二卦之經文故稱文言從此至元亨利貞明乾之四德為第一節從初九曰潜龍勿用至動而有悔明六爻之義為第二節自潜龍勿用下至天下治也論六爻之人事為第三節自潜龍勿用陽氣潜藏至乃見天則論六爻自然之氣為第四節自乾元者至天下平也此一節復說乾元之四德之義為第五節自君子以成德為行至其唯聖人乎此一節更廣明六爻之義為第六節今各依文解之二十元亨利貞配四時五行莊氏云第一節元者善之長者謂天之體性生飬萬物善之大者莫善施生元為施生之宗故言元者善之長也亨者嘉之㑹者嘉美也言天能通暢萬物使物嘉美之㑹聚故云嘉之㑹也利者義之和者言天能利益庶物使物各得其宜而和同也貞者事之幹者言天能以中正之氣成就萬物使物皆得幹濟莊氏之意以此四句明天之德也而配四時元是物始於時配春春為發生故下云體仁仁則春也亨是通暢萬物於時配夏故下云合禮禮則夏也利為和義於時配秋秋既物成各合其宜貞為事幹於時配冬冬既收藏事皆幹了也於五行之氣唯少土也土則分王四季四氣之行非土不載故不言也二十一四德配五事則仁禮義信不言知於五事言之元則仁也亨則禮也利則義也貞則信也不論知者行此四事並須資於知且乾鑿度云水土二行兼信與知也故略知不言也二十二諸卦有四德三德二德一德無德諸卦之中亦有四德但餘卦四德有劣於乾故乾卦直云四德更無所言欲見乾之四德無所不包其餘卦四德之下則更有餘事以四德狹劣故以餘事繫之即坤卦之類是也亦有四德之上即論餘事若革卦云已日乃孚元亨利貞悔亡也由乃孚之後有元亨利貞乃得悔亡也有四德者即乾坤屯臨隨無妄革七卦是也亦有其卦非善而有四德者以其卦凶故有四德乃可也故隨卦有元亨利貞乃得無咎是也四德具者其卦未必善也亦有三德者即離咸萃兊渙小過凡六卦就三德之中為文不一或總稱三德於上更别陳餘事於下若離咸之屬是也就三德之中上下不一離則云利貞亨由利貞乃得亨也亦有先云亨更陳餘事乃始云利貞者以有餘事乃得利貞故也有二德者大有蠱漸大畜升困中孚凡七卦此二德或在事上言之或在事後言之由後有事乃致此二德故也亦有一德者若蒙師小畜履泰謙噬嗑賁復大過震豐節既濟未濟凡十五卦皆一德也並是亨或多在事上言之或在事後言履卦云履虎尾不嘻人亨由有事乃得亨二十三凡卦亨貞連事起文者不數以前所論德者皆於經文挺然特明德者乃言之也其有因事相連而言德者則不數之也若需卦云需有孚光亨貞吉雖有亨貞二德連事起文故不數也遁卦云亨小利貞雖有三德亦不數也旅卦云旅小亨旅貞吉雖有亨貞二德亦連他事不數也比卦云原筮元永貞無咎否卦云否之匪人不利君子貞雖有貞字亦連他文言之又非本卦德亦不數之同人云同人于野亨坎卦云有孚維心亨損卦云無咎可貞此等雖有一德皆連事而言之故亦不數所以然者但易含萬象事義非一隨時曲變不可為典要故也其有意義各於卦下詳之亦有卦善而德少者若泰與謙復之類雖善唯一德亦有全無德者若豫觀剝晉蹇解夬姤井艮歸妹凡十一卦也大略唯有凶卦無德者若剝蹇夬姤之屬是也亦有卦善而無德者晉解之屬是也各於卦下詳之二十四文言第二節設問以釋潜龍初九曰潜龍勿用至潜龍也正義曰此第二節釋初九爻辭也初九曰潜龍勿用何謂也者此夫子疊經初九爻辭故言初九曰方釋其義假設問辭故言潜龍勿用何謂也子曰龍德而𨼆者也此夫子以人事釋潜龍之義聖人有龍德𨼆居者也不易乎世者不移易其心在於世俗雖逢險難不易本志也不成乎名者言自𨼆默不成就於令名使人知也遁世無悶者謂逃遁避世雖逢無道心無所悶不見是而無悶者言舉世皆非雖不見善而心亦無悶心以為樂已則行之心以為憂已則違之確乎其不可拔者身雖逐物推移潜𨼆避世心志守道確乎堅實其不可拔此是潜龍之義也二十五二爻漸見若舜漁陶民化之時九二曰見龍至君德也正義曰此釋九二爻辭子曰龍德而正中者九二居中不偏然不如九五居尊得位故但云龍德而正中者也庸言之信庸行之謹者庸謂中庸庸常也從始至末常言之信實常行之謹慎間邪存其誠者言防間邪惡當自存其誠實也善世而不伐者謂為善於世而不自伐其功德博而化者言德能廣博而變化於世俗初爻則全𨼆遁避世二爻則漸見德行以化於俗也若舜漁於雷澤陶於河濵以器不窳民漸化之是也二十六以異於諸爻特稱易曰又云君德易曰見龍在田利見大人君德也者以其異於諸爻故特稱易曰見龍在田未是君位但云君德也二十七明終敝故不驕知至至故不憂是故居上位而不驕在下位而不憂居下體之上在上體之下明夫終敝故不驕也知夫至至故不憂也二十八上廣陳同類感應明聖作物覩九五曰飛龍至其類也正義曰此明九五爻之義飛龍在天者言天能廣感衆物衆物應之所以利見大人因大人與衆物感應故廣陳衆物相感應以明聖人之作而萬物瞻覩以結之也同聲相應者若彈宫而宫應彈角而角動是也同氣相求者若天欲雨而柱礎潤是也此二者聲氣相感也水流濕火就燥者此二者以形象相應水流於地先就濕處火焚其薪先就燥處此聲氣水火皆無識而相感先明自然之物故發初言之也雲從龍風從虎者龍是水畜雲是水氣故龍吟則景雲出是雲從龍也虎是威猛之獸風是震動之氣此亦是同類相感故虎嘯則谷風生是風從虎也此二句明有識之物感無識故以次言之漸就有識而言也聖人作而萬物覩者此二句正釋飛龍在天利見大人之義聖人作則飛龍在天也萬物覩則利見大人也陳上數事之名本明於此是有識感有識也此亦同類相感聖人有生飬之德萬物有生飬之情故相感應也本乎天者親上本乎地者親下者在上雖陳感應唯眀數事而已此則廣解天地之間共相感應之義莊氏云天地絪緼和合二氣共生萬物然萬物之體有感於天氣偏多者有感於地氣偏多者故周禮大宗伯有天産地産大司徒云動物植物本受氣於天者是動物含靈之屬天體運動含靈之物亦運動是親附於上也本受氣於地者是植物無識之屬地體凝滯植物亦不移動是親附於下也則各從其類者言天地之間共相感應各從其氣類二十八下有異類相感有逺事相感亦有異類相感者若磁石引針琥珀拾芥蠶吐絲而商弦絶銅山崩而洛鐘應其類煩多難一一言也皆冥理自然不知其所以然也感者動也應者報也皆先者為感後者為應非唯近事則相感亦有逺事遙相感者若周時獲麟乃為漢髙之應漢時黃星後為曹公之兆感應之事廣非片言可悉二十九餘爻說龍九三君子各隨其義乾文言首不論乾而先說元下乃曰乾何也夫乾者統行四事者也君子以自强不息行此四者故首不論乾而下曰乾元亨利貞餘爻皆說龍至於九三獨以君子為目何也夫易者象也象之所生生於義也有斯義然後明之以其物故以龍叙乾以馬明坤隨其事義而取象焉統而舉之乾體皆龍别而叙之各隨其義三十上九無位六爻皆無隂是無民上九曰亢龍至有悔也正義曰此明上九爻辭也子曰貴而無位者以上九非位而上九居之是無位也髙而無民者六爻皆無隂是無民也賢人在下位而無輔者賢人雖在下位不為之輔助也是以動而有悔者聖人設戒居此之時不可動作也三十一文言第三節說六爻人事所治故乾元用九則天下治也夫識物之動則其所以然之理皆可知也龍之為德不為妄者也潜而勿用何乎必窮處於下也見而在田必以時之通舍也以爻為人以位為時人不妄動則時皆可知也文王明夷則主可知矣仲尼旅人則國可知矣正義曰此一節是文言第三節說六爻人事所治之義潜龍勿用下也者言聖於此潜龍之時在卑下也見龍在田時舍者舍謂通舍九二以見龍在田是時之通舍也終日乾乾行事者言行此知至知終之事也或躍在淵自試者言聖人逼近五位不敢果决而進唯漸漸自試意欲前進遲疑不定故云自試也飛龍在天上治者言聖人居上位而治理也亢龍有悔窮之災者言位窮而致災災則悔也非為大禍災也乾元用九天下治者易經上稱用九用九之文總是乾德又乾字不可獨言故舉元德以配乾也言此乾元用九德而天下治三十二爻為人位為時人不妄動時可知夫識物之動則其所以然之理皆可知者此欲明在下龍潜見之義故張氏云識物之動謂龍之動也則其所以然之理皆可知者謂識龍之所以潜所以見然此之理皆可知也龍之為德不為妄者言龍靈異於他獸不妄舉動可潜則潜可見則見是不虛妄也三十三經惟言時舍注言時之通舍見而在田必以時之通舍者經唯云時舍也注云必以時之通舍者則輔嗣以通解舍舍是通義也初九潜藏不見九二既見而在田是時之通舍之義也以爻為人以位為時者爻居其位猶若人遇其時三十四文言第四節以天氣眀六爻潜龍勿用至見天則正義曰此一節是文言第四節明六爻天氣之義天下文明者陽氣在田始生萬物故天下有文章而光明也與時偕行者此以天道釋爻象也所以九三乾乾不息終日自戒者同於天時生物不息言與時偕行也偕俱也諸儒以為建辰之月萬物生長不有止息與天時而俱行若以不息言之是建寅之月三陽用事三當生物之初生物不息同於天時生物不息故言與時偕行也乾道乃革者去下體入上體故云乃革也乃位乎天德者位當天德之位言九五陽居於天照臨廣大故云天德也乃見天則者陽是剛亢之物能用此純剛唯天乃然故云乃見天則三十五文言第五節明四德始終不為乾元何能通物之始不性其情何能久行其正是故始而亨者必乾元也利而貞者必性情也正義曰此一節是第五節復明上初章及乾四德之義也性者天生之質正而不邪情者性之欲也言若不能以性制情使其情如性則不能久行其正三十六合散消息與體相乖爻所以眀情其六爻發揮之義案略例云爻者言乎變者也故合散屈伸與體相乖形躁好靜質柔愛剛體與情反質與願違是爻者所以明情故六爻發散旁通萬物之情三十七陽居陽為得位陽得陽為無應輔嗣之意以初為無用之地上為盡末之境其居位者唯二三四五故繫辭唯論此四爻初上雖無正位統而論之爻亦始末之位乾彖云六位時成二四為隂位隂居為得位陽居為失位三五為陽位陽居為得位隂居為失位略例云陽之所求者隂也隂之所求者陽也一與四二與五三與上若一隂一陽為有應若俱隂俱陽為無應此其六爻之大略其義具於繫辭於此略言之三十八文言第六節又明六爻之義君子以成德至弗用也正義曰此一節是文言第六節更復明六爻之義此節明初九爻辭周氏云上第六節乾元者始而亨者也是廣明乾與四德之義此君子以成德為行亦是第六節明六爻之義總屬第六節不更為第七節義或當然也君子以成德為行者明初九潜龍之義故先開此語也周易要義卷一上

body:
  text: 六馬鄭等大衍即天地數與王韓異正義曰先儒馬融王肅等解此皆依繫辭云天數五地數五五位相得而各有合以爲五位相合以隂從陽天得三合謂三與五也地得兩合謂二與四也鄭􅀇亦云天地之數備於十乃三之以天兩之以地而􅀝託大演之數五十也必三之以天兩之以地者天三覆地二載欲極於數庶得吉凶之審也其意皆以繫辭所云大演之數五十其用四十有九明用蓍之數下云天數五地數五五位相得而各有合天地之數五十有五以爲大演即天地之數又此上言幽贊於神明而生蓍便云參天兩地而􅀝數驗文準義故知如此韓康伯注繫辭云大演之數五十用王輔嗣意云易之所賴者五十其用四十有九則其一不用也不用而用以之通非數而數以之成用與不用本末合數故五十也以大衍五十非即天地之數故不用馬融鄭􅀇等􅀃然此􅀝數生數在生蓍之後立卦之前明用蓍得數而布以爲卦故以七八九六當之七九爲竒天數也六八爲耦地數也故取竒於天取耦於地而立七八九六之數也何以參兩爲目竒耦者蓋古之竒耦亦以參兩言之八䟽以八卦相錯爲六十四卦用蓍之法正義曰卦則雷風相薄山澤通氣擬象隂陽變化之體者此言六十四卦非小成之八卦也伏犧􅀄畫八卦以震象雷以巽象風以艮象山以兊象澤八卦未重則雷風各異山澤不通於隂陽變化之理未爲周備故此下云八卦相錯數徃者順知來者逆注云八卦相錯變化理備於往則順而知之於來則逆而數之是也知非八卦者先儒皆以繫辭論用蓍之法云四營而成易十有八變而成卦者謂用蓍三扐而布一爻則十有八變爲六爻也然則用蓍在六爻之後非三畫之時蓋伏犧之􅀄直仰觀俯察用隂陽兩爻而畫八卦後因而重之爲六十四卦然後天地變化人事吉凶莫不周備緼在爻卦之中矣文王又於爻卦之下繫之以辭明其爻卦之中吉凶之義蓍是數也傳稱物生而後有象象而後有滋滋而後有數然則數從象生故可用數求象於是幽贊於神明而生蓍用蓍之法求取卦爻以定吉凶繫辭曰天生神物聖人則之无有逺近幽深遂知來物是也繫辭言伏犧作易之􅀄不假用蓍成卦故直言仰觀俯察此則論其旣重之後端䇿布爻故先言生蓍後言立卦非是聖人幽贊元在觀變之前九天道隂陽言氣地道柔剛言形昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛在天成象在地成形隂陽者言其氣剛柔者言其形變化始於氣象而後成形萬物資始乎天成形乎地故天曰隂陽地曰剛柔也或有在形而言隂陽者本其始也在氣而言柔剛者要其終也要一遥反立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章設六爻以效三才之動故六畫而成卦也六位爻所處之位也二四爲隂三五爲陽故曰分隂分陽六爻升降或柔或剛故曰迭用柔剛也正義曰旣兼備三才之道而皆兩之作易本順此道理湏六畫成卦故作易者而重之使六畫而成卦也六畫所處有其六位分二四爲隂位三五爲陽位迭用六八之柔爻七九之剛爻而來居之故作易者分六位而成爻卦之文章也十亦有在形言隂陽在氣言柔剛注或有至其終也正義曰在形而言隂陽者即坤象辭云履霜堅冰隂始凝是也在氣而言柔剛者即尚書云髙明柔克及左傳云天爲剛德是也十一王氏以􅀄上无隂陽定位注二四爲隂三五爲陽正義曰王輔嗣以爲􅀄上无隂陽定位此注用王之􅀃也十二八卦相錯變化理備往順來逆天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆易八卦相錯變化理備於往則順而知之於來則逆而數之相薄旁各反陸云相附薄也馬鄭顧云薄入也射食亦反虞陸董姚王肅音亦云厭也數徃色具反又色主反而數色主反下文同是故易逆數也作易以逆覩來事以前民用正義曰此一節就卦象明重卦之意易以乾坤象天地艮兊象山澤震巽象雷風坎離象水火􅀂使天地不交水火異處則庶􅀋无生成之用品物无變化之理所以因而重之令八卦相錯則天地人事莫不備矣故云天地定位而合德山澤異體而通氣雷風各動而相薄水火不相入而相資旣八卦之用變化如此故聖人重卦令八卦相錯乾坤震巽坎離艮兊莫不交互而相重以象天地雷風水火山澤莫不交錯則易之爻卦與天地等十三言雷風雨日艮兊乾坤互相備雷以至藏之正義曰此一節揔明八卦養物之功烜乾也上四舉象下四㪯卦者王肅云互相備也明雷風與震巽同用乾坤與天地通功也烜况晩反京云乾也本又作恒日徐古鄧反又一音香元反十四帝者生物之主出震齊巽至成艮帝出至乎艮正義曰康伯於此无注然益卦六二王用享于帝吉王輔嗣注云帝者生物之主興益之宗出震而齊巽者也王之注意正引此文則輔嗣之意以此帝爲大帝也帝若出萬物則在乎震絜齊萬物則在乎巽令萬物相見則在乎離致役以養萬物則在乎坤􅀃萬物而可言者則在乎兊隂陽相戰則在乎乾受納萬物勤勞則在乎坎能成萬物而可定則在乎艮也萬物出乎震震東方者解上帝出乎震以震是東方之卦斗柄指東爲春春時萬物出生也齊乎巽巽東南也齊也者言萬物之絜齊也解上齊乎巽以巽是東南之卦斗柄指東南之時萬物皆絜齊也離也者明也萬物皆相見南方之卦也聖人南靣而聽天下嚮明而治盖取諸此也者解上相見乎離因明聖人法離之事以離爲象日之卦故爲明也日出而萬物皆相見也又位在南方故聖人法南面而聽天下嚮明而治也故云蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤者解上致役乎坤以坤是象地之卦地能生養萬物是有其勞役故云致役乎坤鄭云坤不言方者所言地之養物不專一也兊正秋也萬物之所􅀃也故曰􅀃言乎兊者解上􅀃言乎兊以兊是象澤之卦􅀃萬物者莫􅀃乎澤又位是西方之卦斗柄指西是正秋八月也正秋而萬物皆􅀃成也戰乎乾乾西北之卦也言隂陽相薄也者解上戰乎乾以乾是西北方之卦西北是隂地乾是純陽而居之是隂陽相薄之象也故曰戰乎乾坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎者解上勞乎坎以坎是象水之卦水行不舎晝夜所以爲勞卦又是正北方之卦斗柄指北於時爲冬冬時萬物閉藏納受爲勞是坎爲勞卦也艮東北之卦也萬物之所成終而所成始也故曰成言乎艮者解上成言乎艮也以艮是東北方之卦也東北在寅丑之間丑爲前歳之末寅爲後歳之􅀄則是萬物之所成終而所成始也十六直舉六子以明神之功用不言乾坤不知所以然而然況之曰神也然則神也者非物妙萬物而爲言者神旣範圍天地故此之下不復別言乾坤直舉六子以明神之功用故曰皷動萬物者莫疾乎震震象雷也橈散萬物者莫疾乎巽巽象風也乾燥萬物者莫熯乎離離象火也光􅀃萬物者莫􅀃乎兊兊象澤也潤濕萬物者莫潤乎坎坎象水也終萬物始萬物者莫盛乎艮艮東北方之卦也故水火雖不相入而相逮及雷風雖相薄而不相悖逆山澤雖相懸而能通氣然後能行變化而盡成萬物也艮不言山獨舉卦名者動橈燥潤之功是雷風水火至於終始萬物於山義爲微故言艮而不言山也上章言水火不相入此言水火相逮者旣不相入又不相及則无成物之功明性雖不相入而氣相逮及也上言雷風相薄此言不相悖者二象俱動動􅀂相薄而相悖逆則相傷害亦无成物之功明雖相薄而不相逆也十八釋馬牛龍雞豕雉狗羊之象乾爲馬至兊爲羊正義曰此一節􅀃八卦畜獸之象略明逺取諸物也乾象天以行健故爲馬也坤爲牛坤象地任重而順故爲牛也震爲龍震動象龍動物故爲龍也巽爲雞巽主號令鷄能知時故爲鷄也坎爲豕坎主水瀆豕處汚濕故爲豕也離爲雉離爲文明雉有文章故爲雉也艮爲狗艮爲靜止狗能善守禁止外人故爲狗也兊爲羊兊􅀃也王廙云羊者順從之畜故爲羊也十九釋首腹足股耳目手口之象乾爲首至兊爲口正義曰此一節􅀃八卦人身之象略明近取諸身也乾尊而在上故爲首也坤爲腹坤能包藏含容故爲腹也震爲足足能動用故爲足也巽爲股股隨於足則巽順之謂故爲股也坎爲耳北方之卦主聽故爲耳也離爲目南方之卦主視故爲目也艮爲手艮旣爲手亦能止持其物故爲手也兊爲口兊西方之卦主言語故爲口也二十索訓求得父氣爲男母氣爲女乾天至少女正義曰此一節􅀃乾坤六子明父子之道王氏云索求也以乾坤爲父母而求其子也得父氣者爲男得母氣者爲女坤􅀄求得乾氣爲震故曰長男坤二求得乾氣爲坎故曰中男坤三求得乾氣爲艮故曰少男乾􅀄求得坤氣爲巽故曰長女乾二求得坤氣爲離故曰中女乾三求得坤氣爲兊故曰少女卄一乾爲天以下凡十四象乾爲天爲圜爲君爲父爲玉爲金爲寒爲冰爲大赤爲良馬爲老馬爲瘠馬爲駁馬爲木果正義曰乾旣爲天天動運轉故爲圜也爲君爲父取其尊首而爲萬物之始也爲玉爲金取其剛而清明也爲寒爲冰取其西北寒冰之地也爲大赤取其盛陽之色也爲良馬取其行徤之善也爲老馬取其行徤之乆也爲瘠馬取其行徤之甚瘠馬骨多也爲駁馬言此馬有牙如倨能食虎豹爾雅云倨牙食虎豹此之謂也王廙云駁馬能食虎豹取其至徤也爲木果取其果實著木有似星之著天也圜音圎瘠在亦反下同王廙云徤之甚者爲多骨也京荀作柴云多筋幹卄二坤爲地以下凡十二象坤爲地爲母爲布爲釡爲吝嗇爲均爲子母牛爲大輿爲文爲衆爲柄其於地也爲黒正義曰坤旣爲地地受任生育故謂之爲母也爲布取其地廣載也爲釡取其化生成熟也爲吝嗇取其地生物不轉移也爲均取其地道平均也爲子母牛取其多蕃育而順之也爲大輿取其能載萬物也爲文取其萬物之色􅄂也爲衆取其地載物非一也爲柄取其生物之本也其於地也爲黒取其極隂之色也卄三震爲雷以下九象馬四象稼一究二震爲雷爲龍爲􅀇黃爲旉爲大塗爲長子爲決躁爲蒼筤竹爲萑葦其於馬也爲善鳴爲馵足爲作足爲的顙其於稼也爲反生其究爲徤爲蕃鮮正義曰爲􅀇黃取其相􅄂而成蒼色爲旉取其春時氣至草木皆吐旉布而生也爲大塗取其萬物之所生出也爲長子如上文釋震爲長子也爲決躁取其剛動也爲蒼筤竹竹􅀄生之時色蒼筤取其春生之羙也爲萑葦萑葦竹之􅀋也其於馬也爲善鳴取其象雷聲之逺聞也爲馵足馬後足白爲馵取其動而見也爲作足取其動而行徤也爲的顙白額爲的顙亦取動而見也其於稼也爲反生取其始生戴甲而出也其究爲徤究極也極於震動則爲徤也爲蕃鮮鮮明也取其春時草木蕃育而鮮明龍如字虞于作駹虞云蒼色于云􅄂色旉王肅音孚于云花之通名鋪爲花貌謂之􅞉的顙白頟反生麻豆之屬反生戴莩甲而出也卄四巽爲木以下十一象人四象究一巽爲木爲風爲長女爲縄直爲工爲白爲長爲髙爲進退爲不果爲臭其於人也爲寡髪爲廣顙爲多白眼爲近利市三倍其究爲躁卦正義曰木可以輮曲直即巽順之謂也爲風取其陽在上揺木也爲長女如上釋巽爲長女也爲縄直取其號令齊物如䋲之直木也爲工亦皆取縄直之􅀋爲白取其風吹去塵故㓗白也爲長取其風行之逺也爲髙取其風性髙逺又木生而上也爲進退取其風之性前却其物進退之義也爲不果取其風性前却不能果敢決斷亦皆進退之義也爲臭王肅作爲香臭也求其風所發也又取下風之逺聞其於人也爲寡髪寡少也風落樹之華葉則在樹者稀踈如人之少髮亦􅀋於此故爲寡髮也爲廣顙額闊爲廣顙髮寡少之義故爲廣顙也爲多白眼取其躁人之眼其色多白也爲近利取其躁人之情多近利也市三倍取其木生蕃盛於市則三倍之冝利也其究爲躁卦究極也取其風之􅀔極於躁急也臭昌又反王肅作爲香臭寡髮如字本又作宣黒白雜爲宣髮卄五坎爲水以下十象馬五象輿四木一坎爲水爲溝瀆爲隱伏爲矯輮爲弓輪其於人也爲加憂爲心病爲耳痛爲血卦爲赤其於馬也爲羙脊爲亟心爲下首爲薄蹄爲曵其於輿也爲多眚爲通爲月爲盗其於木也爲堅多心正義曰坎爲水取其北方之行也爲溝瀆取其水行无所不通也爲隱伏取其水藏地中也爲矯輮取其使曲者直爲矯使直者曲爲輮水流曲直故爲矯輮也爲弓輪弓者激矢取如水激射也輪者運行如水行也其於人也爲加憂取其憂險難也爲心病憂其險難故心病也爲耳痛坎爲勞卦也又北方主聽聽勞則耳痛也爲血卦取其人之有血猶地有水也爲赤亦取血色其於馬也爲羙脊取其陽在中也爲亟心亟急也取其中堅内動也爲下首取其水流向下也爲薄蹄取其水流迫地而行也爲曵取其水磨地而行也其於輿也爲多眚取其表裏有隂力弱不能重載常憂災眚也爲通取其水行有孔穴也爲月取其月是水之精也爲盗取水行潜􅀼如盗賊也其於木也爲堅多心取剛在内也卄六离爲火以下六象人七象木一離爲火爲日爲電爲中女爲甲胄爲戈兵其於人也爲大腹爲乾卦爲鱉爲蟹爲蠃爲肨爲􅀛其於木也爲科上槁正義曰離爲火取南方之行也爲日取其日是火之精也爲電取其有明似火之􅀋也爲中女如上釋離爲中女也爲甲胄取其剛在外也爲戈兵取其剛在於外以剛自捍也其於人也爲大腹取其懷隂氣也爲乾卦取其日所烜也爲鱉爲蟹爲蠃爲蚌爲􅀛皆取剛在外也其於木也爲科上槁科空也隂在内爲空木旣空中者上必枯槁也鱉卑列反本又作鼈同蟹户賣反蠃力禾反京作螺姚作蠡二七艮爲山以下十象木一象艮爲山爲徑路爲小石爲門闕爲果蓏爲􅕡寺爲指爲狗爲䑕爲黔喙之屬其於木也爲堅多節正義曰艮爲山取隂在於下爲止陽在於上爲髙故艮象山也爲徑路取其山雖髙有間道也爲小石取其艮爲山又爲陽卦之小者故爲小石也爲門闕取其有徑路又崇髙也爲果蓏木實爲果草實爲蓏取其出於山谷之中也爲􅕡寺取其禁止人也爲指取其執止物也爲狗爲䑕取其皆止人家也爲黔喙之屬取其山居之獸也其於木也爲堅多節取其山之所生其堅勁故多節也徑古定反蓏力火反馬云果桃李之屬蓏􅀲匏之屬應劭云木實曰果草實曰蓏􅀃文云在木曰果在地曰蓏張晏云有核曰果无核曰蓏京本作果墮之果􅕡音昬寺如字徐音侍亦作䦙字黔其兼反徐音其肅其嚴反鄭作黚謂虎豹之屬貪冒之􅀋喙況廢反徐丁遘反二八兊爲澤以下六象地三象兊爲澤爲少女爲巫爲口舌爲毀折爲附決其於地也爲剛鹵爲妾爲羊正義曰此一節廣明兊象兊爲澤取其隂卦之小地􅀋卑也爲少女如上釋兊爲少女也爲巫取其口舌之官也爲口舌取西方於五事爲言取口舌爲言語之具也爲毀折爲附決兊西方之卦又兊主秋也取秋物成熟槀稈之屬則毀折也果蓏之屬則附決也其於地也爲剛鹵取水澤所停則鹹鹵也爲妾取少女從姊爲娣也爲羊如上釋取其羊順性也二九荀爽本八卦又有三十一象此六子依求索而爲次第也本亦有以三男居前三女後從乾徤也章至此韓无注或有注者非也荀爽九家集解本乾後更有四爲龍爲直爲衣爲言巛後有八爲牝爲迷爲方爲王爲裳爲黄爲帛爲漿震後有三爲玉爲鵠爲鼓巽後有二爲楊爲鸛坎後有八爲宫爲律爲可爲㨂爲叢􅁄爲狐爲蒺蔾爲桎梏離後有一爲牝牛艮後有三爲鼻爲虎爲狐兊後有二爲常爲輔頰注云常西方神也不同故記之於此周易要義第九卷終周易要義卷第

front:
  text: 五伏羲作易有􅆱數卦爻道德義理性命此聖人即伏犧也不言伏犧而云聖人者明以聖知而制作也且下繫巳云包犧氏之王天下也於是始作八卦今言作易明是伏犧非文王等凡言作者皆本其事之所由故云昔者聖人之作易也聖人作易其作如何以此聖知深明神明之道而生用蓍求卦之法故曰幽贊於神明而生蓍也􅀝立也旣用蓍求卦其揲蓍所得取竒數於天取耦數於地而立七八九六之數故曰參天兩地而􅀝數也言其作易聖人本觀察變化之道象於天地隂陽而立乾坤等卦故曰觀變於隂陽而立卦也旣觀象立卦又就卦發動揮散於剛柔兩畫而生變動之爻故曰發揮於剛柔而生爻也蓍數旣生爻卦又立易道周備无理不盡聖人用之上以和恊順成聖人之道德下以治理斷割人倫之正義又能窮極萬物深妙之理究盡生靈所禀之性物理旣窮生性又盡至於一期所賦之命莫不窮其短長定其吉凶故曰和順於道德而理於義窮理盡性以至於命也

body:
  text: 下繫一卦舉象重論爻相推繫辭而有變動八卦成列象在其中矣備天下之象也因而重之爻在其中矣夫八卦備天下之理而未極其變故因而重之以象其動用擬諸形容以明治亂之冝觀其所應以著適時之功則爻卦之義所存各異故爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣剛柔相推況八卦相盪或否或㤗繫辭焉而斷其吉凶況之六爻動以適時者也立卦之義則見於􅂏象適時之功則存之爻辭王氏之例詳矣正義曰八卦成列象在其中矣者言八卦各成列位萬物之象在其八卦之中也因而重之爻在其中矣謂因此八卦之象而更重之萬物之爻在其所重之中矣然象亦有爻爻亦有象所以象獨在卦爻獨在重者卦則爻少而象多重則爻多而象少故在卦舉象在重論爻也剛柔相推變在其中矣者則上繫第二章云剛柔相推而生變化是變化之道在剛柔相推之中剛柔即隂陽也論其氣即謂之隂陽語其體即謂之剛柔也繫辭焉而命之動在其中矣者謂繫辭於爻卦之下而呼命其卦爻得失凶吉則適時變動好惡故在其繫辭之中也吉凶悔吝者生乎動者也上旣云動在繫辭之中動則有吉凶悔吝四此制器取卦之爻象之體韓直取卦名作結繩而爲罔罟以佃以漁蓋取諸離離麗也罔罟之用必審物之所麗也魚麗于水獸麗于山也正義曰此第二章明聖人法自然之理而作易象易以制器而利天下用此罔罟或陸畋以羅鳥獸或水澤以罔魚鼈也蓋取諸離者離麗也麗謂附著也言罔罟之用必審知鳥獸魚鼈所附著之處故稱離卦之名爲罔罟也案諸儒象卦制器皆取卦之爻象之體今韓氏之意直取卦名因以制器案上繫云以制器者尚其象則取象不取名也韓氏乃取名不取象於義未善矣今旣遵韓氏之學且依此釋之爲􅅈音古馬姚云猶网也黃本作爲网􅅈云取獸曰网取魚曰􅅈五耒耜致豐取益市合物取噬嗑包犧氏没神農氏作斵木爲耜揉木爲耒耒耨之利以教天下蓋取諸益制器致豐以益萬物斵陟角反耜音似京云耒下耓也陸云廣五寸耓音勑丁反耒力對反京云耜上勾木也􅀃文云耜曲木垂所作字林同力佳反徐力猥反垂造作也日中爲市致天下之民聚天下之貨交易而退各得其所盖取諸噬嗑嗑合也市人之所聚異方之所合設法以合物噬嗑之義也丗本云祝融爲市宋􅂨云顓頊臣也六皇甫謐以制器九事皆黃帝不可用此九事黃帝制其􅀄堯舜成其末事相連接共有九事之功故連云黃帝堯舜也案皇甫謐帝王丗紀載此九事皆爲黃帝之功􅀂如所論則堯舜无事易繫何湏連云堯舜則皇甫之言未可用也垂衣裳者以前衣皮其制短小今衣絲麻布帛所作衣裳其制長大故云垂衣裳也取諸乾坤者衣裳辨貴賤乾坤則上下殊體八舟楫取渙乗理以散動刳木爲舟至取諸渙此九事之第二也舟必用大木刳鑿其中故云刳木也剡木爲楫者楫必湏纎長理當剡削故曰剡木也取諸渙者渙散也渙卦之義取乗理以散動也舟楫亦乗水以載運故取諸渙也桍本作刳口􅀌反徐又口溝反掞以冉反亦作剡楫本又作檝九韓因門柝取豫故九事皆取卦名重門擊柝以待􅁀客蓋取諸豫取其備豫正義曰此九事之第四也豫者取其豫有防備韓氏以此九事皆以卦名而爲義者特以此豫文取備象之義其事相合故其餘八事皆以卦名解義量爲此也十創物者不言古後用代前用言古蓋取諸大壯宫室壯大於穴居故制爲宫室取諸大壯也正義曰此九事之第七也巳前不云上古巳下三事或言上古或言古與上不同者巳前未造此器之前更无餘物之用非是後物以替前物故不云上古也此巳下三事皆是未造此物之前巳更别有所用今將後用而代前用十一衣薪葬野不云上古在穴居結繩後古之葬者至取諸大過正義曰此九事之第八也不云上古直云古之葬者􅀂極逺者則云上古其次逺者則直云古則厚衣之以薪葬之中野猶在穴居結繩之後故直言古者不封不樹者不積土爲墳是不封也不種樹以搮其處是不樹也䘮期无數者哀除則止无日月限數也後丗聖人易之以棺椁者􅀂禮記云有虞氏瓦棺未必用木爲棺也則禮記又云殷人之棺椁以前云椁无文也取諸大過者送終追逺欲其甚大過厚故取諸大過也案書稱堯崩百姓如䘮考妣三載四海遏密八音則䘮期无數在堯巳前而棺椁自殷巳後則夏巳前棺椁未具也所以其文參差前後不齊者但此文舉大略明前後相代之義不必確在一時故九事上從黃帝下稱堯舜連延不絶更相増脩也十三陽竒君道必一隂兩臣體代終陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦夫少者多之所宗一者衆之所歸陽卦二隂故竒爲之君隂卦二陽故耦爲之主其德行何也辨隂陽二卦之德行也陽一君而二民君子之道也隂二君而一民小人之道也陽君道也隂臣道也君以无爲統衆无爲則一也臣以有事代終有事則二也故陽爻畫竒以明君道必一隂爻畫兩以明臣體必二斯則隂陽之數君臣之辨也以一爲君君之德也二居君位非其道也故陽卦曰君子之道隂卦曰小人之道也十四陽卦多隂隂卦多陽分君子小人陽卦多隂謂震坎艮一陽而二隂也隂卦多陽謂巽離兊一隂而二陽也陽卦竒隂卦耦者陽卦則以竒爲君故一陽而二隂陽爲君隂爲臣也隂卦則以耦爲君故二陽而一隂隂爲君陽爲臣也故云其德行何也陽一君而二民君子之道者夫君以无爲統衆无爲者爲毎事因循委任臣下不司其事故稱一也臣則有事代終各司其職有職則有對故稱二也今陽爻以一爲君以二爲民得其尊卑相正之道故爲君子之道者也隂二君而一民小人之道者隂卦則以二爲君是失其正以一爲臣乖反於理上下失序故稱小人之道也十五天下事何湏思慮屈信自然相感天下之事何湏思也何湏慮也日往則月來至相推而歳成者此言不湏思慮任運往來自然明生自然歳成也往者屈也來者信也者此覆明上日往則月來寒往則暑來自然相感而生利之事也往是去藏故爲屈也來是施用故爲信也一屈一信遞相感動而利生則上云明生歳成是利生也尺蠖之屈以求信者覆明上往來相感屈信相湏尺蠖之蟲􅀄行必屈者欲求在後之信也言信必湏屈屈以求信是相湏也龍蛇之蟄以存身者言静以求動也蛟蛇􅀄蟄是静也以此存身是後動也言動必因静也静而得動亦動静相湏也精義入神以致用者亦言先静而後動此言人事之用言聖人用精粹微妙之義入於神化寂然不動乃能致其所用精義入神是先静也以致用是後動也是動因靜而來利用安身以崇德者此亦言人事也言欲利已之用先湏安静其身不湏役其思慮可以増崇其德言利用安身是静也言崇德是動也此亦先静而後動動亦由静而來也過此以往未之或知也者言精義入神以致用利用安身以崇德此二者皆人理之極過此二者以往則微妙不可知云未之或知也窮神知化德之盛者此言過此二者以往之事􅀂能過此以往則窮極微妙之神曉知變化之道乃是聖人德之盛極也十六上交下交䟽以道器釋之知幾其神乎者神道微妙寂然不測人若能豫知事之幾微則能與其神道合㑹也君子上交不謟下交不瀆者上謂道也下謂器也若聖人知幾窮理􅁳於道絶於器故能上交不謟下交不瀆若於道不􅁳而有求焉未能離於謟也於器不絶而有交焉未能免於瀆也能无謟瀆知幾窮理者乎幾者動之微吉之先見者此釋幾之義也幾微也是巳動之微動謂心動事動􅀄動之時其理未著唯纎微而巳若其巳著之後則心事顯露不得爲幾若未動之前又寂然頓无兼亦不得稱幾也幾是離无入有在有无之際故云動之微也若事著之後乃成爲吉此幾在吉之先豫前巳見故云吉之先見者也此直云吉不云凶者凡豫前知幾皆向吉而背凶違凶而就吉无復有凶故特云吉也諸本或有凶字者其定本則无也君子見幾而作不俟終日者言君子旣見事之幾微則湏動作而應之不得待終其日言赴幾之速也易曰介于石不終日貞吉者此豫之六二辭也得位居中故守介于石見幾則動不待終其一日也介如石焉寧用終日斷可識矣者此夫子解釋此爻之辭十九顔子庶於幾以復􅀄九明之子曰顔氏之子至元吉者正義曰此第八節上節明其知幾是聖人之德此節論賢人唯庶於幾雖未能知幾故引顔氏之子以明之也其殆庶幾乎者言聖人知幾顔子亞聖未能知幾但殆近庶慕而巳以復卦􅀄九旣在卦􅀄則能復於陽道是速而不逺則能復也所以无大悔而有元吉也祗韓音祁支反注同王廙輔嗣音支二十爻繇備物極變有衰丗之意其稱名也雜而不􅚼備物極變故其名雜也各得其序不相踰越况爻繇之辭也於稽其􅀋其衰丗之意邪有憂患而後作易丗衰則失得彌彰爻繇之辭所以辨失得故知衰丗之意邪稽猶考也卄一易興其於中古作易其有憂患謂周易其於中古乎者謂易之爻卦之辭起於中古􅀂易之爻卦之象則在上古伏犧之時但其時理尚質素聖道凝寂直觀其象足以垂教矣但中古之時事漸澆浮非象可以爲教又湏繫以文辭示其變動吉凶故爻卦之辭起於中古連山起於神農歸藏起於黃帝周易起於文王及周公也此之所論謂周易也作易者其有憂患乎者􅀂无憂患何思何慮不湏營作今旣作易故知有憂患也身旣患憂湏垂法以示於後以防憂患之事故繫之以文辭明其失得與吉凶也卄二外内出入猶遯豐漸夷隱顯惟時上下无常剛柔相易不可爲典要不可以定準也唯變所適變動貴於適時􅃐舎存乎㑹也其出入以度外内使知懼明出入之度使物知外内之戒也出入猶行藏外内猶隱顯遯以逺時爲吉豐以幽隱致凶漸以髙顯爲美明夷以處昧利貞此外内之戒也卄三六爻唯其時物􅀄擬難知上成易知六爻相雜唯其時物也爻各存乎其時物事也其􅀄難知其上易知本末也􅀄辭擬之卒成之終夫事始於微而後至於著􅀄者數之始擬議其端故難知也上者卦之終事皆成著故易知也卄四中爻辨是非猶乾二五緫攝一卦若夫雜物撰德辨是與非則非其中爻不備者言雜聚天下之物撰數衆人之德辨定是之與非則非其中之一爻不能備具也謂一卦之内而有六爻各主其物各數其德欲辨定此六爻之是非則揔歸於中爻言中爻統攝一卦之義多也􅀂非中爻則各守一爻不能盡統卦義以中爻居一无偏故能統卦義也猶乾之九二見龍在田利見大人九五飛龍在天利見大人是㹅攝乾卦之義噫亦要存亡吉凶則居可知矣者噫者發聲之辭卦爻雖衆意義必在其中爻噫乎發歎要定或此卦存之與亡吉之與凶但觀其中爻則居然可知矣謂平居自知不湏營爲也知者觀其􅂏辭則思過半矣者􅂏辭謂文王卦下之辭卄五二與四三與五同功而有内外貴賤異位二與四同功同隂功也而異位有内外也其善不同二多譽二處中和故多譽也四多懼近也位逼於君故多懼也柔之爲道不利逺者其要无咎其用柔中也四之多懼以近君也柔之爲道湏援而濟故有不利逺者二之能无咎柔而處中也援于眷反三與五同功同陽功也而異位有貴賤也三多凶五多功貴賤之等也其柔危其剛勝邪三五陽位柔非其位處之則危居以剛徤勝其任也夫所貴剛者閑邪存誠動而不違其節者也所貴柔者含弘居中順而不失其貞者也若剛以犯物則非剛之道柔以卑佞則非柔之義也卄七其辭危周謂危而不正韓謂憂危是故其辭危文王與紂之事危其辭也危者使平易者使傾易慢易也其道甚大百物不廢懼以終始其要无咎此之謂易之道也夫文不當而吉凶生則保其存者亡不忘亡者存有其治者亂不忘危者安懼以終始歸於无咎安危之所由爻象之大體也正義曰此一節明易之興起在紂之末丗故其辭危者憂其傾危也以當紂丗憂畏滅亡故作易辭多述憂危之事亦以垂法於後使保身危懼避其患難也周氏云謂當紂時不敢指斥紂惡故其辭微危而不正也今案康伯之注云文王與紂之事危其辭也則似周釋爲得也案下覆云危者使平則以危謂憂危是非旣未可明所以兩存其釋也危者使平者旣有傾危以􅀩大難文王有天下是危者使平也易者使傾者若其慢易不循易道者則使之傾覆若紂爲凶惡以至誅滅也卄八吉則有祥象則知器占則知來是故變化云爲吉事有祥象事知器占事和來夫變化云爲者行其吉事則􅀗嘉祥之應觀其象事則知制器之方玩其占事則覩方來之驗也天地設位聖人成能聖人乗天地之正萬物各成其能人謀􅀑謀百姓與能人謀况議於衆以定失得也􅀑謀况􅀉􅁲筮以考吉凶也不役思慮而失得自明不勞探射而吉凶自著􅀋萬物之情通幽深之故故百姓與能樂推而不厭也卅一有攻有取有感而後吉凶悔吝利害生八卦以象吿以象告人爻􅂏以情言辭有險易而各得其情也剛柔雜居而吉凶可見矣變動以利言變而通之以盡利也吉凶以情遷吉凶无定唯人所動情順乗理以之吉情逆違道以蹈凶故曰吉凶以情遷也是故愛惡相攻而吉凶生泯然同順何吉何凶愛惡相攻然後逆順者殊故吉凶生逺近相取而悔吝生相取猶相資也逺近之爻互相資取而後有悔吝也情僞相感而利害生情以感物則得利僞以感物則致害也凡易之情近而不相得則凶近況比爻也易之情剛柔相摩變動相適者也近而不相得必有乖違之患或有相違而无患者得其應也相順而皆凶者乖於時也存事以考之則義可見矣或害之悔且吝夫无對於物而後盡全順之道豈可有欲害之者乎雖能免濟必有悔吝也或欲害之辭也卅二䟽以大難小難分險阻德行􅁪易以知險者謂乾之德行􅁪易略不有艱難以此之故能知險之所興若不有易略則爲險也故行易以知險也德行􅁪簡以知阻者言坤之德行􅁪爲簡靜不有煩亂以此之故知阻之所興也􅀂不簡則爲阻難故行簡靜以知阻也大難曰險乾以剛徤故知其大難小難曰阻坤以柔順故知其小難知大難曰險者案坎卦􅂏云天險不可升地險山川丘陵言險不云阻故知險爲大難險旣爲大明阻爲小也卅三易能􅀃諸物之心精妙諸侯之慮能研諸侯之慮者研精也諸侯旣有爲於萬物育養萬物使令得所易旣能􅀃諸物之心則能精妙諸侯之慮謂諸侯以此易之道思慮諸物轉益精粹卅四人情不同其辭各異凡六等將叛者其辭慙者此巳下􅀃人情不同其辭各異將欲違叛己者皃雖相親辭不以實故其辭慙也中心疑者其辭枝者枝謂樹枝也中心於事疑惑則其心不定其辭分散􅀂樹枝也吉人之辭寡者以其吉善辭直故辭寡也躁人之辭多者以其煩躁故其辭多也誣善之人其辭游者游謂浮游誣罔善人其辭虚漫故言其辭浮游也失其守者其辭屈者居不值時失其所守之志故其辭屈橈不能申也凡此辭者皆論易經之中有此六種之辭謂作易之人述此六人之意各凖望其意而制其辭也周易要義卷第八周易要義卷第九􅀃卦一幽贊神明而生􅆱􅆱蒿屬昔者聖人之作易也幽贊於神明而生􅆱幽深也贊明也􅆱受命如響不知所以然而然也贊本或作讃子旦反􅆱音尸􅀃文云蒿屬生千歳三百莖易以爲數天子九尺諸侯七尺大夫五尺士三尺毛詩草木䟽云似藾蕭青色科生鴻範五行傳云􅆱百年一本生百莖論衡云七十歳生一莖七百歳生十莖神靈之物故生遲也史記云生滿百莖者其下必有神􅀛守之其上常有雲氣覆之淮南子云上有叢􅆱下有伏􅀛二􅆱極數以定象卦備象以盡數參天兩地而􅀝數參竒也兩耦也七九陽數六八隂數􅀚變於隂陽而立卦卦象也􅆱數也卦則雷風相薄山澤通氣擬象隂陽變化之體􅆱則錯綜天地參兩之數􅆱極數以定象卦備象以盡數故􅆱曰參天兩地而􅀝數卦曰觀變於隂陽也􅀚變一本作􅀚變化發揮於剛柔而生爻剛柔發散變動相生三孔子備陳伏羲重卦之由爲􅀃卦正義曰􅀃卦者陳􅀃八卦之德業變化及法象所爲也孔子以伏羲畫八卦後重爲六十四卦八卦爲六十四卦之本前繫辭中略明八卦小成引而伸之觸􅀋而長之天下之能事畢矣又曰八卦成列象在其中矣因而重之爻在其中矣又云古者包犧氏之王天下也仰則􅀚象於天俯則􅀚法於地􅀚鳥獸之文與地之冝近取諸身逺取諸物於是始作八卦以通神明之德以􅀋萬物之情然引而伸之重三成六之意猶自未明仰􅀚俯察近身逺物之象亦爲未見故孔子於此更備􅀃重卦之由及八卦所爲之象故謂之􅀃卦焉先儒以孔子十翼之次乾坤文言在二繫之後􅀃卦之前以􅂏象附上下二經爲六卷則上繫第七下繫第八文言第九􅀃卦第十輔嗣以文言分附乾坤二卦故􅀃卦爲第九

seq: 7
front:
  text: 一泰不具四德物大通則多失節􅤄乾下坤上泰小徃大來吉亨正義曰小徃大來吉亨者隂去故小徃陽長故大來以此吉而亨通此卦亨通之極而四德不具者物旣大通多失其節故不得以爲元始而利貞也所以象云財成輔相故四德不具泰如字大通也鄭云通也馬云大也坤宫三丗卦
  hash: sha256:3fbfb147cc0b3fdce39b00857734d90b1fc4f909ef798bcd99cf71338c6ac066
body:
  text: 二天地之道謂四時之氣宜謂地所宜象曰天地交泰后以財成天地之道輔相天地之宜以左右民泰者物大通之時也上下大通則物失其節故財成而輔相以左右民也天地之道者謂四時也冬寒夏暑春生秋殺之道􅀂氣相交通則物失其節則冬温夏寒秋生春殺君當財節成就使寒暑得其常生殺依其節此天地自然之氣故云天地之道也天地之冝者謂天地所生之物各有其冝􅀂大司徒云其動物植物及職方云楊州其貢冝稻麥雍州其貢冝􅁰稷􅀂天氣大同則所冝相反故人君輔助天地所冝之物各安其性得其冝三三處天地之際將復其所處九三无平不陂无徃不復艱貞无咎勿恤其孚于食有福乾本上也坤本下也而得泰者降與升也而三處天地之際將復其所處復其所處則上守其尊下守其卑是故无徃而不復也无平而不陂也處天地之將閉平路之將陂時將大變丗將大革而居不失其正動不失其應艱而能貞不失其義故无咎也信義誠著故不恤其孚而自明也故曰勿恤其孚于食有福也陂彼爲反徐甫􅀉反傾也注同又破河反偏也象曰无徃不復天地際也天地將各分復之際四乾樂上復坤樂下復故四云翩翩六四翩翩不冨以其鄰不戒以孚乾樂上復坤樂下復四處坤首不固所居見命則退故曰翩翩也坤爻皆樂下巳退則從故不待冨而用其鄰也莫不與已同其志願故不待戒而自孚也翩如字子夏傳作翩翩向本同云輕舉貌古文作偏偏象曰翩翩不富皆失實也不戒以孚中心願也正義曰六四翩翩者四主坤首而欲下復見命則退故翩翩而下象曰皆失實也解翩翩不冨之義猶衆隂皆失其本實所居之處今旣見命翩翩樂動不待財冨並悉從之故云皆失實也不戒以孚中心願者解不戒以孚之義所以不待六四之戒告而六五上六皆以孚信者由中心皆願下復故不待戒而自孚也五女處尊位而應二故爲帝乙歸妹六五帝乙歸妹以祉元吉婦人謂嫁曰歸泰者隂陽交通之時也女處尊位履中居順降身應二感以相與用中行願不失其禮帝乙歸妹誠合斯義履順居中行願以祉盡夫隂陽交配之冝故元吉也祉音恥一音勑子反又音止六居泰上極否道巳成故告命不行上六城復于隍勿用師自邑告命貞吝居泰上極各反所應泰道將滅上下不交卑不上承尊不下施是故城復于隍卑道崩也勿用師不煩攻也自邑告命貞吝否道巳成命不行也隍音皇城壍也子夏作堭姚作湟子夏傳云隍是城下池也城之爲體由基土陪扶乃得爲城今下不陪扶城則損壞以此崩倒反復於隍猶君之爲體由臣之輔翼今上下不交臣不扶君君道傾危七否大徃小來故匪人不利君子貞􅢍坤上乾下否之匪人不利君子貞大徃小來䟽否之至小來正義曰否之匪人者言否閉之丗非是人道交通之時故云匪人不利君子貞者由小人道長君子道消故不利君子爲正也陽氣徃而隂氣來故云大徃小來陽主生息故稱大隂主消耗故稱小否備鄙反卦内同閉也塞也乾宫三丗卦八三隂􅀋進貞而不謟則吉亨􅀄六拔茅茹以其彚貞吉亨居否之􅀄處順之始爲􅀋之首者也順非健也何可以征居否之時動則入邪三隂同道皆不可進故茅茹以􅀋貞而不謟則吉亨邪似嗟反謟勑檢反象曰拔茅貞吉志在君也志在於君故不苟進九包承小人吉大人否亨六二包承至亂羣也正義曰包承者居否之丗而得其位用其至順包承於上小人吉者否閉之時小人路通故於爲吉也大人否亨者􅀂大人用此包承之德能否閉小人之吉其道乃亨象曰大人否亨不亂羣者此釋所以大人否亨之意良由否閉小人防之以得其道小人雖盛不敢亂羣十同人足以渉難然必利君子貞􅩣離下乾上同人于野亨利涉大川利君子貞䟽同人于野至君子貞正義曰同人謂和同於人于野亨者野是廣逺之處借其野名喻其廣逺言和同於人必湏寛廣无所不同用心无私處非近狹逺至于野乃得亨通故云同人于野亨與人同心足以渉難故曰利渉大川也與人和同義渉邪僻故利君子貞也此利渉大川假物象以明人事同人和同也十一同人非二所能故曰乾行曰同人曰同人曰同人于野亨利涉大川乾行也所以乃得同人于野亨利渉大川非二之所能也是乾之所行故特曰同人曰十二天火性同上故法之以􅀋族辨物象田天與至辨物正義天體在上火又炎上取其性同故云天與火同人君子以􅀋族辨物者族聚者也言君子法此同人以􅀋而聚也辨物謂分辨事物各同其黨使自相同不間雜也辨如字王肅卜免反十三􅀄九无係吝岀門逢人則同􅀄九同人于門至誰咎也正義曰同人于門者居同人之首无應於上心无係吝含弘光大和同於人在於門外出門皆同故云无咎也象曰又誰咎者釋出門同人无咎之義言旣心无係吝出門逢人皆同則誰與爲過咎十四注同人不泰則用師緫論一卦上九同人于郊无悔郊者外之極也處同人之時最在於外不獲同志而逺於内爭故雖无悔吝亦未得其志逺􅀽萬反爭爭闘之爭象曰同人于郊志未得也凡處同人而不泰焉則必用師矣不能大通則各私其黨而求利焉楚人亡弓不能亡楚愛國愈甚益爲它災是以同人不弘剛徤之爻皆志用師也正義曰凡處同人而不泰焉則必用師矣者王氏注意非止上九一爻乃揔論同人一卦之義去􅀄上而言二有同宗之吝三有伏戎之禍四有不克之困五有大師之患是處同人之丗无大通之志則必用師矣楚人亡弓不能亡楚愛國愈甚益爲它災者案孔子家語弟子好生篇云楚昭王出遊亡烏號之弓左右請求之王曰楚人亡弓楚得之又何求焉孔子聞之曰惜乎其志不大也不曰人亡之人得之何必楚也昭王名軫哀六年呉伐陳楚救陳在城父卒此愛國而致它災也引此者證同人不弘皆至用師矣十五大有則必能大通故云元亨􅪻乾上離下大有元亨不大通何由得大有乎大有則必元亨矣正義曰大有元亨者柔得尊位羣陽並應大能所有故稱大有旣能大有則其物大得亨通故云大有元亨大有包容豐冨之象乾宫歸魂卦十六大有包容之象故爲遏惡揚善順命象曰火在天上大有君子以遏惡揚善順天休命大有包容之象也故遏惡揚善成物之美順夫天德休物之命不云天在火下而云火在天上者天體髙明火又在上火是照耀之物而在於天上是光明之甚无所不照亦是包含之義又爲揚善之理也十七公用亨于天子衆家並香兩反九三公用亨于天子小人弗克處大有之時居下體之極乗剛徤之上而履得其位與五同功威權之盛莫此過焉公用斯位乃得通乎天子之道也小人不克害可待也亨許庚反通也下同衆家並香兩反京云獻也于云享宴也姚云享祀也十八匪其彭作旁謂九三九四匪其彭无咎旣失其位而上近至尊之威下比分權之臣其爲懼也可謂危矣惟夫有聖知者乃能免斯咎也三雖至盛五不可舎能辨斯數專心承五常匪其旁則无咎矣旁謂三也彭歩郎反又子夏作旁于云彭亨驕滿貌王肅云壯也虞作尫姚云彭旁俗音同十九易中言吉不言吉或大人吉或小人吉􅪺艮下坤上謙亨君子有終正義曰謙者屈躬下物先人後已以此待物則所在皆通故曰亨也小人行謙則不能長乆唯君子有終也謙必獲吉其吉可知故不言之凡易經之體有􅁻理可知而不言吉者即此謙卦之繇及乾之九五利見大人是吉理分明故不云吉也􅀂坤之六五及泰之六五並以隂居尊位􅀂不行此事則无吉􅀂行此事則得其吉故並稱元吉其餘皆言吉事亦倣此亦有大人爲吉於小人爲凶􅀂否之九五云休否大人吉是也或有於小人爲吉大人爲凶􅀂屯之九五小貞吉大貞凶及否之六二包承小人吉之􅀋是也亦有其􅁻灼然而稱吉者􅀂大有上九自天祐之吉无不利之􅀋是也但易之爲體不可以一爲例今各隨文解之義具諸卦之下今謙卦之繇其吉可知也旣不云吉何故􅀄六六二及九三並云吉者謙卦是㹅諸六爻其善旣大故不湏云吉也六爻各明其義其義有優劣其德旣小嫌其不􅁻故湏吉以明之也謙卑退爲義屈已下物也兊宫五丗卦子夏作嗛云嗛嗛也二十天下濟地上通及虧益變流等義􅂏曰謙亨至之終也正義曰謙亨天道下濟而光明地道卑而上行者此釋亨義也欲明天地上下交通坤體在上故言地道卑而上行也其地道旣上行天地相對則天道下濟也且艮爲陽卦又爲山天之髙明今在下體亦是天道下濟之義也下濟者謂降下濟生萬物也而光明者謂三光垂耀而顯明也地道卑而上行者地體卑柔而氣上行交通於天以生萬物也天道虧盈而益謙者從此以下廣􅀃謙德之美以結君子能終之義也虧謂减損減損盈滿而増益謙退􅀂日中則􅉴月􅄹則食是虧減其􅄹􅄹者虧減則謙者受益也地道變􅄹而流謙者丘陵川谷之属髙者漸下下者益髙是改變􅄹者流布謙者也􅀑神害􅄹而福謙者驕盈者􅀍害謙退者受福是害􅄹而福謙也人道惡盈而好謙者􅄹溢驕慢者皆以惡之謙退恭巽悉皆好之謙尊而光卑而不可踰者尊者有謙而更光明盛大卑謙而不可踰越是君子之所終也言君子能終其謙之善事又獲謙之終福故云君子之終也卄一裒多是尊光益寡是卑不可踰象曰地中有山謙君子以裒多益寡稱物平施多者用謙以爲裒少者用謙以爲益隨物而與施不失平也正義曰裒多者君子􅀂能用此謙道則裒益其多言多者得謙物更裒聚彌益多也故云裒多即謙尊而光也是尊者得謙而光大也益寡者謂寡者得謙而更進益即卑而不可踰也是卑者得謙而更増益不可踰越也稱物平施者稱此物之多少均平而施卄二謙爻雖有失位无應乗剛皆无凶咎上六鳴謙利用行師征邑國最處於外不與内政故有名而已志功未得也處外而履謙順可以征邑國而已征國本或作征邑國者非象曰鳴謙志未得也可用行師征邑國也夫吉凶悔吝生乎動者也動之所起興於利者也故飲食必有訟訟必有衆起未有居衆人之所惡而爲動者所害處不競之地而爲爭者所奪是以六爻雖有失位无應乗剛而皆无凶咎悔吝者以謙爲主也謙尊而光卑而不可踰信矣哉周易要義卷第二上周易要義卷第二下豫至觀

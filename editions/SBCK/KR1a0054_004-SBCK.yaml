body:
  text: 一釋卦名義象體及卦德乾元亨利貞正義曰乾者此卦之名謂之卦者易緯云卦者掛也言懸掛物象以示於人故謂之卦但二畫之體雖象隂陽之氣未成萬物之象未得成卦必三畫以象三才冩天地雷風水火山澤之象乃謂之卦也故繫辭云八卦成列象在其中矣是也但􅀄有三畫雖有萬物之象於萬物變通之理猶有未盡故更重之而有六畫備萬物之形象窮天地之能事故六畫成卦也此乾卦本以象天天乃積諸陽氣而成天故此卦六爻皆陽畫成卦也此旣象天何不謂之天而謂之乾者天者定體之名乾者體用之稱故􅀃卦云乾徤也言天之體以徤爲用元亨利貞者是乾之四德也子夏傳云元始也亨通也利和也貞正也二天氣起子陽潜在下故勿用􅀄九潜龍勿用正義曰居第一之位故稱􅀄以其陽爻故稱九潜者隱伏之名龍者變化之物言天之自然之氣起於建子之月隂氣始盛陽氣潜在地下故言􅀄九潜龍也此自然之象聖人作法言於此潜龍之時小人道盛聖人雖有龍德於此時唯冝潜藏勿可施用三卦位上有末義􅀄有下義第一位言􅀄第六位當言終第六位言上第一位當言下所以文不同者莊氏云下言􅀄則上有末義故大過􅂏云橈本末弱是上有末義六言上則􅀄當言下故小象云潜龍勿用陽在下也則是􅀄有下義互文相通義或然也且第一言􅀄者欲明萬物積漸從无入有所以言􅀄不言一與下也六言上者欲見位居卦上故不言六與未也此􅀄九之等是乾之六爻之辭但乾卦是陽生之丗故六爻所述皆以聖人出處託之其餘卦六爻各因象明義隨義而發不必皆論聖人他皆放此四􅆱爲數爻卦辭之本繫辭云爻也者效此者也聖人畫爻以倣俲萬物之象先儒云後代聖人以易占事之時先用􅆱以求數得數以定爻累爻而成卦因卦以生辭則􅆱爲爻卦之本爻卦爲􅆱之末今案􅀃卦云聖人之作易也幽賛於神明而生􅆱三天兩地而􅀝數觀變於隂陽而立卦發揮於剛柔而生爻繫辭云成天下之亹亹者莫大乎􅆱􅀛是故天生神物聖人則之又易乾鑿度云垂皇䇿者犧據此諸文皆是用􅆱以求卦先儒之􅀃理當然矣然陽爻稱九隂爻稱六其􅀃有二一者乾體有三畫坤體有六畫陽得兼隂故其數九隂不得兼陽故其數六二者老陽數九老隂數六老隂老陽皆變周易以變者爲占故杜元凱注襄九年傳遇艮之八及鄭康成注易皆稱周易以變者爲占故稱九稱六所以老陽數九老隂數六者以揲􅆱之數九遇揲則得老陽六遇揲則得老隂其少陽稱七少隂稱八義亦準此張氏以爲陽數有七有九隂數有八有六但七爲少陽八爲少隂質而不變爲爻之本體九爲老陽六爲老隂文而從變故爲爻之別名且七旣爲陽爻其畫巳長今有九之老陽不可復畫爲陽所以重錢避少陽七數故稱九也八爲隂數而畫隂爻今六爲老隂不可復畫隂爻故交其錢避八而稱六但易含萬象所託多􅂗義或然也六王氏二五爲大人鄭謂二見五之大人九二見龍在田利見大人出潜離隱故曰見龍處於地上故曰在田德施周普居中不偏雖非君位君之德也􅀄則不彰三則乾乾四則或躍上則過亢利見大人唯二五焉正義曰天下衆庶利見九二之大人故先儒云􅀂夫子教於洙泗利益天下有人君之德故稱大人案文言云九二德博而化又云君德也王輔嗣注云雖非君位君之德也是九二有人君之德所以稱大人也輔嗣又云利見大人唯二五焉是二之與五俱是大人爲天下所利見也而禇氏張氏同鄭康成之􅀃皆以爲九二利見九五之大人其義非也且大人之文不專在九五與九二故訟卦云利見大人又蹇卦利見大人此大人之文施處廣矣故輔嗣注謂九二也是大人非專九五在田者先儒以爲重卦之時重於上下兩體故􅀄與四相應二與五相應三與上相應是上下兩體論天地人各別但易含萬象爲例非一及其六位則一二爲地道三四爲人道五上爲天道二在一上是九二處於地上所田食之處七乾六爻子至巳謂正三五七九者非諸儒以爲九二當大蔟之月陽氣發見則九三爲建辰之月九四爲建午之月九五爲建申之月爲隂氣始殺不冝稱飛龍在天上九爲建戌之月羣隂旣盛上九不得言與時偕極於此時陽氣僅存何極之有諸儒此􅀃於理稍乖此乾之陽氣漸生似聖人漸岀冝據十一月之後至建巳之月巳來此九二當據建丑建寅之間於時地之萌芽􅀄有出者即是陽氣發見之義乾卦之象其應然也但隂陽二氣共成歳功故隂興之時仍有陽在陽生之月尚有隂存所以六律六吕隂陽相間取象論義與此不殊乾之􅀄九則與復卦不殊乾之九二又與臨卦无別八九三位不中履重剛故惕厲九三君子終日乾乾夕惕􅀂厲无咎處下體之極居上體之下在不中之位履重剛之險上不在天未可以安其尊也下不在田未可以寧其居也正義曰處下體之極者終也三是上卦之下下體之極故云極也又云居上體之下者四五與上是上體三居四下未入上體但居上體之下四則已入上體但居其上體之下故九四注云居上體之下與此別也云履重剛之險者上下皆有陽爻剛強好爲險難九諸儒以􅀂厲爲如危於上下文不合夕惕猶􅀂厲也者言雖至於夕􅁪懷惕懼猶如未夕之前常􅀂厲也案此卦九三所居之處實有危厲又文言云雖危无咎是實有危也據其上下文勢􅀂字冝爲語辭但諸儒並以􅀂爲如如似有厲實是无厲也理恐未盡今且依如解之竭知力而後免於咎者王以九三與上九相並九三處下卦之極其位猶卑故竭知力而得免咎也上九在上卦之上其位極尊雖竭知力不免亢極言下勝於上卑勝於尊十一有悔謂當有此悔設法戒之上九亢龍有悔正義曰上九亢陽之至天上而極盛故曰亢龍此自然之象以人事言之似聖人有龍德上居天位乆而亢極物極則反故有悔也純陽進極未至大凶但有悔吝而巳繫辭云悔吝者言乎其小疵也故鄭引尭之末年四凶在朝是以有悔未大凶也凡悔之爲文旣是小疵不單稱悔也必以餘字配之其悔􅀂在則言有悔謂當有此悔則此經是也其悔􅀂无則言悔亡言其悔巳亡也􅀂􅁪卦九二悔亡是也其悔雖亡或是更取他文結之􅀂復卦􅀄九不逺復无祇悔元吉是也但聖人至極終始无虧故文言云知進退存亡而不失其正者其唯聖人乎是知大聖之人本无此悔但九五天位有大聖而居者亦有非大聖而居者不能不有驕亢故聖人設法以戒之也十二夫子所作􅂏辭統論一卦之體􅂏曰大哉至咸寧正義曰夫子所作􅂏辭統論一卦之義或􅀃其卦之德或􅀃其卦之義或􅀃其卦之名故略例云􅂏者何也統論一卦之體明其所由之主案禇氏莊氏並云􅂏斷也斷定一卦之義所以名爲􅂏也但此􅂏釋乾與元亨利貞之德但諸儒所􅀃此􅂏分解四德意各不同今案莊氏之􅀃於理稍宻依而用之大哉乾元萬物資始乃統天者此三句揔釋乾與元也乾是卦名元是乾德之首故以元德配乾釋之大哉乾元者陽氣昊大乾體廣逺又以元大始生萬物故曰大哉乾元萬物資始者釋其乾元稱大之義以萬象之物皆資取乾元而各得始生不失其宜所以稱大也乃統天者以其至徤而爲物始以此乃能統領於天天是有形之物以其至徤統有形是乾元之德也雲行雨施品物流形者此二句釋亨之德也言乾能用天之德使雲氣流行雨澤施布故品􅀋之物流布成形各得亨通无所壅蔽是其亨也大明終始六位時成者此二句揔結乾卦之德也以乾之爲德大明曉乎萬物終始之道始則潜伏終則飛躍可潜則潜可飛則飛是明逹乎始終之道故六爻之位依時而成時乗六龍以御天者此二句申明乾元乃統天之義言徤之爲德以依時乗駕六爻之陽氣以控御於天體六龍即六位之龍也以居上下言之謂之六位也陽氣升降謂六龍也變謂後來改前以漸移改謂之變也化謂一有一无忽然而改謂之爲化言乾之爲道使物漸變者使物卒化者各能正定物之性命性者天生之質􅀂剛柔遲速之別命者人所稟受􅀂貴賤夭壽之屬是也保合大和乃利貞此二句釋利貞也純陽剛􅁀􅀂无和順則物不得利又失其正以能保安合㑹大和之道乃能利貞於萬物言萬物得利而貞正也首出庶物萬國咸寧者自上巳來皆論乾德自然養萬物之道此二句論聖人上法乾德生養萬物言聖人爲君在衆物之上最尊髙於物以頭首出於衆物之上各置君長以領萬國皆得寧也十四聖人象乾立化亦有此四德聖人亦當令萬物資始統領於天位而雲行雨施布散恩澤使兆庶衆物各流布其形又大明乎盛衰終始之道使天地四時貴賤髙下各以時而成又任用羣賢以奉行聖化使物各正性命此聖人所以象乾而立化十五凡物壯者皆有衰惟天運日過一度象曰天行至不息正義曰此大象也十翼之中第三翼揔象一卦天行徤行者運動之稱徤者強壯之名乾是衆徤之訓今大象不取餘徤爲釋偏􅀃天者萬物壯徤皆有衰怠唯天運動日過一度蓋運轉混没未曾休息故云天行徤徤是乾之訓也順者坤之訓也坤則云地􅀔坤此不言天行乾而言徤者劉表云詳其名也然則天是體名乾是用名徤是其訓三者並見最爲詳悉所以尊乾異於他卦凡六十四卦􅀃象不同或揔舉象之所由不論象之實體又揔包六爻不顯上體下體則乾坤二卦是也或直舉上下二體者􅀂雲雷屯也天地交泰也天地不交否也雷電噬嗑也雷風􅁪也雷雨作解也風雷益也雷電皆至豐也洊雷震也隨風巽也習坎坎也明兩作離也兼山艮也麗澤兊也凡此一十四卦皆揔舉兩體而結義也取兩體俱成或有直舉兩體上下相對者天與水違行訟也上天下澤履也天與火同人也上火下澤睽也凡此四卦或取兩體相違或取兩體相合或取兩體上下相承而爲卦也故兩體相對而俱言也雖上下二體共成一卦或直指上體而爲文者􅀂雲上於天需也風行天上小畜也火在天上大有也雷出地奮豫也風行地上觀也山附於地剥也澤滅木大過也雷在天上大壯也明岀地上晉也風自火出家人也澤上於天夬也澤上於地萃也風行水上渙也水在火上旣濟也火在水上未濟也凡此十五卦皆先舉上象而連於下亦意取上象以立卦名也亦有雖意在上象而先舉下象以出上象者地上有水比也澤上有地臨也山上有澤咸也山上有火旅也木上有水井也木上有火鼎也山上有木漸也澤上有雷歸妹也山上有水蹇也澤上有水節也澤上有風中孚也山上有雷小過也凡此十二卦皆先舉下象以出上象亦意取上象共下象而成卦也或先舉上象而出下象義取下象以成卦義者山下出泉蒙也地中有水師也山上有風蠱也山下有火賁也天下雷行无妄也山下有雷頤也天下有山遯也山下有澤損也天下有風姤也地中有山謙也澤中有雷隨也地中生木升也澤中有火革也凡此十三卦皆先舉上體後明下體也其上體是天天與山則稱下也􅀂上體是地地與澤則稱中也或有雖先舉下象稱在上象之下者􅀂雷在地中復也天在山中大畜也明入地中明夷也澤无水困也是先舉下象而稱上象之下亦義取下象以立卦也所論之例者皆大判而言之其間委曲各於卦下別更詳之十七有假象實象先儒所云此等象辭或有實象或有假象實象者􅀂地上有水比也地中生木升也皆非虚故言實也假象者􅀂天在山中風自火出如此之􅀋實无此象假而爲義故謂之假也雖有實象假象皆以義示人揔謂之象十八諸象不包在下者稱先王與后􅀂卦體之義唯施於天子不兼包在下者則言先王也􅀂比卦稱先王以建萬國豫卦稱先王以作樂崇德觀卦稱先王以省方觀民設教噬嗑稱先王以明罰勑法復卦稱先王以至日閉關无妄稱先王以茂對時育萬物渙卦稱先王以享於帝立廟泰卦稱后以財成天地之道姤卦稱后以施命誥四方稱后兼諸侯也自外卦並稱君子十九乾坤易之門特作文言此文凡六節文言曰至利貞正義曰文言者是夫子第七翼也以乾坤其易之門户邪其餘諸卦及爻皆從乾坤而岀義理深奥故特作文言以開釋之莊氏云文謂飾以乾坤德大故特文飾以爲文言今謂夫子但賛明易道申􅀃義理非是文飾華彩當爲釋二卦之經文故稱文言從此至元亨利貞明乾之四德爲第一節從􅀄九曰潜龍勿用至動而有悔明六爻之義爲第二節自潜龍勿用下至天下治也論六爻之人事爲第三節自潜龍勿用陽氣潜藏至乃見天則論六爻自然之氣爲第四節自乾元者至天下平也此一節復􅀃乾元之四德之義爲第五節自君子以成德爲行至其唯聖人乎此一節更廣明六爻之義爲第六節今各依文解之二十元亨利貞配四時五行莊氏云第一節元者善之長者謂天之體性生養萬物善之大者莫善施生元爲施生之宗故言元者善之長也亨者嘉之㑹者嘉美也言天能通暢萬物使物嘉美之㑹聚故云嘉之㑹也利者義之和者言天能利益庶物使物各得其冝而和同也貞者事之幹者言天能以中正之氣成就萬物使物皆得幹濟莊氏之意以此四句明天之德也而配四時元是物始於時配春爲發生故下云體仁仁則春也亨是通暢萬物於時配夏故下云合禮禮則夏也利爲和義於時配秋秋旣物成各合其冝貞爲事幹於時配冬冬旣收藏事皆幹了也於五行之氣唯少土也土則分王四季四氣之行非土不載故不言也卄一四德配五事則仁禮義信不言知於五事言之元則仁也亨則禮也利則義也貞則信也不論智者行此四事並湏資於知且乾鑿度云水土二行兼信與知也故略知不言也卄二諸卦有四德三德二德一德無德諸卦之中亦有四德但餘卦四德有劣於乾故乾卦直云四德更无所言欲見乾之四德无所不包其餘卦四德之下則更有餘事以四德狹劣故以餘事繫之即坤卦之􅀋是也亦有四德之上即論餘事若革卦云巳日乃孚元亨利貞悔亡也由乃孚之後有元亨利貞乃得悔亡也有四德者即乾坤屯臨隨无妄革七卦是也亦有其卦非善而有四德者以其卦凶故有四德乃可也故随卦有元亨利貞乃得无咎是也四德具者其卦未必善也亦有三德者即離咸萃兊渙小過凡六卦就三德之中爲文不一或揔稱三德於上更別陳餘事於下若離咸之屬是也就三德之中上下不一離則云利貞亨由利貞乃得亨也亦有先云亨更陳餘事乃始云利貞者以有餘事乃得利貞故也有二德者大有蠱漸大畜升困中孚凡七卦此二德或在事上言之或在事後言之由後有事乃致此二德故也亦有一德者􅀂蒙師小畜履泰謙噬嗑賁復大過震豐節旣濟未濟凡十五卦皆一德也並是亨或多在事後者履卦云履虎尾不咥人亨由有事乃得亨以前所論德者皆於經文挺然特明德者乃言之也其有因事相連而言德者則不數之也􅀂需卦云需有孚光亨貞吉雖有亨貞二德連事起文故不數也遯卦云亨小利貞雖有三德亦不數也旅卦云旅小亨旅貞吉雖有亨貞二德亦連他事不數也比卦云原筮元永貞无咎否卦云否之匪人不利君子貞雖有貞字亦連他文言之又非本卦德亦不數之同人云同人于野亨坎卦云有孚維心亨損卦云无咎可貞此等雖有一德皆連事而言之故亦不數所以然者但易含萬象事義非一隨時曲變不可爲典要故也其有意義各於卦下詳之亦有卦善而德少者􅀂泰與謙復之􅀋雖善唯一德亦有全无德者􅀂豫觀剥晉蹇解夬姤井艮歸妹凡十一卦也大略唯有凶卦无德者若剥蹇夬姤之屬是也亦有卦善而无德者晉解之屬是也各於卦下詳之卄四文言第二節設問以釋潜龍􅀄九曰潜龍勿用至潜龍也正義曰此第二節釋􅀄九爻辭也􅀄九曰潜龍勿用何謂也者此夫子疊經􅀄九爻辭故言􅀄九曰方釋其義假設問辭故言潜龍勿用何謂也子曰龍德而隱者也此夫子以人事釋潜龍之義聖人有龍德隱居者也不易乎丗者不移易其心在於丗俗雖逢險難不易本志也不成乎名者言自隱黙不成就於令名使人知也遯丗无悶者謂逃遯避丗雖逢无道心无所悶不見是而无悶者言舉丗皆非雖不見善而心亦无悶心以爲樂巳則行之心以爲憂巳則違之確乎其不可拔者身雖逐物推移潜隱避丗心志守道確乎堅實其不可拔此是潜龍之義也卄五二爻漸見􅀂舜漁陶民化之時九二見龍至君德也正義曰此釋九二爻辭子曰龍德而正中者九二居中不偏然不如九五居尊得位故但云龍德而正中者也庸言之信庸行之謹者庸謂中庸庸常也從始至末常言之信實常行之謹慎閑邪存其誠者言防閑邪惡當自存其誠實也善丗而不伐者謂爲善於丗而不自伐其功德博而化者言德能廣博而變化於丗俗􅀄爻則全隱遯避丗二爻則漸見德行以化於俗也􅀂舜漁於雷澤陶於河濵以器不窳民漸化之是也易曰見龍在田利見大人君德也者以其異於諸爻故特稱易曰見龍在田未是君位但云君德也卄七明終敝故不驕知至至故不憂是故居上位而不驕在下位而不憂居下體之上在上體之下明夫終敝故不驕也知夫至至故不憂也卄八廣陳同􅀋感應明聖作物覩九五曰飛龍至其􅀋也正義曰此明九五爻之義同聲相應巳下至各從其􅀋也飛龍在天者言天能廣感衆物衆物應之所以利見大人因大人與衆物感應故廣陳衆物相感應以明聖人之作而萬物瞻覩以結之也同聲相應者􅀂彈宫而宫應彈角而角動是也同氣相求者􅀂天欲雨而柱礎􅃳是也此二者聲氣相感也水流濕火就燥者此二者以形象相應水流於地先就濕處火焚其薪先就燥處此同氣水火皆无識而相感先明自然之物故發􅀄言之也雲從龍風從虎者龍是水畜雲是水氣故龍吟則景雲出是雲從龍也虎是威猛之獸風是震動之氣此亦是同􅀋相感故虎嘯則谷風生是從虎也此二句明有識之物感无識故以次言之漸就有識而言也聖人作而萬物覩者此二句正釋飛龍在天利見大人之義聖人作則飛龍在天也萬物覩則利見大人也陳上數事之名本明於此是有識感有識也此亦同􅀋相感聖人有生養之德萬物有生養之情故相感應也本乎天者親上本乎地者親下者在上雖陳感應唯明數事而巳此則廣解天地之間共相感應之義莊氏云天地絪緼和合二氣共生萬物然萬物之體有感於天氣偏多者有感於地氣偏多者故周禮大宗伯有天産地産大司徒云動物植物本受氣於天者是動物含靈之屬天體運動含靈之物亦運動是親附於上也本受氣於地者是植物无識之屬地體凝滯植物亦不移動是親附於下也則各從其􅀋者言天地之間共相感應各從其氣􅀋卄八下有異􅀋相感有逺事相感亦有異􅀋相感者􅀂磁石引針琥珀拾芥􅅙吐絲而啇弦絕銅山崩而洛鐘應其􅀋煩多難一一言也皆其理自然不知其所以然也感者動也應者報也皆先者爲感後者爲應非唯近事則相感亦有逺事遥相感者􅀂周時獲麟乃爲漢髙之應漢時黃星後爲曹公之兆感應之事廣非片言可悉卄九餘爻􅀃龍九三君子各隨其義乾文言首不論乾而先􅀃元下乃曰乾何也夫乾者統行四事者也君子以自強不息行此四者故首不論乾而下曰乾元亨利貞餘爻皆􅀃龍至於九三獨以君子爲目何也夫易者象也象之所生生於義也有斯義然後明之以其物故以龍叙乾以馬明坤隨其事義而取象焉統而舉之乾體皆龍別而叙之各隨其義三十上九无位六爻皆无隂是无民上九曰亢龍至有悔也正義曰此明上九爻辭也子曰貴而无位者以上九非位而上九居之是无位也髙而无民者六爻皆无隂是无民也賢人在下位而无輔者賢人雖在下位不爲之輔助也是以動而有悔者聖人設誡居此之時不可動作也卅一文言第三節􅀃六爻人事所治故乾元用九則天下治也夫識物之動則其所以然之理皆可知也龍之爲德不爲妄也潜而勿用何乎必窮處於下也見而在田必以時之通舎以爻爲人以位爲時人不妄動則時皆可知也文王明夷則主可知矣仲尼旅人則國可知矣正義曰此一節是文言第三節􅀃六爻人事所治之義潜龍勿用下也者言聖人於此潜龍之時在卑下也見龍在田時舎者舎謂通舎九二以見龍在田是時之通舎也終日乾乾行事者言行此知至知終之事也或躍在淵自試者言聖人逼近五位不敢果決而進唯漸漸自試意欲前進遲疑不定故云自試也飛龍在天上治者言聖人居上位而治理也亢龍有悔窮之灾者言位窮而致灾灾則悔也非爲大禍灾也乾元用九天下治者易經上稱用九用九之文揔是乾德又乾字不可獨言故舉元德以配乾也言此乾元用九德而天下治見而在田必以時之通舎者經唯云時舎也注云必以時之通舎者則輔嗣以通解舎舎是通也􅀄九潜藏不見九二旣見而在田是時之通舎之義也以爻爲人以位爲時者爻居其位猶􅀂人遇其時卅四文言第五以天氣明六爻潜龍勿用至見天則正義曰此一節是文言第四節明六爻天氣之義天下文明者陽氣在田始生萬物故天下有文章而光明也與時偕行者此以天道釋爻象也所以九三乾乾不息終日自戒者同於天時生物不息言與時偕行也偕俱也諸儒以爲建辰之月萬物生長不有止息與天時而俱行􅀂以不息言之是建寅之月三陽用事三當生物之􅀄生物不息同於天時生物不息故言與時偕行也乾道乃革者去下體入上體故云乃革也乃位乎天德者位當天德之位言九五陽居於天照臨廣大故云天德也乃見天則者陽是剛亢之物能用此純剛唯天故云乃見天則卅五文言第五節明四德始終不爲乾元何能通物之始不性其情何能乆行其正是故始而亨者必乾元也利而正者必性情也正義曰此一節是第五節復明上􅀄章及乾四德之義也性者天生之質正而不邪情者性之欲也言􅀂不能以性制情使其情如性則不能乆行其正其六爻發揮之義案略例云爻者言乎變者也故合散屈伸與體相乖形躁如靜質柔愛剛體與情反質與願違是爻者所以明情故六爻發散旁通萬物之情輔嗣之意以􅀄爲无用之地上爲盡末之境其居位者唯二三四五故繫辭唯論此四爻􅀄末雖无正位統而論之爻亦始末之位故乾􅂏云六位時成二四爲隂位隂居爲得位陽居爲失位三五爲陽位陽居爲得位隂居爲失位略例云陽之所求者隂也隂之所求者陽也一與四二與五三與上􅀂一隂一陽爲有應􅀂俱隂俱陽爲无應此其六爻之大略其義具於繫辭於此略言之卅八文言第六節又明六爻之義君子以成德至弗用也正義曰此一節是文言第六節更復明六爻之義此節明􅀄九爻辭周氏云上第六節乾元者始而亨者也是廣明乾與四德之義此君子以成德爲行亦是第六節明六爻之義揔屬第六節不更爲第七節義或當然也君子以成德爲行者明􅀄九潜龍之義故先開此語也周易要義卷第一上周易要義卷第

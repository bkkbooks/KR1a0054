front:
  text: 周易要義序
  hash: sha256:ecee51f0e913ed02de0f5699649c90a9eb558dcc5c8a4cf47e9947767fd5993c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0054_SBCK_000-2a}
body:
  text: 上正義人姓名正觀討覈永徽刋定上六經正義表臣無忌等言故祭酒上護軍曲阜縣開國子孔頴逹宏才碩學名振當時貞觀年中奉詔修撰雖加討覈尚有未周爰降絲綸更令刋定勑太尉楊州都督監修國史上柱國趙國公臣無忌司馬上柱國英國公臣勣尚書左僕射兼太子少師監修國史上柱國燕國公臣志寧尚書左僕射兼太子少傅監修國史上護軍北平縣開國公臣行成光禄大夫侍中兼太子少保監修國史上護軍蓨縣開國公臣季輔光禄大夫吏部尚書監修國史上柱國河南郡開國公臣禇遂艮銀青光禄大夫守中書令監修國史上􅀐都尉臣栁奭前諌議大夫弘文館學士臣谷那律國子愽士弘文館學士臣伯莊朝議大夫國子博士臣王德韶朝散大夫行太學博士臣賈公彦朝散大夫行太學博士弘文館直學士臣范義頵朝散大天行太常博士臣栁宣通直郎守太學博士臣齊威宣德郎守國子助教臣史士弘宣德郎守太常博士臣孔志約右内率府長史弘文館直學士臣薛伯珍兼太學􅂇教臣鄭祖玄徴事郎守太學􅂇教臣隨德素徴事郎守四門博士臣趙君賛承務郎守太學助教臣周玄逹承務郎守四門助教臣李玄植儒林郎守四門助教臣王眞儒等上禀宸旨傍摭羣書謹以上聞伏増戰越謹言永徽四年二月二十四日二漢祖述江南虚玄惟王輔嗣獨冠傳易者西都則有丁孟京田東都則有荀劉馬鄭大體更相祖述非有絕倫唯魏丗王輔嗣之注獨冠古今所以江左諸儒並傳其學河北學者罕能及之其江南義䟽十有餘家皆辭尚虚玄義多浮誕原夫易理難窮雖復玄之又玄至於垂範作則便是有而教有􅀂論住内住外之空就能就所之􅀃斯乃義渉於釋氏非爲教於孔門也王氏七日來復即易緯六日七分之成數至􅀂復卦云七日來復並解云七日當爲七月謂陽氣從五月建午而消至十一月建子始復所歴七辰故云七月今案輔嗣注云陽氣始剥盡至來復時凡七日則是陽氣剥盡之後凡經七日始復但陽氣雖建午始消至建戍之月陽氣猶在何得稱七月來復故鄭康成引易緯之􅀃建戍之月以陽氣旣盡建亥之月純隂用事至建子之月陽氣始生隔此純隂一卦卦主六日七分舉其成數言之而云七日來復仲尼之緯分明輔嗣之注􅀂此康成之􅀃遺跡可㝷輔嗣注之於前諸儒背之於後考其義理其可通乎先甲先庚王鄭義異蠱卦云先甲三日後甲三日輔嗣注云甲者創制之令又􅀂漢世之時甲令乙令也輔嗣又云令洽乃誅故後之三日又巽卦云先庚三日後庚三日輔嗣注云申命令謂之庚輔嗣又云甲庚皆申命之謂也諸儒同於鄭氏之􅀃以爲甲者宣令之日先之三日而用辛也欲取改辛之義後之三日而用丁也取其丁寧之義王氏注意本不如此而又不顧其注妄作異端進䟽解姓名謹與朝散大夫行太學博士臣馬嘉運守太學􅂇教臣趙乾叶等對共參議詳其可否至十六年又奉勑與前修䟽人及給事郎守四門博士上􅀐都尉臣蘇德融等對勑使趙弘智覆更詳審爲之注䟽解經凡十卷易一名而含三義夫易者變化之揔名改換之殊稱聖人􅀄畫八卦設剛柔兩畫象二氣也布以三位象三才也謂之爲易取變化之義旣義揔變化而獨以易爲名者易緯乾鑿度云易一名而含三義所謂易也變易也不易也又云易者其德也鄭玄依此義作賛及易論云易一名而含三義易簡一也變易二也不易三也崔覲劉貞簡等並用此義云易者謂生生之德有易簡之義不易者言天地定位不可相易變易者謂生生之道變而相續皆以緯稱不煩不擾澹泊不失此明是易簡之義无爲之道故易者易也作難易之音而周簡子云易者易音亦也不易也變易也易者易代之名凡有无相代彼此相易皆是易義不易者常體之名有常有體无常无體是不易之義變易者相變改之名兩有相變此爲變易張氏何氏並用此義云易者換代之名待奪之義重卦有四􅀃當從王氏以伏犧爲正孔安國馬融王肅姚信等並云伏犧得河圖而作易是則伏犧雖得河圖復須仰觀俯察以相參正然後畫卦伏犧􅀄畫八卦萬物之象皆在其中故繫辭曰八卦成列象在其中矣是也雖有萬物之象其萬物變通之理猶自未備故因其八卦而更重之卦有六爻遂重爲六十四卦也繫辭曰因而重之爻在其中矣是也然重卦之人諸儒不同凡有四􅀃王輔嗣等以爲伏犧重卦鄭玄之徒以爲神農重卦孫盛以爲夏禹重卦史遷等以爲文王重卦其言夏禹及文王重卦者案繫辭神農之時巳有蓋取諸益與噬嗑以此論之不攻自破其言神農重卦亦未爲得今以諸文驗之案􅀃卦云昔者聖人之作易也幽賛於神明而生􅆱几言作者創造之謂也神農以後便是述脩不可謂之作也則幽賛用􅆱謂伏犧矣故乾鑿度云垂皇䇿者犧上繫論用􅂄云四營而成易十有八變而成卦旣言聖人作易十八變成卦明用􅆱在六爻之後非三畫之時伏犧用􅆱即伏犧巳重卦矣􅀃卦又云昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三材而兩之故易六畫而成卦旣言聖人作易兼三材而兩之又非神農始重卦矣又上繫云易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占此四者之事皆在六爻之後何者三畫之時未有􅂏繇不得有尚其辭因而重之始有變動三畫不動不得有尚其變揲􅆱布爻方用之卜筮􅆱起六爻之後三畫不得有尚其占自然中間以制器者尚其象亦非三畫之時今伏犧結繩而爲罔􅅈則是制器明伏犧巳重卦矣又周禮小史掌三皇五帝之書明三皇巳有書也下繫云上古結繩而治後丗聖人易之以書契蓋取諸夬旣象夬卦而造書契伏犧有書契則有夬卦矣故孔安國書序云古者伏犧氏之王天下也始畫八卦造書契以代結繩之政又曰伏犧神農黃帝之書謂之三墳是也又八卦小成爻象未備重三成六能事畢矣􅀂言重卦起自神農其爲功也豈比繫辭而巳哉何因易緯等數所歴三聖但云伏犧文王孔子竟不及神農明神農但有蓋取諸益不重卦矣故今依王輔嗣以伏犧旣畫八卦即自重爲六十四卦爲得其實其重卦之意備在􅀃卦連山歸藏代號周易亦取􅄮陽名案周禮太卜三易云一曰連山二曰歸藏三曰周易杜子春云連山伏犧歸藏黃帝鄭玄易賛及易論云夏曰連山殷曰歸藏周曰周易鄭玄又釋云連山者象山之出雲連連不絶歸藏者萬物莫不歸藏於其中周易者言易道周普无所不備鄭玄雖有此釋更无所據之文先儒因此遂爲文質之義皆煩而无用今所不取案丗譜等羣書神農一曰連山氏亦曰列山氏黃帝一曰歸藏氏旣連山歸藏並是代號則周易稱周取岐陽地名毛詩云周原膴膴是也又文王作易之時正在羑里周德未興猶是殷丗也故題周别於殷以此文王所演故謂之周易其猶周書周禮題周以別餘代故易緯云因代以題周是也先儒又兼取鄭􅀃云旣指周代之名亦是普徧之義雖欲无所遐棄亦恐未可盡通其易題周因代以稱周是先儒更不別解唯皇甫謐云文王在羑里演六十四卦著七八九六之爻謂之周易以此文王安周字一􅀃卦爻辭皆文王一􅀃爻辭周公其周易繫辭凡有二􅀃一􅀃所以卦辭爻辭並是文王所作知者案繫辭云易之興也其於中古乎作易者其有憂患乎又曰易之興也其當殷之末丗周之盛德邪當文王與紂之事邪又乾鑿度云垂皇䇿者犧卦道演德者文成命者孔通卦驗又云蒼牙通靈昌之成孔演命明道經準此諸文伏犧制卦文王繫辭孔子作十翼易歴三聖只謂此也故史遷云文王囚而演易即是作易者其有憂患乎鄭學之徒並依此􅀃也二以爲驗爻辭多是文王後事案升卦六四王用亨於岐山武王剋殷之後始追號文王爲王􅀂爻辭是文王所制不應云王用亨於岐山又明夷六五箕子之明夷武王觀兵之後箕子始被囚奴文王不冝豫言箕子之明夷又旣濟九五東鄰殺牛不如西鄰之禴祭􅀃者皆云西鄰謂文王東鄰謂紂文王之時紂尚南靣豈容自言已德受福勝殷又欲抗君之國遂言東西相鄰而巳又左傳韓宣子適魯見易象云吾乃知周公之德周公􅀍流言之謗亦得爲憂患也驗此諸􅀃以爲卦辭文王爻辭周公馬融陸績等並同此􅀃今依而用之所以只言三聖不數周公者以父統子業故也上下二篇文王所定案乾鑿度云孔子曰陽三隂四位之正也故易卦六十四分爲上下而象隂陽也夫陽道純而竒故上篇三十所以象陽也隂道不純而偶故下篇三十四所以法隂也乾坤者隂陽之本始萬物之祖宗故爲上篇之始而尊之也離爲日坎爲月日月之道隂陽之經所以始終萬物故以坎離爲上篇之終也咸􅁪者男女之始夫婦之道也人道之興必由夫婦所以奉承祖宗爲天地之主故爲下篇之始而貴之也旣濟未濟爲最終者所以明戒慎而全王道也以此言之則上下二篇文王所定夫子作緯以釋其義也鄭學隨經介􅂏象通爲十翼其􅂏象等十翼之辭以爲孔子所作先儒更无異論但數十翼亦有多家旣文王易經本分爲上下二篇則區域各別􅂏象釋卦亦當隨經而分故一家數十翼云上􅂏一下􅂏二上象三下象四上繫五下繫六文言七􅀃卦八序卦九雜卦十鄭學之徒並同此􅀃故今亦依之自啇瞿至漢晉傳易不絕孔子旣作十翼易道大明自啇瞿巳後傳授不絕案儒林傳云啇瞿子木本受易於孔子以授魯橋庇子庸子庸授江東馯臂子弓子弓授燕周醜子家子家授東武孫虞子乗子乗授齊田何子莊及秦燔書易爲卜筮之書獨得不禁故傳授者不絕漢興田何授東武王同子中及雒陽周王孫梁人丁寛齊伏生皆著易傳數篇同授菑川楊何字叔元叔元傳京房京房傳梁丘賀賀授子臨臨授御史大夫王駿其後丁寛又別授田王孫孫授施犨犨授張禹禹授彭宣此前漢大略傳授之人也其後漢則有馬融荀爽鄭玄劉表虞翻陸績等及王輔嗣也孟喜前巳題上下經字緯文鄙僞但子夏傳云雖分爲上下二篇未有經字經字是後人所加不知起自誰始案前漢孟喜易本云分上下二經是孟喜之前巳題經字孝經緯稱易建八卦序六十四卦轉成三百八十四爻運機布度其氣轉易故稱經也但緯文鄙僞不可全信周易序要義泰至謙卷二下豫至觀卷三上噬嗑至无妄卷三下大畜至離卷四上咸至明夷卷四下家人至益卷五上夬至井卷五下革至歸妹卷六上豐至節卷六下中孚至未濟卷七上繫辭上卷七下繫辭上卷八繋辭下卷九􅀃卦卷十序卦雜卦略例周易要義目録終

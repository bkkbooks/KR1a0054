front:
  text: 十序卦雜卦略例
  hash: sha256:81dc3f35c2441ceb4d1b2df44d9424877093a828adcc1f1a014a4652c948802d
body:
  text: 一六十四卦相次非覆即變正義曰序卦者文王旣繇六十四卦分爲上下二篇其先後之次其理不見故孔子就上下二經各序其相次之義故謂之序卦焉韓康伯云序卦之所明非易之緼也盖因卦之次託象以明義不取深緼之義故云非易之緼故以取其人理也今驗六十四卦二二相耦非覆即變覆者表裏視之遂成兩卦屯蒙需訟師比之􅀋是也變者反覆唯成一卦則變以對之乾坤坎離頥大過中孚小過之􅀋是也且聖人本定先後􅀂元用孔子序卦之意則不應非覆即變然則康伯所云因卦之次託象以明義盖不虚矣二屯剛柔始交故爲物之始屯者物之始生也注屯剛柔始交故爲物之始正義曰王肅云屯剛柔始交而難生故爲物始生也盧氏云物之故屯難皆以物之始生釋屯難之義案上言屯者盈也釋屯次乾坤其言巳畢更言屯者物之始生者開􅀃下物生必蒙直取始生之意非重釋屯之名也故韓康伯直引剛柔始交以釋物之始生也三否則思通人人同志故可出門同人物不可以終否故受之以同人注否則相通人人同志故可出門同人不謀而合否備鄙反四順動者衆所隨王肅以爲歡豫豫必有隨注順以動者衆之所隨正義曰鄭􅀇云喜樂而出人則隨從孟子曰吾君不游吾何以休吾君不豫吾何以助此之謂也王肅云歡豫人必有隨隨者皆以爲人君喜樂歡豫則以爲人所隨案豫卦􅂏云豫剛應而志行順以動豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不􅑯聖人以順動則刑罰清而民服即此上云有大而能謙必豫故受之以豫其意以聖人順動能謙爲物所􅀃所以爲豫人旣􅀃豫自然隨之則謙順在君􅀃豫在人也􅀂以人君喜樂㳺豫人則隨之紂作靡靡之樂長夜之飲何爲天下離叛乎故韓康伯云順以動者衆之所隨在於人君取致豫之義然後爲物所隨所以非斥先儒也五可大之業由事而生故以臨次蠱蠱者事也有事而後可大故受之以臨臨者大也注可大之業由事而生六致飾則實喪故賁受之剥嗑者合也物不可以苟合而巳故受之以賁賁者飾也注物相合則湏飾以脩外也致飾然後亨則盡矣故受之以剥極飾則實喪也亨許庚反鄭許兩反徐音向同七頥受之大過言養過則厚王肅云過失頥者養也不養則不可動故受之以大過注不養則不可動養過則厚正義曰鄭􅀇云以養賢者冝過於厚王輔嗣注此卦云音相過之過韓氏云養過則厚與鄭􅀇輔嗣義同唯王肅云過莫過於不養則以爲過失之過案此序卦以大過次頥也明所過在養子雍以爲過在不養違經反義莫此之尤而周氏等不悟其非兼以過失釋大過之名巳具論之於經也八䧟必有所麗物窮則反所麗䧟必有所麗故受之以離離者麗也注物窮則變極䧟則反所麗也九易備三材謂上下經分天道人事者非有天地云云然後禮義有所錯注言咸卦之義也凡序卦所明非易之緼也盖因卦之次記以明義咸柔上而剛下感應以相與夫婦之象莫羙乎斯人倫之道莫大乎夫婦故夫子殷勤深􅄒其義以崇人倫之始而不係之於離也先儒以乾至離爲上經天道也咸至未濟爲下經人事也夫易六畫成卦三材必備錯綜天人以效變化豈有天道人事徧於上下哉斯盖守文而不求義失之逺矣錯七各反注同徐七路反十夫婦以􅁪爲貴與丗升降故受遯物不可以乆居其所故受之以遯遯者退也注夫婦之道以􅁪爲貴而物之所居不可以􅁪宜與丗升降有時而遯也十一家人之義過則乖故受之睽家道窮必乖故受之以睽注室家至親過在失節故家人之義唯嚴與敬樂勝則流禮勝則離家家尚嚴其敝必乖也十二雜卦者孔子所錯綜歸藏卦次亦多異正義曰上序卦依文王上下而次序之此雜卦孔子更以意錯雜而對辨其次第不與序卦同故韓康伯云雜卦者雜揉衆卦錯綜其義或以同相􅀋或以異相明也虞氏云雜卦者雜六十四卦以爲義其於序卦之外別言也此者聖人之興因時而作隨其事冝不必皆相因襲當有損益之意也故歸藏名卦之次亦多異十三屯時君子雖見而磐桓利貞不失居屯見而不失其居注屯利建侯君子以經綸之時雖見而磐桓利貞不失其居也見賢遍反十四謙豫噬賁兊巽隨蠱之義謙輕而豫怠也注謙者不自重大噬嗑食也賁无色也注飾賁合衆无定色也兊見而巽伏也注兊貴顯􅀃巽貴卑退隨无故也蠱則飾也注隨時之冝不繫於故也隨則有事受之以蠱飾整治也蠱所以整治其事也十五井道通困安於所遇咸之感速井通而困相遇也注井物所通用而不吝也困安於所遇而不濫也咸速也注物一相感莫速乎咸十六履不處其位需畏險而止履不處也注王弼云履卦陽爻皆以不處其位爲吉也需不進也注畏險而止也十七略例有承乗應變行藏險易如王輔嗣略例大則揔一部之指歸小則明六爻之得失承乗逆順之理應變情僞之端用有行藏辭有險易觀之者可以經緯天地探測􅀑神匡濟􅀖家推辟咎悔雖人非上聖亦近代一賢臣謹依其文輙爲注解十八六爻隂陽皆以少爲主一卦五陽而一隂則一隂爲之主矣注同人履小畜大有之例是也五隂而一陽則一陽爲之主矣注師比謙豫復剥之例也夫隂之所求者陽也陽之所求者隂也注王弼曰夫隂陽相求之物以所求者貴也陽茍一焉五隂何得不同而歸之隂茍􅃗焉五陽何得不同而從之故隂爻雖賤而爲一卦之主者處其至少之地也注王氏曰陽貴而隂賤以至少處至多之地爻雖賤衆亦從之小畜􅂏云柔得位而上下應之是也或有遺爻而舉二體者卦體不由乎爻也注遺弃也弃此一爻而舉二體以明其義卦體之義不在一爻豐歸妹之􅀋是也十九物有性行異情體反質願違故合散屈伸與體相乖注物之爲體或性同行乖情貌相違同歸殊塗一致百慮故萃卦六二引吉无咎萃之爲體貴相從就六二志在靜退不欲相就人之多辟巳獨處正其體雖合志則不同故曰合散乾之􅀄九潜龍勿用身雖潜屈情无憂悶其志則申故曰屈伸形躁好靜質柔愛剛體與情反質與願違注至如風虎雲龍嘯吟相感物之體性形願相從此則情體乖違質願相反故歸妹九四歸妹愆期遲歸有時四體是震是形躁也愆期待時是好靜也履卦六三武人爲于大君志剛也兊體是隂是質柔也志懷剛武人于大君是愛剛也二十陵三軍􅁀威武而有懼有困陵三軍者或懼於朝廷之儀􅁀威武者或困於酒食之娯注陵三軍􅁀威武視死如歸􅀂獻酬揖讓汗成霡霂此皆體質剛猛懼在微小故大畜􅀄九有厲利已九三輿􅀃輻雖復剛徤怯於柔弱也卄一近不必比逺不必乖雜明同異之理近不必比逺不必乖注近爻不必親比逺爻不必乖離屯六二􅀄九爻雖相近守貞不從九五雖逺十年乃字此例是也同聲相應髙下不必均也同氣相求體質不必齊也注􅀄四二五三上同聲相應不必均髙卑也同氣相求不必齊形質也召雲者龍命吕者律注雲水氣也龍水畜也召水氣者水畜此明有識感无識命隂吕者陽律此明无識感有識故二女相違而剛柔合體注二女俱是隂􅀋而相違剛柔雖異而合體此明異􅀋相應􅂭墀永歎逺壑方盈注􅂭髙也墀水中墀也永長也處髙墀而長歎逺壑之中盈響而應九五尊髙喻於􅂭墀六二卑二同於逺壑唱和相應也投戈散地則六親不能相保注投置也散逃置兵也置兵戈於逃散之地雖是至親不能相保守也遯卦九四好遯君子吉處身於外難在内處外則超然逺遯􅀄六至親不能相保守也同舟而濟則胡越何患乎異心注同在一舟而俱濟彼岸胡越雖殊其心皆同􅀂漸卦三四異體和好物莫能間順而相保似􅀂同在一舟上下殊體猶􅀂胡越利用禦冦何患乎異心卄二唯明爻則知取舎安危吉凶變化睽而知其􅀋異而知其通注睽􅂏曰萬物睽而其事􅀋也男女睽而其志同也其唯明爻者乎注知取舎察安危辯吉凶知變化其唯明爻者也故有善邇而逺至命宫而啇應注善脩治也邇近也近脩治言語千里逺應􅀂中孚之九二鳴鶴在隂其子和之鳴於此和於彼聲同則應有􅀂宫商也脩下而髙者降與彼而取此者服矣注處下脩正髙必命之否之􅀄六㧞茅貞吉九四有命疇離祉也與謂止也取謂下也君上福禄不獨有之下人服者感君之德大有六五厥孚交如威如吉之例是也是故情僞相感逺近相追注正應相感是實情蹇之二五之例不正相感是僞情頥之三上之例有應雖逺而相感睽之三上之例无應近則相取賁之二三之例是也愛惡相攻屈伸相推注同人三四有愛有惡迭相攻伐否㤗二卦一屈一伸更相推謝見情者􅀗直往則違注􅀗得也見彼之情徃必得志屯之六四求㛰媾往吉无不利之例不揆則徃彼必相違六三即鹿无虞惟入于林中君子幾不如舎徃吝之例是也故擬議以成其變化語成噐而後有格注格作括括結也動則擬議極於變化語成噐而後无結閡之患也卄三卦者時爻者適時之變夫卦者時也爻者適時之變者也注卦者統一時之大義爻者適時中之通變夫時有否㤗故用有行藏注泰時則行否時則藏卦有小大故辭有險易注隂長則小陽生則大否卦辭險㤗卦辭易一時之制可反而用也一時之吉可反而凶也注一時有大畜比㤗之制反有天衢後夫復隍之用一時有豐亨之用反有羈旅之凶也故卦以反對而爻亦皆變諸卦之體兩相反正其爻隨卦而變㤗之􅀄九拔茅彚征吉否之􅀄六抜茅彚貞卦旣隨時爻變亦准也卄四吉凶從卦名動靜應時用故名其卦則吉凶從其􅀋存其時則動靜應其用注名其謙比則吉從其􅀋名其蹇剥則凶從其􅀋震時則動應其用艮時則靜應其用卄五得其應雖逺可動得時雖險可處是故雖逺而可以動者得其應也雖險而可以處者得其時也注上下雖逺而動者有其應革之六二去五雖逺隂陽相應徃者无咎也雖險可以處者得其時也需上六居險之上不憂出穴之凶得其時也弱而不懼於敵者得所據也憂而不懼於亂者得所附也注師之六五爲師之主體是隂柔禽來犯田執言徃討處得尊位所以不懼也遯九五嘉遯貞吉處遯之時小人浸長君子道消逃遯於外附著尊位率正小人不敢爲亂也卄七觀變動存乎應察安危存乎位故觀變動者存乎應察安危者存乎位注爻有變動存乎應而有應動動則不失􅀂謙之九三勞謙君子有終吉之例爻之安危在乎位則安若節之六四安節亨之例是失位則危若晋之九四晋如鼫䑕貞厲之􅀋是也辯逆順者存乎承乗注陽乗於隂逆也師之六二師或輿尸凶隂承於陽順也噬嗑六三小吝无咎承於九四雖失其正小吝无咎也明出處者存乎外内注遯君子處外臨君子處内逺近終始各存其㑹注適得其時則吉失其要㑹則凶辟險尚逺趣時貴近注遯之上九肥遯无不利此尚逺也觀之六四觀國之光利用賔于王此貴近也比復好先乾壯惡首注比􅀄六有孚无咎上六比之无首凶復之􅀄九不逺復无祗悔元吉上六迷復凶乾上九亢龍有悔大壯上六羝羊觸藩不能退不能遂无攸利之例是也明夷務暗豐尚光大注明夷􅂏云利艱貞晦其明也豐繇云勿憂冝日中是也吉凶有時不可犯也注時有吉凶不可越分輕犯動靜有適不可過也注動靜適時不可過越而動犯時之思罪不在大失其所適過不在深注􅀂夬之九三壯于頄有凶得位有應時方陽長同決小人三獨應之犯時之忌凶其冝也大過九四棟􅂭吉有它吝大過之時陽處隂位爲羙九四陽處隂位能􅂭其棟良由應􅀄則有它吝此所適違時卅一王氏不取互體卦變五行義茍在徤何必馬乎􅀋茍在順何必牛乎注大壯九三有乾亦云羝羊坤卦无乾􅂏亦云牝馬爻茍合順何必坤乃爲牛義茍應徤何必乾乃爲馬注遯无坤六三亦稱牛明夷无乾六二亦稱馬而或者定馬於乾注唯執乾爲馬其象未弘也案文責卦有馬无乾則僞說滋漫難可紀矣􅀇體不足遂及卦變變又不足推致五行注廣推金木水火土爲象也一失其原巧愈彌甚注一失聖人之原旨廣爲譬喻失之甚縱復或值而義无所取盖存象忘意之由也注失魚兔則空守筌蹄遺徤順則空􅀃龍馬卅二辨卦象􅀄上无得位失位之文案象无􅀄上得位失位之文注隂陽居之不云得失又繫辭但論三五二四同功異位亦不及􅀄上何乎注同其意也唯乾上九文言云貴而无位注陽居之也需上六云雖不當位注隂居之也􅀂以上爲隂位邪則需上六不得云不當位也􅀂以上爲陽位邪則乾上九不得云貴而无位也隂陽處之皆云非位而􅀄亦不􅀃當位失位也注不論當位失位凶吉之由然則􅀄上者是事之終始无隂陽定位也注􅀄爲始上爲終施之於人爲終始非禄位之地也故乾􅀄謂之潜過五謂之无位未有處其位而云潜上有位而云无者也歴觀衆卦盡亦如之􅀄上无隂陽定位亦以明矣夫位者列貴賤之地待才用之宅也注宅居也二四隂賤小人居之三五陽貴君子居之爻者守位分之任應貴賤之序也注名守其位應之以序位有尊卑爻有隂陽尊者陽之所處卑者隂之所履也故以尊爲陽位卑爲隂位去􅀄上而論位分則三五各在一卦之上亦何得不謂之陽位二四各在一卦之下亦何得不謂之隂位􅀄上者體之終始事之先後也故位无常分事无常所非可以隂陽定也尊卑有常序始終无常位注四爻有尊卑之序始終无隂陽之常主也故繫辭但論四爻功位之通例而不及􅀄上之定位也然事不可无終始卦不可无六爻􅀄上雖无隂陽本位是終始之地也統而論之爻之所處則謂之位卦以六爻爲成則不得不謂之六位時成也卅四四德即四時亦有先貞後亨如離者凡體具四德者則轉以勝者爲先故曰元亨利貞也注元爲生物之始春也亨爲㑹聚於物夏也利爲和諧品物秋也貞能幹濟於物冬也乾用此四德以成君子大人之法也其有先貞而後亨者亨由於貞也注離卦云利貞亨卅五􅂏統一卦象辯一爻履三訟二可見凡􅂏者統論一卦之體者也象者各辯一爻之義者也注􅂏統論卦體象各明一爻之義故履卦六三爲兊之主以應於乾成卦之體在斯一爻故􅂏叙其應雖危而亨也注􅂏云柔履剛􅀃而應乎乾是以履虎尾不咥人亨也象則各言六爻之義明其吉凶之行去六三成卦之體而指􅀃一爻之德故危不􅀗亨而見咥也注六三履虎尾咥人凶􅂏言不咥象言見咥明爻􅂏其義各異也訟之九二亦同斯義注訟􅂏曰有孚窒惕中􅁻剛來而得中注云其在一乎以剛而求正夫羣小斷不失中應斯任矣九二不克訟歸而逋其邑人三百户无眚也卅六无咎本皆有咎又有不犯咎无所咎凡言无咎者本皆有咎者也防得其道故得无咎也注乾之九三君子終日乾乾无咎若防失其道則有過咎也􅁻无咎者本亦有咎由􅁻故得免也注師貞丈人􅁻无咎注云興役動衆无功罪也故􅁻乃免咎无咎􅁻者先免於咎而後􅁻從之也注比􅀄六有孚比之无咎終來有它􅁻之例也或亦處得其時􅁻不待功不犯於咎則􅀗􅁻也注需之九二需于沙小有言終􅁻注云近不逼難逺不後時履徤居中以待其㑹雖小有言以􅁻終也或有罪自已招无所怨咎亦曰无咎故節六三曰不節􅀂則嗟􅀂无咎象曰不節之嗟又誰咎也卅七屯一卦皆隂求陽故􅀄陽大得民􅦱屯此一卦皆隂爻求陽也屯難之丗弱者不能自濟必依於彊民思其主之時也故隂爻皆先求陽不召自往馬雖班如而猶不廢不得其主无所馮也􅀄體陽爻處首居下應民所求合其所望故大得民也卅八􅀩昧之時亦是隂先求陽􅦰􅀩此一卦隂爻亦先求陽夫隂昧而陽明隂困童􅀩陽能發之凡不識者求問識者識者不求所告闇者求明明者不諮於闇故童􅀩求我匪我求童􅀩也故六三先唱則犯於爲女四逺於陽則困􅀩吝􅀄比於陽則發蒙也卅九棟橈之丗反以陽得位有應爲凶􅪑大過者棟橈之丗也本末皆弱棟已橈矣而守其常則是危而弗扶凶之道也以陽居隂拯弱之義也故陽爻皆以居隂位爲美濟衰救危唯在同好則所瞻􅄶矣九四有應則有它吝九二无應則无不利也注大過之時陽處隂位心无係應爲吉陽得位有應則凶也四十遯以逺時爲吉上則肥遯􅀄有厲􅣥遯小人浸長難在於内亨在於外與卦相對者也臨剛長則柔危遯柔長故剛遯也注遯以逺時爲吉不係爲美上則肥遯􅀄則有厲四一大壯以陽居隂位爲美用壯則觸藩􅥣大壯未有違謙越禮能全其壯者也故陽爻皆以處隂位爲美用壯處謙壯乃全也壯則觸藩矣四二明夷之義逺難藏明􅪏明夷爲闇之主在於上六􅀄最逺之故曰君子于行五最近之而難不能溺故謂之箕子之貞明不可息也三處明極而征至闇故曰南狩獲其大首也注逺難藏明明夷之義逺于萬反溺寜歴反周易要義卷第十終

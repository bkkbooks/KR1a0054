body:
  text: 上繫一繫本系辭本作􅯊應作詞繫徐胡詣反本系也又音係續也字從􅌛􅀂直作􅌛下系者音口奚反非辭本作􅯊依字應作詞􅀃也􅀃文云詞者意内而言外也辤不受也受辛者辤辤籕文辭字也上第七本亦作繫辭上王肅本皆作繫辭上傳訖於雜卦皆有傳字本亦有無上字者二王輔嗣止注六經相承用韓繫案王輔嗣止注六經講者相承用韓注繫辭以下續之三乾坤貴賤剛柔􅁻凶變化天尊地卑乾坤定矣乾坤其易之門户先明天尊地卑以定乾坤之體其易之門本亦作其易之門户卑髙以陳貴賤位矣天尊地卑之義旣列則渉乎萬物貴賤之位明矣動静有常剛柔㫁矣剛動而柔止也動得其常體則剛柔之分著矣方以􅀋聚物以羣分吉凶生矣方有􅀋物有羣則有同有異有聚有分也順其所同則吉乖其所􅃐則凶故吉凶生矣在天成象在地成形變化見矣象況日月星辰形況山川草木也懸象運轉以成昬明山澤通氣而雲行雨施故變化見矣是故剛柔相摩相㘦摩也言隂陽之交感也八卦相盪相推盪也言運化之推移四乾坤易簡由不爲善始不勞善成乾知大始坤作成物乾以易知坤以簡能天地之道不爲而善始不勞而善成故曰易簡易則易知簡則易從易知則有親易從則有功順萬物之情故曰有親通天下之志故曰有功五上下經辭取繫屬之義又音係正義曰謂之繫辭者凡有二義論字取繫屬之義聖人繫屬此辭於爻卦之下故此篇第六章云繫辭焉以㫁其􅁻凶第十二章云繫辭焉以盡其言是繫屬其辭於爻卦之下則上下二篇經辭是也文取繫屬之義故字體從繋又音爲係者取綱係之義卦之與爻各有其辭以釋其義則卦之與爻各有綱係所以音謂之係也夫子本作十翼中􅀃上下二篇經文繫辭條貫義理別自爲卷揔曰繫辭分爲上下二篇者直以簡編重大是以分之六動静有常論天陽地隂之性動靜有常剛柔斷矣者天陽爲動地隂爲靜各有常度則剛柔斷定矣動而有常則成剛靜而有常則成柔所以剛柔可斷定矣􅀂動而无常則剛道不成靜而无常則柔道不立是剛柔雜亂動静无常則剛柔不可斷定也此經論天地之性也此雖天地動靜亦揔兼萬物也萬物禀於陽氣多而爲動也禀於隂氣多而靜也七剛柔相摩是隂陽更遞變化剛柔相摩者以變化形見即陽極變爲隂隂極變爲陽陽剛而隂柔故剛柔共相切摩更遞變化也八卦相盪者剛則陽爻也柔則隂爻也剛柔兩體是隂陽二爻相雜而成八卦遞相推盪􅀂十一月一陽生而推去一隂五月一隂生而推去一陽雖諸卦遞相推移本從八卦而來八天陽之氣云知地隂之形云作乾知大始者以乾是天陽之氣萬物皆始在於氣故云知其太始也坤作成物者坤是地隂之形坤能造作以成物也􅀄始无形未有營作故但云知也巳成之物事可營爲故云作也乾以易知者易謂易略无所造爲以此爲知九乾坤是用今云體盖指徤順正義曰云先明天尊地卑以定乾坤之體者易含萬象天地最大􅀂天尊地卑各得其所則乾坤之義得定矣案乾坤是天地之用非天地之體今云乾坤之體者是乾以徤爲體坤以順爲體十吉凶悔吝變化剛柔注䟽通互言之是故􅁻凶者失得之象也由有失得故吉凶生悔吝者憂虞之象也失得之微者足以致憂虞而已故曰悔吝變化者進退之象也徃復相推迭進退也迭田節反剛柔者晝夜之象也晝則陽剛夜則隂柔始揔言吉凶變化而下別明悔吝晝夜者悔吝則凶吉之􅀋晝夜亦變化之道吉凶之􅀋則同因繫辭而明變化之道則俱由剛柔而著故始揔言之下則明失得之輕重辨變化之小大故別序其義也剛柔者晝夜之象虞作晝夜者剛柔之象六爻之動三極之道也三極三材也兼三材之道故能見吉凶成變化也三極陸云極至也馬云三統也鄭韓云三才也王肅云隂陽剛柔仁義爲三極十二失得進退明君子知其所處故安君子所居而安者易之序也者以其在上吉凶顯其得失變化明其進退以此之故君子觀象知其所處故可居治之位而安靜居之是易位之次序也􅀂居在乾之􅀄九而安在勿用􅀂居在乾之九三而安在乾乾是以所居而安者由觀易之位次序也十三吉凶悔吝无咎皆生乎變下歴言五者􅂏者言乎象者也􅂏揔一卦之義爻者言乎變者也爻各言其變也爻户交反􅀃文云交也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善􅀘過也是故列貴賤者存乎位爻之所處曰位六位有貴賤也小疵徐才斯反馬云瑕也齊小大者存乎卦卦有大小也齊猶言辯也即􅂏者言乎象也辯吉凶者存乎辭辭爻辭也即爻者言乎變也言象所以明大小言變所以明吉凶故小大之義存乎卦吉凶之狀見乎爻至於悔吝无咎其例一也吉凶悔吝小疵无咎皆生乎變事有大小故下歴言五者之差也辯如字京云明也虞董姚顧蜀才並云別也音彼列反見賢遍反憂悔吝者存乎介介纎介也王弼曰憂悔吝之時其介不可慢也即悔吝者言乎小疵也介音界注同纎王肅于韓云纎介也息廉反震无咎者存乎悔无咎者善􅀘過也震動也故動而无咎存乎悔過也震馬云驚也鄭云懼也王肅韓云動也周云救也十四前言悔吝憂虞之象此言小疵悔吝者言乎其小疵也者辭著悔吝者言􅀃此卦爻有小疵病也有小疵病必預有憂虞故前章云悔吝者憂虞之象但前章據其象此章論其辭十五易中无咎有二義案略例无咎有二一者善能􅀘過故无咎二者其禍自巳招无所怨咎故節之六三不節之嗟又誰咎也但如此者少此據多者言之故云善􅀘過也十六以位卦辭介悔數五者於經便於注􅆾云故下歴言五者之差也謂於吉凶下歴次言五者之差別數五者謂吉一凶二悔三吝四无咎五然諸儒以爲五者皆數列貴賤者存乎位是其一也齊小大者存乎卦是其二也辨吉凶者存乎辭是其三也憂悔吝者存乎介是其四也震无咎者存乎悔是其五也於經數之爲便但於注理則乖今並存焉十七盡聚散之理能知變化之道精氣爲物遊魂爲變精氣烟煴聚而成物聚極則散遊魂爲變也遊魂言其遊散也烟音因煴于云反是故知􅀑神之情狀盡聚散之理則能知變化之道无幽而不通也十八韓注以道爲无一隂一陽一亦爲无一隂一陽之謂道道者何无之稱也无不通也无不由也況之曰道寂然无體不可爲象必有之用極而无之功顯故至乎神无方而易无體而道可見矣故窮變以盡神因神以明道隂陽雖殊无一以待之在隂爲天隂隂以之生在陽爲无陽陽以之成故曰一隂一陽十九聚散皆􅀑神所爲能知是與天地相似云精氣爲物者謂隂陽精靈之氣氤氲積聚而爲萬物也遊魂爲變者物旣積聚極則分散將散之時浮遊精魂去離物形而爲改變則生變爲死成變爲敗或未死之間變爲異􅀋也是故知􅀑神之情狀者能窮易理盡生死變化以此之故能知􅀑神之内外情狀也物旣以聚而生以散而死皆是􅀑神所爲但極聚散之理則知􅀑神之情狀也言聖人以易之理而能然也與天地相似故不違者天地能知􅀑神任其變化聖人亦窮神盡性能知􅀑神是與天地相似二十䟽又以虚无釋道釋一一隂一陽之謂道者一謂无也无隂无陽乃謂之道一得爲无者无是虚无虚无是太虚不可分別唯一而已故以一爲无也􅀂其有境則彼此知形有二有三不得爲一故在隂之時而不見爲隂之功在陽之時而不見爲陽之力自然而有隂陽自然无所營爲此則道之謂也故以言之爲道以數言之謂之一以體言之謂之无以物得開通謂之道以微妙不測謂之神以應機變化謂之易揔而言之皆虚无之謂也卄一隂陽不測之謂神言變化之極隂陽不測之謂神神也者變化之極妙萬物而爲言不可以形詰者也故曰隂陽不測甞試論之曰原夫兩儀之運萬物之動豈有使之然哉莫不獨化於大虚欻爾而自造矣造之非我理自玄應化之无主數自􅁳運故不知所以然而况之神是以明兩儀之大極爲始言變化而稱極乎神也卄二乾以專直言其材坤翕闢言形夫乾其靜也專其動也直是以大生焉專專一也直剛正也夫坤其靜也翕其動也闢是以廣生焉翕歛也止則翕歛其氣動則闢開以生物也乾統天首物爲變化之元通乎形外者也坤則順以承陽功盡於已用止乎形者也故乾以專直言乎其材坤以翕闢言乎其形卄三乾專直故能大生坤翕闢故廣生夫乾其靜也專其動也直是以大生焉者上經旣論易道資隂陽而成故此經明乾復兼明坤也乾是純陽德能普備无所偏二唯專一而已􅀂氣不發動則靜而專一故云其靜也專􅀂其運轉則四時不􅑯寒暑无差剛而得正故云其動也直以其動靜如此故能大生焉夫坤其靜也翕其動也闢是以廣生焉者此經明坤之德也坤是隂柔闢藏翕歛故其靜也翕動則開生萬物故其動也闢以其如此故能廣生於物焉天體髙逺故乾云大生地體廣博故坤云廣生對則乾爲物始坤爲物生散則始亦爲生卄四廣大配天地以下皆配合之配廣大配天地者此經申明易之德以易道廣大配合天地大以配天廣以配地變通配四時者四時變通易理亦能變通故云變通配四時也隂陽之義配日月易簡之善配至德者按􅀄章論乾坤易簡可乆可大配至極微妙之德然易􅀄章易爲賢人之德簡爲賢人之業今揔云至德者對則德業别散則由德而來卄五知效天禮法地易行乎中知者通利萬物象天陽无不覆以崇爲貴也禮者卑敬於物象地柔而在下故以卑爲用也崇效天卑法地者知旣崇髙故效天而禮以卑退故法地也天地設位而易行乎其中矣者天地陳設於位謂知之與禮而效法天地也而易行乎知禮之中言知禮與易而並行也􅀂以實象言之天在上地在下是天地設位天地之間萬物變化是易行乎天地之中也卄六擬形容謂之象㫁吉凶謂之爻聖人有以見天下之􅄨而擬諸其形容象其物冝是故謂之象乾剛坤柔各有其體故曰擬諸形容聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以㫁其吉凶是故謂之爻典禮適時之所用言天下之至􅄨而不可惡也言天下之至動而不可亂也易之爲書不可逺也惡之則逆於順錯之則乖於理㫁丁亂反下注同惡也於嫁反荀作亞亞次也又烏路反馬鄭烏洛反並通卄七以鶴鳴予和明擬議之道謹其微擬之而後言議之而後動擬議以成其變化擬議以動則盡變化之道議之陸姚􅁊玄荀柔之作儀之鳴鶴在隂其子和之我有好爵吾與爾靡之鶴鳴則子和脩誠則物應我有好爵與物散之物亦以善應也明擬議之道繼以斯義者誠以吉凶失得存乎所動同乎道者道亦得之同乎失者失亦違之莫不以同相順以􅀋相應動之斯來綏之斯至鶴鳴于隂氣同則和出言戸庭千里或應出言猶然况其大者乎千里或應况其邇者乎故曰憂悔吝者存乎纎介定得失者愼於樞機是以君子擬議以動愼其微也卄八旣觀㑹通行典禮又繫辭㫁􅁻凶爲爻聖人有以見天下之動者謂聖人有其微妙以見天下萬物之動也而觀其㑹通以行其典禮者旣知萬物以此變動觀看其物之㑹合變通當此㑹通之時施行其典法禮儀也繫辭焉以㫁其吉凶者旣觀其㑹通而行其典禮以定爻之通變而有三百八十四爻於此爻下繫屬文辭以㫁定其吉凶􅀂㑹通典禮得則爲􅁻􅀂㑹通典禮失則爲凶也是故謂之爻者以是之故謂此㑹通之事而爲爻也夫爻者效也效諸物之通變故上章云爻者言乎變者也卄九言行樞機可以感動天地言行君子之樞機者樞謂户樞機謂弩牙言户樞之轉或明或闇弩牙之發或中或否猶言行之動從弩而發以及於爲或是或非也言行君子之所以動天地者言行雖􅀄在於身其善惡積而不已所以感動天地豈可不愼乎同人先號咷而後􅀏者證擬議而動則同􅀋相應以同人􅀄未知同故先號咷後得同􅀋故後􅀏也子曰君子之道者各引易之後其文􅀔已絶故言子曰或岀或處或黙或語者言同􅀋相應本在於心不必共同一事或此物而岀或彼物而處或此物而黙或彼物而語岀處黙語其迹雖異感應之事其意則同或處應於岀或黙應於語二人同心其利㫁金者二人􅀂同齊其心其銛利能㫁截於金金是堅剛之物能㫁而截之盛言利之甚也此謂二人心行同也同心之言其臭如蘭者言二人同齊其心吐發言語氤氲臭氣香馥如蘭也周易要義卷第七上周易要義卷第七下上繫

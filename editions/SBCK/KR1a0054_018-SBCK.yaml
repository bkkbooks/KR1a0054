body:
  text: 一作易者知盗結上不宻失身子曰作易者其知盗乎者此結上不宻失身之事事􅀂不宻人則乗此機危而害之猶􅀂財之不宻盗則乗此機危而􅀼之易者愛惡相攻逺近相取盛衰相變􅀂此爻有釁􅂩衰弱則彼爻乗變而奪之二誨盗誨􅁋比小人居位致㓂􅀒也者小人之事也􅀒者檐􅀒於物合是小人所爲也乗也者君子之器者言乗車者君子之器物言君子合乗車今應􅀒之人而乗車是小人乗君子之器也則盗竊之人思欲奪之矣上慢下􅁀盗思伐之矣者小人居上位必驕慢而在下必􅁀虐爲政如此大盗思欲伐之矣慢藏誨盗冶容誨􅁋以比小人而居貴位驕矜而不謹慎而致㓂至也乗也者如字一讀繩正反慢藏才浪反誨如字教也三其用四十有九不用而用以之通大衍之數五十其用四十有九王弼曰演天地之數所頼者五十也其用四十有九則其一不用也不用而用以之通非數而數以之成斯易之大極也四十有九數之極也夫无不可以无明必因於有故常於有物之極而必明其所由之宗也衍延善反又注演同鄭云衍演也四分二掛一揲四歸竒再扐分而爲二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五歳再閏故再扐而後掛竒況四揲之餘不足復揲者也分而爲二旣揲之餘合掛於一故曰再扐而後掛凡閏者十九年七閏爲一章五歳再閏者二故略舉其凡也掛一卦買反別也王肅音卦揲時設反案揲猶數也設文云閱持也一音思頰反徐音息列反鄭云取也五乾坤之䇿萬有一千二百五十乾之䇿二百一十有六陽爻六一爻三十六䇿六爻二百一十六䇿䇿􅀄革反字亦作筴坤之䇿百四十有四隂爻六一爻二十四䇿六爻百四十四䇿凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也二篇三百八十四爻隂陽各半合萬一千五百二十䇿當如字下同期本又作朞音基同是故四營而成易分而爲二以象兩一營也掛一以象三二營也揲之以四三營也歸竒於扐四營也六大衍之數之用諸􅀃不同正義曰此第八章明占筮之法揲􅆱之體顯天地之數定乾坤之䇿以爲六十四卦而生三百八十四爻大衍之數五十其用四十有九者京房云五十者謂十日十二辰二十八􅀫也凡五十其一不用者天之生氣將欲以虚來實故用四十九焉馬季長云易有大極謂北辰也大極生兩儀兩儀生日月日月生四時四時生五行五行生十二月十二月生二十四氣北辰居位不動其餘四十九轉運而用也荀爽云卦各有六爻六八四十八加乾坤二用凡有五十乾􅀄九潜龍勿用故用四十九也鄭康成云天地之數五十有五以五行氣通凡五行减五大衍又減一故四十九也姚信董遇云天地之數五十有五者其六以象六畫之數故減之而用四十九但五十之數義有多寡各有其􅀃未知孰是今案王弼云演天地之數所頼者五十據王弼此􅀃其意皆與諸儒不同萬物之䇿凡有萬一千五百二十其用此䇿推演天地之數唯用五十䇿也一謂自然所湏䇿者唯用五十就五十䇿中其所用揲􅆱者唯用四十有九其一不用以其虚无非所用也故不數之顧懽同王弼此􅀃故顧懽云立此五十數以數神神雖非數因數而顯故虚其一數以明不可言之義只如此意則別无所以自然而有此五十也今依用之七象一兩三四閏及五位得合之數分而爲二以象兩者五十之内去其一餘有四十九合同末分是象太一也今以四十九分而爲二以象兩儀也掛一以象三者就兩儀之間於天數之中分掛其一而配兩儀以象三才也揲之以四以象四時者分揲其􅆱皆以四四爲數以象四時歸竒於扐以象閏者竒謂四揲之餘歸此殘竒於所扐之䇿而成數以法象天道歸殘聚餘分而成閏也五歳再閏者凡前閏後閏相去大略三十二月在五歳之中故五歳再閏再扐而後掛者旣分天地天於左手地於右手乃四四揲天之數最末之餘歸之合於扐掛之一處是一揲也又以四四揲地之數最末之餘又合於前所歸之扐而揔掛之是再扐而後掛也天數五者謂一三五七九也地數五者二四六八十也五位相得而各有合者􅀂天一與地六相得合爲水地二與天七相得合爲火天三與地八相得合爲木地四與天九相得合爲金天五與地十相得合爲土天數二十有五者揔合五竒之數地數三十者揔合五偶之數也凡天地之數五十有五者是天地二數相合爲五十有五此乃天地隂陽竒偶之數非是上文演天地之䇿也此所以成變化而行􅀑神者言此陽竒隂偶之數成就其變化言變化以此隂陽而成故云成變化也而宣行􅀑神之用言􅀑神以此隂陽而得宣行故云而行􅀑神九當期之日當萬物之數據老隂陽乾之䇿二百一十有六者以乾老陽一爻有三十六䇿六爻凡有二百一十六䇿也乾之少陽一爻有二十八䇿六爻則有一百六十八䇿此經據老陽之䇿也坤之䇿百四十有四者坤之老隂一爻有二十四䇿六爻故一百四十有四䇿也􅀂坤之少隂一爻有三十二六爻則有一百九十二此經據坤之老隂故百四十有四也凡三百有六十當期之日者舉合乾坤兩䇿有三百有六十當期之數三百六十日舉其大略不數五日四分日之一也二篇之䇿萬有一千五百二十當萬物之數者二篇之爻揔有三百八十四爻隂陽各半陽爻一百九十二爻爻別有三十六揔有六千九百一十二也隂爻亦一百九十二爻爻別二十四揔有四千六百八也隂陽揔合萬有一千五百二十當萬物之數也十四營成易十八變成卦引伸觸長四營而成易者營謂經營而後成也謂四度􅆱䇿乃成易之一變也十有八變而成卦者毎一爻有三變謂第一揲不五則九是一變也第二揲不四則八是二變也第三揲亦不四則八是三變也􅀂三者俱多爲老隂謂􅀄得九第二第三俱得八也􅀂三者俱少爲老陽謂􅀄得五第二第三俱得四也􅀂兩少一多爲少隂謂􅀄與二三之間或有四或有五或有八也或有二箇四而有一箇九此爲兩少一多也其兩多一少爲少陽者謂三揲之間或有一箇九有一箇八而有一箇四或有二箇八而有一箇五此爲兩多一少也如此三變旣畢乃定一爻六爻則十有八變乃始成卦也八卦而小成者象天地雷風日月山澤於大象略盡是易道小成引而伸之者謂引長八卦而伸盡之謂引之爲六十四卦也觸􅀋而長之者謂觸逢事􅀋而増長之􅀂觸剛之事􅀋以次增長於剛􅀂觸柔之事􅀋以次増長於柔天下之能事畢矣者天下萬事皆如是例各以􅀋増長則天下所能之事法象皆盡十一韓親受業於王故引所賴者五十正義曰王弼云演天地之數所頼者五十者韓氏親受業於王弼承王弼之旨故引王弼云以證成其義演天地之數所頼者五十謂萬物籌䇿雖萬有一千五百二十􅀂用之推演天地之數所湏頼者唯頼五十十二首論辭變象占中陳深幾神末以四結夫易聖人之所以極深而研幾也者易道弘大故聖人用之所以窮極幽深而研覈幾微也極深者前經􅀄一節云君子將有爲將有行問焉而以言其受命如響无有逺近幽深是極深也研幾者上經次節云參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象是研幾也唯深也故能通天下之志者言聖人用易道以極深故聖人德深也故能通天下之志意即是前經上節問焉而以言其受命如響遂知來物是通天下之志也唯幾也故能成天下之務者聖人用易道以研幾故聖人知事之幾微是前經次節參伍以變錯綜其數通其變遂成天地之文是也幾者離无入有是有􅀄之微以能知有􅀄之微則能興行其事故能成天下之事務也唯神也故不疾而速不行而至者此覆􅀃上經下節易之神功也以无思无爲寂然不動感而遂通故不湏急疾而事速成不湏行動而理自至也案下節云唯深也言通天下之志唯幾也言成天下之務今唯神也直云不疾而速不行而至不言通天下者神則至理微妙不可測知无象无功於天下之事理絶名言不可論也故不云成天下之功也子曰易有聖人之道四焉者此之謂也者章首論聖人之道四焉章中歴陳其三事章末結而成之故曰聖人之道四焉是此之謂也章首聖人之道有四者韓氏注云此四者存乎器象可得而用者則辭也變也象也占也是有形之物形器可知也􅀂章中所陳則有三事一是至精精則唯深也二是至變變則唯幾也三是至神神則微妙无形是其无也神旣无形則章中三事不得配章首四事韓氏云四者存乎器象故知章中三事不得配章首四事者也但行此四者即能致章中三事故章中歴陳三事下揔以聖人之道四焉結之也十三􅆱圎神卦方知爻易貢是故􅂄之德圎而神卦之德方以知圎者運而不窮方者止而有分言􅆱以圎象神卦以方象知也唯變所􅃴无數不周故曰圎卦列爻分各有其體故曰方也知音智注同六爻之義易以貢貢告也六爻變易以告吉凶易以鼔反韓音亦謂變易十四􅆱定數於卦爲來卦成象於􅆱爲往神以知來知以藏往明􅆱卦之用同神知也􅆱定數於始於卦爲來卦成象於終於􅆱爲往往來之用相成猶神知也以􅆱望卦則是知卦象將來之事故言神以知來以卦望􅆱􅀂知聚於􅆱象往去之事故言知以藏往也其孰能與此哉者言誰能同此也蓋是古之聦明叡知神武不殺者夫易道深逺以􅁻凶禍福威服萬物故古人聦明叡知神武之君謂伏犧等用此易道能威服天下而不用刑殺而威服之也十六物先闔後闢闔闢徃來謂之變通凡物先藏而後岀故先言坤而後言乾闔户謂閉藏萬物􅀂室之閉闔其户故云闔户謂之坤闢户謂之乾者闔户謂吐生萬物也􅀂室之開闢其户故云闢户謂之乾也一闔一闢謂之變者開閉相循隂陽遞至或陽變爲隂或開而更闔或隂變爲陽或閉而還開是謂之變也往來不窮謂之通者湏往則變來爲後未來則變往爲來隨湏改變不有窮巳常得通流是謂之通也見乃謂之象者前徃來不窮據其氣也氣漸積聚露見萌兆乃謂之象言物體尚微也形乃謂之器者體質成形是謂器物故曰形乃謂之器言其著也制而用之謂之法者言聖人裁制其物而施用之垂爲模範故云謂之法利用出入民咸用之謂之神者言聖人以利而用或出或入使民咸用之是聖德微妙故云謂之神十八䟽以一生二釋極生兩五行釋四象八卦太極謂天地未分之前元氣混而爲一即是太􅀄太一也故老子云道生一即此太極是也又謂混元旣分即有天地故曰大極生兩儀即老子云一生二也不言天地而言兩儀者指其物體下與四象相對故曰兩儀謂兩體容儀也兩儀生四象者謂金木水火禀天地而有故云兩儀生四象土則分王四季又地中之别故唯云四象也四象生八卦者􅀂謂震木離火兊金坎水各主一時又巽同震木乾同兊金加以坤艮之土爲八卦也八卦定吉凶者八卦旣立爻象變而相推有􅁻有凶故八卦定􅁻凶也吉凶生大業者萬事各有吉凶廣大悉備故能生天下大事業也十九河圖洛書鄭以緯言孔以卦疇釋河岀圖洛岀書聖人則之者如鄭康成之義則春秋緯云河以通乾岀天苞洛以流坤吐地符河龍圖發洛􅀛書感河圖有九篇洛書有六篇孔安國以爲河圖則八卦是也洛書則九疇是也輔嗣之義未知何從二十易有四象非一􅀃䟽謂七八九六莊氏云四象謂六十四卦之中有實象有假象有義象有用象爲四象也今於釋卦之處巳破之矣何氏以爲四象謂天生神物聖人則之一也天地變化聖人效之二也天垂象見吉凶聖人象之三也河出圖洛岀書聖人則之四也今謂此等四事乃是聖人易外別有其功非專易内之物何得稱易有四象且又云易有四象所以示也繫辭焉所以告也然則象之與辭相對之物辭旣爻卦之下辭則象謂爻卦之象也則上兩儀生四象七八九六之謂也故諸儒有爲七八九六今則從以爲義繫辭焉所以告者繫辭於象卦下所以告其得失也定之以吉凶所以斷者謂於繫辭之中定其行事吉凶所以斷其行事得失卄一立象設卦繫辭變通以鼔舞緫之聖人立象以盡意者雖言不盡意立象可以盡之也設卦以盡情僞者非唯立象以盡聖人之意又設卦以盡百姓之情僞也繫辭焉以盡其言者雖書不盡言繫辭可以盡其言也變而通之以盡利者變謂化而裁之通謂推而行之故能盡物之利也鼔之舞之以盡神者此一句揔結立象盡意繫辭盡言之美聖人立象以盡其意繫辭則盡其言可以􅀃化百姓之心百姓之心自然樂順􅀂鼔舞然而天下從之非盡神其孰能與於此卄二謂之事業者凡繫辭􅀃易必關人事舉而錯之天下之民謂之事業者謂舉此理以爲變化而錯置於天下之民凡民得以營爲事業故云謂之事業也此乃自然以變化錯置於民也聖人亦當法此錯置變化於萬民使成其事業也凡繫辭之􅀃皆􅀃易道以爲聖人德化欲使聖人法易道以化成天下是故易與聖人􅁪相將也以作易者本爲立教故也非是空􅀃易道不關人事也是故夫象聖人有以見天下之􅄨至是故謂之爻者於第六章已具其文今於此更復言者何也爲下云極天下之􅄨存乎卦鼔天下之動存乎辭爲此故更引其文也且已下又云存乎變存乎通存乎其人廣陳所存之事所以湏重論也周易要義第七下周易要義卷第八

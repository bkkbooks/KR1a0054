  hash: sha256:d8a033bb9f0530831601509a2792af1f91850f70d0d6a0f87324fdc0c4ea74a9
body:
  text: 坤至需一文王卦辭利牝馬之貞與乾異􅦊坤下坤上坤元亨利牝馬之貞坤貞之所利利於牝馬也馬在下而行者也而又牝馬順之至也至順而後乃亨故唯利於牝馬之貞君子有攸徃先迷後得主利西南得朋東北䘮朋安貞吉西南致養之地與坤同道者也故曰得朋東北反西南者也故曰䘮朋隂之爲物必離其黨之於反􅀋而後獲安貞吉正義曰此一節是文王於坤卦之下陳坤德之辭但乾坤合體之物故乾後次坤言地之爲體亦能始生萬物各得亨通故云元亨與乾同也利牝馬之貞者此與乾異乾之所利利於萬事爲貞此唯云利牝馬之貞坤是隂道當以柔順爲貞假借柔順之象以明柔順之德也不云牛而云馬者牛雖柔順不能行地无疆无以見坤廣生之德馬雖比龍爲劣所行亦能廣逺象地之廣育君子有攸徃者以其柔順利貞故君子利有所徃先迷後得主利者以其至隂當待唱而後和凡有所爲􅀂在物之先即迷惑􅀂在物之後即得主利以隂不可先唱猶臣不可先君卑不可先尊故也西南得朋者此假象以明人事西南坤位是隂也今以隂詣隂是得朋俱是隂􅀋不獲吉也猶人旣懷隂柔之行又向隂柔之所是純隂柔弱故非吉也東北䘮朋安貞吉者西南旣爲隂東北反西南即爲陽也以柔順之道徃詣於陽是䘮失隂朋故得安靜貞正之吉以隂而兼有陽故也􅀂以人事言之象人臣離其黨而入君之朝女子離其家而入夫之室凡言明者非唯人爲其黨性行相同亦爲其黨假令人是隂柔而之剛正亦是離其黨四大與至始與生統天與承天之異正義曰至哉坤元者歎羙坤德故云至哉至謂至極也言地能生飬至極與天同也但天亦至極包籠於地非但至極又大於地故乾言大哉坤言至哉萬物資生者言萬物資地而生􅀄稟其氣謂之始成形謂之生乾本氣􅀄故云資始坤據成形故云資生乃順承天者乾是剛徤能統領於天坤是隂柔以和順承奉於天坤厚載物德合无疆者以其廣厚故能載物有此生長之德合㑹无疆凡言无疆者其有二義一是廣博无疆二是長乆无疆五象在經辭後輔嗣始分附爻下象曰履霜至氷也正義曰夫子所作象辭元在六爻經辭之後以自卑退不敢干亂先聖正經之辭及至輔嗣之意以爲象者本釋經文宜相附近其義易了故分爻之象辭各附其當爻下言之猶如元凱注左傳分經之年與傳相附隂始凝也者釋履霜之義言隂氣始凝結爲霜也馴致其道至堅冰也者馴猶狎順也若鳥獸馴狎然言順其隂柔之道習而不巳乃至堅冰也禇氏云履霜者從􅀄六至六三堅冰者從六四至上六隂陽之氣无爲故積馴履霜必至於堅冰以明人事有爲不可不制其節度故於履霜而逆以堅冰爲戒七六二居中得位極地之質六二直方大不習无不利居中得正極於地質任其自然而物自生不假脩營而功自成故不習焉而无不利象曰六二之動直以方也動而直方任其質也不習无不利地道光也正義曰直方大不習无不利者文言云直其正也二得其位極地之質故亦同地也具包三德生物不邪謂之直也地體安靜是其方也无物不載是其大也旣有三德極地之美自然而生不假脩營故云不習无不利物皆自成无所不利以此爻居中得位極於地體地之形質直方又大此六二居中得正是盡極地之體質也八居隂極不爲物始含章待時六三含章至光大也正義曰含章可貞者六三處下卦之極而能不􅀍疑於陽章美也旣居隂極能自降退不爲事始唯内含章美之道待命乃行可以得正故曰含章可貞或從王事无成有終夫子釋含章之義以身居隂極不敢爲物之首但内含章美之道待時而發是以時發也或從王事知光大者釋无成有終也旣隨從王事不敢主成物始但奉終而行是知慮光大九括囊謂閉其知六四括囊至不害也正義曰括結也囊所以貯物以譬心藏知也閉其知而不用故曰括囊功不顯物故曰无譽不與物忤故曰无咎象曰慎不害者釋所以括囊无咎之義由其謹慎不與物競故不􅀍害也十黃裳以柔順處盛位六五黃裳元吉黃中之色也裳下之飾也坤爲臣道美盡於下夫體无剛徤而能極物之情通理者也以柔順之德處於盛位任夫文理者也十一隂盛似陽陽所不堪故戰而傷上六龍戰于野其血玄黃隂之爲道卑順不􅄹乃全其羙盛而不巳固陽之地陽所不堪故戰于野正義曰龍戰于野其血玄黃者以陽謂之龍上六是隂之至極隂盛似陽故稱龍焉盛而不巳固陽之地陽所不堪故陽氣之龍與之交戰即􅀃卦云戰乎乾是也戰於卦外故曰于野隂陽相傷故其血玄黃十二積柔致禍故於􅀄六言善惡之積積善至言順也正義曰此一節明􅀄六爻辭也積善之家必有餘慶積不善之家必有餘殃者欲明􅀄六其惡有漸故先明其所行善惡事由乆而積漸故致後之吉凶蓋言順者言此履霜堅冰至蓋言順習隂惡之道積微而不巳乃致此弑害稱蓋者是疑之辝凡萬事之起皆從小至大從微至著故上文善惡並言今獨言弑君弑父有漸者以隂主柔順積柔不巳乃終至禍亂故特於坤之􅀄六言之十三黃中至暢發外内俱善君子黃至之至也正義曰此一節明六五爻辭也黃中通理者以黃居中兼四方之色奉承臣職是通曉物理也正位居體者居中得正是正位也處上體之中是居體也黄中通理是美在其中有美在於中必通暢於外故云暢於四支四支猶人手足比于四方物務也外内俱善能宣發於事業所營謂之事事成謂之業美莫過之故云美之至也十四玄黃言隂陽俱傷莊氏云上六雜氣隂疑於至地黃正義曰此一節明上六爻辭隂疑於陽必戰者隂盛爲陽所疑陽乃發動故除去此隂隂旣強盛不肯退避故必戰也爲其嫌於无陽故稱龍焉者上六隂盛以陽爲嫌純隂非陽故稱龍以明之猶未離其􅀋也故稱血焉者言上六雖隂盛似陽然猶未能離其隂􅀋故爲陽所傷而成滅也夫玄黃者天地之雜也天玄而地黃者釋其血玄黃之義莊氏云上六之爻兼有天地雜氣所以上六􅀍傷其血玄黃也天色玄地色黃故血有天地之色今輔嗣注云猶與陽戰而相傷是言隂陽俱傷也恐莊氏之言非王之本意今所不取也十五屯乃元亨亨乃利貞與乾四德􅦱震下坎上屯元亨利貞剛柔始交是以屯也不交則否故屯乃大亨也大亨則无險故利貞屯張倫反難也盈也坎宮二丗卦否備鄙反勿用有攸徃徃益屯也利建侯得主則定正義曰屯難也剛柔始交而難生􅀄相逢遇故云屯難也以隂陽始交而爲難因難物始大通故元亨也萬物大亨乃得利益而貞正故利貞也但屯之四德劣於乾之四德故屯乃元亨亨乃利貞乾之四德无所不包此即勿用有攸徃又別言利建侯不如乾之无所不利此巳上􅀃屯之自然之四德聖人當法之勿用有攸徃利建侯者以其屯難之丗丗道􅀄創其物未寧故宜利建侯以寧之此二句釋人事也十八君子法屯象以經緯繩綸象曰雲雷至經綸正義曰經謂經緯綸謂繩綸言君子去此屯象有爲之時以經綸天下約束於物故云君子以經綸也姚信云綸謂綱也以織綜經緯此君子之事非其義也十九屯􅀄動則難生故磐􅁊居貞建侯􅀄九磐􅁊利居貞利建侯處屯之􅀄動則難生不可以進故磐􅁊也處此時也其利安在不唯居貞建侯乎夫息亂以靜守靜以侯安民在正弘正在謙屯難之丗隂求於陽弱求於強民思其主之時也􅀄處其首而又下焉爻備斯義冝其得民也二十二志在五而不從􅀄故屯邅馬班如六二屯如邅如乗馬班如匪㓂㛰媾女子貞不字十年乃字志在乎五不從於􅀄屯難之時正道未行與􅀄相近而不相得困於侵害故屯邅也時方屯難正道未通渉逺而行難可以進故曰乗馬班如也㓂謂􅀄也无􅀄之難則與五㛰矣故曰匪宼㛰媾也志在於五不從於􅀄故曰女子貞不字也屯難之丗勢不過十年者也十年則反常反常則本志斯獲矣故曰十年乃字屯如子夏傳云如辭也邅張連反馬云難行不進之貌乗繩證反四馬曰乗下及注並同鄭云馬牝牡曰乗子夏傳音繩班如字子夏傳云相牽不進貌鄭本作般女子謂六二也女子以守貞正不受􅀄九之愛字訓愛也十年乃字者十年難息之後即􅀄不害巳也乃得徃適於五受五之字愛十者數之極數極則變故云十年也象曰六二之難乗剛也者釋所以屯如邅如也有畏難者以其乗陵􅀄剛不肯從之故有難也十年乃字反常者謂十年之後屯難止息得反常者謂反常道即二適于五是其得常也已前有難不得行常十年難息得反歸於常以適五也此爻因六二之象以明女子㛰媾之事即其餘人事亦當法此猶如有人逼近於強雖逺有外應未敢進􅀍近者所陵經乆之後乃得與應相合是知萬事皆象於此非唯男女而巳諸爻所云隂陽男女之象義皆倣於此卄二即鹿无虞或作麓君子幾有二音六三即鹿无虞唯入于林中君子幾不如舎徃吝三旣近五而无宼難四雖比五其志在􅀄不妨已路可以進而无屯邅也見路之易不揆其志五應在二徃必不納何異无虞以從禽乎雖見其禽而无其虞徒入于林中其可獲乎幾辭也夫君子之動豈取恨辱哉故不如舎徃吝窮也鹿王肅作麓云山足幾徐音祈辝也注同又音機近也速也鄭作機云弩牙也幾爲語辭不爲義也知此幾不爲事之幾微凡幾微者乃從无向有其事末見乃爲幾也今即鹿无虞是巳成之事事巳顯著故不得爲幾微之幾卄三屯膏而不光故小貞吉大凶九五屯其膏小貞吉大貞凶處屯難之時居尊位之上不能恢弘博施无物不與拯濟微滯亨于羣小而繫應在二屯難其膏非能光其施者也固志同好不容他間小貞之吉大貞之凶正義曰屯其膏者膏謂膏澤恩惠之􅀋言九五旣居尊位當恢弘博施唯繫應在二而所施者􅄶狹是屯難其膏小貞吉大貞凶者貞正也出納之吝謂之有司是小貞爲吉􅀂大人不能恢弘博施是大貞爲凶二四以剛處中能斷疑故童蒙求之􅦰坎下艮上蒙亨匪我求童蒙童蒙求我􅀄筮告再三瀆瀆則不告筮者決疑之物也童蒙之來求我欲決所惑也決之不一不知所從則復惑也故􅀄筮則告再三則瀆瀆蒙也能爲􅀄筮其唯二乎以剛處中能斷夫疑者也蒙莫工反蒙蒙也稚也稽覽圖云无以教天下曰蒙方言云蒙萌也離宫四丗卦童如字字書作僮鄭云未冠之稱二五􅀄筮不剖決告之而再三瀆蒙不如不告正義曰蒙者微昧闇弱之名物皆蒙昩唯願亨通故云蒙亨匪我求童蒙童蒙求我者物旣闇弱而意願亨通即明者不求於闇即匪我師德之髙明徃求童蒙之闇但闇者求明明者不諮於闇故云童蒙求我也􅀄筮告者􅀄者發始之辭筮者決疑之物童蒙旣來求我我當以􅀄始一理剖決告之再三瀆瀆則不告者師􅀂遲疑不定或再或三是褻瀆瀆則不告童蒙來問本爲決疑師􅀂以廣深二義再三之言告之即童蒙聞之轉亦瀆亂故不如不告也卄六内險外止爲蒙時所願者以亨行􅂏曰蒙山下有險險而止蒙退則困險進則閡山不知所遇蒙之義也蒙亨以亨行時中也時之所願唯願亨也以亨行之得時中也匪我求童蒙童蒙求我志應也我謂非童蒙者也非童蒙者即陽也凡不識者求問識者識者不求所告闇者求明明者不諮於闇故蒙之爲義匪我求童蒙童蒙求我也童蒙之來求我志應故也􅀄筮告以剛中也謂二也二爲衆隂之主也无剛決中何由得􅀄筮之告乎再三瀆瀆則不告瀆蒙也蒙以養正聖功也正義曰再三瀆瀆則不告瀆蒙者所以再三不告恐瀆亂蒙者自此巳上􅂏辭揔釋蒙亨之義蒙以養正聖功也者能以蒙昧隱黙自養正道乃成至聖之功此一句釋經之利貞卄七蒙發疑明刑與􅀃皆當以徃則吝􅀄六發蒙利用刑人用􅀃桎梏以徃吝處蒙之􅀄二照其上故蒙發也蒙發疑明刑􅀃當也以徃吝刑不可長也象曰利用刑人以正法也刑人之道道所惡也以正法制故刑人也正義曰發蒙者以􅀄近於九二二以陽處中而明能照闇故􅀄六以能發去其蒙也利用刑人用􅀃桎梏者蒙旣發去无所疑滯故利用刑戮于人又利用􅀃去罪人桎梏以蒙旣發去疑事顯明刑人􅀃梏皆得當在足曰桎在手曰梏小雅云杻謂之梏械謂之桎以徃吝者􅀂以正道而徃即其事益善矣􅀂以刑人之道岀徃行之即有鄙吝象曰利用刑人以正法者且刑人之道乃賊害於物是道之所惡以利用刑人者以正其法制不可不刑矣故刑罰不可不施於國鞭朴不可不施於家案此刑人􅀃人二事象直云利用刑人一者但舉刑重故也卄八上不求三而三求上故云見金夫六三勿用取女見金夫不有躬无攸利童蒙之時隂求於陽晦求於明各求發其昩者也六三在下卦之上上九在上卦之上男女之義也上不求三而三求上女先求男者也女之爲體正行以待命者也見剛夫而求之故曰不有躬也施之於女行在不順故勿用取女而无攸利取七住反卄九陽主生息故言實象曰獨逺實者實謂九三之陽也九二以陽故稱實也六三近九二六五近上九又應九二唯此六四旣不近二又不近上故云獨逺實也陽主生息故稱實隂主消損故不得言實三十自有孚至大川爲繇辭卅一需險在前以剛徤而進故利渉􅨃乾下坎上需有孚至大川正義曰此需卦繇辭也需者待也物􅀄蒙稚待養而成无信即不立所待唯信也故云需有孚言需之爲體唯有信也光亨貞吉者􅀂能有信即需道光明物得亨通于正則吉故云光亨貞吉也利渉大川者以剛徤而進即不患於險乾德乃亨故云利涉大川卅二需字從兩而者訓養讀爲秀需音須字從兩重而者非飲食之道也訓養鄭讀爲秀解云陽氣秀而不直前者畏上坎也坤宫遊䰟卦卅三不云險不云雨不云天上有雲象曰雲上於天需君子以飲食宴樂童蒙巳發盛德光亨飲食宴樂其在兹乎正義曰坎旣爲險又爲雨今不言險雨者此􅂏不取險難之義也故不云險也雨是已下之物不是須待之義故不云雨也不言天上有雲而言雲上於天者天之欲雨待時而落所以明需天惠將施而盛德又亨故君子於此之時以飲食宴樂上時掌反于寶云升也於天王肅本作雲在天上卅四用􅁪守常不能見幾但得无咎􅀄九需于郊至未失常也正義曰但難在於坎􅀄九去難旣逺故待時在于郊郊者是境上之地亦去水逺也利用􅁪无咎者􅁪常也逺難待時以避其害故冝利保守其常所以无咎猶不能見幾速進但得无咎而巳卅五近難需沙而寛衍在中九二需於沙小有言終吉轉近於難故曰需于沙也不至致㓂故曰小有言也近不逼難逺不後時履徤居中以待其㑹雖小有言以終吉也沙如字鄭作沚正義曰沙是水傍之地去水漸近待時于沙象曰需于沙衍在中者衍謂寛衍去難雖近猶未逼于難而寛衍在其中也故雖小有言以吉終也卅六隂陽相傷稱穴居坎之始稱穴六四需于血岀自穴凡稱血者隂陽相傷者也隂陽相近而不相得陽欲進而隂塞之則相害也穴者隂之路也處坎之始居穴者也九三剛進四不能距見侵則辟順以聽命者也故曰需于血岀自穴也辟音避卅七九五居中得正无所復需九五需于酒至中正也正義曰需于酒食貞吉者五旣爲需之王巳得天位无所復需但以需待酒食以遞相宴樂而得貞吉象曰酒食貞吉以中正者釋酒食貞吉之義言九五居中得正需道亨通上下无事也卅八以一隂爲三陽主故須敬乃吉象曰不速之客來敬之終吉雖不當位未大失也處无位之地不當位者也敬之則得終􅁻故雖不當位未大失也正義曰上六入于穴者上六隂爻故亦稱穴也上六與三相應三來之巳不爲禍害乃得爲巳援助故上六无所畏忌乃入于穴而居也有不速之客三人來者速召也不須召喚之客有三人自來三人謂􅀄九九二九三此三陽務欲前進但畏于險難不能前進其難旣通三陽務欲上升不須召喚而自來故云有不速之客三人來也敬之終吉者上六居无位之地以一隂而爲二陽之主不可怠慢故須恭敬此三陽乃得終吉且需之一卦須待難通其於六爻皆假他物之象以明人事待通而亨周易要義卷第一中周易要義卷第

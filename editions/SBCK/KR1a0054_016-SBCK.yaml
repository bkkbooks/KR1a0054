  hash: sha256:495fcc8170624a6d8bb3ceace55f2182d16aad43d5edec736ac0490f1f661c9d
body:
  text: 豫至觀一豫无四德逸豫不可常行􅮩坤下震上豫利建侯行師正義曰謂之豫者取逸豫之義以和順而動動不違衆衆皆􅀃豫故謂之豫也動而衆􅀃故可利建侯也以順而動不加无罪故可以行師也无四德者以逸豫之事不可以常行豫餘慮反恱豫也備豫也馬云豫樂震宫一丗卦二􅂏所嘆者十二卦或時或時用時義豫之時義大矣哉者歎美爲豫之善言於逸豫之時其義大矣此歎卦也凡言不盡意者不可煩文具􅀃故歎之以示情使後生思其餘藴得意而忘言也然歎卦有三體一直歎時如大過之時大矣哉之例是也二歎時并用如險之時用大矣哉之例是也三歎時并義豫之時義大矣哉之例是也夫立卦之體各象其時時有屯夷事非一揆故爻來適時有凶有􅁻人之生丗亦復如斯或逢治丗或遇亂時出處存身此道豈小故曰大矣哉也然時運雖多大體不出四種者一者治時頥養之丗是也二者亂時大過之丗是也三者離散之時解緩之丗是也四者改易之時革變之丗是也故舉此四卦之時爲歎餘皆可知言用者謂適時之用也雖知居時之難此事不小而未知以何而用之耳故坎暌蹇之時冝用君子小人勿用用險取濟不可爲常斟酌得冝是用時之大略舉險難等三卦餘從可知矣文言義者姤卦注云凡言義者不盡於所見中有意謂者也是其時皆有義也略明佚樂之丗相隨相遇之日隱遯覉旅之時凡五卦其義不小則餘卦亦可知也今所歎者十二卦足以發明大義恢弘妙理者也凡于􅂏之末歎云大哉者凡一十二卦􅀂豫旅遯姤凡四卦皆云時義案姤卦注云凡言義者不盡於所見中有意謂以此言之則四卦卦各未盡其理其中更有餘意不可盡申故揔云義也隨之一卦亦言義但與四卦其文稍別四卦皆云時義隨卦則隨時之義者非但其中別有義意又取隨逐其時故變云隨時之義大矣哉睽蹇坎此三卦皆云時用案睽卦注云睽離之時非小人之所能用蹇卦亦云非小人之所能用此二卦言大矣哉者則是大人能用故云大矣哉其中更无餘義唯大人能用故云用不云義也坎卦時用則與睽蹇稍別注云非用之常用有時也謂坎險之事時之湏用利益乃大與睽蹇時用文同而義異也解之時革之時頤之時大過之時此四卦直云時不云義與用也案解卦注難解之時非治難時故不言用體盡於解之名無有幽隱故不曰義以此注言之直云時者㝷卦之名則其意具盡中間更無餘義三雷出地而奮動法此作樂薦配象曰雷岀地奮豫先王以作樂崇德殷薦之上帝以配祖考正義曰案諸卦之象或云雲上于天或云風行天上以􅀋言之今此應云雷出地上乃云雷出地奮豫者雷是陽氣之聲奮是震動之狀雷旣岀地震動萬物􅀍陽氣而生各皆逸豫故云雷岀地奮豫也先王以作樂崇德者雷是鼓動故先王法此鼓動而作樂崇盛德業樂以發揚盛德故也殷薦之上帝者用此殷盛之樂薦祭上帝也象雷岀地而向天也以配祖考者謂以祖考配上帝用祖用考􅀂周夏正郊天配靈威仰以祖后稷配也配祀明堂五方之帝以考文王也故云以配祖考也奮方問反殷於勤反馬云盛也􅀃文云作樂之盛稱殷四六二介于石順不苟從豫不違中六二介于石不終日貞吉處豫之時得位履中安夫貞正不求苟豫者也順不苟從豫不違中是以上交不謟下交不瀆明禍福之所生故不苟􅀃辯必然之理故不改其操介如石焉不終日明矣介音界纎介古文作砎鄭故八反云謂磨砎也馬作扴云觸小石聲苟􅀃音恱象曰不終日貞吉以中正者釋貞吉之義所以見其惡事即能離去不待終日守正􅁻者以此六二居中守正順不苟從豫不違中故不湏待其一日終守貞吉也五盱豫謂睢盱而豫姚引詩盱日始旦六三盱豫悔遲有悔居下體之極處兩卦之際履非其位承動豫之主􅀂其睢盱而豫悔亦生焉遲而不從豫之所疾位非所據而以從豫進退離悔冝其然矣盱香于反睢盱也向云睢盱小人喜恱之貌王肅云盱大也鄭云誇也􅀃文云張目也字林火孤反又火于反子夏作紆京作汙姚作盱云日始出引詩盱日始旦睢香維反􅀃文云仰日也字林火佳反六衆隂由一陽以豫故勿疑則朋合疾九四由豫大有得勿疑朋盍簮處豫之時居動之始獨體陽爻衆隂所從莫不由之以得其豫故曰由豫大有得也夫不信於物物亦疑焉故勿疑則朋合疾也盍合也簮疾也由豫由從也鄭云用也馬作猶云猶豫疑也盍胡獵反合也簮徐側林反子夏傳同疾也鄭云速也埤蒼同王肅又祖感反古文作貸京作橬馬作臧荀作宗虞作戠戠叢合也蜀才本依京義從鄭􅀂能不疑於物以信待之則衆隂羣朋合聚而疾來也象曰由豫大有得志大行者釋由豫大得之意衆隂旣由之而豫大有所得是志意大行也七凡隨有元亨利貞乃无咎􅪹震下兊上隨元亨利貞无咎正義曰元亨者於相隨之丗必大得亨通􅀂其不大亨通則无以相隨逆於時也利貞者相隨之體湏利在得正隨而不正則邪僻之道必湏利貞也无咎者有此四德乃无咎以苟相從渉於朋黨故必湏四德乃无咎也凡卦有四德者或其卦當時之義即有四德如乾坤屯臨无妄此五卦之時即能四德備具其隨卦以惡相隨則不可也有此四德乃无咎无此四德則有咎也與前五卦其義稍別隨從也震宫歸魂卦八六二係􅀄九小子則失九五丈夫六二係小子失丈夫隂之爲物以處隨丗不能獨立必有係也居隨之時體於柔弱而以乗夫剛動豈能秉志違於所近隨此失彼弗能兼與五處已上􅀄處已下故曰係小子失丈夫也正義曰小子謂􅀄九也丈夫謂九五也􅀄九處卑故稱小子五居尊位故稱丈夫六二旣是隂柔不能獨立所處必近係屬􅀄九故云係小子旣屬􅀄九則不得徃應於五故云失丈夫也象曰係小子弗兼與者釋係小子之意旣隨此􅀄九則失彼九五丈夫是不能兩處兼有九六三舎􅀄係四非正應故利居貞六三係丈夫失小子隨有求得利居貞隂之爲物以處隨丗不能獨立必有係也雖體下卦二巳據􅀄將何所附故舎􅀄係四志在丈夫四俱无應亦欲於巳隨之則得其所求矣故曰隨有求得也應非其正以係於人何可以妄故利居貞也􅀄處已下四處已上故曰係丈夫失小子也象曰係丈夫志舎下也下謂􅀄也十輔嗣甲創制庚申命諸儒用辛丁􅫿巽下艮上蠱元亨利渉大川先甲三日後甲三日正義曰蠱者事也有事營爲則大得亨通有爲之時利在濟難故利渉大川也先甲三日後甲三日者甲者創制之令旣在有爲之時不可因仍舊令今用創制之令以治於人人􅀂犯者未可即加刑罰以民未習故先此宣令之前三日殷勤而語之又於此宣令之後三日更丁寧而語之其人不從乃加刑罰也其禇氏何氏周氏等並同鄭義以爲甲者造作新令之日甲前三日取改過自新故用辛也甲後三日取丁寧之義故用丁也今案輔嗣注甲曰創制之令不云創制之日又巽卦九五先庚三日後庚三日輔嗣注申命令謂之庚輔嗣又云甲庚皆申命之謂則輔嗣不以甲爲創制之日而諸儒不顧輔嗣注旨妄作異端非也蠱音古事也惑也亂也左傳云於文皿蟲爲蠱又云女惑男風落山謂之蠱徐又姬祖反一音故巽宫歸魂卦先息薦反􅂏并注同後胡豆反十一物蠱必有事非訓蠱爲事􅂏曰蠱剛至天行也正義曰剛上而柔下巽而止蠱者此釋蠱卦之名并明稱蠱之義也以上剛能制㫁下柔能施令巽順止靜故可以有爲也禇氏云蠱者惑也物旣惑亂終致損壞當湏有事也有爲治理也故序卦云蠱者事也謂物蠱必有事非謂訓蠱爲事義當然也蠱元亨而天下治者釋元亨之義以有爲而得元亨是天下治理也利渉大川徃有事也者釋利渉大川也蠱者有爲之時拔拯危難位當有事故利渉大川此則假外象以喻危難也先甲三日後甲三日終則有始天行者釋先甲三日後甲三日之義也民之犯令告之巳終更復從始告之殷勤不巳􅀂天之行四時旣終更復從春爲始象天之行故云天行也釋注蠱者至四時也正義曰蠱者有事待能之時者物旣蠱壊湏有事營爲所作之事非賢能不可故經云幹父之蠱幹則能也甲者創制之令者甲爲十日之首創造之令爲在後諸令之首故以創造之令謂之爲甲故漢時謂令之重者謂之甲令則此義也創制不可責之以舊者以人有犯令而致罪者不可責之舊法有犯則刑故湏先後三日殷勤語之使曉知新令而後乃誅誅謂兼通責讓之罪非專謂誅殺也􅀃音恱創􅀄亮反此俗字也依字作刱十四振民象山下有風育德象山在上象曰山下至育德正義曰必云山下有風者風能揺動散布􅃳澤今山下有風取君子能以恩澤下振於民育養已德振民象山下有風育德象山在上也振舊之慎反濟也師讀音眞振振仁厚也育王肅作毓古育字十五有子考无咎散文父在亦稱考􅀄六幹父之蠱有子考无咎厲終吉處事之首始見任者也以柔巽之質幹父之事能承先􅁤堪其任者也故曰有子也任爲事首能堪其事考乃无咎也故曰有子考无咎也當事之首是以危也能堪其事故終吉也有子考无咎絕句周依馬王肅以考絕句象曰幹父之蠱意承考者釋幹父之蠱義凡堪幹父事不可小大損益一依父命當量事制冝以意承考而已對文父没稱考􅀂散而言之生亦稱考􅀂康誥云大傷厥考心是父在稱考此避幹父之文故變云考也十六幹母不可貞猶不失中道九二幹母至中道也正義曰居内處中是幹母事也不可貞者婦人之性難可全正冝屈已剛不可固守貞正故云不可貞也象曰得中道者釋幹母之蠱義雖不能全正猶不失在中之道故云得中道也十七臨八月凶謂丑至申三隂盛􅤠兊下坤上臨元亨利貞至于八月有凶正義曰案序卦云臨大也以陽之浸長其德壯大可以監臨於下故曰臨也剛旣浸長􅀃而且順又以剛居中有應於外大得亨通而利正也故曰元亨利貞也至于八月有凶者以物盛必衰隂長陽退臨爲建丑之月從建丑至于八月建申之時三隂旣盛三陽方退小人道長君子道消故八月有凶也以盛不可終保聖人作易以戒之也臨如字序卦云大也十八臨元亨利貞謂大亨以正􅂏曰臨剛至而乆也正義曰臨剛浸而長􅀃而順者此釋臨義也據諸卦之例􅀃而順之下應以臨字結之此无臨字者以其剛中而應亦是臨義故不得於剛中之上而加臨也剛中而應大亨以正天之道者天道以剛居中而下與地相應使物大得亨通而利正故乾卦元亨利貞今此臨卦其義亦然故云天之道也八月者何氏云從建子陽生至建未爲八月禇氏云自建寅至建酉爲八月今案此注云小人道長君子道消冝據否卦之時故以臨卦建丑而至否卦建申爲八月也二十宗廟可觀莫盛於盥注引禘灌􅦉坤下巽上觀盥而不薦有孚顒􅀂王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛於盥者至薦簡略不足復觀故觀盥而不觀薦也孔子曰禘自旣灌而徃者吾不欲觀之矣盡夫觀盛則下觀而化矣故觀至盥則有孚顒􅀂也觀官喚反示也乾宫四丗卦盥音管卄一神道謂不以形制使物如天使四時聖人以神道設教而天下服矣統􅀃觀之爲道不以刑制使物而以觀感化物者也神則无形者也不見天之使四時而四時不忒不見聖人使百姓而百姓自服也卄二大觀之時而爲童觀小人之道􅀄六童觀小人无咎君子吝處於觀時而最逺朝美體於隂柔不能自進无所鑒見故曰童觀趣順而已无所能爲小人之道也故曰小人无咎君子處大觀之時而爲童觀不亦鄙乎童觀馬云童猶獨也鄭云稚也逺􅀽萬反朝直遥反卄三觀卦中或音官或去聲讀童觀闚觀皆讀爲去聲也觀國如字或音官喚反盡夫觀盛故觀至大觀在上王肅音官以觀天下徐唯此一字作官音觀盥而不薦觀之爲道而以觀感風行地上觀處於觀時君子處大觀之時大觀廣鑒亦音官居觀之時爲觀之主觀之盛也從盡夫觀以下並官喚反餘不出者並音官卄四觀我生君子謂觀民以察巳九五觀我生君子无咎居於尊位爲觀之主宣弘大化光于四表觀之極者也上之化下猶風之靡草故觀民之俗以察已道百姓有罪在予一人君子風著已乃无咎上爲化主將欲自觀乃觀民也象曰觀我生觀民也正義曰九五居尊爲觀之主四海之内由我而化我教化善則天下有君子之風教化不善則天下著小人之俗故觀民以察我道有君子之風著則无咎也周易要義卷第二下周易要義卷第七上

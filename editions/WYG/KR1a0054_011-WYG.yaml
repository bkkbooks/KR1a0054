body:
  text: 周易要義卷四上宋魏了翁輯咸至明夷一上經天道下經人道恐不可分艮下兑上咸亨利貞取女吉正義曰先儒以易之舊題分自此以上三十卦爲上經以下三十四卦爲下經序卦至此又别起端首先儒皆以上經明天道下經明人事然韓康伯注序卦破此義云夫易六畫成卦三才必備錯綜天人以效變化豈有天道人事偏於上下哉案上經之内明飲食必有訟訟必有衆起是兼於人事不專天道既不專天道則下經不專人事理則然矣二上下經序卦繫辭已分但孔子序卦不以咸繫離繫辭云二篇之䇿則是六十四卦舊分上下乾坤象天地咸恒明夫婦乾坤乃造化之本夫婦實人倫之原因而擬之何爲不可三天地各卦夫婦共卦明人物始于相感天地各卦夫婦共卦者周氏云尊天地之道畧於人事猶如三才天地爲二人止爲一也此必不然竊謂乾坤明天地初闢至屯乃剛柔始交故以純陽象天純隂象地則咸以明人事人物既生共相感應若二氣不交則不成於相感既相感應乃得亨通若以邪道相通則凶害斯及故利在貞正既感通以正即是婚媾之善故云咸亨利貞取女吉也咸如字彖云感也兌宫三世卦取七具反四凡感不能感非類故以取女明之天地萬物之情見於所感也凡感之爲道不能感非類者也故引取女以明同類之義也同類而不相感應以其各亢所處也故女雖應男之物必下之而後取女乃吉也正義曰柔上而剛下二氣感應以相與者此因上下二體釋咸亨之義也艮剛而兌柔若剛自在上柔自在下則不相感无由得通今兌柔在上而艮剛在下是二氣感應以相授與所以爲咸亨也止而說者此因二卦之義釋利貞也艮止而兌説也能自静止則不隨欲動以止行說則不爲邪諂不失其正所以利貞也男下女者此因二卦之象釋取女吉之義艮爲少男而居於下兌爲少女而處於上是男下於女也婚姻之義男先求女親迎之禮御輪三周皆是男先下於女然後女應於男所以取女得吉者也五初拇感末二腓躁動三股隨人初六咸其拇處咸之初爲感之始所感在末故有志而已如其本實未至傷静拇茂后反馬鄭薛云足大指也子夏作􅡑六二咸其腓凶居吉咸道轉進離拇升腓腓體動躁者也感物以躁凶之道也由躁故凶居則吉矣處不乘剛故可以居而𫉬吉腓房非反鄭云膊腸也膊音市臠反王廙云腓腓腸也九三咸其股執其隨往吝股之爲物隨足者也進不能制動退不能静處所感在股志在隨人者也志在隨人所執亦以賤矣用斯以往吝其宜也六九四不能至於无思故憧憧往來九四貞吉悔亡憧憧往來朋從爾思處上卦之初應下卦之始居體之中在股之上二體始相交感以通其志心神始感者也凡物始感而不以之於正則至於害故必貞然後乃吉吉然後乃得亡其悔也始在於感未盡感極不能至於无思以得其黨故有憧憧往來然後朋從其思也憧昌容反馬云行貌王肅云往來不絶貌廣雅云往來也劉云意未定也徐又音童又音鍾七咸其脢其志淺末无悔而巳九五咸其脢无悔脢者心之上口之下進不能大感退亦不爲无志其志淺末故无悔而巳脢武杯反又音每心之上口之下也鄭云背脊肉也說文同王肅又音􅁅廣雅云胂謂之脢胂音以人反正義曰脢者心之上口之下者子夏易傳曰在脊曰脢馬融云脢背也鄭𤣥云脢脊肉也王肅云脢在背而夾脊說文云脢背肉也雖諸說不同大體皆在心上輔嗣以四爲心神上爲輔頰五在上四之間故直云心之上口之下也明其淺于心神厚於言語上六咸其輔頰舌咸道轉末故在口舌言語而巳八憧憧未光大滕口淺末可知象曰咸其輔頰舌滕口說也輔頰舌者所以爲語之具也咸其輔頰舌則滕口說也憧憧往來猶未光大况在滕口薄可知也正義曰咸其輔頰舌者馬融云輔上頷也輔頰舌者言語之具咸道轉末在于口舌言語而巳故云咸其輔頰舌也象曰滕口說也者舊說字作滕徒登反滕競與也所競者口无復心實故云滕口說也鄭𤣥又作媵媵送也咸道極薄徒送口舌言語相感而巳不復有志於其間王注義得两通未知誰同其㫖也滕徒登反逹也九家作乘虞作媵鄭云送也說如字九注恒亨以濟三事褚說長巽下震上恒亨无咎利貞恒而亨以濟三事也恒之爲道亨乃无咎也恒通无咎乃利貞也恒如字久也震宫三世卦注恒而亨以濟三事也正義曰褚氏云三事謂无咎利貞利有攸往莊氏云三事者无咎一也利二也貞三也周氏云三事者一亨也二无咎也三利貞也注不明數故先儒各以意說竊謂注云恒而亨以濟三事者明用此恒亨濟彼三事无疑亨字在三事之中而此注云恒之爲道亨乃无咎恒通无咎乃利正也又注彖曰道得所久則常通无咎而利正也此觧皆以利正相將爲一事分以爲二恐非注㫖驗此注云恒之爲道亨乃无咎此以恒亨濟无咎也又云恒通无咎乃利正也此以恒亨濟利貞也下注利有攸往云各得所恒修其常道終則有始往而无違故利有攸往此以恒亨濟利有攸往也觀文騐注褚氏爲長十恒卦有順序交感无違相應四義彖曰恒久至可見矣正義曰恒久也者釋訓卦名也恒之爲名以長久爲義剛上而柔下者既訓恒爲久因明此卦得其恒名所以釋可久之意此就二體以釋恒也震剛而巽柔震則剛尊在上巽則柔卑在下得其順序所以爲恒也雷風相與者此就二象釋恒也雷之與風隂陽交感二氣相與更互而相成故得恒久也巽而動者此就二卦之義因釋恒名震動而巽順无有違逆所以可恒也剛柔皆應者此就六爻釋恒此卦六爻剛柔皆相應和无孤嫓者故可長久也恒者歴就四義釋恒名訖故更舉卦名以結之也明上四事皆可久之道故名此卦爲恒十一咸取二氣相交恒取尊卑得序注剛尊柔卑得其序也正義曰咸明感應故柔上而剛下取二氣相交也恒明長久故剛上而柔下取尊卑得序也十二長隂長陽明夫婦可久之道注長陽長隂能相成也正義曰震爲長男故曰長陽巽爲長女故曰長隂􅂏曰雷風相與雷之與風共相助成之義故褚氏云雷資風而益逺風假雷而增威是也今言長陽長隂能相成者因震爲長男巽爲長女遂以長陽長隂而名之作文之體也又此卦明夫婦可久之道故以二長相成如雷風之義也十三處恒之初而求深若仁義即不厭深初六浚恒貞凶无攸利處恒之初最處卦底始求深者也求深窮底令物无餘藴漸以至此物猶不堪而况始求深者乎以此爲恒凶正害德无施而利也浚荀潤反象曰浚恒之凶始求深也正義曰浚深也最處卦底故曰深也深恒者以深爲恒是也施之於仁義即不厭深施之於正即求物之情過深十四九三在不中之位以无恒取羞九三不恒至无所容也正義曰不恒其德或承之羞貞吝者九三居下體之上處上體之下雖處三陽之中又在不中之位上不全尊下不全卑執心不定德行无恒故曰不恒其德徳既无恒自相違錯則為羞辱承之所羞非一故曰或承之羞也處久如斯正之所賤故曰貞吝也象曰无所容者謂不恒之人所往之處皆不納之故无所容也十五婦人從一而終五係應在二爲從婦凶六五恒其德貞婦人吉夫子凶居得尊位爲恒之主不能制義而係應在二用心專貞從唱而已婦人之吉夫子之凶也象曰婦人貞吉從一而終也夫子制義從婦凶也正義曰恒其徳貞者六五係應在二不能傍及他人是恒常貞一其德故曰恒其德貞也五與二相應五居尊位在震爲夫二處下體在巽爲婦五係於二故曰從婦凶也十六處卦上居動極爲振恒凶上六振恒凶夫静爲躁君安爲動主故安者上之所處也静者可久之道也處卦之上居動之極以此爲恒无施而得也振之刄反馬云動也鄭云揺落也十七遯以隂初長正道未全㓕故小利貞艮下乾上遯亨小利貞正義曰遯亨者遯者隐退逃避之名隂長之卦小人方用君子日消君子當此之時若不隐遯避世即受其害須遯而後得通故曰遯亨小利貞者隂道初始浸長正道亦未全㓕故曰小利貞遯徒巽反字又作􅋟又作遁同隠退也匿迹避時奉身退隐之謂也鄭云迯去之名序卦云遯者退也乾宫二世卦十八天下有山隂長之象故君子逺小人象曰天下有山遯天下有山隂長之象君子以逺小人不惡而嚴正義曰天下有山遯者山者隂類進在天下即是山勢欲上逼於天天性髙逺不受於逼是遯避之象故曰天下有山遯君子以逺小人不惡而嚴者君子當此遯避之時小人進長理須逺避積陽為天積隂為地山者地之髙峻今上逼於天是隂長之象十九遯尾厲不如不往之无災初六遯尾厲勿用有攸往遯之爲義避内而之外者也尾之爲物最在體後者也處遯之時不往何災而爲遯尾禍所及也危至而後求行難可免乎厲則勿用有攸往也象曰遯尾之厲不往何災也正義曰不往何災者象釋當遯之時宜須出避而勿用有攸往者既爲遯尾出必見執不如不往即无災害何災者猶言无災也與何傷何咎義同也二十遯以陽附隂爲係遯畜臣妾可也九三係遯有疾厲畜臣妾吉在内近二以陽附隂宜遯而繫故曰係遯遯之爲義宜逺小人以陽附隂繫於所在不能逺害亦巳憊矣宜其屈辱而危厲也繫於所在畜臣妾可也施於大事凶之道也係古詣反本或作擊二十一好遯君子舍之吉小人繫戀而否九四好遯君子吉小人否處於外而有應於内君子好遯故能舍之小人繫戀是以否也好呼報反注下同否音鄙注下同惡也徐方有反鄭王肅備鄙反云塞也舍音捨象曰君子好遯小人否也音臧否之否二十二四五以有應爲累上獨稱肥遯上九肥遯无不利最處外極无應於内超然絶志心无疑顧憂患不能累矰繳不能及是以肥遯无不利也肥如字子夏云肥饒裕累劣僞反矰則能反繳章畧反象曰肥遯无不利无所疑也正義曰子夏傳曰肥饒裕也四五雖在于外皆在内有應猶有反顧之心二十三陽長既多大者𫉬正故大壯利貞乾下震上大壯利貞正義曰大壯卦名也壯者强盛之名以陽稱大陽長既多是大者盛壯故曰大壯利貞者卦徳也羣陽盛長小道將㓕大者𫉬正故曰利貞也壯莊亮反威盛强猛之名鄭云氣力浸强之名王肅云壯盛也廣雅云健也馬云傷也郭璞云今淮南人呼壯爲傷坤宫四世卦􅂏曰大壯至見矣正義曰大者壯也者就爻釋卦名陽爻浸長已至於四是大者盛壯故曰大者壯也剛以動故壯者就二體釋卦名乾剛而震動柔弱而動即有退溺剛强以動所以成壯大壯利貞大者正也者就爻釋卦徳大者獲正故得利貞正大而天地之情可見矣者因大獲正遂廣美正大之義二十四壯而違禮則凶故非禮弗履象曰雷在天上大壯剛以動也君子以非禮弗履壯而違禮則凶凶則失壯也故居子以大壯而順禮也二十五壯趾征凶言居下而用壯初九壯于趾征凶有孚夫得大壯者必能自終成也未有陵犯于物而得終其壯者在下而壯故曰壯于趾也居下而用剛壯以斯而進窮凶可必也故曰征凶有孚象曰壯于趾其孚窮也言其信窮二十六小人用以爲壯即君子以爲罔九三小人用壯君子用罔貞厲羝羊觸藩羸其角處健之極以陽處陽用其壯者也故小人用之以爲壯君子用之以爲羅巳者也貞厲以壯雖復羝羊以之觸藩能無羸乎罔羅也馬王肅云无羝音低張云羖羊也廣雅云吳羊曰羝觸徐處六反藩方𡊮反徐甫言反下同馬云籬落也羸律悲反又力追反下同馬云大索地徐力皮反王肅作縲音螺鄭虞作纍正義曰以壯爲正其正必危故曰貞厲也以此爲正狀似羝羊觸藩也必拘羸其角矣象曰小人用壯君子罔也者言小人用以爲壯者即是君子所以爲羅罔也二十七喪羊于易言六五委九二則无悔六五喪羊于易无悔居於大壯以陽處陽猶不免咎而况以隂處陽以柔乗剛者乎羊壯也必喪其羊失其所居也能䘮壯于易不于險難故得无悔二履貞吉能幹其任而已委焉則得无悔委之則難不至居之則敵冦來故曰喪羊于易正義曰羊剛狠之物故以譬壯云必喪其羊失其所居者言違謙越禮理𫝑必然云能喪壯於易不於險難者二雖應已剛長則侵隂爲已冦難必喪其壯當在於平易㓂難未來之時勿於險難敵冦既來之日良由居之有必喪其羊之理故戒其預防而莊氏云經止一言喪羊而注爲兩處分用初云必喪其羊失其所居是自然應失後云能喪壯於易不於險難故得无咎自能喪其羊二理自爲矛盾竊謂莊氏此言全不識注意二十八康侯言美昇進之臣坤下離上晉康侯用錫馬蕃庶晝日三接正義曰晉者卦名也晉之爲義進長之名此卦明臣之昇進故謂之晉康者美之名也侯謂昇進之臣也臣既柔進天子美之賜以車馬蕃多而衆庶故曰康侯用錫馬蕃庶也晝日三接者言非惟䝉賜蕃多又被親寵頻數一晝之間三度接見也晉􅂏云進也孟作齊齊子西反義同乾宫遊魂卦二十九訟受服則朝三褫柔受寵則晝三接是以康侯用錫馬蕃庶晝日三接也康美之名也順以著明臣之道也柔進而上行物所與也故得錫馬而蕃庶以訟受服則終朝三褫柔進受寵則一晝三接也三十處進之初未受命宜寛裕進德象曰晉如摧如獨行正也裕无咎未受命也未得履位未受命也正義曰獨行正者獨猶專也言進與退専行其正也裕无咎未受命者處進之初未得履位未受錫命故宜寛裕進德乃得无咎三十一鼫鼠進无所守即碩鼠即伎窮者九四晉如鼫鼠貞厲履非其位上承於五下據三隂履非其位又負且乗无業可安志无所據以斯爲進正之危也進如鼫鼠無所守也鼫音石子夏傳作碩鼠正義曰蔡邕勸學篇云鼫鼠五能不成一伎注曰能飛不能過屋能縁不能窮木能游不能渡谷能穴不能掩身能走不能先人本草經云螻蛄一名鼫鼠謂此也鄭引詩云碩鼠碩鼠无食我黍謂大鼠也陸機以爲雀鼠案注以爲无所守蓋五伎者當之三十二晉其角則過亢故云厲吉貞吝上九晉其角至未光也正義曰晉其角者西南隅也上九處進之極過明之中其猶日過於中巳在于角而猶進之故曰進其角也維用伐邑者在角猶進過亢不已不能端拱无爲使物自服必須攻伐其邑然後服之故云維用伐邑也厲吉无咎貞吝者兵者凶器伐而服之是危乃得吉吉乃无咎故曰厲吉无咎以此爲正亦以賤矣故曰貞吝也象曰道未光也者用伐乃服雖得之其道未光大也三十三當明夷之時利在艱難貞正離下坤上明夷利艱貞正義曰明夷卦名夷者傷也此卦日入地中明夷之象施之於人事闇主在上明臣在下不敢顯其明智亦明夷之義也時雖至闇不可隨世傾邪故宜艱難堅固守其貞正之德故明夷之世利在艱貞夷傷也坎宫遊魂卦三十四文王䝉難箕子正志皆晦其明􅂏曰明入至以之正義曰明入地中明夷者此就二象以釋卦名故此及晉卦皆􅂏象同辭也内文明而外柔順以䝉大難文王以之者既釋明夷之義又須出能用明夷之人内懷文明之德撫教六州外執柔順之能三分事紂以此蒙犯大難身得保全惟文王能用之故云文王以之利艱貞晦其明也者此又就二體釋卦之德明在地中是晦其明也既處明夷之世外晦其明恐陷於邪道故利在艱固其貞不失其正言所以利艱貞者用晦其明也内難而能正其志箕子以之者既釋艱貞之義又須出能用艱貞之人内有險難殷祚將傾而能自正其志不爲邪諂惟箕子能用之故云箕子以之三十五逃難宜速故義不求食初九明夷于飛垂其翼君子于行三日不食有攸往主人有言明夷之主在於上六上六爲至闇者也初處卦之始最逺於難也逺難過甚明夷逺遯絶迹匿形不由軌路故曰明夷于飛懷懼而行行不敢顯故曰垂其翼也尚義而行故曰君子于行也志急于行饑不遑食故曰三日不食也殊類過甚以斯適人人必疑之故曰有攸往主人有言正義象曰義不食也者君子逃難惟速故義不求食也三十六夷于左股其傷小不爲闇主所疑六二明夷夷至則也正義曰明夷夷于左股者左股被傷行不能壯六二以柔居中用夷其明不行剛壯之事者也故曰明夷夷于左股莊氏云言左者取其傷小則比夷右未爲切也夷於左股明避難不壯不爲闇主所疑猶得處位不至懷懼而行然後徐徐用馬以自拯濟而獲其壯吉也故曰用拯馬壯吉也象曰順以則也者言順闇主之則不同初九殊類過甚故不爲闇主所疑故得拯馬之吉也三十七南狩得大首不可疾貞謂除闇而漸化九三明夷至大得也正義曰南方文明之所狩者征伐之類大首謂闇君明夷于南狩得其大首初藏明而往託狩而行至南方而發其明也九三應於上六是明夷之臣發明以征闇君而得其大首故曰明夷于南狩得其大首也不可疾貞者既誅其主將正其民民迷日久不可卒正宜化之以漸故曰不可疾貞象曰南狩之志乃大得者志欲除闇乃得大首三十八入左腹獲心意故雖近不危六四入於左腹獲明夷之心於出門庭左者取其順也入於左腹得其心意故雖近不危隨時辟難門庭而已能不逆忤也三十九劉向云今易箕子作荄滋正義曰箕子之明夷蜀才箕作其劉向云今易箕子作荄滋鄒湛云訓箕爲荄詁子爲滋漫衍无經不可致詰以譏荀爽四十箕子事闇主而貞故曰明不可息六五箕子至可息也正義曰箕子之明夷者六五最比闇君似箕子之近殷紂故曰箕子之明夷也利貞者箕子執志不回闇不能没明不可息正不憂危故曰利貞象曰明不可息也息㓕也象稱明不可㓕者箕子能保其貞卒以全身爲武王師也周易要義卷四上

body:
  text: 周易要義卷四下宋魏了翁輯家人至益一家人利女貞其正在家內而已離下巽上家人利女貞家人之義各自修一家之道不能知家外他人之事也統而論之非元亨利君子之貞故利女貞其正在家內而已家人説文家居也案人所居稱家爾雅室內謂之家是也巽宫二世卦二家人以內為本故先言女正彖曰家人女正位乎內謂二也男正位乎外謂五也家人之義以內為本故先説女也男女正天地之大義也正義曰女正位乎內男正位乎外者此因二五得正以釋家人之義並明女貞之旨家人之道必須女主于內男主于外然後家道乃立今此卦六二柔而得位是女正位乎內也九五剛而得位是男正位乎外也家人以內為本故先説女也男女正天地之大義也者因正位之言廣明家人之義乃道均二儀非惟人事而已家人即女正於內男正於外二儀則天尊在上地卑在下三有物有恆言家道修于近小而不妄象曰風自火出家人由內以相成熾也熾尺志反君子以言有物而行有恆家人之道修于近小而不妄也故君子以言必有物而口無擇言行必有恆而身無擇行四火因風熾火盛生風內外相成正義曰風自火出家人者巽在離外是風從火出火出之初因風方熾火既炎盛還復生風內外相成有似家人之義故曰風自火出家人也君子以言有物而行有恆者物事也言必有事五凡教在初法在始故初九間有家初九間有家悔亡凡教在初而法在始家瀆而後嚴之志變而後治之則悔矣處家人之初為家人之始故宜必以間有家然後悔亡也正義象曰志未變也者釋在初防間之義六六二以隂應陽故無攸遂在中饋六二無攸遂在中饋貞吉居內處中履得其位以隂應陽盡婦人之正義無所必遂職乎中饋巽順而已是以貞吉也七嗃嗃嘻嘻言慢寧恭瀆寧嚴九三家人嗃嗃悔厲吉婦子嘻嘻終吝以陽處陽剛嚴者也處下體之極為一家之長者也行與其慢寧過乎恭家與其瀆寧過乎嚴是以家人雖嗃嗃悔厲猶得其道婦子嘻嘻乃失其節也嗃呼落反又呼學反馬云悅樂自得貌鄭云苦熱之意荀作確確劉作熇熇嘻喜悲反馬云笑聲鄭云驕佚喜笑之意張作嬉嬉陸作喜喜八居尊位而明家道故勿恤而吉九五王假有家勿恤吉假至也履正而應處尊體巽王至斯道以有其家者也居於尊位而明于家道則下莫不化矣父父子子兄兄弟弟夫夫婦婦六親和睦交相愛樂而家道正正家而天下定矣故王假有家則勿恤而吉假更白反九家人之道尚威以反身終之上九有孚威如終吉處家人之終居家道之成刑于寡妻以著于外者也故曰有孚凡物以猛為本者則患在寡恩以愛為本者則患在寡威故家人之道尚威嚴也家道可終唯信與威身得威敬人亦如之反之於身則知施於人也十睽小事吉謂不待衆力者兑下離上睽小事吉正義曰睽者乖異之名物情乖異不可大事大事謂興役動衆必須大同之世方可為之小事謂飲食衣服不待衆力雖乖而可故曰小事吉也睽苦圭反馬鄭王肅徐吕沈並音圭序卦云乖也雜卦云外也説文云目不相聼也艮宫四世卦十一火上澤下二女不同志皆為睽彖曰睽火至大矣哉正義曰睽火動而上澤動而下二女同居其志不同行者此就二體釋卦名為睽之義同而異者也水火二物共成烹飪理應相濟今火在上而炎上澤居下而潤下無相成之道所以為乖中少二女共居一家理應同志各自出適志不同行所以為異也説而麗乎明柔進而上行得中而應乎剛是以小事吉者此就二體及六五有應釋所以小事得吉説而麗乎明不為邪僻柔進而上行所之在貴得中而應乎剛非為全弱雖在乖違之時卦爻有此三德故可以行小事而獲吉也十二天地男女萬物體乖而用合天地睽而其事同此以下歷就天地男女萬物廣明睽義體乖而用合也天高地卑其體懸隔是天地睽也而生成品物其事則同也男女睽而其志通者男外女內分位有别是男女睽也而成家理事其志則通也萬物殊形各自為象是萬物睽也而均于生長其事即類十三處窮下而上無應故見惡人以避咎見惡人無咎者處于窮下上無其應無應則無以為援窮下則無權可恃若標顯自異不能和光同塵以為惡人所害故曰見惡人無咎謂遜接之也象曰以辟咎也者惡人不應與之相見而遜接之者以辟咎也辟音避十四二五俱失位不期而遇故云于巷九二遇主于巷無咎處睽失位將無所安然五亦失位俱求其黨出門同趣不期而遇故曰遇主于巷也處睽得援雖失其位未失道也巷户絳反説文云里中道也廣雅云居也字書作弄十五三不能比二四為輿曳牛掣天且劓六三見輿曳其牛掣其人天且劓無初有終凡物近而不相得則凶處睽之時履非其位以隂居陽以柔乘剛志在于上而不和于四二應于五則近而不相比故見輿曵輿曳者履非其位失所載也其牛掣者滯隔所在不獲進也其人天且劓者四從上取二從下取而應在上九執志不回初雖受困終獲剛助曳以制反掣昌逝反鄭作觢云牛角皆踊曰觢徐市制反説文作觢之世反云角一俯一仰子夏傳作契云一角仰也荀作觭劉本從説文解依鄭其人天天剠也馬云剠鑿其額曰天劓魚器反截鼻也王肅作臲臲魚一反十六初與四俱陽初為元夫蓋丈夫之夫九四睽孤遇至志行也正義曰元夫謂初九也處于卦始故云元也初四俱陽而言夫者蓋是丈夫之夫非夫婦之夫十七自見豕至遇雨言睽而合殊而通上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉處睽之極睽道未通故曰睽孤巳居炎極三處澤盛睽之極也以文明之極而觀至穢之物睽之甚也豕而負塗穢莫過焉至睽將合至殊將通恢詭譎怪道將為一未至于合先見殊怪故見豕負塗甚可穢也見鬼盈車吁可怪也先張之弧將攻害也後説之弧睽怪通也四剠其應故為冦也睽志將通匪冦婚媾往不失時睽疑亡也貴于遇雨和隂陽也隂陽既和羣疑亡也十八蹇難不利東北利之平地艮下坎上蹇利西南不利東北西南地也東北山也以難之平則難解以難之山則道窮蹇紀免反彖及序卦皆云難也王肅徐紀偃反兑宫四世卦十九救難利平易利見大人當位貞吉就二體有險有止以釋蹇名坎在其外是險在前也有險在前所以為難若冒險而行或罹其害艮居其內止而不往相時而動非知不能故曰見險而能止知矣哉也蹇利西南往得中也者之于平易救難之理故云往得中也不利東北其道窮者之于險阻更益其難其道彌窮故曰其道窮也利見大人往有功也者往見大人必能除難故曰往有功也當位貞吉以正邦也者二三四五爻皆當位所以得正而吉故曰當位貞吉也以正邦也者居難守正正邦之道故曰以正邦也二十水失其性故曰蹇終反下故曰反身象曰山上有水蹇山上有水蹇難之象君子以反身修德除難莫若反身修德正義曰山上有水蹇者山者是巖險水是阻難水積山上彌益危難故曰山上有水蹇君子以反身修德者蹇難之時未可以進惟宜反求諸身自修其德道成德立方能濟險故曰君子以反身修德也陸績曰水在山上失流通之性故曰蹇通水流下今在山上不得下流蹇之象陸績又云水本應山下今左山上終應反下故曰反身處難之世不可以行只可反自省察二十一五在難中而二應之為匪躬無尤六二王臣蹇蹇匪躬之故處難之時履當其位居不失中以應于五不以五在難中私身逺害執心不回志匡王室者也故曰王臣蹇蹇匪躬之故履中行義以存其上處蹇以此未見其尤也二十二往蹇來連而當位實非妄所招六四往蹇來連往則無應來則乘剛往來皆難故曰往蹇來連得位履正當其本實雖遇于難非妄所招也連力善反馬云難也鄭如字遲久之意正義曰馬云連亦難也鄭云遲久之意六四往則無應來則乘剛往來皆難故曰往蹇來連也象曰當位實者明六四得位履正當其本實而往來遇難者乃數之所招非邪妄之所致也二十三九五大蹇而同志集以不易其節九五大蹇朋來處難之時獨在險中難之大者也故曰大蹇然居不失正履不失中執德之長不改其節如此則同志者集而至矣故曰朋來也正義象曰以中節者得位居中不易其節故致朋來二十四解利西南言利施于衆坎下震上解利西南西南衆也解難濟險利施於衆也亦不困于東北故不言不利東北也解音蟹序卦云緩也震宫二世卦二十五無所往來復宜靜有往夙吉宜速無所往其來復吉有攸往夙吉未有善于解難而迷于處安也解之為義解難而濟厄者也無難可往以解來復則不失中有難而往則以速為吉也無難則能復其中有難則能濟其厄也褚氏云世有無事求功故誡以無難宜靜亦有待敗乃救故誡以有難須速也二十六六三乘二負四以致冦正之所賤六三負且乘致冦至貞吝處非其位履非其正以附于四用夫柔邪以自媚者也乘二負四以容其身冦之來也自已所致雖幸而免正之所賤也乘如字王肅繩證反正義曰負且乘致冦至者六三失正無應下乘于二上附于四即是用夫邪佞以自説媚者也乘者君子之器也負者小人之事也施之于人即在車騎之上而負于物也故冦盜知其非己所有于是競欲奪之故曰負且乘致冦至也貞吝者負乘之人正其所鄙故曰貞吝也象曰亦可醜也者天下之醜多矣此是其一故曰亦可醜也自我致戎又誰咎也者言此冦難由己之招二十七君子解難而人服故曰有孚于小人六五君子維有解吉有孚于小人居尊履中而應乎剛可以有解而獲吉矣以君子之道解難釋險小人雖暗猶知服之而無怨矣故曰有孚于小人也二十八隼居高墉人所射三居高位人所誅上六公用射隼于髙墉之上獲之無不利初為四應二為五應三不應上失位負乘處下體之上故曰高墉墉非隼之所處高非三之所履上六居動之上為解之極將解荒悖而除穢亂者故用射之極而後動成而後舉故必獲之而無不利也象曰公用射隼以解悖也正義曰隼者貪殘之鳥鸇鷂之屬墉墻也六三失位負乘不應于上即是罪釁之人故以譬於隼此借飛鳥為喻而居下體之上其猶隼處高墉隼之為鳥宜在山林集于人家高墉必為人所繳射以譬六三處于高位必當被人所誅討云公者臣之極上六以隂居上故謂之公也象曰解悖也者悖逆也六三失位負乘不應于上是悖逆之人也上六居動之上能除解六三之荒悖故云以解悖也解佳買反二十九行損以信無咎可貞言過可正兑下艮上損有孚元吉無咎可貞利有攸往曷之用二簋可用享正義曰損者減損之名此卦明損下益上故謂之損損之為義損下益上非補不足者也損剛益柔非長君子之道者也若不以誠信則涉諂諛而有過咎故必有孚然後大吉無咎可正而利有攸往矣故曰損有孚元吉無咎可貞利有攸往也先儒皆以無咎可貞各自為義言既吉而無咎則可以為正凖下王注彖辭云損下而不為邪益上而不為諂則何咎而可正然則王意以無咎可貞共成一義故莊氏云若行損有咎則須補過以正其失今行損用信則是無過可正故云無咎可貞竊謂莊氏之言得正旨矣三十二簋可用享貴信不貴豐曷之用二簋可用享者明行損之禮貴夫誠信不在于豐既行損以信何用豐為二簋至約可用享祭矣故曰曷之用二簋可用享也損孫本反虧減之義又訓失序卦云緩必有所失是也艮宫三世卦三十一忿欲有往來懲窒互文象曰山下有澤損山下有澤損之象也君子以懲忿窒欲可損之善莫善忿欲也正義曰山下有澤損君子以懲忿窒欲者澤在山下澤卑山高似澤之自損以崇山之象也君子以法此損道以懲止忿怒窒塞情欲夫人之情也感物而動境有順逆故情有忿欲懲者息其既往窒者閉其將來忿欲皆有往來懲窒互文而相足也懲直升反止也鄭云猶清也劉作懲云清也蜀才作澄忿芳粉反窒珍栗反徐得悉反鄭劉作懫懫止也孟作恎陸作􅻷欲如字三十二三隂偕行乃損六三獨行則得友六三三人行則損一人一人行則得其友損之為道損下益上其道上行三人謂自六三巳上三隂也三隂並行以承于上則上失其友內無其主名之曰益其實乃損故天地相應乃得化醇男女匹配乃得化生隂陽不對生可得乎故六三獨行乃得其友三隂俱行則必疑矣象曰一人行三則疑也正義曰三人行則損一人一人行則得其友者六三處損之時居于下體損之為義其道上行三人謂自六三巳上三隂上一人謂上九也下一人謂六三也夫隂陽相應萬物化醇男女匹配故能生育六三應于上九上有二隂六四六五也損道上行有相從之義若與二隂并已俱行雖欲益上九一人更使上九懷疑疑則失其適匹之義也名之曰益即不是減損其實損之也故曰三人行則損一人若六三一人獨行則上九納巳無疑則得其友矣故曰一人行則得其友也象曰三則疑者言一人則可三人益加疑惑也三十三六五以損致益盡天人之助六五或益之十朋之龜弗克違元吉以柔居尊而為損道江海處下百谷歸之履尊以損則或益之矣朋黨也龜者決疑之物也隂非先唱柔非自任尊以自居損以守之故人用其力事竭其功知者慮能明者慮䇿弗能違也則衆才之用盡矣獲益而得十朋之龜足以盡天人之助也正義曰馬鄭皆案爾雅云十朋之龜者一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜三十四損終反益故得臣天下為一而無家上九弗損益之無咎貞吉利有攸往得臣無家處損之終上無所奉損終反益剛德不損乃反益之而不憂于咎用正而吉不制于柔剛德遂長故曰弗損益之無咎貞吉利有攸往也居上乘柔處損之極尚夫剛德為物所歸故曰得臣得臣則天下為一故無家也三十五損益皆就下得名志在惠下震下巽上益利有攸往利涉大川正義曰益者增足之名損上益下故謂之益下巳有矣而上更益之明聖人利物之無已也損卦則損下益上益卦則損上益下得名皆就下而不據上者向秀云明王之道志在惠下故取下謂之損與下謂之益既上行惠下之道利益萬物動而無違何往不利故曰利有攸往以益涉難理絶險阻故曰利涉大川益增長之名又以𢎞裕為義繫辭云益長裕而不設也巽宫三世卦三十六損上益下則民説涉川無害彖曰益損至偕行正義曰益損上益下民説無疆者此就二體釋卦名之義柔巽在上剛動在下上巽不違于下損上益下之義也既居上者能自損以益下則下民歡説無復疆限益卦所以名益者正以損上益下民説無疆者也自上下下其道大光利有攸往中正有慶者此就九五之爻釋利有攸往中正有慶也涉川無害方見益之為利故云利涉大川木道乃行也三十七凡施益不可恆用當應時行之益動而巽日進無疆者自此以下廣明益義前則就二體明損上益下以釋卦名以下有動求上能巽接是損上益下之義今就二體更明得益之方也天施氣于地地受氣而化生亦是損上益下義也其施化之益無有方所故曰天施地生其益無方凡益之道與時偕行者雖施無方不可恆用當應時行之故舉凡益以結之三十八風之為益在雷後故曰風雷益象曰風雷益君子以見善則遷有過則改遷善改過益莫大焉正義曰風雷益君子以見善則遷有過則改者子夏傳云雷以動之風以散之萬物皆益孟喜亦與此同其意言必須雷動於前風散于後然後萬物皆益如二月啓蟄之後風以長物八月收聲之後風以殘物風之為益其在雷後故曰風雷益也六子之中並有益物獨取風雷者何晏云取其最長可久之義也三十九時可大作而居下非厚事之地初九利用為大作元吉無咎處益之初居動之始體夫剛德以蒞其事而之乎巽以斯大作必獲大功夫居下非厚事之地在卑非任重之處大作非小功所濟故元吉乃得無咎也象曰元吉無咎下不厚事也時可以大作而下不可以厚事得其時而無其處故元吉乃得無咎也四十朋龜同于損五位不當尊用享帝吉六二或益之十朋之龜弗克違永貞吉王用享于帝吉以柔居中而得位處內履中居益以沖益自外來不召自至不先不為則朋龜獻䇿同于損卦六五之位位不當尊故吉在永貞也帝者生物之主興益之宗出震而齊巽者也六二居益之中體柔當位而應于巽享帝之美在此時也用享香兩反注同王廙許庚反象曰或益之自外來也四十一帝者生物之主出震而齊巽正義曰同于損卦六五之位故曰或益之十朋之龜弗克違也然位不當尊故永貞乃吉故曰永貞吉帝天也王用此時以享祭于帝明靈降福故曰王用享于帝吉也象曰自外來者明益之者從外自來不召而至也四十二六四體柔當位應下用中利依遷國六四中行至益志也正義曰中行告公從利用為依遷國者六四居益之時處巽之始體柔當位在上應下卑不窮下高不處亢位雖不中用中行者也故曰中行也以此中行之德有事以告于公公必從之故曰告公從也用此道以依人而遷國者人無不納故曰利用為依遷國也遷國國之大事明以中行雖有大事而無不利如周之東遷晉鄭焉依之義也象曰以益志者既為公所從其志得益也四十三信以惠心物亦應之故有孚惠我德九五有孚惠心勿問元吉有孚惠我德得位履尊為益之主者也為益之大莫大於信為惠之大莫大於心因民所利而利之焉惠而不費惠心者也信以惠心盡物之願故不待問而元吉有孚惠我德也以誠惠物物亦應之故曰有孚惠我德也四十四無厭之求人弗與故曰或擊之立心勿恆凶上九莫益之或擊之立心勿恆凶處益之極過盈者也求益無已心無恆者也無厭之求人弗與也獨唱莫和是偏辭也人道惡盈怨者非一故曰或擊之也正義象曰偏辭者此有求而彼不應是偏辭也自外來者怨者非一不待召也周易要義卷四下

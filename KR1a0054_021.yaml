body:
  text: 周易要義卷十宋魏了翁輯序卦雜卦略例一六十四卦相次非覆即變正義曰序卦者文王既繇六十四卦分為上下二篇其先後之次其理不見故孔子就上下二經各序其相次之義故謂之序卦焉韓康伯云序卦之所明非易之緼也蓋因卦之次託象以明義不取深緼之義故云非易之緼故以取其人理也今驗六十四卦二二相耦非覆即變覆者表裏視之遂成兩卦屯蒙需訟師比之類是也變者反覆唯成一卦則變以對之乾坤坎離頤大過中孚小過之類是也且聖人本定先後若元用孔子序卦之意則不應非覆即變然則康伯所云因卦之次託象以明義蓋不虛矣二屯剛柔始交故為物之始屯者物之始生也注屯剛柔始交故為物之始生正義曰王肅云屯剛柔始交而難生故為物始生也盧氏云物始生故屯難皆以物之始生釋屯難之義案上言屯者盈也釋屯次乾坤其言已畢更言屯者物之始生者開下説物生必蒙直取始生之意非重釋屯之名也故韓康伯直引剛柔始交以釋物之始生也三否則思通人人同志故可出門同人物不可以終否故受之以同人注否則思通人人同志故可出門同人不謀而合否偹鄙反四順動者衆所隨王肅以為歡豫豫必有隨注順以動者衆之所隨正義曰鄭玄云喜樂而出人則隨從孟子曰吾君不遊吾何以休吾君不豫吾何以助此之謂也王肅云歡豫人必有隨隨者皆以為人君喜樂歡豫則以為人所隨案豫卦彖云豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服即此上云有大而能謙必豫故受之以豫其意以聖人順動能謙為物所説所以為豫人既説豫自然隨之則謙順在君説豫在人也若以人君喜樂遊豫則隨之紂作靡靡之樂長夜之飲何為天下離叛乎故康伯云順以動者衆之所隨在於人君取致豫之義然後為物所隨所以非斥先儒也五可大之業由事而生故以臨次蠱蠱者事也有事而後可大故受之以臨臨者大也注可大之業由事而生六致飾則實喪故賁受之剝嗑者合也物不可以苟合而已故受之以賁賁者飾也注物相合則須飾以修外也致飾然後亨則盡矣故受之以剝極飾則實喪也亨許庚反鄭許兩反徐音向同七頥受之大過言養過則厚王肅云過失頥者養也不養則不可動故受之以大過注不養則不可動養過則厚正義曰鄭玄云以養賢者宜過於厚王輔嗣注此卦云音相過之過韓氏云養過則厚與鄭玄輔嗣義同唯王肅云過莫過於不養則以為過失之過案此序卦以大過次頥也明所過在養子雍以為過在不養違經反義莫此之尤而周氏等不悟其非兼以過失釋大過之名已具論之於經也八陷必有所麗物窮則反所麗陷必有所麗故受之以離離者麗也注物窮則變極陷則反所麗也九易備三才謂上下經分天道人事者非有天地云云然後禮義有所錯注言咸卦之義也凡序卦所明非易之緼也蓋因卦之次託以明義咸柔上而剛下感應以相與夫婦之象莫美乎斯人倫之道莫大乎夫婦故夫子殷勤深述其義以崇人倫之始而不係之於離也先儒以乾至離為上經天道也咸至未濟為下經人事也夫易六畫成卦三才必備錯綜天人以效變化豈有天道人事偏於上下哉斯蓋守文而不求義失之逺矣錯七各反注同徐七路反十夫婦以恆為貴與世升降故受遁物不可以久居其所故受之以遁遁者退也注夫婦之道以恆為貴而物之所居不可以恆宜與世升降有時而遁也十一家人之義過則乖故受之睽家道窮必乖故受之以睽注室家至親過在失節故家人之義唯嚴與敬樂勝則流禮勝則離家人尚嚴其敝必乖也十二雜卦者孔子所錯綜歸藏卦次亦多異正義曰上序卦依文王上下而次序之此雜卦孔子更以意錯雜而對辨其次第不與序卦同故韓康伯云雜卦者雜揉衆卦錯綜其義或以同相類或以異相明也虞氏云雜卦者雜六十四卦以為義其於序卦之外别言也昔者聖人之興因時而作隨其事宜不必皆相因襲當有損益之意也故歸藏名卦之次亦多異十三屯時君子雖見而磐桓利貞不失居屯見而不失其居注屯利建侯君子以經綸之時雖見而磐桓利貞不失其居也見賢遍反十四謙豫噬嗑賁兊巽隨蠱之義謙輕而豫怠也注謙者不自重大噬嗑食也賁無色也注飾貴合衆無定色也兊見而巽伏也注兊貴顯説巽貴卑退隨無故也蠱則飭也注隨時之宜不繫於故也隨則有事受之以蠱飭整治也蠱所以整治其事也十五井道通困安於所遇咸之感速井通而困相遇也注井物所通用而不吝也困安於所遇而不濫也咸速也注物之相應莫速乎咸十六履不處其位需畏險而止履不處也注王弼云履卦陽爻皆以不處其位為吉也需不進也注畏險而止也十七略例有承乘應變行藏險易如王輔嗣略例大則總一部之指歸小則明六爻之得失承乘逆順之理應變情偽之端用有行藏辭有險易觀之者可以經緯天地深測鬼神匡濟邦家推辟咎悔雖人非上聖亦近代一賢臣謹依其文輒為注解十八六爻隂陽皆以少為主一卦五陽而一隂則一隂為之主矣注同人履小畜大有之例是也五隂而一陽則一陽為之主矣注師比謙豫復剝之例是也夫隂之所求者陽也陽之所求者隂也注王弼曰夫隂陽相求之物以所求者貴也陽苟一焉五隂何得不同而歸之隂苟隻焉五陽何得不同而從之故隂爻雖賤而為一卦之主者處其至少之地也注王氏曰陽貴而隂賤以至少處至多之地爻雖賤衆亦從之小畜彖云柔得位而上下應之是也或有遺爻而舉二體者卦體不由乎爻也注遺棄也棄此一爻而舉二體以明其義卦體之義不在一爻豐歸妹之類是也十九物有性行異情體反質願違故合散屈伸與體相乖注物之為體或性同行乖情貌相違同歸殊塗一致百慮故萃卦六二引吉無咎萃之為體貴相從就六三志在靜退不欲相就人之多辟已獨處正其體雖合志則不同故曰合散乾之初九潛龍勿用身雖潛屈情無憂悶其志則伸故曰屈伸形躁好靜質柔愛剛體與情反質與願違注至如風虎雲龍嘯吹相感物之體性形願相從此則情體乖違質願相反故歸妹九四歸妹愆期遲歸有時四體是震是形躁也愆期待時是好也履卦六三武人為于大君志剛也兊體是隂是質柔也志懷剛武人于大君是愛剛也二十陵三軍暴威武而有懼有困陵三軍者或懼於朝廷之儀暴威武者或困於酒色之娛注陵三軍暴威武視死如歸若獻酬揖讓流汗成霡此皆體質剛猛懼在微小故大畜初九有厲利已九三輿説輻雖復剛健怯於柔弱也二十一近不必比逺不必乖雜明同異之理近不必比逺不必乖注近爻不必親比逺爻不必乖離屯六二初九爻雖相近守貞不從九五雖逺十年乃字此例是也同聲相應髙下不必均也同氣相求體質不必齊也注初四二五三上同聲相應不必均髙卑也同氣相求不必齊形質也召雲者龍命吕者律注雲水氣也龍水畜也召水氣者水畜此明有識感無識命隂吕者陽律此明無識感有識故二女相違而剛柔合體注二女俱是隂類而相違剛柔雖異而合體此明異類相應隆墀永歎逺壑必盈注隆髙也墀水中墀也永長也處髙墀而長歎逺壑之中盈響而應九五尊髙喻於隆墀六二卑下同於逺壑唱和相應也故投戈散地則六親不能相保注投置也散逃也置兵戈於逃散之地雖是至親不能相保守也遁卦九四好遁君子吉處身於外難在內處外則超然逺遁初六至親不能相保守也同舟而濟則胡越何患乎異心注同在一舟而俱濟彼岸胡越雖殊其心皆同若漸卦三四異體和好物莫能間順而相保似若同在一舟上下殊體猶若胡越利用禦冦何患乎異心二十二唯明爻則知取舍安危吉凶變化睽而知其類異而知其通注睽彖曰萬物睽而其事類也男女睽而其志同也其唯明爻者乎注知取舍察安危辨吉凶知變化其唯明爻者也故有善邇而逺至命宫而商應若中孚之九二鳴鶴在隂其子和之鳴於此和於彼聲同則應有若宫商也修下而髙者降與彼而取此者服矣注處下修正髙必命之否之初六拔茅貞吉九四有命疇離祉也與謂上也取謂下也君上福祿不獨有之下人服者感君之德大有六五厥孚交如威如吉之例是也是故情偽相感逺近相追注正應相感是實情蹇之二五之例不正相感是偽情頥之三上之例有應雖逺而相追睽之三上之例無應近則相取賁之二三之例是也愛惡相攻屈伸相推注同人三四有愛有惡迭相攻伐否泰二卦一屈一伸更相推謝見情者獲直往則違注獲得也見彼之情往必得志屯之六四求婚媾往吉無不利之例不揆則往彼必相違六三即鹿無虞惟入于林中君子幾不如舍往吝之例是也故擬議以成其變化語成器而後有格注格作括括結也動則擬議極於變化語成器而後無結閡之患也二十三卦者時爻者適時之變夫卦者時也爻者適時之變者也注卦者統一時之大義爻者適時中之通變夫時有否泰故用有行藏注泰時則行否時則藏卦有小大故辭有險易注隂長則小陽生則大否卦辭險泰卦辭易一時之制可反而用也一時之吉可反而凶也注一時有大畜比泰之制反而有天衢後夫復隍之用一時有豐亨之用反有羈旅之凶也故卦以反對而爻亦皆變諸卦之體兩相反正其爻隨卦而變泰之初九拔茅茹以其彚征吉否之初六拔茅茹以其彚貞吉亨卦既隨時爻變亦準也二十四吉凶從卦名動靜應時用故名其卦則吉凶從其類存其時則動靜應其用注名其謙比則吉從其類名其蹇剝則凶從其類震時則動應其用艮時則靜應其用二十五得其應雖逺可動得其時雖險可處是故雖逺而可以動者得其應也雖險而可以處者得其時也注上下雖逺而動者有其應革之六二去五雖逺隂陽相應往者無咎也雖險可以處者得其時也需上六居險之上不憂出穴之凶得其時也二十六得所據附弱不懼敵憂不懼亂弱而不懼於敵者得所據也憂而不懼於亂者得所附也注師之六五為師之主體是隂柔禽來犯田執言往討處得尊位所以不懼也遁位九五嘉遁貞吉處遁之時小人浸長君子道消逃遁於外附著尊位率正小人不敢為亂也二十七觀變動存乎應察安危存乎位故觀變動者存乎應察安危者存乎位注爻有變動存乎應而有動動則不失若謙之九三勞謙君子有終吉之例爻之安危在乎位則安若莭之六四安節亨之例是失位則危若晉之九四晉如鼫鼠貞厲之類是也二十八爻有承乘外內得失辟趣先後晦明辨逆順者存乎承乘注陽乘於隂逆也師之六三師或輿尸凶隂承於陽順也噬嗑六三小吝無咎也明出處者存乎外內注遁君子處外臨君子處內逺近終始各存其會注適得其時則吉失其要會則凶二十九遁尚逺觀貴近比復好先乾壯惡首辟險尚逺趨時貴近注遁上九肥遁無不利尚逺也觀六四觀國之光利用賔于王貴近也比復好先乾壯惡首注比初六有孚無咎上六比之無首凶復之初九不逺復無祗悔元吉上六迷復凶乾上九亢龍有悔大壯上六羝羊觸藩不能退不能遂無攸利之例是也三十夬陽同決小人三獨應之有凶明夷務暗豐尚光大注明夷彖云利艱貞晦其明也豐彖云勿憂宜日中是也吉凶有時不可犯也注時有吉凶不可越分輕犯動靜有適不可過也注動靜適時不可過越而動犯時之忌罪不在大失其所適過不在深注若夬之九三壯于頄有凶得位有應時方陽長同決小人三獨應之犯時之忌凶其宜也大過九四棟隆吉有它吝大過之時陽處隂位為美九四陽處隂位能隆其棟良由應初則有它吝此所適違時三十一王氏不取互體卦變五行義苟在健何必馬乎類苟在順何必牛乎注大壯九三有乾亦云羝羊坤卦無乾彖亦云牝馬爻苟合順何必坤乃為牛義苟應健何必乾乃為馬注遁無坤六三亦稱牛明夷無乾六二亦稱馬而或者定馬於乾注唯執乾為馬其象未𢎞也案文責卦有馬無乾則偽説滋蔓難可紀矣互體不足遂及卦變變又不足推致五行注廣推金木水火土為象也一失其原巧愈彌甚注一失聖人之原旨廣為譬喻失之甚縱復或值而義無所取蓋存象忘意之由也注失魚兔則空守筌蹄遺健順則空説龍馬三十二辨卦象初上無得位之文案象無初上得位失位之文注隂陽居之不云得失又繫辭但論三五二四同功異位亦不及初上何乎注同其意也唯乾上九文言云貴而無位注陽居之也需上六需雖不當位注隂居之也若以上為隂位邪則需上六不得云不當位也若以上為陽位邪則乾上九不得云貴而無位也隂陽處之皆云非位而初亦不説當位失位也注不論當位失位凶吉之由然則初上者是事之終始無隂陽定位也注初為始上為終施之於人為終始非祿位之地也故乾初謂之潛過五謂之無位未有處其位而云潛上有位而云無者也歷觀衆卦盡亦如之初上無隂陽定位亦以明矣夫位者列貴賤之地待才用之宅也注宅居也二四隂賤小人居之三五陽貴君子居之爻者守位分之任應貴賤之序也注各守其位應之以序位有尊卑爻有隂陽尊者陽之所處卑者隂之所履也故以尊為陽位卑為隂位去初上而論位分則三五各在一卦之上亦何得不為之陽位二四各在一卦之下亦何得不謂之隂位初上者體之終始事之先後也故位無常分事無常所非可以隂陽定也三十三位列貴賤之地爻所處則為位尊卑有常序始終無常主注四爻有尊卑之序始終無隂陽之常主也故繫辭但論四爻功位之通例而不及初上之定位也然事不可無終始卦不可無六爻初上雖無隂陽本位是終始之地也統而論之爻之所處則謂之位卦以六爻為成則不得不謂之六位時成也三十四德即四時亦有先貞後亨如離者凡體具四德者則轉以勝者為先故曰元亨利貞也注元為生物之始春也亨為會聚於物夏也利為和諧品物秋也貞能幹濟於物冬也乾用此四德以成君子大人之法也其有先貞而後亨者亨由於貞也注離卦云利貞亨三十五彖統一卦象辨一爻履三説二可見凡彖者統論一卦之體者也象者各辨一爻之義者也注彖統論卦體象各明一爻之義故履卦六三為兊之主以應於乾成卦之體在斯一爻故彖敘其應雖危而亨也注彖云柔履剛説而應乎乾是以履虎尾不嘻人亨也象則各言六爻之義明其吉凶之行去六三成卦之體而指説一爻之德故危不獲亨而見嘻也注六三履虎尾嘻人凶彖言不嘻象言見嘻明爻彖其義各異也訟之九二亦同斯義注訟彖曰有孚窒惕中吉剛來而得中注云其在二乎以剛而來正夫羣小斷不失中應斯任也九二不克訟歸而逋其邑人三百户無眚也三十六無咎本皆有咎又有不犯咎無所咎凡言無咎者本皆有咎者也防得其道故得無咎也注乾之九三君子終日乾乾無咎若防失其道則有過咎也吉無咎者本亦有咎由吉故得免也注師貞丈人吉無咎注云興役動衆無功罪也故吉乃無咎無咎吉者先免於咎而後吉從之也注比初六有孚比之無咎終來有它吉之例也或亦處得其時吉不待功不犯於咎則獲吉也注需之九二需于沙小有言終吉注云近不逼難逺不後時履健居中以待其會雖小有言以吉終也或有罪自己招無所怨咎亦曰無咎故節六三曰不節若則嗟若無咎象曰不節之嗟又誰咎也三十七屯一卦皆隂求陽故初陽大得民屯此一卦皆隂爻求陽也屯難之世弱者不能自濟必依於強民思其主之時也故隂爻皆先求陽不召自往馬雖班如猶不廢不得其主無所馮也初體陽爻處首居下應民所求合其所望故大得民也三十八蒙昧之時亦是隂先求陽蒙此一卦隂爻亦先求陽夫隂昧而陽明隂困童蒙陽能發之凡不識者求問識者識者不求所告暗者求明明者不咨於暗故童蒙求我匪我求童蒙也故六三先唱則犯於為女四逺於陽則困蒙吝初比於陽則發蒙也三十九棟橈之世反以陽得位有應為凶大過者棟橈之世也本末皆弱棟已橈矣而守其常則是危而弗扶凶之道也以陽居隂拯弱之義也故陽爻皆以居隂位為美濟衰救危唯在同好則所贍褊矣九四有應則有它吝九二無應則無不利也注大過之時陽處隂位心無係應為吉陽得位有應則凶四十遁以逺時為吉上則肥遁初有厲遁小人浸長難在於內亨在於外與臨卦相對者也臨剛長則柔危遁柔長故剛遁也注遁以逺時為吉不係為美上則肥遁初則有厲四十一大壯以陽居隂位為美用壯則觸藩大壯未有違謙越禮能全其壯者也故陽爻皆以處隂位為美用壯處謙壯乃全也用壯處壯則觸藩矣四十二明夷之義逺難藏明明夷為暗之主在於上六初最逺之故曰君子于行五最近之而難不能溺故謂之箕子之貞明不可息也三處明極而征至暗故曰南狩獲其大首也注逺難藏明明夷之義逺於萬反溺寧歷反周易要義卷十

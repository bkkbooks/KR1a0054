body:
  text: 周易要義卷一中宋魏了翁輯坤至需一文王卦辭利牝馬之貞與乾異坤下坤上坤元亨利牝馬之貞坤貞之所利利於牝馬也馬在下而行者也而又牝馬順之至也至順而後乃亨故唯利於牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉西南致飬之地與坤同道者也故曰得朋東北反西南者也故曰喪朋隂之為物必離其黨之於反類而後獲安貞吉正義曰此一節是文王於坤卦之下陳坤德之辭蓋乾坤合體之物故乾後次坤言地之為體亦能始生萬物各得亨通故云元亨與乾同也利牝馬之貞者此與乾異乾之所利利於萬事為貞此唯云利牝馬之貞坤是隂道當以柔順為貞假借柔順之象以明柔順之德也不云牛而云馬者牛雖柔順不能行地無疆無以見坤廣生之德馬雖比龍為劣所行亦能廣逺象地之廣育二隂不為唱故先迷後得主利君子有攸往者以其柔順利貞故君子利有所往先迷後得主利者以其至隂當待唱而後和凡有所為若在物之先即迷惑若在物之後即得主利以隂不可先唱猶臣不可先君卑不可先尊故也三隂喪朋則吉猶人隂柔而之剛正西南得朋者此假象以明人事西南坤位是隂也今以隂詣隂是得朋俱是隂類不獲吉也猶人既懷隂柔之行又向隂柔之所是純隂柔弱故非吉也東北喪朋安貞吉者西南既為隂東北反西南即為陽也以柔順之道往詣於陽是喪失隂朋故得安靜貞正之吉以隂而兼有陽故也若以人事言之象人臣離其黨而入君之朝女子離其家而入夫之室凡言朋者非唯人為其黨性行相同亦為其黨假令人是隂柔而之剛正亦是離其黨四大與至始與生統天與承天之異正義曰至哉坤元者歎美坤德故云至哉至謂至極也言地能生飬至極與天同也但天亦至極包籠於地非但至極又大於地故乾言大哉坤言至哉萬物資生者言萬物資地而生初稟其氣謂之始成形謂之生乾本氣初故云資始坤據成形故云資生乃順承天者乾是剛健能統領於天坤是隂柔以和順承奉於天坤厚載物德合無疆者以其廣厚故能載物有此生長之德合會無疆凡言無疆者具有二義一是廣博無疆二是長久無疆五象在經辭後輔嗣始分附爻下象曰履霜至冰也正義曰夫子所作象辭元在六爻經辭之後以自卑退不敢干亂先聖正經之辭及至輔嗣意以為象者本釋經文宜相附近其義易了故分爻之象辭各附其當爻下言之猶如元凱注左傳分經之年與傳相附六褚云履霜初至三堅冰四至上隂始凝也者釋履霜之義言隂氣始凝結為霜也馴致其道至堅冰也者馴猶狎順也若鳥獸馴狎然言順其隂柔之道習而不已乃至堅冰也褚氏云履霜者從初六至六三堅冰者從六四至上六隂陽之氣無為故積馴履霜必至於堅冰以明人事有為不可不制其節度故於履霜而逆以堅冰為戒七六二居中得位極地之質六二直方大不習無不利居中得正極於地質任其自然而物自生不假修營而功自成故不習焉而無不利象曰六二之動直以方也動而直方任其質也不習無不利地道光也正義曰直方大不習無不利者文言云直其正也二得其位極地之質故亦同地也具包三德生物不邪謂之直也地體安靜是其方也無物不載是其大也既有三德極地之美自然而生不假修營故云不習無不利物皆自成無所不利以此爻居中得位極於地體地之形質直方又大此六二居中得正是盡極地之體質也八居隂極不為物始含章待時六三含章至光大也正義曰含章可貞者六三處下卦之極而能不被疑於陽章美也既居隂極能自降退不為事始唯內含章美之道待命乃行可以得正故曰含章可貞或從王事無成有終者夫子釋含章之義以身居隂極不敢為物之首但內含章美之道待時而發是以時發也或從王事知光大者釋無成有終也既隨從王事不敢主成物始但奉終而行是知慮光大九括囊謂閉其知六四括囊至不害也正義曰括結也囊所以貯物以譬心藏知也閉其知而不用故曰括囊功不顯物故曰無譽不與物忤故曰無咎象曰慎不害者釋所以括囊無咎之義施其謹慎不與物競故不被害也十黃裳以柔順處盛位六五黃裳元吉黃中之色也裳下之飾也坤為臣道美盡於下夫體無剛健而能極物之情通理者也以柔順之德處於盛位任夫文理者也十一隂盛似陽陽所不堪故戰而傷上六龍戰于野其血玄黃隂之為道卑順不盈乃全其美盛而不已固陽之地陽所不堪故戰于野正義曰龍戰于野其血玄黃者以陽謂之龍上六是隂之至極隂盛似陽故稱龍焉盛而不巳固陽之地陽所不堪故陽氣之龍與之交戰即説卦云戰乎乾是也戰于卦外故曰于野隂陽相傷故其血玄黃十二積柔致禍故於初六言善惡之積積善至言順也正義曰此一節明初六爻辭也積善之家必有餘慶積不善之家必有餘殃者欲明初六其惡有漸故先明其所行善惡事由久而積漸故致後之吉凶蓋言順者言此履霜堅冰至蓋言順習隂惡之道積微而不已乃致此弒害稱蓋者是疑之辭凡萬事之起皆從小至大從微至著故上文善惡並言今獨言弒君弒父有漸者以隂主柔順積柔不已乃終至禍亂故特於坤之初六言之十三黃中至暢發外內俱善君子黃至之至也正義曰此一節明六五爻辭也黃中通理者以黃居中兼四方之色奉承臣職是通曉物理也正位居體者居中得正是正位也處上體之中是居體也黃中通理是美在其中有美在於中必通暢於外故云暢於四支四支猶人手足比於四方物務也外內俱善能宣發於事業所營謂之事事成謂之業美莫過之故云美之至也十四玄黃言隂陽俱傷莊氏云上六雜氣隂疑於至地黃正義曰此一節明上六爻辭隂疑於陽必戰者隂盛為陽所疑陽乃發動欲除去此隂隂既強盛不肯退避故必戰也為其嫌於無陽故稱龍焉者上六隂盛似陽為嫌純隂非陽故稱龍以明之猶未離其類也故稱血馬者言上六雖隂盛似陽然猶未能離其隂類故為陽所傷而見血也夫玄黃者天地之雜也天玄而地黃者釋其血玄黃之義莊氏云上六之爻兼有天地雜氣所以上六被傷其血玄黃也天色玄地色黃故血有天地之色今輔嗣注云猶與陽戰而相傷是言隂陽俱傷也恐莊氏之言非王之本意今所不取也十五屯乃元亨亨乃利貞與乾四德異震下坎上屯元亨利貞剛柔始交是以屯不交則否故屯乃大亨也大亨則無險故利貞十六屯為坎宫二世卦諸卦放此屯張倫反難也盈也坎宫二世卦否備鄙反十七隂德始交為難利建侯以寧之勿用有攸往往益屯也利建侯得主則定正義曰屯難也剛柔始交而難生初相逢遇故云屯難也以隂陽始交而為難因難物始大通故元亨也萬物大亨乃得利益而貞正故利貞也但屯之四德劣於乾之四德故屯乃元亨亨乃利貞乾之四德無所不包此即勿用有攸往又别言利建侯不如乾之無所不利此已上説屯之自然之四德聖人當法之勿用有攸往利建侯者以其屯難之世世道初創其物未寧故宜利建侯以寧之此二句釋人事也十八君子法屯象以經緯綱綸象曰雲雷至經綸正義曰經謂經緯綸謂綱綸言君子法此屯象有為之時以經綸天下約束於物故云君子以經綸也姚信云綸謂緯也以織綜經緯此君子之事非其義也十九屯初動則難生故磐桓居貞建侯初九磐桓利居貞利建侯處屯之初動則難生不可以進故磐桓也處此時也其利安在不唯居貞建侯乎夫息亂以靜守靜以侯安民在正𢎞正在謙屯難之世隂求於陽弱求於強民思其主之時也初處其首而又下焉爻備斯義宜其得民也二十二志在五而不從初故屯邅馬班如六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字志在乎五不從于初屯難之時正道未行與初相近而不相得困於侵害故屯邅也時方屯難正道未通涉逺而行難可以進故曰乘馬班如也寇謂初也無初之難則與五婚矣故曰匪寇婚媾也志在於五不從於初故曰女子貞不字也屯難之世勢不過十年者也十年則反常反常則本志斯獲矣故曰十年乃字屯如子夏傳云如辭也邅張連反馬云難行不進之貌乘繩證反四馬曰乘下及注並同鄭云馬牝牡曰乘子夏傳音繩班如字子夏傳云相牽不進貌鄭本作般正義曰女子謂六二也女子以守貞正不受初九之愛字訓愛也十年乃字者十年難息之後即初不害已也乃得往適於五受五之字愛十者數之極數極則復故云十年也象曰六二之難乘剛也者釋所以屯如邅如也有畏難者以其乘陵初剛不肯從之故有難也十年乃字反常者謂十年之後屯難止息得反常者謂反常道即二適於五是其得常也已前有難不得行常十年難息得反歸於常以適五也二十一女子十年乃字猶寇近應逺久乃合此爻因六二之象以明女子婚媾之事即其餘人事亦當法此猶如有人逼近於強雖逺有外應未敢茍進被近者所陵經久之後乃得與應相合是知萬事皆象於此非唯男女而已諸爻所云隂陽男女之象義皆倣於此二十二即鹿無虞或作麓君子幾有二音六三即鹿無虞唯入于林中君子幾不如舍往吝三既近五而無寇難四雖比五其志在初不妨已路可以進而無屯邅也見路之易不揆其志五應在二往必不納何異無虞以從禽乎雖見其禽而無其虞徒入于林中其可獲乎幾辭也夫君子之動豈取恨辱哉故不如舍往吝窮也鹿王肅作麓云山足幾徐音祈辭也注同又音機近也速也鄭作機云弩牙也正義曰幾為語辭不為義也知此幾不為事之幾微凡幾微者乃從無向有其事未見乃為幾也今即鹿無虞是已成之事事已顯著故不得為幾微之義二十三屯膏而不光故小貞吉大貞凶九五屯其膏小貞吉大貞凶處屯難之時居尊位之上不能恢𢎞博施無物不與拯濟微滯亨于羣小而繫應在二屯難其膏非能光其施者也固志同好不容他間小貞之吉大貞之凶正義曰屯其膏者膏謂膏澤恩惠之類言九五既居尊位當恢𢎞博施唯繫應在二而所施者褊狹是屯難其膏小貞吉大貞凶者貞正也出納之吝謂之有司是小貞為吉若大人不能恢𢎞博施是大貞為凶二十四以剛處中能斷疑故童蒙求之坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告筮者決疑之物也童蒙之來求我欲決所惑也決之不一不知所從則復惑也故初筮則告再三則瀆瀆蒙也能為初筮其唯二乎以剛處中能斷夫疑者也蒙莫公反蒙也稚也稽覽圖云無以教天下曰蒙方言云蒙萌也離宫四世卦童如字字書作僮鄭云未冠之稱二十五初筮不剖決告之而再三瀆蒙不如不告正義曰蒙者微昧暗弱之名物皆蒙昧唯願亨通故云蒙亨匪我求童蒙童蒙求我者物既暗弱而意願亨通即明者不求於暗即匪我師德之髙明往求童蒙之暗但暗者求明明者不咨於暗故云童蒙求我也初筮告者初者發始之辭筮者決疑之物童蒙既來求我我當以初始一理剖決告之再三瀆瀆則不告者師若遲疑不定或再或三是褻瀆瀆則不告童蒙來問本為決疑師若以廣深二義再三之言告之則童蒙聞之轉亦瀆亂故不如不告也二十六內險外止為蒙時所願者以亨行彖曰蒙山下有險險而止蒙退則困險進則閡山不知所適蒙之義也蒙亨以亨行時中也時之所願唯願亨也以亨行之得時中也匪我求童蒙童蒙求我志應也我謂非童蒙者也非童蒙者即陽也凡不識者求問識者識者不求所告暗者求明明者不咨於暗故蒙之為義匪我求童蒙童蒙求我也童蒙之來求我志應故也初筮告以剛中也謂二也二為衆隂之主也無剛失中何由得初筮之告乎再三瀆瀆則不告瀆蒙也蒙以飬正聖功也正義曰再三瀆瀆則不告瀆蒙者所以再三不告恐瀆亂蒙者自此以上彖辭總釋蒙亨之義蒙以飬正聖功也者能以蒙昧隱默自飬正道乃成至聖之功此一句釋經之利貞二十七蒙發疑明刑與説皆當以往則吝初六發蒙利用刑人用説桎梏以往吝處蒙之初二照其上故蒙發也蒙發疑明刑説當也以往吝刑不可長也象曰利用刑人以正法也刑人之道道所惡也以正法制故刑人也正義曰發蒙者以初近於九二二以陽處中而明能照暗故初六以能發去其蒙也利用刑人用説桎梏者蒙既發去無所疑滯故利用刑戮于人又利用説去罪人桎梏以蒙既發去疑事顯明刑人説桎梏皆得當在足曰桎在手曰梏小爾雅云杻謂之梏械謂之桎以往吝者若以正道而往即其事益善矣若以刑人之道出往往之即有鄙吝象曰利用刑人以正法者且刑人之道乃賊害於物是道之所惡以利用刑人者以正其法制不可不刑矣故刑罰不可不施於國鞭撲不可不施於家案經刑人説人二事象直云利用刑人一者但舉刑重故也二十八上不求三而三求上故云見金夫六三勿用取女見金夫不有躬無攸利童蒙之時隂求於陽晦求於明各求發其昧者也六三在下卦之上上九在上卦之上男女之義也上不求三而三求上女先求男者也女之為體正行以待命者也見剛夫而求之故曰不有躬也施之於女行在不順故勿用取女而無攸利取七住反二十九陽主生息故言實正義象曰獨逺實者實謂九二之陽也九二以陽故稱實也六三近九二六五近上九又應九二唯此六四既不近二又不近上故云獨逺實也陽主生息故稱實隂主消損故不得言實三十自有孚至大川為繇辭乾下坎上需有孚至大川正義曰此需卦繇辭也需者待也物初蒙稚待飬而成無信即不立所待唯信也故需有孚言需之為體唯有信也光亨貞吉者若能有信即需道光明物得亨通于正則吉故云光亨貞吉也三十一需險在前以剛健而進故利涉利涉大川者以剛健而進即不患於險乾德乃亨故云利涉大川三十二需字從雨重而者訓飬讀為秀需音須字從雨重而者非飲食之道也訓飬鄭讀為秀解云陽氣秀而不直上者畏上坎也坤宫遊魂卦三十三不云險不云雨不云天上有雲象曰雲上于天需君子以飲食宴樂童蒙已發盛德光亨飲食宴樂其在兹乎正義曰坎既為險又為雨今不言險雨者此象不取險難之義也故不云險也雨是已下之物不是須待之義故不云雨也不言天上有雲而言雲上于天者天之欲雨待時而落所以明需天惠將施而盛德又亨故君子於此之時以飲食宴樂上時掌反干寶云升也王肅本作雲在天上三十四用恆守常不能見幾乃得無咎初九需于郊至未失常也正義曰但難在於坎初九去難既逺故待時在于郊郊者是境上之地亦去水逺也利用恆無咎者恆常也逺難待時以避其害故宜利保守其常所以無咎猶不能見幾速進但得無咎而已三十五近難需沙而寬衍在中九二需于沙小有言終吉轉近於難故曰需于沙也不至致寇故曰小有言也近不逼難逺不後時履健居中以待其會雖小有言以吉終也沙如字鄭作沚正義曰沙是水傍之地去水漸近待時於沙象曰需于沙衍在中者衍謂寬衍去難雖近猶未逼於難而寬衍在其中也故雖小有言以吉終也三十六隂陽相傷稱血居坎之始稱穴六四需于血出自穴凡稱血者隂陽相傷者也隂陽相近而不相得陽欲進而隂塞之則相害也穴者隂之路也處坎之始居穴者也九三剛進四不能距見侵則辟順以聽命者也故曰需于血出自穴也辟音避三十七九五居中得正無所用需九五需于酒至中正也正義曰需于酒食貞吉者五既為需之主已得天位無所復需但以需待酒食以遞相宴樂而得貞吉象曰酒食貞吉以中正者釋酒食貞吉之義言九五居中得正需道亨通上下無事也三十八以一隂為三陽主故須敬乃吉象曰不速之客來敬之終吉雖不當位未大失也處無位之地不當位者也敬之則得終吉故雖不當位未大失也正義曰上六入于穴者上六隂爻故亦稱穴也上六與三相應三來之已不為禍害乃得為已援助故上六無所畏忌乃入于穴而居也有不速之客三人來者速召也不須召喚之客有三人自來三人謂初九九二九三此三陽務欲前進但畏于險難不能前進其難既通三陽務欲上升不須召喚而自來故云有不速之客三人來也敬之終吉者上六居無位之地以一隂而為三陽之主不可怠慢故須恭敬此三陽乃得終吉且需之一卦須待難通其於六爻皆假他物之象以明人事待通而亨周易要義卷一中

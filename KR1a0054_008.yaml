body:
  text: 周易要義卷二下宋魏了翁輯豫至觀一豫無四徳逸豫不可常行坤下震上豫利建侯行師正義曰謂之豫者取逸豫之義以和順而動動不違衆衆皆說豫故謂之豫也動而衆說故可利建侯也以順而動不加无罪故可以行師也无四徳者以逸豫之事不可以常行豫餘慮反悅豫也備豫也馬云豫樂震宫一世卦二彖所嘆者十二卦或時或時用時義豫之時義大矣哉者歎美為豫之善言于逸豫之時其義大矣此歎卦也凡言不盡意者不可煩文具説故歎之以示情使後生思其餘藴得意而忘言也然歎卦有三體一直歎時如大過之時大矣哉之例是也二歎時并用如險之時用大矣哉之例是也三歎時并義豫之時義大矣哉之例是也夫立卦之體各象其時時有屯夷事非一揆故爻來適時有凶有吉人之生世亦復如斯或逢治世或遇亂時出處存身此道豈小故曰大矣哉也然時運雖多大體不出四種者一者治時頥養之世是也二者亂時大過之世是也三者離散之時解緩之世是也四者改易之時革變之世是也故舉此四卦之時為歎餘皆可知言用者謂適時之用也雖知居時之難此事不小而未知以何而用之耳故坎睽蹇之時宜用君子小人勿用用險取濟不可為常斟酌得宜是用時之大畧舉險難等三卦餘從可知矣又言義者姤卦注云凡言義者不盡於所見中有意謂者也是其時皆有義也畧明佚樂之世相隨相遇之日隐遯覊旅之時凡五卦其義不小則餘卦亦可知也今所歎者十二卦足以𤼵明大義恢𢎞妙理者也凡於彖之末歎云大哉者凡一十二卦若豫旅遯姤凡四卦皆云時義案姤卦注云凡言義者不盡於所見中有意謂以此言之則四卦卦各未盡其理其中更有餘意不可盡申故總云義也隨之一卦亦言義但與四卦其文稍别四卦皆云時義隨卦則隨時之義者非但其中别有義意又取隨逐其時故變云隨時之義大矣哉睽蹇坎此三卦皆云時用案睽卦注云睽離之時非小人之所能用蹇卦亦云非小人之所能用此二卦言大矣哉者則是大人能用故云大矣哉其中更无餘義唯大人能用故云用不云義也坎卦時用則與睽蹇稍别注云非用之常用有時也謂坎險之事時之須用利益乃大與睽蹇時用文同而義異也解之時革之時頥之時大過之時此四卦直云時不云義與用也案解卦注難解之時非治難時故不言用體盡於解之名無有幽𨼆故不曰義以此注言之直云時者尋卦之名則其意具盡中間更無餘義三雷出地而奮動法此作樂薦配象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考正義曰案諸卦之象或云雲上于天或云風行天上以𩔖言之今此應云雷出地上乃云雷出地奮豫者雷是陽氣之聲奮是震動之狀雷既出地震動萬物被陽氣而生各皆逸豫故云雷出地奮豫也先王以作樂崇徳者雷是鼔動故先王法此鼓動而作樂崇盛徳業樂以𤼵揚盛徳故也殷薦之上帝者用此殷盛之樂薦祭上帝也象雷出地而向天也以配祖考者謂以祖考配上帝用祖用考若周夏正郊天配靈威仰以祖后稷配也配祀明堂五方之帝以考文王也故云以配祖考也奮方問反殷于勤反馬云盛也說文云作樂之盛稱殷四六二介于石順不茍從豫不違中六二介于石不終日貞吉處豫之時得位履中安夫貞正不茍求豫者也順不茍從豫不違中是以上交不諂下交不瀆明禍福之所生故不茍說辨必然之理故不改其操介如石焉不終日明矣介音界纎介古文作砎鄭故八反云謂磨砎也馬作扴云觸小石聲荀說音恱正義象曰不終日貞吉以中正者釋貞吉之義所以見其惡事即能離去不待終日守正吉者以此六二居中守正順不茍從豫不違中故不須待其一日終守貞吉也五盱豫謂睢盱而豫姚引詩旴日始旦六三盱豫悔遲有悔居下體之極處兩卦之際履非其位承動豫之主若其睢盱而豫悔亦生焉遲而不從豫之所疾位非所據而以從豫進退離悔宜其然矣盱香于反睢盱也向云睢盱小人喜悅之貌王肅云盱大也鄭云誇也説文云張目也字林火孤反又火于反子夏作紆京作汙姚作旴云日始出引詩旴日始旦睢香維反説文云仰日也字林火佳反六衆隂由一陽以豫故勿疑則朋合疾九四由豫大有得勿疑朋盍簮處豫之時居動之始獨體陽爻衆隂所從莫不由之以得其豫故曰由豫大有得也夫不信于物物亦疑焉故勿疑則朋合疾也盍合也簮疾也由豫由從也鄭云用也馬作猶云猶豫疑也盍胡獵反合也簮徐側林反子夏傳同疾也鄭云速也埤蒼同王肅又祖感反古文作貸京作橬馬作臧荀作宗虞作戠戠叢合也蜀才本依京義從鄭若能不疑于物以信待之則衆隂羣朋合聚而疾來也正義象曰由豫大有得志大行者釋由豫大有得之意衆隂既由之而豫大有所得是志意大行也七凡隨有元亨利貞乃无咎震下兑上隨元亨利貞无咎正義曰元亨者于相隨之世必大得亨通若其不大亨通則元以相隨逆于時也利貞者相隨之體須利在得正隨而不正則邪僻之道必須利貞也无咎者有此四徳乃无咎以茍相從涉於朋黨故必須四徳乃无咎也凡卦有四徳者或其卦當時之義即有四徳如乾坤屯臨无妄此五卦之時即能四徳備具其隨卦以惡相隨則不可也有此四徳乃无咎无此四徳則有咎也與前五卦其義稍别隨從也震宫歸魂卦八六二係初九小子則失九五丈夫六二係小子失丈夫隂之為物以處隨世不能獨立必有係也居隨之時體分柔弱而以乘夫剛動豈能秉志違於所近隨此失彼弗能兼與五處已上初處已下故曰係小子失丈夫也正義曰小子謂初九也丈夫謂九五也初九處卑故稱小子五居尊位故稱丈夫六二既是隂柔不能獨立所處必近係屬初九故云係小子既屬初九則不得往應於五故云失丈夫也象曰係小子弗兼與者釋係小子之意既隨此初九則失彼九五丈夫是不能兩處兼有九六三舎初係四非正應故利居貞六三係丈夫失小子隨有求得利居貞隂之為物以處隨世不能獨立必有係也雖體下卦二已據初將何所附故舎初係四志在丈夫四俱无應亦欲於已隨之則得其所求矣故曰隨有求得也應非其正以係於人何可以妄故利居貞也初處已下四處已上故曰係丈夫失小子也象曰係丈夫志舎下也下謂初也十輔嗣甲創制庚申命諸儒用辛丁巽下艮上蠱元亨利涉大川先甲三日後甲三日正義曰蠱者事也有事營為則大得亨通有為之時利在拯難故利涉大川也先甲三日後甲三日者甲者創制之令既在有為之時不可因仍舊令今用創制之令以治於人人若犯者未可即加刑罰以民未習故先此宣令之前三日殷勤而語之又於此宣令之後三日更丁寧而語之其人不從乃加刑罰也其褚氏何氏周氏等並同鄭義以為甲者造作新令之日甲前三日取改過自新故用辛也甲後三日取丁寧之義故用丁也今案輔嗣注甲曰創制之令不云創制之日又巽卦九五先庚三日後庚三日輔嗣注申命令為之庚輔嗣又云甲庚皆申命之謂則輔嗣不以甲為創制之日而諸儒不顧輔嗣注㫖妄作異端非也蠱音古事也惑也亂也左傳云于文皿蟲為蠱又云女惑男風落山謂之蠱徐又姬祖反一音故巽宫歸魂卦先息薦反彖并注同後胡豆反十一物蠱必有事非訓蠱為事彖曰蠱剛至天行也正義曰剛上而柔下巽而止蠱者此釋蠱卦之名并明稱蠱之義也以上剛能斷制下柔能施令巽順止靜故可以有為也褚氏云蠱者惑也物既惑亂終致損壊當須有事也有為治理也故序卦云蠱者事也謂物蠱必有事非謂訓蠱為事義當然也蠱元亨而天下治者釋元亨之義以有為而得元亨是天下治理也利涉大川往有事也者釋利涉大川也蠱者有為之時拔拯危難往當有事故利涉大川此則假外象以喻危難也先甲三日後甲三日終則有始天行者釋先甲三日後甲三日之義也民之犯令告之已終更復從始告之殷勤不已若天之行四時既終更復從春為始象天之行故云天行也釋注蠱者至四時也正義曰蠱者有事待能之時者物既蠱壊須有事營為所作之事非賢能不可故經云幹父之蠱幹則能也十二甲為日首故漢令重者曰甲令甲者創制之令者甲為十日之首創造之令為在後諸令之首故以創造之令謂之為甲故漢時謂令之重者謂之甲令則此義也十三使民曉新令然後誅兼通責讓創制不可責之以舊者以人有犯令而致罪者不可責之舊法有犯則刑故須先後三日殷勤語之使曉知新令而後乃誅誅謂兼通責讓之罪非專謂誅殺也說音悦創初亮反此俗字也依字作剏十四振民象山下有風育徳象山在上象曰山下至育徳正義曰必云山下有風者風能摇動散布潤澤今山下有風取君子能以恩澤下振于民育養已徳振民象山下有風育徳象山在上也振舊之慎反濟也師讀音真振振仁厚也育王肅作毓古育字十五有子考无咎散文父在亦稱考初六幹父之蠱有子考无咎厲終吉處事之首始見任者也以柔巽之質幹父之事能承先軌堪其任者也故曰有子也任為事首能堪其事考乃无咎也故曰有子考无咎也當事之首是以危也能堪其事故終吉也有子考无咎絶句周依馬王肅以考絶句正義象曰幹父之蠱意承考者釋幹父之蠱義凡堪幹父事不可小大損益一依父命當量事制宜以意承考而已對文父沒稱考若散而言之生亦稱考若康誥云大傷厥考心是父在稱考此避幹父之文故變云考也十六幹母不可貞猶不失中道九二幹母至中道也正義曰居内處中是幹母事也不可貞者婦人之性難可全正宜屈已剛不可固守貞正故云不可貞也象曰得中道者釋幹母之蠱義雖不能全正猶不失在中之道故云得中道也十七臨八月凶謂丑至申三隂盛兊下坤上臨元亨利貞至于八月有凶正義曰案序卦云臨大也以陽之浸長其徳壯大可以監臨于下故曰臨也剛既浸長說而且順又以剛居中有應於外大得亨通而利正也故曰元亨利貞也至于八月有凶者以物盛必衰隂長陽退臨為建丑之月從建丑至于八月建申之時三隂既盛三陽方退小人道長君子道消故八月有凶也以盛不可終保聖人作易以戒之也臨如字序卦云大也坤宫二世卦十八臨元亨利貞謂大亨以正彖曰臨剛至不乆也正義曰臨剛浸而長說而順者此釋臨義也據諸卦之例說而順之下應以臨字結之此无臨字者以其剛中而應亦是臨義故不得于剛中之上而加臨也剛中而應大亨以正天之道者天道以剛居中而下與地相應使物大得亨通而利正故乾卦元亨利貞今此臨卦其義亦然故云天之道也十九八月子至未寅至酉五至申凡三說八月者何氏云從建子陽生至建未為八月褚氏云自建寅至建酉為八月今案此注云小人道長君子道消宜據否卦之時故以臨卦建丑而至否卦建申為八月也二十宗廟可觀莫盛于盥注引禘灌坤下巽上觀盥而不薦有孚顒若王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛於盥也至薦簡畧不足復觀故觀盥而不觀薦也孔子曰禘自既灌而往者吾不欲觀之矣盡夫觀盛則下觀而化矣故觀至盥則有孚顒若也觀官喚反示也乾宫四世卦盥音管二十一神道謂不以刑制使物如天使四時聖人以神道設教而天下服矣統說觀之為道不以刑制使物而以觀感化物者也神則無形者也不見天之使四時而四時不忒不見聖人使百姓而百姓自服也二十二大觀之時而為童觀小人之道初六童觀小人无咎君子吝處于觀時而最逺朝美體於隂柔不能自進无所鍳見故曰童觀趣順而已无所能為小人之道也故曰小人无咎君子處大觀之時而為童觀不亦鄙乎童觀馬云童猶獨也鄭云稚也逺𡊮萬反朝直遥反二十三觀卦中或音官或去聲讀童觀闚觀皆讀為去聲也觀國如字或音官喚反盡夫觀盛故觀至大觀在上王肅音官以觀天下徐唯此一字作官音觀盥而不薦觀之為道而以觀感風行地上觀處于觀時君子處大觀之時大觀廣鍳亦音官居觀之時為觀之主觀之盛也從盡夫觀以下並官喚反餘不出者並音官二十四觀我生君子謂觀民以察已九五觀我生君子无咎居于尊位為觀之主宣𢎞大化光于四表觀之極者也上之化下猶風之靡草故觀民之俗以察已道百姓有罪在予一人君子風著已乃无咎上為化主將欲自觀乃觀民也象曰觀我生觀民也正義曰九五居尊為觀之主四海之内由我而化我教化善則天下有君子之風教化不善則天下著小人之俗故觀民以察我道有君子之風著則无咎也周易要義卷二下

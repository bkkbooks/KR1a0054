body:
  text: 周易要義卷八宋魏了翁輯下繫一卦舉象重論爻相推繫辭而有變動八卦成列象在其中矣備天下之象也因而重之爻在其中矣夫八卦備天下之理而未極其變故因而重之以象其動用擬諸形容以明治亂之宜觀其所應以著適時之功則爻卦之義所存各異故爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣剛柔相推况八卦相蕩或否或泰繫辭焉而斷其吉凶况之六爻動以適時者也立卦之義則見於彖象適時之功則存之爻辭王氏之例詳矣正義曰八卦成列象在其中矣者言八卦各成列位萬物之象在其八卦之中也因而重之爻在其中矣謂因此八卦之象而更重之萬物之爻在其所重之中矣然象亦有爻爻亦有象所以象獨在卦爻獨在重者卦則爻少而象多重則爻多而象少故在卦舉象在重論爻也二疏以氣謂之隂陽體謂之剛柔剛柔相推變在其中矣者則上繫第二章云剛柔相推而生變化是變化之道在剛柔相推之中剛柔即隂陽也論其氣即謂之隂陽語其體即謂之剛柔也三繫辭命卦爻有動吉凶悔吝以生繫辭焉而命之動在其中矣者謂繫辭於爻卦之下而呼命其卦爻得失吉凶則適時變動好惡故在其繫辭之中也吉凶悔吝者生乎動者也上既云動在繫辭之中動則有吉凶悔吝四此制器取卦之爻象之體韓直取卦名作結繩而為網罟以佃以漁蓋取諸離離麗也網罟之用必審物之所麗也魚麗於水獸麗於山也正義曰此第二章明聖人法自然之理而作易象易以制器而利天下用此網罟或陸畋以羅鳥獸水澤以網魚鱉也蓋取諸離者離麗也麗謂附著也言網罟之用必審知鳥獸魚鱉所附著之處故稱離卦之為網罟也案諸儒象卦制器皆取卦之爻象之體今韓氏之意直取卦名因以制器案上繫云以制器者尚其象則取象不取名也韓氏乃取名不取象於義未善矣今既遵韓氏之學且依此釋之罟音古馬姚云猶网也黃本作為网罟云取獸曰网取魚曰罟五耒耜致豐取益市合物取噬嗑包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益制器致豐以益萬物斫陟角反耜音似京云耒下耓也陸云廣五寸耓音敕丁反耒力對反京云耜上勾木也説文云耜曲木垂所作字林同力佳反徐力猥反垂造作也日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑噬嗑合也市人之所聚異方之所合設法以合物噬嗑之義也世本云祝融為市宋𠂻云顓頊臣也六皇甫謐以制器九事皆黃帝不可用此九事黃帝制其初堯舜成其末事相連接共有九事之功故連云黃帝堯舜也案皇甫謐帝王世紀載此九事皆為黃帝之功若如所論則堯舜無事易繫何須連云堯舜則皇甫之言未可用也七垂衣裳者黃帝以前衣皮制短垂衣裳者以前衣皮其制短小今衣絲麻布帛所作衣裳其制長大故云垂衣裳也取諸乾坤者衣裳辨貴賤乾坤則上下殊體八舟楫取渙乘理以散動刳木為舟至取諸渙此九事之第二也舟必用大木刳鑿中故云刳木也剡木為楫者楫必須纎長理當剡削故曰剡木也取諸渙者渙散也渙卦之義取乘理以散動也舟楫亦乘水以載運故取諸渙也刳本作瓠口孤反徐又口溝反剡以冉反亦作掞楫本又作楫九韓因門柝取豫故九事皆取卦名重門擊柝以待暴客蓋取諸豫取其備豫正義曰此九事之第四也豫者取其豫有防備韓氏以此九事皆以卦名而為義者特以此象文取備豫之義其事相合故其餘八事皆以卦名解義量為此也十創物者不言古後用代前用言古蓋取諸大壯宫室壯大於穴居故制為宫室取諸大壯也正義曰此九事之第七也以前不云上古以下三事或言上古或言古與上不同者以前未造此器之前更無餘物之用非是後物以替前物故不云上古也此以下三事皆是未造此物之前已更别有所用今將後用而代前用十一衣薪葬野不云上古在穴居結繩後古之葬者至取諸大過正義曰此九事之第八也不云上古直云古之葬者若極逺者則云上古其次逺者則直云古則厚衣之以薪葬之中野猶在穴居結繩之後故直言古也不封不樹者不積土為墳是不封也不種樹以標其處是不樹也十二喪期無數堯以前棺槨自殷以後喪期無數者哀除則止無日月限數也後世聖人易之以棺槨者若禮記云有虞氏瓦棺未必用木為棺也則禮記又云殷人之棺槨以前云槨無文也取諸大過者送終追逺欲其甚大過厚故取諸大過也案書稱堯崩百姓如喪考妣三載四海遏密八音則喪期無數在堯已前而棺槨自殷已後則夏已前棺椁未具也所以其文參差前後不齊者但此文舉大略明前後相代之義不必確在一時故九事上從黃帝下稱堯舜連延不絶更相增修也十三陽竒君道必一隂兩臣體代終陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦夫少者多之所宗一者衆之所歸陽卦二隂故竒為之君隂卦二陽故耦為之主其德行何也辨隂陽二卦之德行也陽一君而二民君子之道也隂二君而一民小人之道也陽君道也隂臣道也君以無為統衆無為則一也臣以有事代終有事則二也故陽爻畫竒以明君道必一隂爻畫兩以明臣體必二斯則隂陽之數君臣之辨也以一為君君之德也二居君位非其道也故陽卦曰君子之道隂卦曰小人之道也十四陽卦多隂隂卦多陽分君子小人正義陽卦多隂謂震坎艮一陽而二隂也隂卦多陽謂巽離兊一隂而二陽也陽卦竒隂卦耦者陽卦則以竒為君故一陽而二隂陽為君隂為臣也隂卦則以耦為君故二陽而一隂隂為君陽為臣也故云其德行何也陽一君而二民君子之道者夫君以無為統衆無為者為每事因循委任臣下不司其事故稱一也臣則有事代終各司其職有職則有對故稱二也今陽爻以一為君以二為民得其尊卑相正之道者故為君子之道也隂二君而一民小人之道者隂卦則以二為君是失其正以一為臣乖反於理上下失序故稱小人之道也十五天下事何須思慮屈信自然相感天下之事何須思也何須慮也日往則月來至相推而嵗成者此言不須思慮任運往來自然明生自然嵗成也往者屈也來者信也者此覆明上日往則月來寒往則暑來自然相感而生利之事也往是去藏故為屈也來是施用故為信也一屈一信遞相感動而利生則上云明生嵗成是利生也尺蠖之屈以求信者覆明上往來相感屈信相須尺蠖之蟲初行必屈者欲求在後之信也言信必須屈屈以求信是相須也龍蛇之蟄以存身者言靜以求動也龍蛇初蟄是靜也以此存身是後動也言動必因靜也靜而得動亦動靜相須也精義入神以致用者亦言先靜而後動此言人事之用言聖人用精粹微妙之義入於神化寂然不動乃能致其所用精義入神是先靜也以致用是後動也是動因靜而來利用安身以崇德者此亦言人事也言欲利己之用先須安靜其身不須役其思慮可以增崇其德言利用安身是靜也言崇德是動也此亦先靜而後動動亦由靜而來也過此以往未之或知也者精義入神以致用利用安身以崇德此二者皆人理之極過此二者以往則微妙不可知故云未之或知也窮神知化德之盛者此言過此二者以往之事若能過此以往則窮極微妙之神曉知變化之道乃是聖人德之盛極也十六上交下交疏以道器釋之知幾其神乎者神道微妙寂然不測人若能豫知事之幾微則能與其神道合會也君子上交不諂下交不瀆者上謂道也下謂器也若聖人知幾窮理冥於道絶於器故能上交不諂下交不瀆若於道不冥而有求焉未能離於諂也於器不絶而有交焉未能免於瀆也能無諂瀆知幾窮理者乎十七知幾則吉故言吉之先見諸本或有凶字幾者動之微吉之先見者此釋幾之義也幾微也是己動之微動謂心動事動初動之時其理未著唯纎微而已若其己著之後則心事顯露不得為幾若未動之前又寂然頓無兼亦不得稱幾也幾是離無入有在有無之際故云動之微也若事著之後乃成為吉此幾在吉之先豫前已見故云吉之先見者也此直云吉不云凶者凡豫前知幾皆向吉而背凶違凶而就吉無復有凶故特云吉也諸本或有凶字者其定本則無也十八豫六二得位居中故守介見幾君子見幾而作不俟終日者言君子既見事之幾微則須動作而應之不得待終其日言赴幾之速也易曰介于石不終日貞吉者此豫之六二辭也得位居中故守介如石見幾則動不待終其一日也介如石焉寧用終日斷可識矣者此夫子解釋此爻之辭十九顔子庶於幾以復初九明之子曰顔氏之子至元吉者正義曰此第八節上節明其知幾是聖人之德此節論賢人唯庶於幾雖未能知幾故引顔氏之子以明之也其殆庶幾乎者言聖人知幾顔子亞聖未能知幾但殆近庶慕而已以復卦初九既在卦初則能復於陽道是速而不逺則能復也所以無祇悔而有元吉也祇韓音祁支反注同王廙輔嗣音支二十爻繇偹物極變有衰世之意其稱名也雜而不越偹物極變故其名雜也各得其序不相踰越况爻繇之辭也于稽其類其衰世之意邪有憂患而後作易世衰則失得彌彰爻繇之辭所以辨失得故知衰世之意邪稽猶考也二十一易興其于中古作易其有憂患謂周易正義其于中古乎者謂易之爻卦之辭起于中古若易之爻卦之象則在上古伏犧之時但其時理尚質素聖道凝寂直觀其象足以垂教矣但中古之時事漸澆浮非象可以為教又須繫以文辭示其變動吉凶故爻卦之辭起於中古連山起於神農歸藏起於黃帝周易起於文王及周公也此之所論謂周易也作易者其有憂患乎者若無憂患何思何慮不須營作今既作易故知有憂患也身既憂患須垂法以示於後以防憂患之事故繫之以文辭明其失得與吉凶也二十二外內出入猶遁豐漸夷隱顯惟時上下無常剛柔相易不可為典要不可立定凖也唯變所適變動貴於適時趣舍存乎會也其出入以度外內使知懼明出入之度使物知外內之戒也出入猶行藏外內猶隱顯遁以逺時為吉豐以幽隱致凶漸以髙顯為美明夷以處昧利貞此外內之戒也二十三爻唯其時物初擬難知上成易知六爻相雜唯其時物也爻各存乎其時物事也其初難知其上易知本末也初辭擬之卒成之終夫事始於微而後至於著初者數之始擬議其端故難知也上者卦之終事皆成著故易知也二十四中爻辨是非猶乾二並總攝一卦正義若夫雜物撰德辨是與非則非其中爻不偹者言雜聚天下之物撰數衆人之德辨定是之與非則非其中之一爻不能偹具也謂一卦之內而有六爻各主其物各數其德欲辨定此六爻之是非則總歸於中爻言中爻統攝一卦之義多也若非中爻則各守一爻不能盡統卦義以中爻居一無偏故能統卦義也猶乾之九二見龍在田利見大人九五飛龍在天利見大人是總攝乾卦之義噫亦要存亡吉凶則居可知矣者噫者發聲之辭卦爻雖衆意義必在其中爻噫乎發歎要定或此卦存之與亡吉之與凶但觀其中爻則居然可知矣謂平居自知不須營為也知者觀其象辭則思過半矣者彖辭謂文王卦下之辭二十五二與四三與五同功而有內外貴賤異位二與四同功同隂功也而異位有內外也其善不同二多譽二處中和故多譽也四多懼近也位逼於君故多懼也柔之為道不利逺者其要無咎其用柔中也四之多懼以近君也柔之為道須援而濟故有不利逺者二之能無咎柔而處中也援于眷反三與五同功同陽功也而異位有貴賤也三多凶五多功貴賤之等也其柔危其剛勝邪三五陽位柔非其位處之則危居以剛健勝其任也二十六剛柔有正有偏夫所貴剛者間邪存誠動而不違其節者也所貴柔者含𢎞居中順而不失其貞也若剛以犯物則非剛之道柔以卑佞則非柔之義也二十七其辭危則謂危而不正韓謂憂危是故其辭危文王與紂之事危其辭也危者使平易者使傾易慢易也其道甚大百物不廢懼以終始其要無咎此之謂易之道也夫文不當而吉凶生則保其存者亡不忘亡者存有其治者亂不忘危者安懼以終始歸於無咎安危之所由爻象之大體也正義曰此一節明易之興起在紂之末世故其辭危者憂其傾危也以當紂世憂畏滅亡故作易辭多述憂危之事亦以垂法於後使保身危懼避其患難也周氏云謂當紂時不敢指斥紂惡故其辭微危而不正也今案康伯之注云文王與紂之事危其辭也則似周釋為得也案下覆云危者使平則以危謂憂危是非既未可明所以兩存其釋也危者使平者既有傾危以蒙大難文王有天下是危者使平也易者使傾者若其慢易不循易道者則使之傾覆若紂為凶惡以至誅滅也二十八吉則有祥象則知器占則知來是故變化云為吉事有祥象事知器占事知來夫變化云為者行其吉事則獲嘉祥之應觀其象事則知制器之方玩其占事則覩方來之驗也二十九聖人乘天地之正萬物各成其能天地設位聖人成能聖人乘天地之正萬物各成其能三十鬼謀凡寄卜筮以考吉凶人謀鬼謀百姓與能人謀凡議於衆以定得失也鬼謀凡寄卜筮以考吉凶也不役思慮而失得自明不勞探討而吉凶自著類萬物之情通幽深之故故百姓與能樂推而不厭也三十一有攻有取有感而後吉凶悔吝利害生八卦以象告以象告人爻彖以情言辭有險易而各得其情也剛柔雜居而吉凶可見矣變動以利言變而通之以盡利也吉凶以情遷吉凶無定唯人所動情順乘理以之吉情逆違道以陷凶故曰吉凶以情遷也是故愛惡相攻而吉凶生泯然同順何吉何凶愛惡相攻然後逆順者殊故吉凶生逺近相取而悔吝生相取猶相資也逺近之爻互相資取而後有悔吝也情偽相感而利害生情以感物則得利偽以感物則致害也凡易之情近而不相得則凶近凡比爻也易之情剛柔相摩變動相適者也近而不相得必有乖違之患或有相違而無患者得其應也相順而皆凶者乖於時也存事以考之則義可見矣或害之悔且吝夫無對於物而後盡全順之道豈可有欲害之者乎雖能免濟必有悔吝也或欲害之辭也三十二疏以大難小難分險阻正義德行恆易以知險者謂乾之德行恆易略不有艱難以此之故能知險之所興若不有易略則險也故行易以知險也德行恆簡以知阻者言坤之德行恆為簡靜不有煩亂以此之故知阻之所興也若不簡則為阻難故行簡靜以知阻也大難曰險乾以剛健故知其大難小難曰阻坤以柔順故知其小難知大難曰險者案坎卦彖云天險不可升地險山川丘陵言險不云阻故知險為大難險既為大明阻為小也三十三易能説諸物之心精妙諸侯之慮能研諸侯之慮者研精也諸侯既有為於萬物育飬萬物使令得所易既能説諸物之心則能精妙諸侯之慮謂諸侯以此易之道思慮諸物轉益精粹三十四人情不同其辭各異凡六等將叛者其辭慙者此以下説人情不同其辭各異將欲違叛己者貌雖相親辭不以實故其辭慙也中心疑者其辭枝者枝謂樹枝也吉人之辭寡者以其吉善辭直故辭寡也躁人之辭多者以其煩躁故其辭多也誣善之人其辭遊者遊謂浮遊誣罔善人其辭虛漫故言其辭遊也失其守者其辭屈者居不值時失其所守之志故其辭屈撓不能申也凡此辭者皆論易經之中有此六種之辭謂作易之人述此六人之意各凖望其意而制其辭也周易要義卷八

body:
  text: 周易要義卷六下宋魏了翁輯中孚至未濟一中孚及於微𨼆故利於涉難兑下巽上中孚豚魚吉利涉大川利貞正義曰中孚豚魚吉者中孚卦名也信發於中謂之中孚魚者蟲之幽𨼆豚者獸之微賤人主內有誠信則雖微𨼆之物信皆及矣莫不得所而獲吉故曰豚魚吉曰利涉大川利貞者微𨼆獲吉顯著可知既有誠信光被萬物萬物得宜以斯涉難何往不通故曰利涉大川信而不正凶邪之道故利在貞也中孚芳夫反信也艮宫逰魂卦二柔在內而剛得中說而巽然後孚彖曰中孚柔在內而剛得中說而巽孚有上四德然後乃孚乃化邦也信立而後邦乃化也柔在內而剛得中各得其所也剛得中則直而正柔在內則靜而順說而以巽則乖爭不作如此則物無巧競敦實之行著而篤信發乎其中矣豚魚吉信及豚魚也魚者蟲之幽隱者也豚者獸之微賤者也爭競之道不興中信之德淳著則雖微隱之物信皆及之三用中孚以涉難若乘木舟虛無溺利涉大川乘木舟虛也乘木於用舟之虛則終已無溺也用中孚以涉難若乘木舟虛也中孚以利貞乃應乎天也盛之至也四九二居重隂下與同類應為鶴鳴子和九二鳴鶴在隂其子和之我有好爵吾與爾靡之靡同縻處內而居重隂之下而履不失中不狥於外任其真者也立誠篤志雖在暗昧物亦應焉故曰鳴鶴在隂其子和之也不私權利唯德是與誠之至也故曰我有好爵與物散之正義曰象曰中心願者誠信之人願與同類相應得誠信而應之五三四兩隂相敵故鼓罷泣歌無恆六三得敵或鼓或罷或泣或歌三居少隂之上四居長隂之下對而不相比敵之謂也以隂居陽欲進者也欲進而閡敵故或鼓也四履正而承五非已所克故或罷也不勝而退懼見侵陵故或泣也四履乎順不與物校退而不見害故或歌也不量其力進退無恆憊可知也罷如字王肅音皮徐扶彼反正義象曰位不當者所以或鼓或罷進退無恆者止為不當其位妄進故也六六四月幾望馬匹亡謂處隂而絶類六四月幾望馬匹亡無咎居中孚之時處巽之始應說之初居正履順以承於五內毗元首外宣德化者也充乎隂德之盛故曰月幾望馬匹亡者棄羣類也若夫居盛德之位而與物校其競爭則失其所盛矣故曰絶類而上履正承尊不與三爭乃得無咎也幾音機又音祈京作近荀作既七上九信之終如翰音逺聞而無實上九翰音至可長也正義曰翰音登于天貞凶者翰髙飛也飛音者音飛而實不從之謂也上九處信之終信終則衰也信衰則詐起而忠篤內喪華美外揚若鳥之翰音登于天虛聲逺聞也故曰翰音登于天虛聲無實正之凶也故曰貞凶象曰何可長也者虛聲無實何可久長八小過即行過恭之類非罪過艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉飛鳥遺其音聲哀以求處上愈無所適下則得安愈上則愈窮莫若飛鳥也正義曰過於小事謂之小過即行過乎恭喪過乎哀之例是也褚氏云謂小人之行小有過差君子為過厚之行以矯之也如晏子狐裘之比也此因小人有過差故君子為過厚之行非即以過差釋卦名彖曰小過小者過而亨言因過得亨明非罪過故王於大過音之明雖義兼罪過得名止在君子為過行也而周氏等不悟此理兼以罪過釋卦名失之逺矣過為小事道乃可通小過古卧反義與大過同王肅云音戈兊宫遊魂卦九上逆下順有飛鳥之象有飛鳥之象焉不宜上宜下即飛鳥之象飛鳥遺之音不宜上宜下大吉上逆而下順也上則乘剛逆也下則承陽順也施過於不順凶莫大焉施過於順過更變而為吉也十飛鳥以凶謂進而之逆初六飛鳥以凶小過上逆下順而應在上卦進而之逆無所錯足飛鳥之凶也正義曰象曰不可以如何也者進而之逆孰知不可自取凶咎欲如何乎十一六二在小過而當位故云遇妣遇臣六二過其至可過也正義曰過其祖遇其妣不及其君遇其臣無咎者過而得之謂之遇六二在小過而當位是過而得之也祖始也謂初也妣者母之稱六二居內履中而正故謂之妣已過於初故曰過其祖也履得中位故曰遇其妣也過不至於僣盡於臣位而已故曰不及其君遇其臣無咎象曰臣不可過者臣不可自過其位也十二隂布而陽不交故小畜小過皆不雨六五密雲不雨自我西郊公弋取彼在穴小過者小者過於大也六得五位隂之盛也故密雲不雨至于西郊也夫雨者隂布於上而陽薄之而不得通則蒸而為雨今艮止於下而不交焉故不雨也是故小畜尚往而亨則不雨也小過陽不上交亦不雨也雖隂盛于上未能行其施也公者臣之極也五極隂盛故稱公也弋射也在穴者隱伏之物也小過者過小而難未大作猶在隱伏者也以隂質治小過能獲小過者也故曰公弋取彼在穴也除過之道不在取之是乃密雲未能雨也象曰密雲不雨已上也陽已上故止也十三既濟亨小言大小皆濟離下坎上既濟亨小利貞初吉終亂正義曰既萬事皆濟若小者不通則有所未濟故曰既濟亨小也小者尚亨何况于大則大小剛柔各當其位皆得其所當此之時非正不利故曰利貞也但人皆不能居安思危慎終如始故戒以今日既濟之初雖皆獲吉若不進德修業至於終極則危亂及之故曰初吉終亂也既濟節計反下卦同鄭云既已也盡也濟渡也坎宫三世卦亨小絶句以小連利貞者非十四水火炊㸑之象慮初吉終亂故豫防正義曰水在火上炊㸑之象飲食以之而成性命以之而濟故曰水在火上既濟也但既濟之道初吉終亂故君子思其後患而豫防之十五初剛在棄難雖曳輪濡尾不有咎正義曰曳其輪濡其尾無咎者初九處既濟之初體剛居下是始欲濟渡也始濟未涉於燥故輪曳而尾濡故云曳其輪濡其尾也但志在棄難雖復曳輪濡尾其義不有咎故云無咎十六處既濟之時婦喪茀不逐而自得六二婦喪其茀勿逐七日得居中履正處文明之盛而應乎五隂之光盛者也然居初三之間而近不相得上不承三下不比初夫以光盛之隂處於二陽之間近而不相得能無見侵乎故曰喪其茀也稱婦者以明自有夫而它人侵之也茀首飾也夫以中道執乎貞正而見侵者衆之所助也處既濟之時不容邪道者也時既明峻衆又助之竊之者逃竄而莫之歸矣量斯勢也不過七日不須己逐而自得也喪息浪反注皆同茀方拂反馬同于云馬佛也鄭云車蔽也子夏作佛荀作紱董作髢十七高宗德文明而勢憊故三年乃克鬼方九三髙宗至憊也正義曰髙宗伐鬼方三年克之者髙宗者殷王武丁之號也九三處既濟之時居文明之終履得其位是居衰末而能濟者髙宗伐鬼方以中興殷道事同此爻故取譬焉髙宗德實文明而勢甚衰憊不能即勝三年乃克故曰髙宗伐鬼方三年克之也小人勿用者勢既衰弱君子處之能建功立德故興而復之小人居之日就危亂必喪邦也故曰小人勿用象曰憊也者以衰憊之故故三年乃克之憊備拜反鄭云劣弱也十八有隙之棄舟而得濟以有衣袽六四繻有衣袽終日戒繻宜曰濡衣袽所以塞舟漏也履得其正而近不與三五相得夫有隙之棄舟而得濟者有衣袽也鄰於不親而得全者終日戒也繻而朱反鄭王肅云音須子夏作襦王廙同薛云古文作繻袽女居反絲袽也王肅音如說文作絮云緼也廣雅云絮塞也子夏作茹京作絮正義曰象曰有所疑者釋所以終日戒以不與三五相得懼其侵克有所疑故也二十祭祀莫盛於修德故牛祭不如禴九五東鄰至大來也正義曰牛祭之盛者也禴殷春祭之名祭之薄者也九五居既濟之時而處尊位物既濟矣將何為焉其所務者祭祀而已祭祀之盛莫盛修德九五履正居中動不為妄修德者也苟能修德雖薄可饗故曰實受其福也象曰不如西鄰之時也者詩云威儀孔時言周王廟中羣臣助祭皆威儀肅敬甚得其時二十一既濟道窮而進不已故有濡首之厲上六濡其首厲處既濟之極既濟道窮則之於未濟之於未濟則首先犯焉過進不已則遇於難故濡其首也將沒不久危莫先焉正義曰象曰何可久者首既被濡身將陷沒何可久長者也二十二小才不能濟難如小狐水汔濟而濡尾坎下離上未濟亨至無攸利正義曰未濟亨者未濟者未能濟渡之名也未濟之時小才居位不能建功立德拔難濟險若能執柔用中委任賢哲則未濟有可濟之理所以得通故曰未濟亨小狐汔濟濡其尾無攸利者汔者將盡之名小才不能濟難事同小狐雖能渡水而無餘力必須水汔方可涉川未及登岸而濡其尾濟不免濡豈有所利故曰小狐汔濟濡其尾無攸利也未濟離宫三世卦狐音胡汔音訖反說文云水涸也鄭云幾也二十三未濟柔得中而不違剛故亨彖曰未濟亨柔得中也以柔處中不違剛也能納剛健故得亨也小狐汔濟未出中也小狐不能涉大川須汔然後乃能濟處未濟之時必剛健拔難然後乃能濟汔乃能濟未能出險之中濡其尾無攸利不續終也小狐雖能渡而無餘力將濟而濡其尾力竭於斯不能續終險難猶未足以濟也濟未濟者必有餘力也雖不當位剛柔應也位不當故未濟剛柔應故可濟正義曰雖不當位剛柔應者重釋未濟之義凡言未者今日雖未濟後有可濟之理以其不當其位故即時未濟剛柔皆應足得相拯是有可濟之理故稱未濟不言不濟也二十五火水未濟故慎辨物居方使得所正義曰火在水上未濟者火在水上不成烹飪未能濟物故曰火在水上未濟君子以慎辨物居方者君子見未濟之時剛柔失正故用慎為德辨别衆物各居其方使皆得安其所所以濟也二十六既濟上六濡首始入難未濟初六濡尾已沒身初六濡其至知極也正義曰濡其尾吝者初六處未濟之初最居險下而欲上之其應進則溺身如小狐之渡川濡其尾也未濟之始始於既濟之上六也既濟上六濡其首言始入於難未沒其身此言濡其尾者進不知極已沒其身也然以隂處下非為進亢遂其志者也困則能反故不曰凶不能豫照事之幾萌困而後反頑亦甚矣故曰吝也象曰亦不知極者未濟之初始於既濟之上六濡首而不知遂濡其尾二十七九二失位而貞吉以居中而能行正九二曵其輪貞吉體剛履中而應於五五體隂柔應與而不自任者也居未濟之時處險難之中體剛中之質而見任與拯救危難經綸屯蹇者也用健拯難靖難在正而不違中故曵其輪貞吉象曰九二貞吉中以行正也位雖不正中以行正也正義曰曵其輪者言其勞也靖難在正然後得吉故曰曵其輪貞吉也象曰中以行正者釋九二失位而稱貞吉者位雖不正以其居中故能行正也二十八九四失位而貞吉悔亡有賞以正志得行九四貞吉悔亡震用伐鬼方三年有賞於大國處未濟之時而出險難之上居文明之初體乎剛質以近至尊雖履非其位志在乎正則吉而悔亡矣其志得行靡禁其威故曰震用伐鬼方也伐鬼方者興衰之征也故每至興衰而取義焉處文明之初始出於難其德未盛故曰三年也五居尊以柔體乎文明之盛不奪物功者也故以大國賞之正義曰象曰志行者釋九四失位而得貞吉悔亡者也以其正志得行而終吉故也二十九六五以柔居尊而付與九二故光暉而吉六五貞吉無悔君子之光有孚吉以柔居尊處文明之盛為未濟之主故必正然後乃吉吉乃無悔也夫以柔順文明之質居於尊位付與於能而不自役使武以文御剛以柔斯誠君子之光也付物以能而不疑也物則竭力功斯克矣故曰有孚吉正義曰有應於二是能付物以能而不自役有君子之光華矣象曰其暉吉者言君子之德光暉著見然後乃得吉也三十上九逸豫而飲酒不知節致濡首之難上九有孚于飲酒無咎濡其首有孚失是未濟之極則反於既濟既濟之道所任者當也所任者當則可信之無疑而已逸焉故曰有孚于飲酒無咎也以其能信於物故得逸豫而不憂於事之廢苟不憂於事之廢而耽於樂之甚則至于失節矣由於有孚失於是矣故曰濡其首有孚失是也正義曰象曰亦不知節者釋飲酒所以致濡首之難以其不知止節故也周易要義卷六下

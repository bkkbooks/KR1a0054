body:
  text: 周易要義卷六上宋魏了翁輯豐至節一豐是腆厚光大與豊字不同離下震上豐亨王假之大而亨者王之所至豐芳忠反字林匹忠反依字作豐今並三直畫猶是變體若曲下作豆禮字耳非也世人亂之久矣豐上敷忠反下虚啓反彖及序卦皆云大也案豐是腆厚光大之義鄭云豐之言倎充滿意也坎宫五世卦假庚白反至也下同馬古雅反大也二有不亨則憂未巳故豐亨乃得勿憂勿憂宜日中豐之爲義闡𢎞微細通夫𨼆滯者也爲天下之主而令㣲𨼆者不亨憂未已也故至豐亨乃得勿憂也用夫豐亨不憂之德宜處天中以徧照者也故曰宜日中也三日中下言中昃盈虛孔子因豐設戒正義曰勿憂宜日中宜照天下也者日中之時徧照天下王无憂慮德乃光被同於日中之盛故曰勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎者此孔子因豐設戒以上言王者以豐大之德照臨天下同於日中然盛必有衰自然常理日中至盛過中則昃月滿則盈過盈則食天之寒暑往來地之陵谷遷貿盈則與時而息虚則與時而消天地日月尚不能久况於人與鬼神而能長保其盈盛乎勉令及時修德仍戒居存慮亡也此辭先陳天地後言人鬼神者欲以輕譬重亦先尊後卑也而日月先天地者承上冝日中之文遂言其昃食四豐大也輔嗣音闡大之大注音闡大之大也正義曰闡者𢎞廣之言凡物之大其有二種一者自然之大二者由人之闡𢎞使太豐之爲義既闡𢎞微細則豐之稱大乃闡大之大非自然之大故音之也五雷電皆至則威且明故言刑獄象曰雷電皆至豐君子以折獄致刑文明以動不失情理也正義曰雷電皆至豐者雷者天之威動電者天之光耀雷電俱至則威明備斷决獄訟須得虛實之情致用刑罰必得輕重之中若動而不明則滛濫斯及故君子象於此卦而折獄致刑折之舌反六雖旬无咎旬猶均謂初四皆陽初九遇其配主雖旬无咎往有尚處豐之初其配在四以陽適陽以明之動能相光大者也旬均也雖均无咎往有尚也初四俱陽爻故曰均也旬如字王肅尚純反或音脣荀作均劉昞作鈞七處見斗之時信以發志故得吉日中者明之盛也斗見者闇之極也處盛明而豐其蔀故曰日中見斗不能自發故往得疑疾然履中當位處闇不邪有孚者也若辭也有孚可以發其志不困於闇故獲吉也蔀音部王廙同蒲户反王肅普苟反略例云大暗之謂蔀馬云蔀小也鄭作菩云小席正義曰二五俱隂二已見斗之闇不能自發以自求於五往則得見疑之疾象曰信以發志者雖處幽闇而不爲邪是有信以發其豐大之志故得吉也八沛見沬愈於蔀見斗如折右肱不可用九三豐其沛日中見沬折其右肱无咎沛幡幔所以禦盛光也沬微昧之明也應在上六志在乎隂雖愈乎以隂處隂亦未足以免於闇也所豐在沛日中見沬之謂也施明則見沬而已施用則折其右肱故可以自守而已未足用也沛本或作斾謂幡幔也又音普貝反姚云滂沛也王廙豐蓋反又補賴反徐普蓋反子夏傳作芾云小也鄭干作芾云祭祀之蔽膝九見沬或云斗杓後星或小星或輔星沬徐武蓋反又亡對反微昧之光也字林作昧亡太反云斗杓後星王肅云音妹鄭作妹服虔云日中而昬也子夏傳云昧星之小者馬同薛云輔星也象曰折其右肱終不可用也雖有左在不足用也正義曰處光大之時而豐沛見沬雖愈於豐蔀見斗然施於大事終不可用假如折其右肱自守而已乃得无咎十四初皆陽故曰旬曰夷又互言主九四豐其至吉行也正義曰豐其蔀者九四以陽居隂闇同於六二故曰豐其蔀也日中見斗遇其夷主吉者夷平也四應在初而同是陽爻能相顯發而得其吉故曰遇其夷主吉也言四之與初交相爲主者若賔主之義也若據所適初適四則以四爲主故曰遇其配主自四之初則以初爲主故曰遇其夷主也二陽體敵兩主均平故初謂四爲旬而四謂初爲夷也十一以陽處隂故爲蔀闇以遇陽故吉行象曰位不當者止謂以陽居隂而位不當所以豐蔀而闇者也幽不明也者日中盛明而反見斗以譬當光大而居隂是應明而幽闇不明也吉行也者處於隂位爲闇已甚更應於无隂由獲吉猶與陽相遇故得吉行也十二六五隂來適陽能自章顯故有慶譽六五來章有慶譽吉以隂之質來適尊陽之位能自光大章顯其徳獲慶譽也正義象曰有慶也者言六五以柔處尊履得其中故致慶譽也十三隂處極而在外故爲豐屋蔀家无人上六豐其屋蔀其家闚其户閴其無人三嵗不覿凶屋蔵䕃之物以隂處極而最在外不履於位深自幽𨼆絶跡深蔵者也既豐其屋又蔀其家屋厚家覆闇之甚也雖闚其户閴其無人棄其所處而自深藏也處於明動尚大之時而深自幽𨼆以髙其行治道未濟𨼆猶可也既濟而𨼆以治爲亂也豐其屋説文作豐云大屋也闚苦規反李登云小視閴苦鵙反徐苦鶂反一音苦馘反馬鄭云无人貎正義曰三年豐道已成而猶不見所以爲凶故曰豐其屋蔀其家闚其户閴其無人三嵗不覿凶十四處明動之時而天際翔故云自藏象曰天際翔也者如鳥之飛翔於天際言𨼆翳之深也自藏也者言非有爲而當自藏可以出而不出无事自為隱藏也藏如字衆家作戕慈羊反馬王肅云殘也鄭云傷也十五覊旅而獲小亨是旅之貞吉艮下離上旅小亨旅貞吉不足全夫貞吉之道唯足以爲旅之貞吉故特重曰旅貞吉也正義曰旅者客寄之名覊旅之稱失其本居而寄他方謂之爲旅既爲覊旅苟求僅存雖得自通非甚光大故旅之爲義小亨而已故曰旅小亨覊旅而獲小亨是旅之正吉故曰旅貞吉也旅力舉反覊旅也序卦云旅而無所容雜卦云親寡旅是也離宫一世卦王肅等以爲軍旅十六旅失其居智者宜有爲故言時義大旅之時義大矣哉旅者大散物皆失其所居之時也咸失其居物願所附豈非知者有爲之時十七柔處外而得中順陽故爲旅亨貞正義曰柔處於外弱而爲客之象若所託不得其主得其主而不能順從則乖逆而離散何由得自通而貞吉乎今柔雖處外而得中順陽則是得其所託而順從於主又止而麗明動不履妄故能於寄旅之時得通而正不失所安也十八艮止離明爲慎刑不留獄之𧰼象曰山上至留獄正義曰山上有火旅君子以明慎用刑而不留獄者火在山上逐草而行勢不久留故爲旅象又上下二體艮止離明故居子象此以静止明察審慎用刑而不稽留獄訟十九以寄旅而施下爲主所疑若齊之田氏九三旅焚其次䘮其童僕貞厲居下體之上與二相得以寄旅之身而爲施下之道與萌侵權主之所疑也故次焚僕䘮而身危也正義象曰亦以傷矣者言失其所安亦可悲陽也其義䘮者言以旅與下理是䘮亡也釋注與萌侵權言與得政事之萌漸侵奪主居之權勢若齊之田氏故爲主所疑也二十資斧諸家作齊斧或齋斧九四旅于處得其資斧我心不快斧所以斫除荆棘以安其舎者也雖處上體之下不先於物然而不得其位不獲平坦之地客于所處不得其次而得其資斧之地故其心不快也得其資斧如字子夏傳及衆家並作齊斧張軌云齊斧蓋黄鉞斧也張晏云整齊也應劭云齊利也虞喜志林云齊當作齋齋戒入廟而受斧下卦同二十一旅不可盛位猶射雉亡矢以承上故譽命六五射雉至上逮也正義曰射雉一矢亡終以譽命者覊旅不可以處盛位六五以覊旅之身進居貴位其位終不可保譬之射雉惟有一矢射之而復亡失其矢其雉終不可得故曰射雉一矢亡也然出文明之内能照禍福之幾不乗下以侵權而承上以自保故得終以美譽而見爵命故曰終以譽命也象曰上逮者逮及也以能承及於上故得終以譽命也二十二以旅居上故先笑後號喪牛而終莫聞上九鳥焚其巢旅人先笑後號咷喪牛于易凶居髙危而以爲宅巢之謂也客旅得上位故先笑也以旅而處于上極衆之所嫉也以不親之身而當嫉害之地必凶之道也故曰後號咷牛者稼穡之資以旅處上衆所同嫉故喪牛於易不在於難物莫之與危而不扶喪牛于易故莫之聞莫之聞則傷之者至矣正義象曰終莫之聞也者衆所同嫉危而不扶至于喪牛于易終无以一言告之使聞而悟也二十三二五以剛巽乎中正故能行志而申命巽下巽上巽小亨全以巽爲德是以小亨也上下皆巽不違其令命乃行也故申命行事之時上下不可以不巽也彖曰重巽以申命命乃行也未有不巽而命行也剛巽乎中正而志行以剛而能用巽處于中正物所與也柔皆順乎剛明無違逆故得小亨是以小亨利有攸往利見大人正義曰重巽以申命者此卦以卑巽爲名以申命爲義故就二體上下皆巽以明可以申命也剛巽乎中正而志行者須上下皆巽若命不可從則物所不與也故又因二五之爻剛而能巽不失其中所以志意得行申其命令也柔皆順乎剛者剛雖巽爲中正柔苦不順乎剛何以申其命乎二十四柔皆順剛非獻替之道故小亨案彖併舉小亨利有攸往利見大人以結之明柔皆順剛之意不専釋小亨二字而注獨言明无違逆故得小亨者褚氏云夫獻可替否其道乃𢎞柔皆順剛非大通之道所以文王繫小亨之辭孔子致皆順之釋案王注上下卦之體皆以巽言之柔不違剛正是巽義故知皆順之言通釋諸辭也二十五甲庚皆申命之謂言以漸化物九五貞吉悔亡无不利无初有終先庚三日後庚三日吉以陽居陽損於謙巽然秉乎中正以宣其令物莫之違故曰貞吉悔亡无不利也化不以漸卒以剛直用加於物故初皆不説也終於中正邪道以消故有終也申命令謂之庚夫以正齊物不可卒也民迷固久直不可肆也故先申三日令著之後復申三日然後誅而无咎怨矣甲庚皆申命之謂也先西薦反後胡豆反卒才忽反正義曰象曰位正中者若不以九居五位則不能以中正齊物物之不齊无由致吉是由九居五位故舉爻位言之二十六説恐陷於諂邪故利在貞正兌下兌上兌亨利貞正義曰兌説也説卦曰説萬物者莫説乎澤惠施民説所以爲亨以説説物恐陷諂邪其利在於貞正故曰兑亨利貞二十七兩澤相潤説爲朋友講習之象象曰麗澤至講習正義曰麗澤兌者麗猶連也兩澤相連潤説之盛故曰麗澤兌也君子以朋友講習者同門曰朋同志曰友朋友聚居講習道義相説之盛莫過於此也故君子象之以朋友講習也二十八六三履非位而求説爲來兌凶六三來兌凶以隂柔之質履非其位來求説者也非正而求説邪佞者也二十九商兌介疾謂大臣裁佞閑邪故有喜九四商兌未寧介疾有喜商商量裁制之謂也介隔也三爲佞説將近至尊故四以剛德裁而隔之匡内制外是以未寧也處於幾近閑邪介疾宜其有喜也商如字鄭云隠度也正義曰夫佞邪之人國之疾也防邪隔疾宜其有喜故曰介疾有喜象曰有慶者四能匡内制外介疾除邪此之爲喜乃爲至尊所善天下蒙賴故言有慶也三十居九五正當之位而孚于剥九五孚于剥有厲比於上六而與相得處尊正之位不説信乎陽而説信乎隂孚于剥之義也剥之爲義小人道長之謂比毗志反正義曰象曰位正當者以正當之位宜任君子而信小人故曰當位責之也三十一渙爲小人離大德亨通之時坎下巽上渙亨正義曰渙亨者渙卦名也序卦曰説而後散之故受之以渙然則渙者散釋之名雜卦曰渙離也此又渙是離散之號也蓋渙之爲義小人遭難離散奔迸而逃避也大德之人能於此時建功立德散難釋險故謂之爲渙能釋險難所以爲亨渙呼亂反散也序卦云離也離宫五世卦三十二二剛德居險四得位從上故能渙難正義曰渙亨者疊經文略舉名德也剛來而不窮柔得位乎外而上同者此就九二剛德居險六四得位從上釋所以能散釋險難而致亨通乃至利涉大川利貞等也二以剛德來居險中而不窮於險四以柔順得位於外而上與五同内剛无險困之難外柔无違逆之乖所以得散釋險難而通亨建立宗廟而祭享利涉大川而克濟利以正道而鳩民也三十三王居渙時可以有廟王假有廟王乃在中者此重明渙時可以有廟之義險難未夷方勞經略今在渙然之中故至於有廟也三十四上故乗木有功王不取象注乗木即涉難也木者專所以涉川也先儒皆以此卦坎下巽上以爲乗木水上涉川之象故言乗木有功王不用象直取况喻之義三十五渙然无難故先王以享上帝立宗廟象曰風行至立廟正義曰風行水上渙者風行水上激動波濤散釋之象故曰風行水上渙先王以享于帝立廟者先王以渙然无難之時享于上帝以告太平建立宗廟以祭祖考三十六九二奔初而得所安爲渙奔机九二渙奔至得願也正義曰渙奔其机者机承物者也初承於二謂初爲机二俱无應與初相得而初得逺難之道今二散奔歸初故曰渙奔其机也悔亡者初得散道而二往歸之得其所安故悔亡也象曰得願者違難奔散願得所安奔初獲安是得其願也三十七出號令以散險惟王居乃无咎九五渙汗至正位也正義曰渙汗其大號者人遇險阨驚怖而勞則汗從體出故以汗喻險阨也九五處尊履正在號令之中能行號令以散險阨者也故曰渙汗其大號也渙王居无咎者爲渙之主名位不可假人惟土居之乃得无咎故曰渙王居无咎象曰正位者釋王居无咎之義以九五是王之正位三十八節者制度之名過苦不可貞兌下坎上節亨苦節不可貞正義曰節卦名也彖曰節以制度雜卦云節止也然則節者制度之名節止之義制事有節其道乃亨故曰節亨節須得中爲節過苦傷於刻薄物所不堪不可復正故曰苦節不可貞也節薦絜反止也明禮有制度之名一云分段支節之義坎宫一世卦三十九剛柔分而二五以剛居中爲節彖曰節亨至不害民正義曰節亨剛柔分而剛得中者此就上下二體及二五剛中釋所以爲節得亨之義也坎剛居上兌柔處下是剛柔分也剛柔分男女别節之大義也二五以剛居中爲制之主所以得節節不違中所以得亨故曰節亨剛柔分而剛得中也苦節不可貞其道窮也爲節過苦不可爲正若以苦節爲正則其道困窮故曰苦節不可貞其道窮也説以行險當位以節中正以通者上言苦節不可貞其道窮者正由爲節不中則物所不説不可復正其道困窮故更就二體及四五當位重釋行節得亨之義以明苦節之窮也行險以説則爲節得中當位以節則可以爲正良由中而能正所以得通故曰中正以通此其所以爲亨也天地節而四時成者此下就天地與人廣明節義四十數度謂禮命多少德行謂人才優劣象曰澤上至德行正義曰澤上有水節者水在澤中乃得其節故曰澤上有水節也君子以制數度議德行者數度謂尊卑禮命之多少德行謂人才堪任之優劣君子象節以制其禮數等差皆使有度議人之德行任用皆使得宜四十一居節之初尚謹宻故不出户庭初九不出户庭无咎爲節之初將整離散而主制度者也故明於通塞慮於險僞不出户庭慎宻不失然後事濟而无咎也正義曰序卦云物不可以終離故受之以節以此卦承渙之後初九居節之初故曰將整離散而立法度也四十二九二不出門庭失時極故凶九二不出門庭凶初已造之至二宜宣其制矣而故匿之失時之極則遂廢矣故不出門庭則凶也象曰不出門庭凶失時極也正義曰象曰失時極者極中也應出不出失時之中所以爲凶四十三六三隂處陽柔乘剛不節又誰咎六三不節至誰咎也正義曰不節若則嗟若无咎者節者制度之卦處節之時位不可失六三以隂處陽以柔乘剛失位驕逆違節之道禍將及已以至哀嗟故曰不節若則嗟若也禍自己致无所怨咎故曰无咎四十四當位居中爲節之主甘而不苦九五甘節吉往有尚當位居中爲節之主不失其中不傷財不害民之謂也爲節而不苦非甘而何術斯以往往有尚也象曰甘節之吉居位中也正義曰甘節吉往有尚者甘者不苦之名也四十五節過而苦正之凶也而得悔亡上六苦節貞凶悔亡過節之中以至亢極苦節者也以斯施人物所不堪正之凶也以斯修身行在无妄故得悔亡周易要義卷六上
